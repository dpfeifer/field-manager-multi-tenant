function LineItemsEditor({ items, onChange }) {
  function update(idx, field, value) {
    const next = items.map((item, i) => {
      if (i !== idx) return item;
      const updated = { ...item, [field]: value };
      const q = parseFloat(updated.quantity);
      const r = parseFloat(updated.rate);
      updated.amount = (isFinite(q) ? q : 0) * (isFinite(r) ? r : 0);
      return updated;
    });
    onChange(next);
  }

  function add() {
    onChange([...items, { description: '', quantity: 1, rate: 0, amount: 0 }]);
  }

  function remove(idx) {
    onChange(items.filter((_, i) => i !== idx));
  }

  const total = items.reduce((sum, item) => sum + (parseFloat(item.amount) || 0), 0);

  return (
    <div>
      {items.length === 0 ? (
        <div className="line-items-empty">No line items yet. Click "Add line item" to start.</div>
      ) : (
        <table className="line-items-table">
          <thead>
            <tr>
              <th className="col-desc">Description</th>
              <th>Qty</th>
              <th>Rate</th>
              <th style={{ textAlign: 'right' }}>Amount</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            {items.map((item, idx) => (
              <tr key={idx}>
                <td className="col-desc">
                  <input
                    value={item.description || ''}
                    onChange={(e) => update(idx, 'description', e.target.value)}
                    placeholder="e.g. Weekly mow service"
                  />
                </td>
                <td className="col-qty">
                  <input
                    type="number" step="0.01" min="0"
                    value={item.quantity ?? ''}
                    onChange={(e) => update(idx, 'quantity', e.target.value)}
                  />
                </td>
                <td className="col-rate">
                  <input
                    type="number" step="0.01" min="0"
                    value={item.rate ?? ''}
                    onChange={(e) => update(idx, 'rate', e.target.value)}
                  />
                </td>
                <td className="col-amount">{formatPrice(item.amount)}</td>
                <td className="col-remove">
                  <button type="button" onClick={() => remove(idx)} aria-label="Remove">×</button>
                </td>
              </tr>
            ))}
          </tbody>
          <tfoot>
            <tr>
              <td colSpan="3" style={{ textAlign: 'right' }}>Total</td>
              <td className="col-amount">{formatPrice(total)}</td>
              <td></td>
            </tr>
          </tfoot>
        </table>
      )}
      <button type="button" className="secondary" onClick={add}>+ Add line item</button>
    </div>
  );
}

function lineItemsTotal(items) {
  return (items || []).reduce((sum, item) => sum + (parseFloat(item.amount) || 0), 0);
}

function invoiceMath(inv) {
  const subtotal = lineItemsTotal(inv.line_items);
  let discount = 0;
  const dv = parseFloat(inv.discount_value) || 0;
  if (dv > 0 && (inv.discount_type === 'percent' || inv.discount_type === 'amount')) {
    discount = inv.discount_type === 'percent' ? subtotal * dv / 100 : dv;
  }
  const discounted = Math.max(0, subtotal - discount);
  const taxRate = parseFloat(inv.tax_rate) || 0;
  const tax = discounted * taxRate / 100;
  const total = discounted + tax;
  return { subtotal, discount, discounted, taxRate, tax, total };
}

function isInvoiceLate(inv) {
  if (inv.status !== 'sent' || !inv.sent_date) return false;
  const sent = new Date(inv.sent_date);
  const ageDays = (Date.now() - sent.getTime()) / (1000 * 60 * 60 * 24);
  return ageDays > 30;
}

function daysOutstanding(inv) {
  if (!inv.sent_date) return 0;
  const sent = new Date(inv.sent_date);
  return Math.floor((Date.now() - sent.getTime()) / (1000 * 60 * 60 * 24));
}

function parseCSV(text) {
  const lines = text.split(/\r?\n/).map((l) => l).filter((l) => l.trim().length > 0);
  if (lines.length === 0) return { headers: [], rows: [] };
  function splitLine(line) {
    const out = [];
    let cur = '';
    let inQuote = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') {
        if (inQuote && line[i + 1] === '"') { cur += '"'; i++; }
        else { inQuote = !inQuote; }
      } else if (c === ',' && !inQuote) {
        out.push(cur);
        cur = '';
      } else {
        cur += c;
      }
    }
    out.push(cur);
    return out.map((s) => s.trim());
  }
  const headers = splitLine(lines[0]).map((h) => h.toLowerCase().replace(/\s+/g, '_'));
  const rows = lines.slice(1).map((line) => {
    const cells = splitLine(line);
    const row = {};
    headers.forEach((h, i) => { row[h] = cells[i] === undefined ? '' : cells[i]; });
    return row;
  });
  return { headers, rows };
}

function searchMatches(needle, ...fields) {
  if (!needle) return true;
  const n = needle.toLowerCase().trim();
  if (!n) return true;
  return fields.some((f) => f && String(f).toLowerCase().includes(n));
}

function downloadCSV(filename, headers, rows) {
  const escape = (cell) => {
    if (cell == null) return '';
    const s = String(cell);
    return /[",\n\r]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
  };
  const csv = [headers, ...rows].map((row) => row.map(escape).join(',')).join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 200);
}

function sortBy(items, key, dir = 'asc') {
  const arr = [...items];
  arr.sort((a, b) => {
    const av = typeof key === 'function' ? key(a) : a[key];
    const bv = typeof key === 'function' ? key(b) : b[key];
    if (av == null && bv == null) return 0;
    if (av == null) return 1;
    if (bv == null) return -1;
    if (typeof av === 'number' && typeof bv === 'number') return dir === 'asc' ? av - bv : bv - av;
    return dir === 'asc' ? String(av).localeCompare(String(bv)) : String(bv).localeCompare(String(av));
  });
  return arr;
}

function computeProjectedIncome(jobs, fromStr, toStr) {
  const todayStr = formatYMD(todayStart());
  const effectiveFrom = fromStr > todayStr ? fromStr : todayStr;
  if (effectiveFrom > toStr) return 0;
  let total = 0;
  for (const job of jobs) {
    if (!job.default_price) continue;
    const price = parseFloat(job.default_price);
    if (!isFinite(price) || price <= 0) continue;
    const upcoming = jobOccurrencesInRange(job, effectiveFrom, toStr).filter((o) => !o.completed);
    total += upcoming.length * price;
  }
  return total;
}

function InvoiceForm({ initial, customers, onSubmit, onCancel, busy }) {
  const terms = useTerms();
  const [customer_id, setCustomerId] = useState(initial?.customer_id || (customers[0]?.id || ''));
  const [description, setDescription] = useState(initial?.description || '');
  const [date, setDate] = useState(initial?.date || formatYMD(new Date()));
  const [line_items, setLineItems] = useState(initial?.line_items || []);
  const [discount_type, setDiscountType] = useState(initial?.discount_type || 'none');
  const [discount_value, setDiscountValue] = useState(initial?.discount_value ?? '');
  const [tax_rate, setTaxRate] = useState(initial?.tax_rate ?? '');

  const preview = invoiceMath({
    line_items,
    discount_type: discount_type === 'none' ? null : discount_type,
    discount_value,
    tax_rate,
  });

  function submit(e) {
    e.preventDefault();
    onSubmit({
      customer_id,
      description: description || null,
      date,
      line_items,
      discount_type: discount_type === 'none' ? null : discount_type,
      discount_value: parseFloat(discount_value) || 0,
      tax_rate: parseFloat(tax_rate) || 0,
    });
  }

  return (
    <form onSubmit={submit}>
      <div className="form-grid">
        <div className="full">
          <label>{terms.customer}</label>
          <select value={customer_id} onChange={(e) => setCustomerId(e.target.value)} required>
            {customers.length === 0 && <option value="">No {terms.customersLower} — add one first</option>}
            {customers.map((c) => <option key={c.id} value={c.id}>{customerDisplayName(c)}</option>)}
          </select>
        </div>
        <div>
          <label>Date</label>
          <input type="date" value={date} onChange={(e) => setDate(e.target.value)} required />
        </div>
        <div></div>
        <div className="full">
          <label>Description <span className="hint">(shown to the {terms.customerLower})</span></label>
          <input value={description} onChange={(e) => setDescription(e.target.value)} placeholder="e.g. May lawn service" />
        </div>
        <div className="full">
          <label>Line items</label>
          <LineItemsEditor items={line_items} onChange={setLineItems} />
        </div>
        <div>
          <label>Discount</label>
          <select value={discount_type} onChange={(e) => setDiscountType(e.target.value)}>
            <option value="none">No discount</option>
            <option value="percent">Percent (%)</option>
            <option value="amount">Fixed amount ($)</option>
          </select>
        </div>
        <div>
          <label>Discount value</label>
          <input
            type="number" step="0.01" min="0"
            value={discount_value}
            onChange={(e) => setDiscountValue(e.target.value)}
            disabled={discount_type === 'none'}
            placeholder="0"
          />
        </div>
        <div>
          <label>Tax rate <span className="hint">(%)</span></label>
          <input
            type="number" step="0.001" min="0"
            value={tax_rate}
            onChange={(e) => setTaxRate(e.target.value)}
            placeholder="0"
          />
        </div>
      </div>

      <div className="form-card" style={{ marginTop: 12, padding: 16, background: 'var(--row-hover)' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13, color: 'var(--text-muted)' }}>
          <span>Subtotal</span><span>{formatPrice(preview.subtotal)}</span>
        </div>
        {preview.discount > 0 && (
          <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13, color: 'var(--text-muted)' }}>
            <span>Discount</span><span>−{formatPrice(preview.discount)}</span>
          </div>
        )}
        {preview.tax > 0 && (
          <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13, color: 'var(--text-muted)' }}>
            <span>Tax ({preview.taxRate}%)</span><span>{formatPrice(preview.tax)}</span>
          </div>
        )}
        <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 15, fontWeight: 600, marginTop: 8, paddingTop: 8, borderTop: '1px solid var(--border)' }}>
          <span>Total</span><span>{formatPrice(preview.total)}</span>
        </div>
      </div>

      <div className="form-actions">
        <button type="submit" className="primary" disabled={busy}>
          {busy ? 'Saving...' : (initial ? 'Save changes' : 'Create invoice')}
        </button>
        <button type="button" className="secondary" onClick={onCancel} disabled={busy}>Cancel</button>
      </div>
    </form>
  );
}

function InvoicesView({ session }) {
  const terms = useTerms();
  const [invoices, setInvoices] = useState([]);
  const [customers, setCustomers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [mode, setMode] = useState('list');
  const [editing, setEditing] = useState(null);
  const [busy, setBusy] = useState(false);
  const [copiedId, setCopiedId] = useState(null);
  const [search, setSearch] = useState('');
  const [sort, setSort] = useState('newest');
  const [statusFilter, setStatusFilter] = useState('all');

  function exportInvoices() {
    const headers = ['invoice_number', 'customer', 'date', 'status', 'sent_date', 'paid_date', 'subtotal', 'discount', 'tax', 'total', 'description'];
    const rows = invoices.map((inv) => {
      const m = invoiceMath(inv);
      return [
        inv.invoice_number,
        customerDisplayName({
          first_name: inv.customer_first_name,
          last_name: inv.customer_last_name,
          business_name: inv.customer_business_name,
        }),
        inv.date, inv.status,
        inv.sent_date ? inv.sent_date.split('T')[0] : '',
        inv.paid_date ? inv.paid_date.split('T')[0] : '',
        m.subtotal.toFixed(2), m.discount.toFixed(2), m.tax.toFixed(2), m.total.toFixed(2),
        inv.description,
      ];
    });
    downloadCSV(`invoices-${formatYMD(new Date())}.csv`, headers, rows);
  }

  async function copyPublicLink(invoiceId) {
    const url = `${window.location.origin}/i/${invoiceId}`;
    try {
      await navigator.clipboard.writeText(url);
      setCopiedId(invoiceId);
      setTimeout(() => setCopiedId((curr) => (curr === invoiceId ? null : curr)), 2000);
    } catch {
      window.prompt('Copy this link:', url);
    }
  }

  const canMutate = ['admin', 'lead'].includes(session.user.role);

  const refresh = useCallback(async () => {
    setLoading(true); setError(null);
    try {
      const [invData, custData] = await Promise.all([
        apiRequest('/api/invoices', { slug: session.slug, token: session.token }),
        apiRequest('/api/customers', { slug: session.slug, token: session.token }),
      ]);
      setInvoices(invData);
      setCustomers(custData);
    } catch (err) { setError(err.message); }
    finally { setLoading(false); }
  }, [session.slug, session.token]);

  useEffect(() => { refresh(); }, [refresh]);

  async function createInvoice(values) {
    setBusy(true); setError(null);
    try {
      await apiRequest('/api/invoices', {
        method: 'POST', slug: session.slug, token: session.token, body: values,
      });
      setMode('list');
      await refresh();
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  async function updateInvoice(values) {
    setBusy(true); setError(null);
    try {
      await apiRequest(`/api/invoices/${editing.id}`, {
        method: 'PUT', slug: session.slug, token: session.token, body: values,
      });
      setEditing(null); setMode('list');
      await refresh();
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  async function deleteInvoice(id) {
    if (!confirm('Delete this invoice?')) return;
    setError(null);
    try {
      await apiRequest(`/api/invoices/${id}`, {
        method: 'DELETE', slug: session.slug, token: session.token,
      });
      await refresh();
    } catch (err) { setError(err.message); }
  }

  async function transition(id, path) {
    setError(null);
    try {
      await apiRequest(`/api/invoices/${id}/${path}`, {
        method: 'POST', slug: session.slug, token: session.token,
      });
      await refresh();
    } catch (err) { setError(err.message); }
  }

  async function emailInvoice(inv) {
    if (!confirm(`Email invoice #${inv.invoice_number} to ${inv.customer_email || 'the customer'}?`)) return;
    setError(null);
    try {
      await apiRequest(`/api/invoices/${inv.id}/send-email`, {
        method: 'POST', slug: session.slug, token: session.token,
      });
      await refresh();
      alert('Invoice emailed.');
    } catch (err) { setError(err.message); }
  }

  if (mode === 'create') {
    return (
      <div>
        <div className="page-header"><h2>New invoice</h2></div>
        {error && <div className="error">{error}</div>}
        {customers.length === 0 ? (
          <div className="form-card">
            <p style={{ margin: 0, color: 'var(--text-muted)' }}>You need a customer first. Add one in the Customers tab.</p>
            <div className="form-actions"><button className="secondary" onClick={() => setMode('list')}>Back</button></div>
          </div>
        ) : (
          <div className="form-card">
            <InvoiceForm customers={customers} onSubmit={createInvoice} onCancel={() => { setError(null); setMode('list'); }} busy={busy} />
          </div>
        )}
      </div>
    );
  }

  if (mode === 'edit' && editing) {
    return (
      <div>
        <div className="page-header"><h2>Edit invoice #{editing.invoice_number}</h2></div>
        {error && <div className="error">{error}</div>}
        <div className="form-card">
          <InvoiceForm
            initial={editing}
            customers={customers}
            onSubmit={updateInvoice}
            onCancel={() => { setError(null); setEditing(null); setMode('list'); }}
            busy={busy}
          />
        </div>
      </div>
    );
  }

  function matchesStatus(inv) {
    if (statusFilter === 'all') return true;
    if (statusFilter === 'late') return isInvoiceLate(inv);
    if (statusFilter === 'unpaid') return inv.status === 'draft' || inv.status === 'sent';
    return inv.status === statusFilter;
  }

  const filteredInvoices = invoices.filter((inv) => matchesStatus(inv) && searchMatches(
    search,
    String(inv.invoice_number),
    inv.description,
    inv.customer_first_name, inv.customer_last_name, inv.customer_business_name
  ));
  const invSortKey = sort === 'number' ? 'invoice_number'
    : sort === 'total' ? (inv) => lineItemsTotal(inv.line_items)
    : sort === 'status' ? 'status'
    : 'created_at';
  const sortedInvoices = sortBy(filteredInvoices, invSortKey, sort === 'oldest' ? 'asc' : sort === 'status' ? 'asc' : 'desc');

  return (
    <div>
      <div className="page-header">
        <h2>Invoices</h2>
        <div style={{ display: 'flex', gap: 8 }}>
          <button className="secondary" onClick={exportInvoices} disabled={invoices.length === 0}>Export</button>
          {canMutate && <button className="primary" onClick={() => { setError(null); setMode('create'); }}>+ New invoice</button>}
        </div>
      </div>
      <div className="filter-bar">
        <div className="chip-group">
          {['all', 'unpaid', 'draft', 'sent', 'paid', 'late'].map((f) => {
            const count = invoices.filter((inv) => {
              if (f === 'all') return true;
              if (f === 'late') return isInvoiceLate(inv);
              if (f === 'unpaid') return inv.status === 'draft' || inv.status === 'sent';
              return inv.status === f;
            }).length;
            const labels = { all: 'All', unpaid: 'Unpaid', draft: 'Draft', sent: 'Sent', paid: 'Paid', late: 'Late' };
            return (
              <button
                key={f}
                className={`chip ${statusFilter === f ? 'active' : ''}`}
                onClick={() => setStatusFilter(f)}
              >
                {labels[f]} <span style={{ opacity: 0.7 }}>({count})</span>
              </button>
            );
          })}
        </div>
      </div>
      <div className="search-bar" style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
        <input
          type="search"
          value={search}
          onChange={(e) => setSearch(e.target.value)}
          placeholder={`Search by invoice #, ${terms.customerLower}, or description...`}
          style={{ flex: 1 }}
        />
        <select value={sort} onChange={(e) => setSort(e.target.value)} style={{ width: 'auto' }}>
          <option value="newest">Sort: Newest</option>
          <option value="oldest">Sort: Oldest</option>
          <option value="number">Sort: Invoice # (high)</option>
          <option value="total">Sort: Total (high)</option>
          <option value="status">Sort: Status</option>
        </select>
      </div>
      {error && <div className="error">{error}</div>}
      <div className="list">
        {loading ? (
          <div className="list-empty">Loading...</div>
        ) : sortedInvoices.length === 0 ? (
          <div className="list-empty">
            {invoices.length === 0
              ? (canMutate ? `No invoices yet. Draft an invoice for any ${terms.customerLower} with completed work.` : 'No invoices yet.')
              : 'No invoices match these filters.'}
          </div>
        ) : (
          sortedInvoices.map((inv) => {
            const math = invoiceMath(inv);
            const late = isInvoiceLate(inv);
            const days = late ? daysOutstanding(inv) : 0;
            return (
              <div key={inv.id} className="row">
                <div className="info">
                  <div className="name">
                    Invoice #{inv.invoice_number}
                    <span className="price">{formatPrice(math.total)}</span>
                  </div>
                  <div className="meta">
                    {customerDisplayName({
                      first_name: inv.customer_first_name,
                      last_name: inv.customer_last_name,
                      business_name: inv.customer_business_name,
                    })} • {formatDateString(inv.date)} • <span className={`badge ${inv.status}`}>{inv.status}</span>
                    {late && <> · <span className="badge" style={{ background: 'var(--danger-bg)', color: 'var(--danger)' }}>Late · {days}d</span></>}
                  </div>
                  {inv.description && <div className="secondary-meta">{inv.description}</div>}
                </div>
                {canMutate && (
                  <div className="actions">
                    {(inv.status === 'draft' || inv.status === 'sent') && (
                      <button className="primary" onClick={() => emailInvoice(inv)}>Email to {terms.customerLower}</button>
                    )}
                    {inv.status === 'sent' && (
                      <button className="primary" onClick={() => transition(inv.id, 'mark-paid')}>Mark paid</button>
                    )}
                    {inv.status === 'paid' && (
                      <button className="secondary" onClick={() => transition(inv.id, 'mark-unpaid')}>Mark unpaid</button>
                    )}
                    {(inv.status === 'sent' || inv.status === 'paid') && (
                      <>
                        <button className="secondary" onClick={() => copyPublicLink(inv.id)}>
                          {copiedId === inv.id ? 'Copied!' : 'Copy link'}
                        </button>
                        <button className="secondary" onClick={() => window.open(`/i/${inv.id}`, '_blank')}>
                          View
                        </button>
                      </>
                    )}
                    <button className="secondary" onClick={() => { setEditing(inv); setMode('edit'); }}>Edit</button>
                    <button className="danger" onClick={() => deleteInvoice(inv.id)}>Delete</button>
                  </div>
                )}
              </div>
            );
          })
        )}
      </div>
    </div>
  );
}

function QuoteForm({ initial, customers, onSubmit, onCancel, busy }) {
  const terms = useTerms();
  const initialIsProspect = initial ? !initial.customer_id : false;
  const [isProspect, setIsProspect] = useState(initialIsProspect);
  const [customer_id, setCustomerId] = useState(initial?.customer_id || (customers[0]?.id || ''));
  const [prospect_name, setProspectName] = useState(initial?.prospect_name || '');
  const [prospect_email, setProspectEmail] = useState(initial?.prospect_email || '');
  const [prospect_phone, setProspectPhone] = useState(initial?.prospect_phone || '');
  const [prospect_address, setProspectAddress] = useState(initial?.prospect_address || '');
  const [description, setDescription] = useState(initial?.description || '');
  const [notes, setNotes] = useState(initial?.notes || '');
  const [line_items, setLineItems] = useState(initial?.line_items || []);
  const [status, setStatus] = useState(initial?.status || 'draft');

  function submit(e) {
    e.preventDefault();
    const payload = {
      description: description || null,
      notes: notes || null,
      line_items, status,
    };
    if (isProspect) {
      payload.customer_id = null;
      payload.prospect_name = prospect_name;
      payload.prospect_email = prospect_email || null;
      payload.prospect_phone = prospect_phone || null;
      payload.prospect_address = prospect_address || null;
    } else {
      payload.customer_id = customer_id;
    }
    onSubmit(payload);
  }

  return (
    <form onSubmit={submit}>
      <div className="form-grid">
        <div className="full">
          <label>Recipient</label>
          <div className="toggle-group">
            <button type="button" className={!isProspect ? 'active' : ''} onClick={() => setIsProspect(false)}>Existing {terms.customerLower}</button>
            <button type="button" className={isProspect ? 'active' : ''} onClick={() => setIsProspect(true)}>Prospect</button>
          </div>
        </div>
        {!isProspect ? (
          <div className="full">
            <label>{terms.customer}</label>
            <select value={customer_id} onChange={(e) => setCustomerId(e.target.value)} required>
              {customers.length === 0 && <option value="">No {terms.customersLower} — add one first</option>}
              {customers.map((c) => <option key={c.id} value={c.id}>{customerDisplayName(c)}</option>)}
            </select>
          </div>
        ) : (
          <>
            <div className="full">
              <label>Prospect name</label>
              <input value={prospect_name} onChange={(e) => setProspectName(e.target.value)} required />
            </div>
            <div>
              <label>Email <span className="hint">(optional)</span></label>
              <input type="email" value={prospect_email} onChange={(e) => setProspectEmail(e.target.value)} />
            </div>
            <div>
              <label>Phone <span className="hint">(optional)</span></label>
              <input value={prospect_phone} onChange={(e) => setProspectPhone(e.target.value)} />
            </div>
            <div className="full">
              <label>Address <span className="hint">(optional)</span></label>
              <textarea value={prospect_address} onChange={(e) => setProspectAddress(e.target.value)} />
            </div>
          </>
        )}
        <div className="full">
          <label>Description <span className="hint">(shown on the quote)</span></label>
          <input value={description} onChange={(e) => setDescription(e.target.value)} />
        </div>
        <div className="full">
          <label>Notes <span className="hint">(internal)</span></label>
          <textarea value={notes} onChange={(e) => setNotes(e.target.value)} />
        </div>
        <div className="full">
          <label>Line items</label>
          <LineItemsEditor items={line_items} onChange={setLineItems} />
        </div>
        <div>
          <label>Status</label>
          <select value={status} onChange={(e) => setStatus(e.target.value)}>
            <option value="draft">Draft</option>
            <option value="sent">Sent</option>
            <option value="accepted">Accepted</option>
            <option value="declined">Declined</option>
          </select>
        </div>
      </div>
      <div className="form-actions">
        <button type="submit" className="primary" disabled={busy}>
          {busy ? 'Saving...' : (initial ? 'Save changes' : 'Create quote')}
        </button>
        <button type="button" className="secondary" onClick={onCancel} disabled={busy}>Cancel</button>
      </div>
    </form>
  );
}

function splitProspectName(name) {
  if (!name) return { first: '', last: '', business: '' };
  const parts = name.trim().split(/\s+/);
  if (parts.length === 1) return { first: parts[0], last: '', business: '' };
  return { first: parts[0], last: parts.slice(1).join(' '), business: '' };
}

      <div className="form-grid">

          <label>First name</label>
          <input value={first_name} onChange={(e) => setFirst(e.target.value)} />
        </div>
        <div>
          <label>Last name</label>
          <input value={last_name} onChange={(e) => setLast(e.target.value)} />

          <label>Phone</label>
          <input value={phone} onChange={(e) => setPhone(e.target.value)} />

        <div>
          <label>Email</label>
          <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} />
        </div>
        <div className="full">
          <label>Address</label>
          <textarea value={address} onChange={(e) => setAddress(e.target.value)} />

        <div className="full">
          <label>Notes <span className="hint">(optional)</span></label>
          <textarea value={notes} onChange={(e) => setNotes(e.target.value)} />

      <div className="form-actions">
        <button type="submit" className="primary" disabled={busy}>
          {busy ? 'Creating...' : `Create ${terms.customerLower}`}
        </button>
        <button type="button" className="secondary" onClick={onCancel} disabled={busy}>Cancel</button>
      </div>
    </form>
  );

function quoteRecipientName(q) {
  if (q.customer_id) {
    return customerDisplayName({
      first_name: q.customer_first_name,
      last_name: q.customer_last_name,
      business_name: q.customer_business_name,
    });
  }
  return q.prospect_name || '(unnamed prospect)';
}

  async function deleteQuote(id) {
    if (!confirm('Delete this quote?')) return;
    setError(null);
    try {
      await apiRequest(`/api/quotes/${id}`, { method: 'DELETE', slug: session.slug, token: session.token });
      await refresh();
    } catch (err) { setError(err.message); }
  }

  async function emailQuote(q) {
    const email = q.customer_email || q.prospect_email;
    if (!email) {
      alert('This recipient has no email on file.');
      return;
    }
    if (!confirm(`Email this quote to ${email}?`)) return;
    setError(null);
    try {
      await apiRequest(`/api/quotes/${q.id}/send-email`, {
        method: 'POST', slug: session.slug, token: session.token,
      });
      await refresh();
      alert('Quote emailed.');
    } catch (err) { setError(err.message); }
  }

  async function promoteToCustomer(values) {
    setBusy(true); setError(null);
    try {
      await apiRequest(`/api/quotes/${editing.id}/promote-to-customer`, {
        method: 'POST', slug: session.slug, token: session.token, body: values,
      });
      setEditing(null); setMode('list');
      await refresh();
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  async function createInvoiceFromQuote(quoteId) {
    if (!confirm('Create a draft invoice from this quote? The line items will be copied and the quote will be marked accepted.')) return;
    setError(null);
    try {
      await apiRequest(`/api/quotes/${quoteId}/create-invoice`, {
        method: 'POST', slug: session.slug, token: session.token,
      });
      await refresh();
      alert('Draft invoice created. Switch to the Invoices tab to review and send.');
    } catch (err) { setError(err.message); }
  }

  async function createJobFromQuote(values) {
    setBusy(true); setError(null);
    try {
      await apiRequest('/api/jobs', {
        method: 'POST', slug: session.slug, token: session.token, body: values,
      });
      if (['draft', 'sent'].includes(editing.status)) {
        await apiRequest(`/api/quotes/${editing.id}`, {
          method: 'PUT', slug: session.slug, token: session.token, body: { status: 'accepted' },
        });
      }
      setEditing(null); setMode('list');
      await refresh();
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  if (mode === 'create') {
    return (
      <div>
        <div className="page-header"><h2>New quote</h2></div>
        {error && <div className="error">{error}</div>}
        <div className="form-card">
          <QuoteForm customers={customers} onSubmit={createQuote} onCancel={() => { setError(null); setMode('list'); }} busy={busy} />
        </div>
      </div>
    );
  }

  if (mode === 'edit' && editing) {
    return (
      <div>
        <div className="page-header"><h2>Edit quote</h2></div>
        {error && <div className="error">{error}</div>}
        <div className="form-card">
          <QuoteForm
            initial={editing}
            customers={customers}
            onSubmit={updateQuote}
            onCancel={() => { setError(null); setEditing(null); setMode('list'); }}
            busy={busy}
          />
        </div>
      </div>
    );
  }

  if (mode === 'promote' && editing) {
    return (
      <div>
        <div className="page-header"><h2>Promote prospect to {terms.customerLower}</h2></div>
        {error && <div className="error">{error}</div>}
        <div className="form-card">
          <PromoteForm
            quote={editing}
            onSubmit={promoteToCustomer}
            onCancel={() => { setError(null); setEditing(null); setMode('list'); }}
            busy={busy}
          />
        </div>
      </div>
    );
  }

  if (mode === 'createJob' && editing) {
    const total = lineItemsTotal(editing.line_items);
    const initial = {
      customer_id: editing.customer_id,
      title: editing.description || 'Job from quote',
      description: null,
      type: 'single',
      date: formatYMD(new Date()),
      default_price: total > 0 ? total : null,
      assigned_to: [],
    };
    return (
      <div>
        <div className="page-header"><h2>Create {terms.jobLower} from quote</h2></div>
        {error && <div className="error">{error}</div>}
        <div className="form-card">
          <JobForm
            initial={initial}
            customers={customers}
            users={users}
            onSubmit={createJobFromQuote}
            onCancel={() => { setError(null); setEditing(null); setMode('list'); }}
            busy={busy}
          />
        </div>
      </div>
    );
  }

  const filteredQuotes = quotes.filter((q) => searchMatches(
    search,
    q.description,
    quoteRecipientName(q),
    q.prospect_email,
    q.prospect_phone
  ));
  const qSortKey = sort === 'total' ? (q) => lineItemsTotal(q.line_items)
    : sort === 'status' ? 'status'
    : 'created_at';
  const sortedQuotes = sortBy(filteredQuotes, qSortKey, sort === 'oldest' ? 'asc' : sort === 'status' ? 'asc' : 'desc');

  return (
    <div>
      <div className="page-header">
        <h2>Quotes</h2>
        <div style={{ display: 'flex', gap: 8 }}>
          <button className="secondary" onClick={exportQuotes} disabled={quotes.length === 0}>Export</button>
          {canMutate && <button className="primary" onClick={() => { setError(null); setMode('create'); }}>+ New quote</button>}
        </div>
      </div>
      <div className="search-bar" style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
        <input
          type="search"
          value={search}
          onChange={(e) => setSearch(e.target.value)}
          placeholder="Search by customer, prospect, or description..."
          style={{ flex: 1 }}
        />
        <select value={sort} onChange={(e) => setSort(e.target.value)} style={{ width: 'auto' }}>
          <option value="newest">Sort: Newest</option>
          <option value="oldest">Sort: Oldest</option>
          <option value="total">Sort: Total (high)</option>
          <option value="status">Sort: Status</option>
        </select>
      </div>
      {error && <div className="error">{error}</div>}
      <div className="list">
        {loading ? (
          <div className="list-empty">Loading...</div>
        ) : sortedQuotes.length === 0 ? (
          <div className="list-empty">
            {quotes.length === 0
              ? (canMutate ? 'No quotes yet. Draft a quote for an existing customer or a prospect.' : 'No quotes yet.')
              : 'No quotes match this search.'}
          </div>
        ) : (
          sortedQuotes.map((q) => {
            const total = lineItemsTotal(q.line_items);
            return (
              <div key={q.id} className="row">
                <div className="info">
                  <div className="name">
                    {quoteRecipientName(q)}
                    {!q.customer_id && <span className="hint" style={{ marginLeft: 8 }}>(prospect)</span>}
                    <span className="price">{formatPrice(total)}</span>
                  </div>
                  <div className="meta">
                    {formatDateString(q.created_at.split('T')[0])} • <span className={`badge ${q.status}`}>{q.status}</span>
                  </div>
                  {q.description && <div className="secondary-meta">{q.description}</div>}
                </div>
                {canMutate && (
                  <div className="actions">
                    <button className="primary" onClick={() => emailQuote(q)}>Email</button>
                    {!q.customer_id && (
                      <button className="secondary" onClick={() => { setError(null); setEditing(q); setMode('promote'); }}>Promote to {terms.customerLower}</button>
                    )}
                    {q.customer_id && (
                      <>
                        {features.invoices && (
                          <button className="secondary" onClick={() => createInvoiceFromQuote(q.id)}>Create invoice</button>
                        )}
                        <button className="secondary" onClick={() => { setError(null); setEditing(q); setMode('createJob'); }}>Create {terms.jobLower}</button>
                      </>
                    )}
                    <button className="secondary" onClick={() => { setEditing(q); setMode('edit'); }}>Edit</button>
                    <button className="danger" onClick={() => deleteQuote(q.id)}>Delete</button>
                  </div>
                )}
              </div>
            );
          })
        )}
      </div>
    </div>
  );
}

function CopyButton({ text, label = 'Copy' }) {
  const [copied, setCopied] = useState(false);
  async function doCopy() {
    try {
      await navigator.clipboard.writeText(text);
      setCopied(true);
      setTimeout(() => setCopied(false), 1500);
    } catch (err) {
      alert('Could not copy. The link is: ' + text);
    }
  }
  return (
    <button type="button" className="secondary" onClick={doCopy}>
      {copied ? 'Copied!' : label}
    </button>
  );
}

      setForm({
        company_name: data.company_name || '',
        logo_url: data.logo_url || '',

        phone: data.phone || '',

                <label>Plural</label>
                <input value={form.job_label_plural || ''} onChange={(e) => setField('job_label_plural', e.target.value)} placeholder="Jobs" disabled={!isAdmin} />

      {subView === 'company' && (

      )}
      <form onSubmit={submit} className="form-card">
        <div className="section-heading" style={{ marginTop: 0 }}>Public booking link</div>
        <p className="hint" style={{ marginTop: 0, marginBottom: 8 }}>

        <div style={{ display: 'flex', gap: 8, alignItems: 'center', marginBottom: 4 }}>
          <input

          <CopyButton text={`${window.location.origin}/book/${session.slug}`} />

        <div className="section-heading">Company</div>
        <div className="form-grid">
          <div className="full">
            <label>Company name</label>
            <input value={form.company_name} onChange={(e) => setField('company_name', e.target.value)} disabled={!isAdmin} />

          <div className="full">
            <label>Logo URL</label>

        {isAdmin && (
          <div className="form-actions">
            <button type="submit" className="primary" disabled={busy}>

  );
}

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const ms = new Date(dateStr).getTime() - Date.now();
  return Math.ceil(ms / (1000 * 60 * 60 * 24));
}

function BillingBanner({ status, trialDaysLeft, isAdmin }) {
  if (!status) return null;
  let body = null;
  let bg = '#fff5e6';
  let color = '#8c5a00';

  if (status === 'trialing' && trialDaysLeft !== null && trialDaysLeft > 3) {
    bg = 'var(--tinted)';
    color = 'var(--text-muted)';
    body = isAdmin
      ? <>You're on a free trial — {trialDaysLeft} days left. <button className="link-button" style={{ color: 'inherit', textDecoration: 'underline' }} onClick={() => navigate('/billing')}>Add billing now</button> to lock in your subscription.</>
      : <>This organization is on a free trial — {trialDaysLeft} days left.</>;
  } else if (status === 'trialing' && trialDaysLeft !== null && trialDaysLeft <= 3 && trialDaysLeft > 0) {
    body = isAdmin
      ? <>Your free trial ends in {trialDaysLeft} {trialDaysLeft === 1 ? 'day' : 'days'}. <button className="link-button" style={{ color: 'inherit', textDecoration: 'underline' }} onClick={() => navigate('/billing')}>Subscribe to keep editing</button>.</>
      : <>Your organization's free trial ends in {trialDaysLeft} {trialDaysLeft === 1 ? 'day' : 'days'}. Ask an admin to subscribe.</>;
  } else if (status === 'trial_expired' || (status === 'trialing' && trialDaysLeft !== null && trialDaysLeft <= 0)) {
    bg = 'var(--danger-bg)'; color = 'var(--danger)';
    body = isAdmin
      ? <>Trial ended. You can still record completions, but editing is locked. <button className="link-button" style={{ color: 'inherit', textDecoration: 'underline' }} onClick={() => navigate('/billing')}>Subscribe</button>.</>
      : <>Trial ended. Ask an admin to subscribe to re-enable editing.</>;
  } else if (status === 'past_due') {
    bg = 'var(--danger-bg)'; color = 'var(--danger)';
    body = isAdmin
      ? <>Your latest payment failed. <button className="link-button" style={{ color: 'inherit', textDecoration: 'underline' }} onClick={() => navigate('/billing')}>Update payment method</button>.</>
      : <>Payment is past due. Ask an admin to update the payment method.</>;
  } else if (status === 'canceled') {
    bg = 'var(--danger-bg)'; color = 'var(--danger)';
    body = isAdmin
      ? <>Subscription canceled. Editing is locked. <button className="link-button" style={{ color: 'inherit', textDecoration: 'underline' }} onClick={() => navigate('/billing')}>Resubscribe</button>.</>
      : <>Subscription canceled. Ask an admin to resubscribe.</>;
  }

  if (!body) return null;
  return (
    <div style={{
      background: bg, color, padding: '10px 24px', textAlign: 'center',
      fontSize: 13, fontWeight: 500, borderBottom: '1px solid var(--border)',
    }}>
      {body}
    </div>
  );
}

function BillingView({ session }) {
  const [status, setStatus] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [busy, setBusy] = useState(false);

  const params = new URLSearchParams(window.location.search);
  const justSucceeded = params.get('success') === 'true';
  const justCanceled = params.get('canceled') === 'true';

  const isAdmin = session.user.role === 'admin';

  const load = useCallback(async () => {
    setLoading(true); setError(null);
    try {
      const data = await apiRequest('/api/billing/status', { slug: session.slug, token: session.token });
      setStatus(data);
    } catch (err) { setError(err.message); }
    finally { setLoading(false); }
  }, [session.slug, session.token]);

  useEffect(() => { load(); }, [load]);

  async function startCheckout() {
    setBusy(true); setError(null);
    try {
      const r = await apiRequest('/api/billing/checkout', {
        method: 'POST', slug: session.slug, token: session.token,
      });
      window.location.href = r.url;
    } catch (err) { setError(err.message); setBusy(false); }
  }

  async function openPortal() {
    setBusy(true); setError(null);
    try {
      const r = await apiRequest('/api/billing/portal', {
        method: 'POST', slug: session.slug, token: session.token,
      });
      window.location.href = r.url;
    } catch (err) { setError(err.message); setBusy(false); }
  }

  return (
    <div>
      <div className="page-header"><h2>Billing</h2></div>

      {justSucceeded && (
        <div className="error" style={{ background: '#e8f1ec', color: '#1f6f4a' }}>
          Payment succeeded. Your subscription is active.
        </div>
      )}
      {justCanceled && (
        <div className="error" style={{ background: 'var(--tinted)', color: 'var(--text)' }}>
          Checkout canceled. You can subscribe anytime.
        </div>
      )}
      {error && <div className="error">{error}</div>}

      {loading ? (
        <div className="list-empty">Loading...</div>
      ) : !status ? null : (
        <>
          <div className="form-card">
            <div className="section-heading" style={{ marginTop: 0 }}>Current plan</div>
            <div style={{ fontSize: 14 }}>
              <div style={{ marginBottom: 10 }}>
                Status: <span className={`badge ${badgeForStatus(status.status)}`}>{statusLabel(status.status, status.trial_ends_at)}</span>
              </div>
              {status.status === 'trialing' && status.trial_ends_at && (
                <div style={{ color: 'var(--text-muted)' }}>
                  Free trial ends {formatDateString(status.trial_ends_at.split('T')[0])} — {daysUntil(status.trial_ends_at)} {daysUntil(status.trial_ends_at) === 1 ? 'day' : 'days'} left.
                </div>
              )}
              {status.status === 'free' && (
                <div style={{ color: 'var(--text-muted)' }}>
                  Comp'd account — no billing. (Set by platform staff.)
                </div>
              )}
              {status.status === 'active' && (
                <div style={{ color: 'var(--text-muted)' }}>Subscription is active — $29/month.</div>
              )}
              {status.status === 'past_due' && (
                <div style={{ color: 'var(--danger)' }}>Payment failed. Update your payment method to avoid losing access.</div>
              )}
              {status.status === 'canceled' && (
                <div style={{ color: 'var(--danger)' }}>Subscription canceled. Resubscribe to restore editing.</div>
              )}
            </div>

            {isAdmin && (
              <div className="form-actions">
                {(status.status === 'trialing' || status.status === 'canceled') && (
                  <button className="primary" disabled={busy} onClick={startCheckout}>
                    {busy ? 'Loading...' : 'Subscribe — $29/month'}
                  </button>
                )}
                {(status.status === 'active' || status.status === 'past_due') && status.has_subscription && (
                  <button className="primary" disabled={busy} onClick={openPortal}>
                    {busy ? 'Loading...' : 'Manage billing'}
                  </button>
                )}
                <button className="secondary" disabled={busy} onClick={load}>Refresh</button>
              </div>
            )}
            {!isAdmin && (
              <p className="hint" style={{ marginTop: 16 }}>
                Only admins can change billing. Ask your admin to make changes.
              </p>
            )}
          </div>
        </>
      )}
    </div>
  );
}

function badgeForStatus(s) {
  if (s === 'free' || s === 'active') return 'paid';
  if (s === 'trialing') return 'sent';
  if (s === 'past_due' || s === 'canceled') return 'declined';
  return 'draft';
}

function statusLabel(s, trialEnds) {
  if (s === 'free') return 'Free';
  if (s === 'trialing') {
    const d = daysUntil(trialEnds);
    return d !== null && d <= 0 ? 'Trial expired' : 'Free trial';
  }
  if (s === 'active') return 'Active';
  if (s === 'past_due') return 'Past due';
  if (s === 'canceled') return 'Canceled';
  return s;
}

  const [me, setMe] = useState(null);
  const [resentVerify, setResentVerify] = useState(false);

  const reloadMe = useCallback(async () => {
    try {
      const m = await apiRequest('/api/auth/me', { slug: session.slug, token: session.token });
      setMe(m);
    } catch (err) { console.error('me reload failed', err); }
  }, [session.slug, session.token]);

  const [pendingRequestsCount, setPendingRequestsCount] = useState(0);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {

          apiRequest('/api/billing/status', { slug: session.slug, token: session.token }),
          apiRequest('/api/auth/me', { slug: session.slug, token: session.token }),
          apiRequest('/api/booking-requests/count', { slug: session.slug, token: session.token })

      <div className="nav">

        <button className={view === 'jobs' ? 'active' : ''} onClick={() => navigate('/jobs')}><Icon name="jobs" />{terms.jobs}</button>
        <button className={view === 'customers' ? 'active' : ''} onClick={() => navigate('/customers')}><Icon name="customers" />{terms.customers}</button>

function DashboardView({ session }) {
  const [jobs, setJobs] = useState([]);
  const [invoices, setInvoices] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [completing, setCompleting] = useState(null);
  const [busy, setBusy] = useState(false);

  const refresh = useCallback(async () => {
    setLoading(true); setError(null);
    try {
      const [jobsData, invoicesData] = await Promise.all([
        apiRequest('/api/jobs', { slug: session.slug, token: session.token }),
        apiRequest('/api/invoices', { slug: session.slug, token: session.token }),
      ]);
      setJobs(jobsData);
      setInvoices(invoicesData);
    } catch (err) { setError(err.message); }
    finally { setLoading(false); }
  }, [session.slug, session.token]);

  useEffect(() => { refresh(); }, [refresh]);

  async function completeJob(values) {
    setBusy(true); setError(null);
    try {
      await apiRequest(`/api/jobs/${completing.job.id}/complete`, {
        method: 'POST', slug: session.slug, token: session.token, body: values,
      });
      setCompleting(null);
      await refresh();
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  async function markInvoicePaid(id) {
    setError(null);
    try {
      await apiRequest(`/api/invoices/${id}/mark-paid`, {
        method: 'POST', slug: session.slug, token: session.token,
      });
      await refresh();
    } catch (err) { setError(err.message); }
  }

  const today = todayStart();
  const todayStr = formatYMD(today);
  const weekAgoStr = formatYMD(addDays(today, -6));
  const overdueStart = formatYMD(addDays(today, -90));
  const yesterdayStr = formatYMD(addDays(today, -1));

  const todayOccurrences = jobs.flatMap((j) => jobOccurrencesInRange(j, todayStr, todayStr));
  const overdueOccurrences = jobs
    .flatMap((j) => jobOccurrencesInRange(j, overdueStart, yesterdayStr))
    .filter((o) => !o.completed)
    .sort((a, b) => b.date.localeCompare(a.date));
  const outstandingInvoices = invoices.filter((i) => i.status === 'sent');

  const outstandingTotal = outstandingInvoices.reduce((sum, i) => sum + invoiceMath(i).total, 0);
  const weekRevenue = invoices
    .filter((i) => i.status === 'paid' && i.paid_date && i.paid_date.split('T')[0] >= weekAgoStr && i.paid_date.split('T')[0] <= todayStr)
    .reduce((sum, i) => sum + invoiceMath(i).total, 0);
  const next7DaysProjected = computeProjectedIncome(jobs, todayStr, formatYMD(addDays(today, 6)));

  if (completing) {
    return (
      <div>
        <div className="page-header"><h2>Mark complete: {completing.job.title}</h2></div>
        {error && <div className="error">{error}</div>}
        <div className="form-card">
          <CompletionForm
            job={completing.job}
            initialDate={completing.date}
            onSubmit={completeJob}
            onCancel={() => { setError(null); setCompleting(null); }}
            busy={busy}
          />
        </div>
      </div>
    );
  }

  return (
    <div>
      <div className="page-header">
        <h2>Dashboard</h2>
        <div style={{ fontSize: 13, color: 'var(--text-muted)' }}>{formatDateString(todayStr)}</div>
      </div>

      {error && <div className="error">{error}</div>}

      {loading ? (
        <div className="list-empty">Loading...</div>
      ) : (
        <>
          <div className="stats-grid">
            <div className="stat-card accent">
              <div className="label">Today's visits</div>
              <div className="value">{todayOccurrences.length}</div>
              <div className="subvalue">{todayOccurrences.filter((o) => o.completed).length} completed</div>
            </div>
            <div className="stat-card">
              <div className="label">Overdue</div>
              <div className="value">{overdueOccurrences.length}</div>
              <div className="subvalue">last 90 days</div>
            </div>
            <div className="stat-card">
              <div className="label">Outstanding</div>
              <div className="value">{formatPrice(outstandingTotal)}</div>
              <div className="subvalue">{outstandingInvoices.length} {outstandingInvoices.length === 1 ? 'invoice' : 'invoices'}</div>
            </div>
            <div className="stat-card">
              <div className="label">Last 7 days revenue</div>
              <div className="value">{formatPrice(weekRevenue)}</div>
              <div className="subvalue">paid invoices</div>
            </div>
            <div className="stat-card">
              <div className="label">Next 7 days projected</div>
              <div className="value">{formatPrice(next7DaysProjected)}</div>
              <div className="subvalue">from upcoming work</div>
            </div>
          </div>

          <div className="section-heading">Today</div>
          <div className="list">
            {todayOccurrences.length === 0 ? (
              <div className="list-empty">No visits scheduled today.</div>
            ) : (
              todayOccurrences.map((o, i) => (
                <OccurrenceRow
                  key={`today-${o.job.id}-${o.date}-${i}`}
                  occurrence={o}
                  onMarkComplete={(job, date) => setCompleting({ job, date })}
                  onEdit={() => {}}
                />
              ))
            )}
          </div>

          {overdueOccurrences.length > 0 && (
            <>
              <div className="section-heading">Overdue</div>
              <div className="list">
                {overdueOccurrences.slice(0, 10).map((o, i) => (
                  <OccurrenceRow
                    key={`overdue-${o.job.id}-${o.date}-${i}`}
                    occurrence={o}
                    onMarkComplete={(job, date) => setCompleting({ job, date })}
                    onEdit={() => {}}
                  />
                ))}
                {overdueOccurrences.length > 10 && (
                  <div className="list-empty" style={{ padding: 14 }}>+ {overdueOccurrences.length - 10} more overdue. Use the Jobs tab's Past due filter to see all.</div>
                )}
              </div>
            </>
          )}

          {outstandingInvoices.length > 0 && (
            <>
              <div className="section-heading">Outstanding invoices</div>
              <div className="list">
                {outstandingInvoices.map((inv) => {
                  const math = invoiceMath(inv);
                  const late = isInvoiceLate(inv);
                  const days = daysOutstanding(inv);
                  return (
                    <div key={inv.id} className="row">
                      <div className="info">
                        <div className="name">
                          Invoice #{inv.invoice_number}
                          <span className="price">{formatPrice(math.total)}</span>
                        </div>
                        <div className="meta">
                          {customerDisplayName({
                            first_name: inv.customer_first_name,
                            last_name: inv.customer_last_name,
                            business_name: inv.customer_business_name,
                          })} • Sent {inv.sent_date ? formatDateString(inv.sent_date.split('T')[0]) : '—'} · {days}d outstanding
                          {late && <> · <span className="badge" style={{ background: 'var(--danger-bg)', color: 'var(--danger)' }}>Late</span></>}
                        </div>
                      </div>
                      <div className="actions">
                        <button className="primary" onClick={() => markInvoicePaid(inv.id)}>Mark paid</button>
                        <button className="secondary" onClick={() => window.open(`/i/${inv.id}`, '_blank')}>View</button>
                      </div>
                    </div>
                  );
                })}
              </div>
            </>
          )}
        </>
      )}
    </div>
  );
}

const REPORT_PRESETS = {
  '7days': '7 days',
  'month': 'This month',
  'quarter': 'This quarter',
  'year': 'This year',
  'all': 'All time',
  'custom': 'Custom',
};

function getReportRange(preset, customFrom, customTo) {
  const today = todayStart();
  const todayStr = formatYMD(today);
  if (preset === '7days') return { from: formatYMD(addDays(today, -6)), to: todayStr };
  if (preset === 'month') {
    return { from: formatYMD(new Date(today.getFullYear(), today.getMonth(), 1)), to: todayStr };
  }
  if (preset === 'quarter') {
    const q = Math.floor(today.getMonth() / 3);
    return { from: formatYMD(new Date(today.getFullYear(), q * 3, 1)), to: todayStr };
  }
  if (preset === 'year') {
    return { from: formatYMD(new Date(today.getFullYear(), 0, 1)), to: todayStr };
  }
  if (preset === 'all') {
    return { from: '2000-01-01', to: todayStr };
  }
  return { from: customFrom || todayStr, to: customTo || todayStr };
}

function ReportsView({ session }) {

  const [customFrom, setCustomFrom] = useState(formatYMD(todayStart()));
  const [customTo, setCustomTo] = useState(formatYMD(todayStart()));
  const [report, setReport] = useState(null);
  const [jobs, setJobs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  const range = getReportRange(preset, customFrom, customTo);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      setLoading(true); setError(null);
      try {
        const params = new URLSearchParams({ from: range.from, to: range.to });
        const [reportData, jobsData] = await Promise.all([
          apiRequest(`/api/reports?${params}`, { slug: session.slug, token: session.token }),
          apiRequest('/api/jobs', { slug: session.slug, token: session.token }),
        ]);
        if (!cancelled) { setReport(reportData); setJobs(jobsData); }
      } catch (err) {
        if (!cancelled) setError(err.message);
      } finally {
        if (!cancelled) setLoading(false);
      }
    })();
    return () => { cancelled = true; };
  }, [session.slug, session.token, range.from, range.to]);

  const projectedIncome = computeProjectedIncome(jobs, range.from, range.to);

  const maxMonthly = report && report.monthly_revenue.length > 0
    ? Math.max(...report.monthly_revenue.map((r) => parseFloat(r.paid_total) || 0))
    : 0;

  return (
    <div>
      <div className="page-header">
        <h2>Reports</h2>
        <div className="meta" style={{ fontSize: 13, color: 'var(--text-muted)' }}>
          {formatDateString(range.from)} — {formatDateString(range.to)}
        </div>
      </div>
      <div className="filter-bar">
        <div className="chip-group">
          {Object.entries(REPORT_PRESETS).map(([key, label]) => (
            <button
              key={key}
              className={`chip ${preset === key ? 'active' : ''}`}
              onClick={() => setPreset(key)}

              {label}
            </button>
          ))}

      </div>
      {preset === 'custom' && (
        <div className="form-card" style={{ marginBottom: 20 }}>
          <div className="form-grid">
            <div>
              <label>From</label>
              <input type="date" value={customFrom} onChange={(e) => setCustomFrom(e.target.value)} />
            </div>
            <div>
              <label>To</label>
              <input type="date" value={customTo} onChange={(e) => setCustomTo(e.target.value)} />
            </div>
          </div>
        </div>
      )}

      {error && <div className="error">{error}</div>}
      {loading ? (
        <div className="list-empty">Loading...</div>
      ) : report ? (
        <>
          <div className="stats-grid">
            <div className="stat-card accent">
              <div className="label">Paid revenue</div>
              <div className="value">{formatPrice(report.invoices.paid_total)}</div>
              <div className="subvalue">{report.invoices.paid_count} {report.invoices.paid_count === 1 ? 'invoice' : 'invoices'}</div>
            </div>
            <div className="stat-card">
              <div className="label">Outstanding</div>
              <div className="value">{formatPrice(report.invoices.outstanding_total)}</div>
              <div className="subvalue">{report.invoices.outstanding_count} unpaid (all time)</div>
            </div>
            <div className="stat-card">
              <div className="label">Visits completed</div>
              <div className="value">{report.completed_work}</div>
              <div className="subvalue">in selected range</div>
            </div>
            <div className="stat-card">
              <div className="label">New {terms.customersLower}</div>
              <div className="value">{report.new_customers}</div>
              <div className="subvalue">in selected range</div>
            </div>
            <div className="stat-card">
              <div className="label">Projected income</div>
              <div className="value">{formatPrice(projectedIncome)}</div>
              <div className="subvalue">from upcoming work in range</div>
            </div>
          </div>

          <div className="section-heading">Revenue by month</div>
          <div className="form-card">
            {report.monthly_revenue.length === 0 ? (
              <div className="line-items-empty">No revenue in this range.</div>
            ) : (
              <div className="revenue-bars">
                {report.monthly_revenue.map((row) => {
                  const amount = parseFloat(row.paid_total) || 0;
                  const pct = maxMonthly > 0 ? (amount / maxMonthly) * 100 : 0;

                  const label = d.toLocaleString(undefined, { month: 'short', year: 'numeric' });
                  return (
                    <div key={row.month} className="revenue-bar-row">
                      <div className="month">{label}</div>
                      <div className="bar-track"><div className="bar-fill" style={{ width: `${pct}%` }}></div></div>
                      <div className="amount">{formatPrice(amount)}</div>

            {report.top_customers.length === 0 ? (

            ) : (
              report.top_customers.map((c, i) => (
                <div key={c.id} className="row">
                  <div className="info">

        </>

    </div>
  );

function OnboardingPage({ session, onDone }) {
  const terms = useTerms();
  const [features, setFeatures] = useState({ invoices: false, quotes: false, reports: false });
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState(null);

  function toggle(key) {
    setFeatures((f) => ({ ...f, [key]: !f[key] }));
  }

  async function submit() {
    setBusy(true); setError(null);
    try {
      await apiRequest('/api/onboarding/complete', {
        method: 'POST', slug: session.slug, token: session.token, body: { features },
      });
      await onDone();
    } catch (err) { setError(err.message); setBusy(false); }
  }

  return (
    <div className="auth-shell" style={{ maxWidth: 640 }}>
      <div className="card">
        <h1>Welcome to {session.organization.name}!</h1>
        <p className="subtitle" style={{ marginBottom: 16 }}>
          You're already set up with the basics: a <strong style={{ color: 'var(--text)' }}>Dashboard</strong>, <strong style={{ color: 'var(--text)' }}>{terms.customers}</strong>, <strong style={{ color: 'var(--text)' }}>{terms.jobs}</strong>, and <strong style={{ color: 'var(--text)' }}>Team</strong> management. These are always on — they're the core of Field Manager.
        </p>
        <p className="subtitle">
          Click below to add anything else you need. You can change this later in Settings → Modules.
        </p>

        <div className="section-heading" style={{ marginTop: 24, marginBottom: 12 }}>Optional modules</div>

        <FeatureRow
          enabled={features.invoices} onToggle={() => toggle('invoices')}
          label="Invoices"
          description={`Track billable work, send invoices to ${terms.customersLower} (email or shareable link), record payments, tax + discounts, recurring-${terms.jobLower} auto-billing.`}
        />
        <FeatureRow
          enabled={features.quotes} onToggle={() => toggle('quotes')}
          label="Quotes / Estimates"
          description={`Send estimates to prospects, convert accepted quotes into ${terms.customersLower}, ${terms.jobsLower}, or invoices in one click.`}
        />
        <FeatureRow
          enabled={features.reports} onToggle={() => toggle('reports')}
          label="Reports"
          description={`Revenue dashboard, projected income, top ${terms.customersLower}, monthly trends. Admin-only when on.`}
        />

        {error && <div className="error">{error}</div>}

        <div className="form-actions" style={{ marginTop: 24 }}>
          <button className="primary" disabled={busy} onClick={submit}>
            {busy ? 'Saving...' : 'Continue to dashboard'}
          </button>
        </div>
      </div>
    </div>
  );
}

function FeatureRow({ enabled, onToggle, label, description }) {

        style={{ marginTop: 4, width: 18, height: 18 }}
      />

function ProfileView({ session, onSessionUpdate }) {
  const [name, setName] = useState(session.user.name || '');
  const [currentPassword, setCurrentPassword] = useState('');
  const [newPassword, setNewPassword] = useState('');
  const [confirmPassword, setConfirmPassword] = useState('');
  const [nameBusy, setNameBusy] = useState(false);
  const [pwBusy, setPwBusy] = useState(false);
  const [error, setError] = useState(null);
  const [success, setSuccess] = useState(null);
  const [theme, setTheme] = useState(() => document.documentElement.dataset.theme || 'light');

  function changeTheme(next) {
    setTheme(next);
    document.documentElement.dataset.theme = next;
    try { localStorage.setItem('fm_theme', next); } catch (e) {}
  }

  async function saveName(e) {
    e.preventDefault();
    setError(null); setSuccess(null); setNameBusy(true);
    try {
      const updated = await apiRequest('/api/auth/me', {
        method: 'PUT', slug: session.slug, token: session.token, body: { name },
      });
      onSessionUpdate({ ...session, user: { ...session.user, name: updated.name } });
      setSuccess('Name updated.');
    } catch (err) { setError(err.message); }
    finally { setNameBusy(false); }
  }

  async function changePassword(e) {
    e.preventDefault();
    setError(null); setSuccess(null);
    if (newPassword !== confirmPassword) {
      setError('New passwords do not match.');
      return;
    }
    setPwBusy(true);
    try {
      await apiRequest('/api/auth/me', {
        method: 'PUT', slug: session.slug, token: session.token,
        body: { current_password: currentPassword, new_password: newPassword },
      });
      setCurrentPassword(''); setNewPassword(''); setConfirmPassword('');
      setSuccess('Password changed.');
    } catch (err) { setError(err.message); }
    finally { setPwBusy(false); }
  }

  return (
    <div>
      <div className="page-header">
        <h2>Profile</h2>
      </div>
      {error && <div className="error">{error}</div>}
      {success && <div className="error" style={{ background: '#e8f1ec', color: '#1f6f4a' }}>{success}</div>}

      <div className="form-card">
        <div className="section-heading" style={{ marginTop: 0 }}>Account</div>
        <form onSubmit={saveName}>
          <label>Name</label>
          <input value={name} onChange={(e) => setName(e.target.value)} />
          <label>Email</label>
          <input value={session.user.email} disabled />
          <label>Role</label>
          <input value={session.user.role} disabled />
          <label>Organization</label>
          <input value={`${session.organization.name} (${session.organization.slug})`} disabled />
          <div className="form-actions">
            <button type="submit" className="primary" disabled={nameBusy}>
              {nameBusy ? 'Saving...' : 'Save name'}
            </button>
          </div>
        </form>
      </div>

      <div className="form-card">
        <div className="section-heading" style={{ marginTop: 0 }}>Change password</div>
        <form onSubmit={changePassword}>
          <label>Current password</label>
          <input type="password" value={currentPassword} onChange={(e) => setCurrentPassword(e.target.value)} required />
          <label>New password <span className="hint">(8+ chars, upper, lower, number, special)</span></label>
          <input type="password" value={newPassword} onChange={(e) => setNewPassword(e.target.value)} required />
          <label>Confirm new password</label>
          <input type="password" value={confirmPassword} onChange={(e) => setConfirmPassword(e.target.value)} required />
          <div className="form-actions">
            <button type="submit" className="primary" disabled={pwBusy}>
              {pwBusy ? 'Saving...' : 'Change password'}
            </button>
          </div>
        </form>
      </div>

      <div className="form-card">
        <div className="section-heading" style={{ marginTop: 0 }}>Appearance</div>
        <label>Theme</label>
        <div className="toggle-group">
          <button type="button" className={theme === 'light' ? 'active' : ''} onClick={() => changeTheme('light')}>Light</button>
          <button type="button" className={theme === 'dark' ? 'active' : ''} onClick={() => changeTheme('dark')}>Dark</button>
        </div>
      </div>
    </div>
  );
}

function TeamView({ session }) {
  const [users, setUsers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [mode, setMode] = useState('list');
  const [busy, setBusy] = useState(false);
  const [editingRoleId, setEditingRoleId] = useState(null);
  const [resettingId, setResettingId] = useState(null);
  const [resetPassword, setResetPassword] = useState('');
  const [resetSuccess, setResetSuccess] = useState(null);

  const refresh = useCallback(async () => {
    setLoading(true); setError(null);
    try {
      const data = await apiRequest('/api/auth/users', { slug: session.slug, token: session.token });
      setUsers(data);
    } catch (err) { setError(err.message); }
    finally { setLoading(false); }
  }, [session.slug, session.token]);

  useEffect(() => { refresh(); }, [refresh]);

  async function inviteUser(values) {
    setBusy(true); setError(null);
    try {
      await apiRequest('/api/auth/register', {
        method: 'POST', slug: session.slug, token: session.token, body: values,
      });
      setMode('list');
      await refresh();
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  async function changeRole(userId, newRole) {
    setError(null);
    try {
      await apiRequest(`/api/auth/users/${userId}`, {
        method: 'PUT', slug: session.slug, token: session.token, body: { role: newRole },
      });
      setEditingRoleId(null);
      await refresh();
    } catch (err) { setError(err.message); }
  }

  async function deleteUser(userId, displayName) {
    if (!confirm(`Remove ${displayName} from the team?`)) return;
    setError(null);
    try {
      await apiRequest(`/api/auth/users/${userId}`, {
        method: 'DELETE', slug: session.slug, token: session.token,
      });
      await refresh();
    } catch (err) { setError(err.message); }
  }

  async function submitResetPassword(userId) {
    setError(null); setResetSuccess(null);
    try {
      await apiRequest(`/api/auth/users/${userId}/reset-password`, {
        method: 'POST', slug: session.slug, token: session.token,
        body: { new_password: resetPassword },
      });
      setResettingId(null); setResetPassword('');
      setResetSuccess('Password reset. Share the new password with your teammate.');
    } catch (err) { setError(err.message); }
  }

  if (mode === 'invite') {
    return (
      <div>
        <div className="page-header"><h2>Invite teammate</h2></div>
        {error && <div className="error">{error}</div>}
        <div className="form-card">
          <InviteForm
            onSubmit={inviteUser}
            onCancel={() => { setError(null); setMode('list'); }}
            busy={busy}
          />
        </div>
      </div>
    );
  }

  return (
    <div>
      <div className="page-header">
        <h2>Team</h2>
        <button className="primary" onClick={() => { setError(null); setMode('invite'); }}>+ Invite teammate</button>
      </div>
      {error && <div className="error">{error}</div>}
      {resetSuccess && (
        <div className="error" style={{ background: '#e8f1ec', color: '#1f6f4a' }}>{resetSuccess}</div>
      )}
      <div className="list">
        {loading ? (
          <div className="list-empty">Loading...</div>
        ) : users.length === 0 ? (
          <div className="list-empty">No teammates yet.</div>
        ) : (
          users.map((u) => {
            const isMe = u.id === session.user.id;
            const displayName = u.name || u.email;
            const isResetting = resettingId === u.id;
            return (
              <div key={u.id} className="row">
                <div className="info">
                  <div className="name">
                    {displayName}{isMe && <span className="hint" style={{ marginLeft: 8 }}>(you)</span>}
                  </div>
                  <div className="meta">{u.email}</div>
                  {isResetting && (
                    <div className="secondary-meta" style={{ marginTop: 8 }}>
                      <input
                        type="password"
                        placeholder="New password"
                        value={resetPassword}
                        onChange={(e) => setResetPassword(e.target.value)}
                        style={{ width: 260, marginRight: 8 }}
                      />
                      <button className="primary" onClick={() => submitResetPassword(u.id)} disabled={!resetPassword}>Set password</button>
                      <button className="secondary" onClick={() => { setResettingId(null); setResetPassword(''); }} style={{ marginLeft: 6 }}>Cancel</button>
                    </div>
                  )}
                </div>
                <div className="actions">
                  {editingRoleId === u.id ? (
                    <>
                      <select
                        defaultValue={u.role}
                        onChange={(e) => changeRole(u.id, e.target.value)}
                        style={{ width: 'auto', padding: '7px 10px', fontSize: 13 }}
                      >
                        <option value="employee">Employee</option>
                        <option value="lead">Lead</option>
                        <option value="admin">Admin</option>
                      </select>
                      <button className="secondary" onClick={() => setEditingRoleId(null)}>Cancel</button>
                    </>
                  ) : (
                    <span className="badge">{u.role}</span>
                  )}
                  {!isMe && editingRoleId !== u.id && !isResetting && (
                    <>
                      <button className="secondary" onClick={() => { setResettingId(u.id); setResetPassword(''); setResetSuccess(null); }}>Reset password</button>
                      <button className="secondary" onClick={() => setEditingRoleId(u.id)}>Change role</button>
                      <button className="danger" onClick={() => deleteUser(u.id, displayName)}>Remove</button>
                    </>
                  )}
                </div>
              </div>
            );
          })
        )}
      </div>
    </div>
  );
}
