<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Field Manager</title>
  <script>
    (function () {
      try {
        var t = localStorage.getItem('fm_theme');
        if (t === 'dark' || t === 'light') document.documentElement.dataset.theme = t;
      } catch (e) {}
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg: #f7f4ec;
      --bg-elevated: #fcfaf3;
      --card: #ffffff;
      --text: #19170f;
      --text-muted: #66635c;
      --border: #e8e1d1;
      --border-strong: #d4cab4;
      --primary: #2c3e57;
      --primary-hover: #1b2940;
      --primary-ring: rgba(44, 62, 87, 0.16);
      --accent: #c98558;
      --accent-hover: #b16f43;
      --danger: #a23b2c;
      --danger-bg: #f9e3df;
      --success: #2d6b4a;
      --success-bg: #e1ede5;
      --shadow-sm: 0 1px 2px rgba(25, 23, 15, 0.04), 0 1px 1px rgba(25, 23, 15, 0.02);
      --shadow-md: 0 1px 2px rgba(25, 23, 15, 0.04), 0 8px 24px -8px rgba(25, 23, 15, 0.08), 0 16px 48px -16px rgba(25, 23, 15, 0.06);
      --shadow-lg: 0 2px 4px rgba(25, 23, 15, 0.06), 0 16px 40px -8px rgba(25, 23, 15, 0.12), 0 32px 72px -16px rgba(25, 23, 15, 0.08);
      --row-hover: #faf6ea;
      --tinted: #efe7d3;
      --serif: 'Fraunces', Georgia, 'Times New Roman', serif;
    }
    :root[data-theme="dark"] {
      --bg: #0d1117;
      --bg-elevated: #131820;
      --card: #1a1f2a;
      --text: #ede7d6;
      --text-muted: #8a857a;
      --border: #2a3142;
      --border-strong: #3d4459;
      --primary: #8da6c8;
      --primary-hover: #a8bedc;
      --primary-ring: rgba(141, 166, 200, 0.22);
      --accent: #dca176;
      --accent-hover: #c98558;
      --danger: #db6b5c;
      --danger-bg: #3a1c17;
      --success: #62a87e;
      --success-bg: #1a2e22;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.45);
      --shadow-md: 0 2px 6px rgba(0, 0, 0, 0.5), 0 16px 40px -8px rgba(0, 0, 0, 0.55), 0 32px 72px -16px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 4px 12px rgba(0, 0, 0, 0.55), 0 24px 64px -8px rgba(0, 0, 0, 0.6);
      --row-hover: #1e2533;
      --tinted: #2a3142;
    }
    :root[data-theme="dark"] .cal-cell.empty { background: #1a1d27; }
    :root[data-theme="dark"] .cal-chip { background: #2c3142; color: var(--text); }
    :root[data-theme="dark"] .cal-chip:hover { background: #3b4258; }
    :root[data-theme="dark"] .cal-chip.done { background: #1f3328; color: var(--text-muted); }
    :root[data-theme="dark"] .check-list label.checked { background: #2c3a4e; color: var(--primary); }
    :root[data-theme="dark"] .badge.draft { background: #2e2a22; color: #b0a99a; }
    :root[data-theme="dark"] .badge.sent { background: #1f2a3b; color: #92a8c8; }
    :root[data-theme="dark"] .badge.paid { background: #1c2e22; color: #7ab089; }
    :root[data-theme="dark"] .badge.accepted { background: #1c2e22; color: #7ab089; }
    :root[data-theme="dark"] .badge.declined { background: #3b1f1b; color: #d76b5d; }
    :root[data-theme="dark"] .badge { background: #3a2820; color: #e8a78c; }
    :root[data-theme="dark"] input:disabled, :root[data-theme="dark"] textarea:disabled { background: #1a1d27; color: var(--text-muted); }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-feature-settings: 'cv11', 'ss01', 'ss03';
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }
    h1, h2, h3, .brand {
      font-family: var(--serif);
      font-feature-settings: 'liga', 'kern';
      letter-spacing: -0.02em;
    }
    h1 { font-weight: 600; }
    h2, h3 { font-weight: 600; }
    button { font-family: inherit; }
    .icon {
      display: inline-block;
      width: 1em; height: 1em; vertical-align: -0.15em;
      stroke: currentColor; stroke-width: 2;
      stroke-linecap: round; stroke-linejoin: round;
      fill: none;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both; }
    .fade-in-delay-1 { animation: fadeInUp 0.5s 0.06s cubic-bezier(0.16, 1, 0.3, 1) both; }
    .fade-in-delay-2 { animation: fadeInUp 0.5s 0.12s cubic-bezier(0.16, 1, 0.3, 1) both; }
    .fade-in-delay-3 { animation: fadeInUp 0.5s 0.18s cubic-bezier(0.16, 1, 0.3, 1) both; }

    /* Scroll-reveal: hidden by default, revealed when JS adds .is-revealed */
    [data-reveal] {
      opacity: 0; transform: translateY(28px);
      transition: opacity 0.85s cubic-bezier(0.16, 1, 0.3, 1),
                  transform 0.85s cubic-bezier(0.16, 1, 0.3, 1);
      will-change: opacity, transform;
    }
    [data-reveal].is-revealed { opacity: 1; transform: translateY(0); }
    [data-reveal-delay="1"] { transition-delay: 0.08s; }
    [data-reveal-delay="2"] { transition-delay: 0.16s; }
    [data-reveal-delay="3"] { transition-delay: 0.24s; }
    [data-reveal-delay="4"] { transition-delay: 0.32s; }
    [data-reveal-delay="5"] { transition-delay: 0.4s; }
    @media (prefers-reduced-motion: reduce) {
      [data-reveal] { opacity: 1; transform: none; transition: none; }
      .fade-in, .fade-in-delay-1, .fade-in-delay-2, .fade-in-delay-3 { animation: none; opacity: 1; }
    }

    /* Stacked hero headline with cycling industry word */
    .hero-stacked {
      display: flex; flex-direction: column;
      align-items: center;
      line-height: 1;
    }
    .hero-line { display: block; }
    .hero-cycle-line {
      display: block;
      line-height: 1.15;
      padding-bottom: 0.06em;
      white-space: nowrap;
      /* Inherits the h1's font-size — all three lines stay the same scale. */
    }
    .cycle-word {
      font-style: italic;
      color: var(--accent);
      display: inline-block;
      animation: wordSwap 0.24s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .cycle-word.settled {
      font-style: normal;
      color: inherit;
      animation: wordSettle 0.55s cubic-bezier(0.22, 1, 0.36, 1);
    }
    @keyframes wordSwap {
      0%   { opacity: 0; transform: translateY(0.18em); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes wordSettle {
      0%   { opacity: 0; transform: translateY(0.18em) scale(0.94); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Bold sans typography scoped to the hero only */
    .landing-hero h1 {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 800;
      font-feature-settings: 'ss01', 'cv11';
    }
    .landing .eyebrow,
    .landing .section-label { font-weight: 600; }

    /* Public profile page */
    .profile-page {
      min-height: 100vh;
      padding: 60px 20px;
      display: flex; flex-direction: column; align-items: center;
      background: var(--bg);
    }
    .profile-card {
      max-width: 560px; width: 100%;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; padding: 48px 40px;
      box-shadow: 0 20px 60px -20px rgba(40, 30, 20, 0.15);
      text-align: center;
    }
    .profile-logo {
      width: 88px; height: 88px; border-radius: 22px;
      object-fit: cover; margin-bottom: 18px;
      box-shadow: 0 4px 12px -4px rgba(40, 30, 20, 0.18);
    }
    .profile-name {
      font-family: var(--serif); font-weight: 600;
      font-size: 36px; letter-spacing: -0.02em;
      margin: 0 0 14px;
    }
    .profile-about {
      color: var(--text-muted); font-size: 16px; line-height: 1.6;
      margin: 0 0 28px; max-width: 460px; margin-left: auto; margin-right: auto;
    }
    .profile-cta-row { display: flex; justify-content: center; margin-bottom: 36px; }
    .profile-cta {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 28px; font-size: 15px; font-weight: 600;
      background: var(--primary); color: white;
      border-radius: 10px; text-decoration: none;
      box-shadow: 0 4px 14px -4px rgba(44, 62, 87, 0.4);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .profile-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px -6px rgba(44, 62, 87, 0.45);
    }
    .profile-cta .icon { transition: transform 0.2s; }
    .profile-cta:hover .icon { transform: translateX(3px); }
    .profile-contact {
      text-align: left; max-width: 360px;
      margin: 0 auto; padding-top: 28px;
      border-top: 1px solid var(--border);
      display: grid; gap: 14px;
    }
    .profile-contact > div {
      display: grid; grid-template-columns: 80px 1fr; gap: 16px;
      align-items: baseline;
    }
    .profile-contact dt {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-muted); margin: 0;
    }
    .profile-contact dd {
      margin: 0; font-size: 14.5px; color: var(--text); line-height: 1.5;
    }
    .profile-contact dd a { color: var(--text); text-decoration: underline; text-decoration-color: rgba(0,0,0,0.2); }
    .profile-contact dd a:hover { text-decoration-color: var(--text); }
    .profile-footer {
      margin-top: 28px; font-size: 12px; color: var(--text-muted);
    }
    .profile-footer a { color: inherit; text-decoration: underline; }
    @media (max-width: 600px) {
      .profile-page { padding: 36px 16px; }
      .profile-card { padding: 32px 24px; }
      .profile-name { font-size: 28px; }
    }

    /* Auth screens */
    .auth-shell { max-width: 480px; margin: 80px auto; padding: 0 16px; }
    .card {
      background: var(--card);
      border-radius: 16px;
      box-shadow: var(--shadow-lg);
      padding: 44px 40px;
      border: 1px solid var(--border);
    }
    h1 { margin: 0 0 8px; font-size: 30px; }
    h2 { font-size: 22px; }
    h3 { font-size: 17px; }
    .subtitle { color: var(--text-muted); margin: 0 0 28px; font-size: 14px; line-height: 1.6; }
    .tabs { display: flex; gap: 0; margin-bottom: 24px; border-bottom: 1px solid var(--border); }
    .tab {
      flex: 1; padding: 12px 0; background: none; border: none;
      cursor: pointer; font-size: 14px; color: var(--text-muted);
      border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s;
    }
    .tab.active { color: var(--text); border-bottom-color: var(--primary); font-weight: 600; }
    .tab:hover { color: var(--text); }
    label { display: block; font-size: 13px; font-weight: 600; margin: 14px 0 6px; color: var(--text); }
    .hint { font-weight: 400; color: var(--text-muted); font-size: 12px; margin-left: 6px; }
    input, textarea {
      width: 100%; padding: 11px 14px; font-size: 14px;
      border: 1px solid var(--border-strong); border-radius: 8px;
      background: var(--card); font-family: inherit; color: var(--text);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    textarea { resize: vertical; min-height: 76px; }
    input:focus, textarea:focus {
      outline: none; border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-ring);
    }
    input::placeholder, textarea::placeholder { color: #b0a99a; }
    button.primary {
      padding: 11px 20px; background: var(--primary); color: white;
      border: none; border-radius: 10px; font-size: 14px;
      font-weight: 600; cursor: pointer;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06), 0 0 0 1px rgba(0, 0, 0, 0.04) inset;
      letter-spacing: -0.005em;
    }
    button.primary:hover { background: var(--primary-hover); box-shadow: 0 4px 12px -2px rgba(44, 62, 87, 0.2), 0 0 0 1px rgba(0, 0, 0, 0.04) inset; }
    button.primary:active { transform: translateY(1px); }
    button.primary:disabled { background: #a8a59c; cursor: not-allowed; box-shadow: none; }
    button.primary.block { width: 100%; margin-top: 24px; }
    button.secondary {
      padding: 9px 16px; background: var(--card); color: var(--text);
      border: 1px solid var(--border-strong); border-radius: 10px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    button.secondary:hover { background: var(--row-hover); border-color: var(--primary); }
    button.secondary:active { transform: translateY(1px); }
    button.danger {
      padding: 9px 16px; background: var(--card); color: var(--danger);
      border: 1px solid var(--border-strong); border-radius: 10px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    button.danger:hover { background: var(--danger-bg); border-color: var(--danger); }
    .error {
      margin-top: 16px; padding: 11px 14px;
      background: var(--danger-bg); color: var(--danger);
      border-radius: 8px; font-size: 13px;
    }
    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 999px;
      background: #f4ddd0; color: #8c4e30; font-size: 11px;
      font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em;
    }

    /* App shell */
    .topbar {
      background: var(--card); border-bottom: 1px solid var(--border);
      padding: 16px 32px; display: flex;
      align-items: center; justify-content: space-between;
    }
    .topbar .brand { font-size: 18px; font-weight: 600; letter-spacing: -0.02em; }
    .topbar .right { display: flex; align-items: center; gap: 14px; font-size: 13px; }
    .topbar .right .user { color: var(--text-muted); }
    /* User menu */
    .user-menu-wrap { position: relative; }
    .user-menu-trigger {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--card); border: 1px solid var(--border-strong);
      cursor: pointer;
      padding: 3px 8px 3px 3px; border-radius: 999px;
      color: var(--text-muted);
      transition: border-color 0.15s, box-shadow 0.15s, color 0.15s;
    }
    .user-menu-trigger:hover {
      border-color: var(--primary); color: var(--text);
      box-shadow: 0 2px 8px -2px rgba(40,30,20,0.12);
    }
    .user-menu-trigger[aria-expanded="true"] {
      border-color: var(--primary); color: var(--text);
      box-shadow: 0 0 0 3px var(--primary-ring, rgba(44,62,87,0.18));
    }
    .user-menu-avatar {
      display: inline-flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-hover));
      color: white; font-weight: 600; font-size: 12px;
      letter-spacing: 0.02em;
      flex-shrink: 0;
    }
    .user-menu-caret {
      width: 10px; height: 7px;
      transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .user-menu-trigger[aria-expanded="true"] .user-menu-caret {
      transform: rotate(180deg);
    }
    .user-menu-pop {
      position: absolute; right: 0; top: calc(100% + 8px);
      min-width: 260px; max-width: 320px; z-index: 100;
      background: var(--card); border: 1px solid var(--border-strong);
      border-radius: 12px;
      box-shadow: 0 20px 50px -16px rgba(40, 30, 20, 0.25),
                  0 6px 16px -4px rgba(40, 30, 20, 0.12);
      padding: 6px;
      animation: fadeInUp 0.15s ease-out;
    }
    .user-menu-header {
      padding: 10px 12px 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 6px;
    }
    .user-menu-name {
      font-weight: 600; font-size: 14px; color: var(--text);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .user-menu-email {
      font-size: 12px; color: var(--text-muted); margin-top: 2px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .user-menu-role {
      display: flex; align-items: center; gap: 6px; margin-top: 8px;
    }
    .user-menu-section {
      padding: 8px 12px 4px;
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--text-muted);
    }
    .user-menu-item {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; padding: 8px 12px;
      background: none; border: none; cursor: pointer;
      font-family: inherit; font-size: 14px; color: var(--text);
      border-radius: 6px;
      text-align: left;
      transition: background 0.12s;
    }
    .user-menu-item:hover:not(:disabled) { background: var(--tinted); }
    .user-menu-item:disabled { opacity: 0.5; cursor: not-allowed; }
    .user-menu-item-meta {
      font-size: 11px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600;
    }
    .user-menu-item-danger { color: var(--danger); }
    .user-menu-item-danger:hover:not(:disabled) { background: var(--danger-bg); }
    .user-menu-divider {
      height: 1px; background: var(--border); margin: 6px 0;
    }

    .topbar-system-link {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 6px;
      background: var(--tinted); color: var(--text-muted);
      border: 1px solid var(--border);
      font-family: inherit; font-size: 12px; font-weight: 600;
      letter-spacing: 0.02em; cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .topbar-system-link:hover {
      color: white; background: var(--primary); border-color: var(--primary);
    }
    .topbar-system-link .icon { font-size: 13px; opacity: 0.75; }
    .topbar-system-link:hover .icon { opacity: 1; }
    .nav {
      background: var(--card); border-bottom: 1px solid var(--border);
      padding: 0 28px; display: flex; gap: 2px;
    }
    .nav button {
      background: none; border: none; padding: 14px 14px;
      font-size: 13.5px; color: var(--text-muted); cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
      display: inline-flex; align-items: center; gap: 7px;
      font-weight: 500;
    }
    .nav button .icon { font-size: 15px; opacity: 0.7; }
    .nav button.active { color: var(--text); font-weight: 600; border-bottom-color: var(--primary); }
    .nav button.active .icon { opacity: 1; color: var(--primary); }
    .nav button:hover { color: var(--text); }
    .nav-badge {
      background: var(--accent); color: white;
      font-size: 10px; font-weight: 700;
      padding: 1px 7px; border-radius: 999px;
      margin-left: 4px; letter-spacing: 0.02em;
      line-height: 1.4;
    }
    .nav-lock {
      background: var(--tinted); color: var(--text-muted);
      font-size: 9px; font-weight: 700; letter-spacing: 0.08em;
      padding: 1px 6px; border-radius: 4px;
      margin-left: 6px; text-transform: uppercase;
      border: 1px solid var(--border);
    }
    .nav button.locked {
      color: var(--text-muted);
    }
    .nav button.locked .icon { opacity: 0.45; }
    .nav button.locked:hover { color: var(--text); }
    .nav button.locked:hover .nav-lock { background: var(--accent); color: white; border-color: var(--accent); }
    .nav-quota {
      background: var(--tinted); color: var(--text-muted);
      font-size: 10px; font-weight: 600;
      padding: 1px 7px; border-radius: 999px;
      margin-left: 6px; font-family: ui-monospace, monospace;
      letter-spacing: 0;
    }
    .nav-quota.over {
      background: var(--accent); color: white;
    }

    /* Plan pill in topbar */
    .plan-pill {
      display: inline-flex; align-items: center;
      padding: 3px 10px; border-radius: 999px;
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.05em; text-transform: uppercase;
      line-height: 1.6;
    }
    .plan-pill.plan-free {
      background: var(--tinted); color: var(--text-muted);
      cursor: pointer; border: 1px solid var(--border-strong);
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    .plan-pill.plan-free:hover {
      background: var(--accent); color: white; border-color: var(--accent);
    }
    .plan-pill.plan-pro {
      background: linear-gradient(135deg, var(--primary), var(--primary-hover));
      color: white;
    }

    /* Locked feature page */
    .locked-feature {
      display: flex; align-items: center; justify-content: center;
      padding: 60px 20px;
    }
    .locked-feature-card {
      max-width: 540px; text-align: center;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; padding: 48px 40px;
      box-shadow: var(--shadow-lg);
    }
    .locked-icon-wrap {
      display: inline-flex; align-items: center; justify-content: center;
      width: 56px; height: 56px; border-radius: 16px;
      background: var(--tinted); color: var(--primary);
      margin-bottom: 18px;
    }
    .locked-icon-wrap .icon { font-size: 24px; }
    .locked-eyebrow {
      font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
      color: var(--accent); text-transform: uppercase; margin-bottom: 10px;
    }
    .locked-feature-card h2 {
      font-family: var(--serif); font-size: 28px;
      margin: 0 0 12px; letter-spacing: -0.02em;
    }
    .locked-feature-card > p {
      color: var(--text-muted); margin: 0 0 24px;
      font-size: 15px; line-height: 1.55;
    }
    .locked-bullets {
      list-style: none; padding: 0; margin: 0 0 28px;
      text-align: left; max-width: 380px;
      margin-left: auto; margin-right: auto;
    }
    .locked-bullets li {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 0; font-size: 14px; color: var(--text);
    }
    .locked-bullets li .icon {
      color: var(--accent); flex-shrink: 0;
    }
    .locked-cta-row {
      display: flex; gap: 10px; justify-content: center;
      flex-wrap: wrap;
    }
    .locked-cta-row button.primary {
      padding: 12px 22px; font-size: 14px;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .locked-cta-row button.primary .icon { transition: transform 0.2s; }
    .locked-cta-row button.primary:hover .icon { transform: translateX(2px); }
    .locked-fine {
      margin-top: 16px; font-size: 12px; color: var(--text-muted);
    }

    /* Billing page hero */
    .billing-hero {
      padding: 32px 32px 28px;
      border-radius: 18px;
      margin-bottom: 24px;
      background: var(--card); border: 1px solid var(--border);
    }
    .billing-hero.billing-pro {
      background: linear-gradient(135deg, var(--card), var(--tinted));
      border-color: var(--border-strong);
    }
    .billing-hero.billing-free {
      background: linear-gradient(135deg, var(--tinted), var(--card));
      border-color: var(--accent);
    }
    .billing-hero-head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .billing-trial-chip {
      background: #f4ddd0; color: #8c4e30;
      font-size: 11px; font-weight: 700;
      padding: 3px 10px; border-radius: 999px;
      letter-spacing: 0.04em;
    }
    .billing-hero-title {
      font-family: var(--serif); font-weight: 600;
      font-size: 28px; letter-spacing: -0.02em;
      margin: 0 0 10px;
    }
    .billing-hero-sub {
      color: var(--text-muted); font-size: 14.5px; line-height: 1.55;
      margin: 0; max-width: 600px;
    }
    .billing-cta-row {
      display: flex; gap: 10px; margin-top: 22px; flex-wrap: wrap;
    }
    .billing-cta-row button.primary {
      padding: 12px 22px; font-size: 14px;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .billing-cta-row button.primary .icon { transition: transform 0.2s; }
    .billing-cta-row button.primary:hover .icon { transform: translateX(2px); }

    .billing-usage-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 18px;
      margin-bottom: 8px;
    }
    @media (max-width: 600px) {
      .billing-usage-row { grid-template-columns: 1fr; }
    }
    .usage-bar { }
    .usage-bar-head {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 6px;
    }
    .usage-bar-label {
      font-size: 13px; font-weight: 600; color: var(--text);
    }
    .usage-bar-count {
      font-family: ui-monospace, monospace; font-size: 12px;
      color: var(--text-muted);
    }
    .usage-bar-count.over { color: var(--accent); font-weight: 600; }
    .usage-bar-track {
      height: 6px; background: var(--tinted);
      border-radius: 999px; overflow: hidden;
    }
    .usage-bar-fill {
      height: 100%; background: var(--primary);
      border-radius: 999px;
      transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .usage-bar-fill.over { background: var(--accent); }

    .danger-zone {
      margin-top: 24px; padding: 24px;
      background: var(--card);
      border: 1px solid var(--danger);
      border-radius: 16px;
    }
    .danger-zone-summary {
      display: flex; justify-content: space-between; align-items: flex-start; gap: 18px;
    }
    .danger-zone-summary strong { font-size: 14px; color: var(--text); display: block; }
    .danger-zone-summary p { margin: 4px 0 0; font-size: 13px; color: var(--text-muted); line-height: 1.5; max-width: 500px; }
    .danger-zone-summary button.danger { flex-shrink: 0; }
    .danger-zone-confirm p { font-size: 13px; color: var(--text); margin: 0 0 12px; line-height: 1.5; }
    .danger-zone-confirm code {
      background: var(--tinted); padding: 2px 6px; border-radius: 4px;
      font-family: ui-monospace, monospace; font-size: 13px;
    }
    @media (max-width: 600px) {
      .danger-zone-summary { flex-direction: column; }
    }

    .billing-locked-list, .billing-included-list {
      list-style: none; padding: 0; margin: 0;
      font-size: 14px; color: var(--text);
    }
    .billing-locked-list li, .billing-included-list li {
      display: flex; gap: 10px; align-items: flex-start;
      padding: 7px 0; line-height: 1.5;
    }
    .billing-locked-list li .icon { color: var(--text-muted); margin-top: 2px; flex-shrink: 0; }
    .billing-included-list li .icon { color: var(--accent); margin-top: 2px; flex-shrink: 0; }

    /* Inline upgrade prompt (limit hit) */
    .upgrade-prompt {
      display: flex; align-items: center; gap: 16px;
      background: linear-gradient(to right, var(--tinted), var(--card));
      border: 1px solid var(--accent);
      border-radius: 12px; padding: 14px 18px;
      margin-bottom: 16px;
    }
    .upgrade-prompt-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: 10px;
      background: var(--accent); color: white;
      flex-shrink: 0;
    }
    .upgrade-prompt-icon .icon { font-size: 16px; }
    .upgrade-prompt-text { flex: 1; }
    .upgrade-prompt-text strong { display: block; font-size: 14px; color: var(--text); margin-bottom: 2px; }
    .upgrade-prompt-text span { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
    .upgrade-prompt button.primary { white-space: nowrap; flex-shrink: 0; }
    .content { max-width: 960px; margin: 32px auto; padding: 0 28px; }
    .page-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px;
    }
    .page-header h2 { margin: 0; font-size: 22px; }

    /* List */
    .list {
      background: var(--card); border-radius: 12px;
      border: 1px solid var(--border); overflow: hidden;
      box-shadow: var(--shadow-sm);
    }
    .list-empty { padding: 56px 24px; text-align: center; color: var(--text-muted); font-size: 14px; }
    .row {
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; transition: background 0.12s;
    }
    .row:last-child { border-bottom: none; }
    .row:hover { background: var(--row-hover); }
    .row .info .name { font-weight: 500; font-size: 14px; margin-bottom: 3px; }
    .row .info .meta { color: var(--text-muted); font-size: 12px; }
    .row .actions { display: flex; gap: 8px; flex-shrink: 0; align-items: center; }

    /* Forms in app shell */
    .form-card {
      background: var(--card); border-radius: 12px;
      border: 1px solid var(--border); padding: 28px;
      margin-bottom: 24px; box-shadow: var(--shadow-sm);
    }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 18px; }
    .form-grid .full { grid-column: 1 / -1; }
    .form-actions { margin-top: 24px; display: flex; gap: 10px; }

    select {
      width: 100%; padding: 11px 14px; font-size: 14px;
      border: 1px solid var(--border-strong); border-radius: 8px;
      background: var(--card); font-family: inherit; color: var(--text);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-ring); }

    .toggle-group {
      display: inline-flex; background: var(--tinted); border-radius: 8px;
      padding: 4px; gap: 4px;
    }
    .toggle-group button {
      background: none; border: none; padding: 7px 16px;
      font-size: 13px; font-weight: 500; color: var(--text-muted);
      border-radius: 6px; cursor: pointer; transition: background 0.15s, color 0.15s;
    }
    .toggle-group button.active {
      background: var(--card); color: var(--text);
      box-shadow: 0 1px 2px rgba(0,0,0,0.06);
    }

    .check-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .check-list label {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 12px; border: 1px solid var(--border-strong);
      border-radius: 999px; font-size: 13px; font-weight: 500;
      cursor: pointer; margin: 0;
      background: var(--card); transition: background 0.15s, border-color 0.15s;
    }
    .check-list label:hover { background: var(--row-hover); }
    .check-list label.checked { background: #eaf0f2; border-color: var(--primary); color: var(--primary); }
    .check-list input { display: none; }

    .row .info .secondary-meta { color: var(--text-muted); font-size: 12px; margin-top: 2px; }
    .row .info .price { display: inline-block; margin-left: 8px; color: var(--text); font-weight: 500; }

    .section-heading {
      margin: 28px 0 10px; font-size: 12px; font-weight: 600;
      color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em;
    }
    .section-heading:first-child { margin-top: 0; }
    .inline-form { display: flex; align-items: center; gap: 8px; }
    .inline-form input[type="date"] { width: auto; padding: 8px 10px; font-size: 13px; }
    .schedule-summary {
      background: var(--card); border-radius: 10px;
      border: 1px solid var(--border); padding: 14px 18px;
      margin-bottom: 20px; color: var(--text-muted); font-size: 13px;
    }

    .filter-bar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .chip-group { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip {
      padding: 7px 14px; background: var(--card); color: var(--text-muted);
      border: 1px solid var(--border-strong); border-radius: 999px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .chip:hover { color: var(--text); background: var(--row-hover); }
    .chip.active {
      background: var(--primary); color: white; border-color: var(--primary);
    }

    .occurrence-row { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .occurrence-row:last-child { border-bottom: none; }
    .occurrence-row.completed { opacity: 0.55; }
    .occurrence-row:hover { background: var(--row-hover); }
    .occurrence-row .date {
      flex-shrink: 0; min-width: 90px; padding: 6px 10px;
      background: var(--tinted); border-radius: 8px; text-align: center;
    }
    .occurrence-row .date .day { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .occurrence-row .date .num { font-size: 18px; font-weight: 600; line-height: 1.1; }
    .occurrence-row.completed .date { background: #e8f1ec; }
    .occurrence-row.today .date { background: var(--primary); color: white; }
    .occurrence-row.today .date .day { color: #cbd6e6; }
    .occurrence-row .body { flex: 1; min-width: 0; }
    .occurrence-row .body .title { font-weight: 500; font-size: 14px; margin-bottom: 2px; }
    .occurrence-row .body .meta { font-size: 12px; color: var(--text-muted); }
    .occurrence-row .actions { display: flex; gap: 8px; flex-shrink: 0; align-items: center; flex-wrap: nowrap; }
    .occurrence-row .actions button { white-space: nowrap; }
    .occurrence-row .actions .row-sms,
    .row .actions .row-sms {
      padding: 6px 10px; font-size: 13px;
      background: var(--card); border: 1px solid var(--border-strong);
      border-radius: 8px; font-family: inherit; cursor: pointer;
      color: var(--text); font-weight: 500;
      flex-shrink: 0;
      max-width: 110px;
    }

    /* Jobs page sub-tabs (Schedule / List) */
    .jobs-tabs {
      display: flex; gap: 4px;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .jobs-tab {
      background: none; border: none; cursor: pointer;
      padding: 10px 18px; margin-bottom: -1px;
      font-family: inherit; font-size: 14px; font-weight: 600;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .jobs-tab:hover { color: var(--text); }
    .jobs-tab.active {
      color: var(--text);
      border-bottom-color: var(--primary);
    }

    /* Day view — time grid */
    .day-grid {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
    }
    .day-untimed-section {
      border-bottom: 1px solid var(--border);
    }
    .day-untimed-header {
      padding: 9px 16px;
      background: var(--tinted);
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }
    .day-untimed-list { display: flex; flex-direction: column; }
    .day-untimed-block {
      display: flex; gap: 14px; align-items: flex-start;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
    }
    .day-untimed-block:last-child { border-bottom: none; }
    .day-untimed-block:hover { background: var(--row-hover); }
    .day-untimed-block.completed { opacity: 0.55; }
    .day-untimed-main { flex: 1; min-width: 0; }
    .day-untimed-title {
      font-weight: 600; font-size: 14px; color: var(--text);
      line-height: 1.3;
    }
    .day-untimed-customer {
      font-size: 13px; color: var(--text-muted); margin-top: 2px;
    }
    .day-untimed-sms {
      padding: 6px 10px;
      background: var(--card); border: 1px solid var(--border-strong);
      border-radius: 6px;
      font-size: 12px; font-family: inherit; cursor: pointer;
      color: var(--text); font-weight: 600;
    }
    .day-untimed-meta {
      display: flex; flex-direction: column; align-items: flex-end; gap: 6px;
      flex-shrink: 0;
    }
    .day-untimed-actions {
      display: flex; align-items: center; gap: 6px;
    }
    .day-untimed-price {
      font-family: var(--serif); font-weight: 600;
      font-size: 16px; letter-spacing: -0.01em;
      color: var(--text);
    }
    .day-untimed-complete {
      padding: 6px 12px; background: var(--primary); color: white;
      border: none; border-radius: 6px;
      font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .day-untimed-complete:hover { background: var(--primary-hover); }
    .day-untimed-done-pill {
      font-size: 11px; font-weight: 600; color: var(--text-muted);
      letter-spacing: 0.02em;
    }
    @media (max-width: 600px) {
      .day-untimed-block {
        flex-direction: column; align-items: stretch;
        padding: 10px 12px; gap: 8px;
      }
      .day-untimed-meta {
        flex-direction: row; align-items: center; justify-content: space-between;
        gap: 8px;
      }
      .day-untimed-actions { flex-wrap: wrap; }
    }

    .day-grid-body { display: flex; position: relative; }
    .day-grid-hours {
      width: 64px; flex-shrink: 0; position: relative;
      border-right: 1px solid var(--border);
    }
    .day-grid-hour {
      position: relative; border-bottom: 1px dashed var(--border);
    }
    .day-grid-hour:last-child { border-bottom: none; }
    .day-grid-hour-label {
      position: absolute; top: 4px; left: 8px;
      font-size: 11px; font-weight: 600;
      color: var(--text-muted);
      padding: 0;
    }
    .day-grid-blocks { flex: 1; position: relative; }
    .day-grid-lane { border-bottom: 1px dashed var(--border); }
    .day-grid-lane:last-child { border-bottom: none; }
    .day-grid-now {
      position: absolute; left: 0; right: 0; z-index: 2;
      pointer-events: none;
    }
    .day-grid-now-dot {
      position: absolute; left: -5px; top: -5px;
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(201, 133, 88, 0.2);
    }
    .day-grid-now-line {
      display: block; height: 2px; background: var(--accent);
      margin-left: 6px;
    }
    .day-block {
      position: absolute; left: 8px; right: 8px;
      background: var(--primary); color: white;
      border-radius: 8px; padding: 6px 10px;
      font-size: 12px; cursor: pointer;
      overflow: hidden;
      box-shadow: 0 4px 14px -6px rgba(40,30,20,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
      z-index: 1; border: none; text-align: left;
      display: flex; flex-direction: column; gap: 2px;
    }
    .day-block:hover {
      transform: translateX(2px);
      box-shadow: 0 6px 18px -6px rgba(40,30,20,0.5);
    }
    .day-block.completed {
      background: var(--text-muted); opacity: 0.65;
    }
    .day-block-head { display: flex; justify-content: space-between; align-items: baseline; }
    .day-block-time { font-weight: 700; opacity: 0.9; font-size: 11px; letter-spacing: 0.02em; }
    .day-block-price {
      font-family: var(--serif); font-weight: 600; font-size: 12px;
      letter-spacing: -0.01em;
    }
    .day-block-title { font-weight: 600; line-height: 1.2; }
    .day-block-customer { opacity: 0.85; font-size: 11px; line-height: 1.2; }
    .day-block-bottom {
      display: flex; align-items: center; gap: 8px;
      justify-content: space-between;
      margin-top: auto;
      min-width: 0;
    }
    .day-block-bottom .day-block-customer {
      flex: 1; min-width: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      margin-top: 0;
    }
    .day-block-actions {
      display: flex; gap: 6px; align-items: center;
      justify-content: flex-end; flex-wrap: nowrap;
      flex-shrink: 0;
    }
    .day-block-actions .day-block-sms { flex: 0 1 auto; max-width: 100px; }
    @media (max-width: 600px) {
      .day-block-bottom {
        flex-direction: column; align-items: flex-start;
      }
      .day-block-actions { flex-wrap: wrap; justify-content: flex-start; }
      .day-block-actions .day-block-sms { max-width: none; }
    }
    .day-block-complete {
      background: rgba(255,255,255,0.18); color: white;
      border: 1px solid rgba(255,255,255,0.3); border-radius: 6px;
      padding: 4px 9px; font-size: 11px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .day-block-complete:hover { background: rgba(255,255,255,0.32); }
    .day-block-sms {
      padding: 3px 6px;
      background: rgba(255,255,255,0.18); color: white;
      border: 1px solid rgba(255,255,255,0.3); border-radius: 6px;
      font-size: 11px; font-weight: 600;
      font-family: inherit; cursor: pointer;
      min-width: 0;
    }
    .day-block-sms option { color: var(--text); background: var(--card); }
    .day-block.completed .day-block-sms { display: none; }

    /* Dashboard widgets */
    .dash-greeting { margin-bottom: 16px; }
    .dash-greeting h2 {
      font-family: var(--serif); font-weight: 600;
      font-size: clamp(24px, 3.5vw, 32px);
      letter-spacing: -0.02em; margin: 0 0 4px;
    }
    .dash-greeting p {
      margin: 0; color: var(--text-muted);
      font-size: 14px; line-height: 1.5;
    }

    .dash-pending-requests {
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; padding: 14px 18px;
      background: linear-gradient(to right, var(--tinted), var(--card));
      border: 1px solid var(--accent);
      border-radius: 12px; margin: 16px 0;
      font-size: 14px;
    }
    .dash-pending-requests strong { font-family: var(--serif); font-size: 22px; font-weight: 600; margin-right: 6px; }

    .dash-quick-actions {
      display: flex; gap: 8px; margin: 16px 0;
      flex-wrap: wrap;
    }
    .dash-quick-actions button { font-size: 13px; }

    /* Dashboard widget editor in Settings */
    .dash-widget-list {
      display: flex; flex-direction: column; gap: 8px;
    }
    .dash-widget-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; cursor: grab;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .dash-widget-row:hover {
      border-color: var(--border-strong);
      box-shadow: 0 2px 8px -2px rgba(40, 30, 20, 0.08);
    }
    .dash-widget-row:active { cursor: grabbing; }
    .dash-widget-drag {
      color: var(--text-muted); font-size: 16px; line-height: 1;
      letter-spacing: -3px; flex-shrink: 0; user-select: none;
    }
    .dash-widget-toggle { margin: 0; padding: 0; flex-shrink: 0; }
    .dash-widget-toggle input { width: 18px; height: 18px; cursor: pointer; }
    .dash-widget-text { flex: 1; min-width: 0; }
    .dash-widget-name { font-weight: 600; font-size: 14px; color: var(--text); }
    .dash-widget-help { font-size: 12px; color: var(--text-muted); margin-top: 1px; line-height: 1.4; }

    /* Quick-text editor rows in Settings */
    .sms-template-row {
      display: flex; gap: 12px; align-items: flex-start;
      padding: 14px; margin-bottom: 12px;
      background: var(--tinted);
      border: 1px solid var(--border);
      border-radius: 10px;
    }
    .sms-template-fields {
      flex: 1; display: flex; flex-direction: column; gap: 10px;
      min-width: 0;
    }
    .sms-template-fields label { margin-top: 0; }
    .sms-template-row .sms-template-remove {
      flex-shrink: 0; align-self: flex-start;
      padding: 4px 10px; font-size: 12px;
    }
    .sms-template-row code {
      background: var(--card); padding: 1px 5px; border-radius: 3px;
      font-family: ui-monospace, monospace; font-size: 12px;
    }
    @media (max-width: 600px) {
      .sms-template-row { flex-direction: column; }
      .sms-template-fields { grid-template-columns: 1fr; }
    }

    /* Week view — 7 columns of day summaries */
    .week-grid {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px;
    }
    .week-col {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; display: flex; flex-direction: column;
      min-height: 200px; overflow: hidden;
    }
    .week-col.today { border-color: var(--primary); }
    .week-col.selected { box-shadow: 0 0 0 1px var(--accent) inset; }
    .week-col-head {
      padding: 10px 8px; border: none; background: var(--tinted);
      border-bottom: 1px solid var(--border);
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      cursor: pointer; font-family: inherit;
      transition: background 0.15s;
    }
    .week-col-head:hover { background: var(--row-hover); }
    .week-col.today .week-col-head { background: var(--primary); color: white; }
    .week-col-dow {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .week-col-num {
      font-family: var(--serif); font-size: 18px; font-weight: 600;
      letter-spacing: -0.02em; line-height: 1;
    }
    .week-col-body {
      padding: 8px; display: flex; flex-direction: column; gap: 4px;
      flex: 1;
    }
    .week-col-empty {
      color: var(--text-muted); font-size: 12px; text-align: center;
      margin-top: auto; margin-bottom: auto; opacity: 0.5;
    }
    .week-pill {
      display: flex; flex-direction: column; gap: 1px;
      padding: 6px 8px; background: var(--tinted);
      border: 1px solid var(--border); border-radius: 6px;
      text-align: left; font-family: inherit; cursor: pointer;
      transition: border-color 0.15s, transform 0.15s;
    }
    .week-pill:hover {
      border-color: var(--primary); transform: translateY(-1px);
    }
    .week-pill.done { opacity: 0.55; }
    .week-pill.done .week-pill-title { text-decoration: line-through; }
    .week-pill-time {
      font-size: 10px; font-weight: 700;
      color: var(--accent); letter-spacing: 0.02em;
    }
    .week-pill-title {
      font-size: 12px; font-weight: 600; color: var(--text);
      line-height: 1.2;
    }
    .week-pill-customer {
      font-size: 11px; color: var(--text-muted);
      line-height: 1.2;
    }
    @media (max-width: 860px) {
      .week-grid { grid-template-columns: repeat(7, minmax(110px, 1fr)); overflow-x: auto; }
    }

    .cal-week-label {
      font-size: 14px; font-weight: 600; color: var(--text);
      padding: 0 8px; letter-spacing: -0.01em;
      white-space: nowrap;
    }

    .cal-mode-row {
      display: flex; align-items: center; gap: 16px;
      margin-bottom: 16px; flex-wrap: wrap;
    }
    .cal-mode-toggle { flex-shrink: 0; }
    .cal-day-nav {
      display: flex; align-items: center; gap: 6px;
      margin-left: auto;
    }
    .cal-day-nav .secondary { padding: 6px 12px; font-size: 14px; }
    .cal-day-picker {
      padding: 6px 10px; font-size: 13px; width: auto;
      font-family: ui-monospace, monospace;
    }
    .cal-day-header {
      display: flex; align-items: baseline; justify-content: space-between;
      margin: 4px 0 14px;
    }
    .cal-day-header h3 {
      font-family: var(--serif); font-size: 24px; margin: 0;
      letter-spacing: -0.02em; font-weight: 600;
    }
    .cal-day-count {
      font-size: 13px; color: var(--text-muted);
      font-weight: 500;
    }
    @media (max-width: 600px) {
      .cal-mode-row { gap: 10px; }
      .cal-day-nav { margin-left: 0; width: 100%; }
      .cal-day-picker { flex: 1; min-width: 0; }
      .cal-day-header h3 { font-size: 20px; }
      .cal-week-label { font-size: 12px; padding: 0 4px; }
      .day-grid-hours { width: 44px !important; }
      .day-grid-hour-label { font-size: 10px; left: 4px; padding: 0 2px; }
      .day-block { left: 4px; right: 4px; padding: 5px 8px; }
      .day-block-time { font-size: 10px; }
      .day-block-title { font-size: 11px; }
      .day-block-customer { font-size: 10px; }
      .day-grid-untimed { flex-direction: column; gap: 6px; padding: 10px 12px; }
      .day-grid-untimed-label { padding-top: 0; }
    }

    .calendar {
      background: var(--card); border-radius: 12px;
      border: 1px solid var(--border); padding: 18px;
      box-shadow: var(--shadow-sm);
    }
    .cal-nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .cal-nav .cal-month { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
    .cal-nav button { padding: 6px 12px; font-size: 14px; }
    .cal-grid {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
    }
    .cal-dow {
      padding: 6px; text-align: center; font-size: 11px;
      font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .cal-cell {
      min-height: 96px; padding: 6px 8px; border: 1px solid var(--border);
      border-radius: 8px; background: var(--card); overflow: hidden;
      display: flex; flex-direction: column; gap: 2px;
    }
    .cal-cell.empty { background: #f9f5ec; border-color: transparent; }
    .cal-cell { cursor: pointer; transition: background 0.12s, border-color 0.12s; }
    .cal-cell:hover:not(.empty) { background: var(--row-hover); }
    .cal-cell.today { border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-ring); }
    .cal-cell.selected { border-color: var(--primary); background: var(--tinted); }
    .cal-cell.selected.today { box-shadow: 0 0 0 2px var(--primary-ring); }
    .cal-cell .cal-date { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    .cal-cell.today .cal-date { color: var(--primary); }
    .cal-chip {
      font-size: 11px; padding: 2px 6px; border-radius: 4px;
      background: #eaf0f2; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      cursor: pointer; transition: background 0.12s;
    }
    .cal-chip:hover { background: #d5dee3; }
    .cal-chip.done { background: #e8f1ec; color: var(--text-muted); text-decoration: line-through; }
    .cal-more { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

    .pager {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 14px; font-size: 13px; color: var(--text-muted);
    }
    .pager .info { flex: 1; text-align: center; }

    .badge.draft { background: #ece6d8; color: #6d6a64; }
    .badge.sent { background: #dde6f0; color: #3a4d68; }
    .badge.paid { background: #d5e8d6; color: #2f6b3a; }
    .badge.accepted { background: #d5e8d6; color: #2f6b3a; }
    .badge.declined { background: #f4dad6; color: #99362a; }

    .line-items-table { width: 100%; border-collapse: collapse; margin: 12px 0; }
    .line-items-table th {
      text-align: left; padding: 8px 10px; font-size: 12px;
      font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.04em;
      border-bottom: 1px solid var(--border);
    }
    .line-items-table td { padding: 8px 6px; vertical-align: middle; border-bottom: 1px solid var(--border); }
    .line-items-table input { padding: 8px 10px; font-size: 13px; }
    .line-items-table .col-desc { width: 50%; }
    .line-items-table .col-qty input,
    .line-items-table .col-rate input { width: 90px; text-align: right; }
    .line-items-table .col-amount { text-align: right; font-weight: 500; white-space: nowrap; padding-right: 12px; }
    .line-items-table .col-remove { width: 36px; text-align: right; }
    .line-items-table .col-remove button {
      background: none; border: none; color: var(--text-muted);
      font-size: 18px; line-height: 1; cursor: pointer; padding: 4px 8px;
    }
    .line-items-table .col-remove button:hover { color: var(--danger); }
    .line-items-table tfoot td {
      font-weight: 600; border-bottom: none; border-top: 2px solid var(--border);
      padding-top: 12px;
    }
    .line-items-empty {
      padding: 18px; text-align: center; color: var(--text-muted);
      font-size: 13px; border: 1px dashed var(--border-strong);
      border-radius: 8px; margin: 12px 0;
    }

    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px; margin-bottom: 24px;
    }
    .stats-grid.row-fixed-3 { grid-template-columns: repeat(3, 1fr); }
    .stats-grid.row-fixed-2 { grid-template-columns: repeat(2, 1fr); }
    @media (max-width: 720px) {
      .stats-grid.row-fixed-3 { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 500px) {
      .stats-grid.row-fixed-3,
      .stats-grid.row-fixed-2 { grid-template-columns: 1fr; }
    }
    .stat-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 18px;
      box-shadow: var(--shadow-sm);
    }
    .stat-card .label {
      font-size: 11px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.06em;
      font-weight: 600; margin-bottom: 6px;
    }
    .stat-card .value { font-size: 26px; font-weight: 600; letter-spacing: -0.01em; }
    .stat-card .subvalue { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    .stat-card.accent .value { color: var(--primary); }

    /* First-job celebration toast */
    .first-job-toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 1000;
      display: flex; align-items: center; gap: 14px;
      max-width: 380px; padding: 14px 16px 14px 18px;
      background: linear-gradient(135deg, var(--primary), var(--primary-hover));
      color: white;
      border-radius: 14px;
      box-shadow: 0 16px 40px -10px rgba(0,0,0,0.35),
                  0 6px 14px -4px rgba(0,0,0,0.15);
      animation: firstJobIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .first-job-toast strong { display: block; font-size: 14px; line-height: 1.2; margin-bottom: 3px; }
    .first-job-toast span:not(.first-job-toast-burst) {
      display: block; font-size: 12.5px; opacity: 0.85; line-height: 1.4;
    }
    .first-job-toast-burst {
      font-size: 26px; display: inline-block;
      animation: firstJobBurst 1.2s cubic-bezier(0.16, 1, 0.3, 1);
      transform-origin: center;
    }
    .first-job-toast-close {
      background: none; border: none; color: white; opacity: 0.7;
      cursor: pointer; font-size: 20px; line-height: 1;
      padding: 4px 8px; border-radius: 4px;
      transition: opacity 0.15s;
    }
    .first-job-toast-close:hover { opacity: 1; }
    @keyframes firstJobIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes firstJobBurst {
      0% { transform: scale(0.6) rotate(-20deg); opacity: 0; }
      40% { transform: scale(1.3) rotate(15deg); opacity: 1; }
      70% { transform: scale(0.95) rotate(-6deg); }
      100% { transform: scale(1) rotate(0deg); }
    }
    @media (max-width: 600px) {
      .first-job-toast {
        left: 16px; right: 16px; max-width: none; bottom: 16px;
      }
    }

    /* Auto-invoice schedule options */
    .auto-invoice-options {
      display: grid; grid-template-columns: 1fr; gap: 8px;
    }
    .auto-invoice-option {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 14px 16px; cursor: pointer;
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: 10px;
      transition: border-color 0.15s, background 0.15s;
    }
    .auto-invoice-option:hover { border-color: var(--border-strong); }
    .auto-invoice-option.active {
      border-color: var(--primary);
      background: var(--tinted);
    }
    .auto-invoice-option input[type="radio"] {
      margin-top: 3px; width: 16px; height: 16px; cursor: pointer;
    }
    .auto-invoice-option-name {
      font-weight: 600; font-size: 14px; color: var(--text);
    }
    .auto-invoice-option-help {
      font-size: 12.5px; color: var(--text-muted); margin-top: 2px;
      line-height: 1.4;
    }

    /* Customer notes timeline */
    .note-add {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px;
      margin-bottom: 16px;
    }
    .note-add textarea {
      width: 100%; resize: vertical; min-height: 70px;
      font-family: inherit; font-size: 14px; line-height: 1.5;
      color: var(--text); background: var(--bg);
      border: 1px solid var(--border-strong); border-radius: 8px;
      padding: 10px 12px;
    }
    .note-add textarea:focus { outline: none; border-color: var(--primary); }
    .note-add-actions {
      display: flex; justify-content: flex-end; margin-top: 10px;
    }
    .note-timeline {
      display: flex; flex-direction: column; gap: 10px;
    }
    .note-row {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 14px;
    }
    .note-meta {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 6px;
    }
    .note-author {
      font-size: 13px; font-weight: 600; color: var(--text);
    }
    .note-time {
      font-size: 11px; color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }
    .note-delete {
      margin-left: auto; background: none; border: none;
      color: var(--text-muted); cursor: pointer;
      font-size: 18px; line-height: 1; padding: 2px 6px;
      border-radius: 4px; transition: color 0.15s, background 0.15s;
    }
    .note-delete:hover { color: var(--danger); background: var(--danger-bg); }
    .note-body {
      font-size: 14px; line-height: 1.55; color: var(--text);
      white-space: pre-wrap;
    }

    /* Empty state */
    .empty-state {
      text-align: center; padding: 56px 28px;
      background: var(--card); border: 1px dashed var(--border-strong);
      border-radius: 14px;
    }
    .empty-state-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 56px; height: 56px; border-radius: 16px;
      background: var(--tinted); color: var(--primary);
      margin-bottom: 16px;
    }
    .empty-state-icon .icon { font-size: 26px; }
    .empty-state h3 {
      font-family: var(--serif); font-weight: 600;
      font-size: 22px; letter-spacing: -0.01em;
      margin: 0 0 8px;
    }
    .empty-state p {
      color: var(--text-muted); font-size: 14px; line-height: 1.55;
      margin: 0 auto 22px; max-width: 380px;
    }
    .empty-state-cta {
      display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
    }

    /* Reports page */
    .reports-hero {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 24px 28px;
      margin-bottom: 20px;
    }
    .reports-hero-eyebrow {
      font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 8px;
    }
    .reports-hero-title {
      font-family: var(--serif); font-weight: 600;
      font-size: clamp(28px, 4vw, 36px);
      letter-spacing: -0.025em; margin: 0 0 6px;
    }
    .reports-hero-sub {
      color: var(--text-muted); font-size: 14px;
      margin: 0 0 18px;
      font-variant-numeric: tabular-nums;
    }
    .reports-range-chips {
      display: flex; gap: 6px; flex-wrap: wrap;
    }
    .reports-panel {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 22px 24px;
      margin-bottom: 18px;
      box-shadow: var(--shadow-sm);
    }
    .reports-panel-head {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 16px;
    }
    .reports-panel-head h3 {
      font-family: var(--serif); font-size: 18px; font-weight: 600;
      letter-spacing: -0.01em; margin: 0;
    }
    .reports-panel-head span {
      font-size: 12px; color: var(--text-muted);
      font-weight: 500; letter-spacing: 0.01em;
    }
    .reports-top-customers { display: flex; flex-direction: column; gap: 10px; }
    .reports-tc-row {
      display: grid; grid-template-columns: 28px 1fr auto;
      gap: 14px; align-items: center;
    }
    .reports-tc-rank {
      font-family: var(--serif); font-size: 18px; font-weight: 500;
      color: var(--text-muted); text-align: center;
    }
    .reports-tc-body { min-width: 0; }
    .reports-tc-name {
      font-size: 14px; font-weight: 600; color: var(--text);
      margin-bottom: 4px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .reports-tc-bar {
      height: 4px; background: var(--tinted); border-radius: 999px;
      overflow: hidden;
    }
    .reports-tc-bar span {
      display: block; height: 100%;
      background: linear-gradient(to right, var(--primary), var(--accent));
      border-radius: 999px;
      transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .reports-tc-amount {
      font-family: var(--serif); font-weight: 600; font-size: 15px;
      letter-spacing: -0.01em; color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .revenue-bars { padding: 4px 0; }
    .revenue-bar-row {
      display: grid; grid-template-columns: 80px 1fr 90px;
      align-items: center; gap: 12px; padding: 6px 0;
    }
    .revenue-bar-row .month { font-size: 13px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
    .revenue-bar-row .bar-track {
      height: 8px; background: var(--border); border-radius: 4px; overflow: hidden;
    }
    .revenue-bar-row .bar-fill {
      height: 100%; background: var(--primary); border-radius: 4px;
    }
    .revenue-bar-row .amount {
      text-align: right; font-size: 13px; font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    .public-shell { max-width: 760px; margin: 40px auto; padding: 0 16px; }
    .invoice-doc {
      background: var(--card); border-radius: 14px;
      box-shadow: var(--shadow-md); padding: 40px;
    }
    .invoice-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 24px; padding-bottom: 24px; border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .invoice-header .company { display: flex; gap: 14px; align-items: flex-start; }
    .invoice-header .company img { max-width: 64px; max-height: 64px; border-radius: 8px; }
    .invoice-header .company h1 { font-size: 22px; margin: 0 0 4px; }
    .invoice-header .company .addr {
      font-size: 12px; color: var(--text-muted); white-space: pre-line; margin: 0;
    }
    .invoice-header .meta { text-align: right; font-size: 13px; }
    .invoice-header .meta .num { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
    .invoice-header .meta .date { color: var(--text-muted); margin-bottom: 8px; }
    .invoice-meta-blocks {
      display: grid; grid-template-columns: 1fr 1fr; gap: 24px;
      padding: 24px 0; border-bottom: 1px solid var(--border);
    }
    .invoice-meta-blocks h3 {
      margin: 0 0 8px; font-size: 11px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600;
    }
    .invoice-meta-blocks p { margin: 2px 0; font-size: 14px; }
    .invoice-meta-blocks .muted { color: var(--text-muted); font-size: 13px; white-space: pre-line; }
    .invoice-description {
      padding: 18px 0; font-size: 14px; border-bottom: 1px solid var(--border);
    }
    .invoice-items {
      width: 100%; border-collapse: collapse; margin: 12px 0;
    }
    .invoice-items th {
      text-align: left; padding: 10px; font-size: 11px; font-weight: 600;
      color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em;
      border-bottom: 1px solid var(--border);
    }
    .invoice-items th.r, .invoice-items td.r { text-align: right; }
    .invoice-items td {
      padding: 10px; font-size: 14px; border-bottom: 1px solid var(--border);
    }
    .invoice-items tr:last-child td { border-bottom: none; }
    .invoice-total {
      text-align: right; font-size: 18px; font-weight: 600;
      padding: 16px 10px; border-top: 2px solid var(--text);
    }
    .invoice-payment {
      margin-top: 24px; padding: 20px;
      background: var(--tinted); border-radius: 10px;
      font-size: 14px;
    }
    .invoice-payment a {
      display: inline-block; padding: 8px 16px; margin-top: 8px;
      background: #3D95CE; color: white; text-decoration: none;
      border-radius: 8px; font-weight: 600;
    }

    /* Editorial collage: 9 sharp-edged photos sharing a middle horizontal
       seam. Within each row tiles touch left-to-right. Heights vary above
       and below the seam, so outer top/bottom edges stagger. Rows can be
       slightly offset so left/right edges stagger too. */
    .ed-collage {
      position: relative;
      width: 100%;
      max-width: 1180px;
      margin: 0 auto;
      aspect-ratio: 2.2 / 1;
      min-height: 420px;
    }
    .ed-tile {
      position: absolute;
      background-size: cover;
      background-position: center;
      background-color: #e8dfd0;
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1),
                  z-index 0s 0.4s;
    }
    .ed-tile:hover {
      transform: scale(1.03);
      z-index: 10;
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1),
                  z-index 0s;
    }
    /* row 1 (above seam) — 5 tiles, dramatic height contrast.
       Tile 2 + Tile 5 are tall portraits anchoring the rhythm;
       tiles 1, 3, 4 are shorter landscapes. */
    .ed-tile-1 { left:  0%; bottom: 50%; width: 17%; height: 28%;
      background-image: url('https://images.unsplash.com/photo-1623161551727-54c918bdcec1?w=600&q=80&auto=format&fit=crop');
    }
    .ed-tile-2 { left: 17%; bottom: 50%; width: 21%; height: 42%;
      background-image: url('https://images.unsplash.com/photo-1728706613021-e447801e1ea6?w=700&q=80&auto=format&fit=crop');
    }
    .ed-tile-3 { left: 38%; bottom: 50%; width: 22%; height: 34%;
      background-image: url('https://images.unsplash.com/photo-1740657254989-42fe9c3b8cce?w=700&q=80&auto=format&fit=crop');
    }
    .ed-tile-4 { left: 60%; bottom: 50%; width: 18%; height: 26%;
      background-image: url('https://images.unsplash.com/photo-1641199788912-9a7385a35c82?w=600&q=80&auto=format&fit=crop');
    }
    .ed-tile-5 { left: 78%; bottom: 50%; width: 22%; height: 40%;
      background-image: url('https://images.unsplash.com/photo-1628847115161-d6793dc59c7f?w=700&q=80&auto=format&fit=crop');
    }
    /* row 2 (below seam) — 4 tiles, more uniform heights, offset right
       so the outer left edge staggers vs row 1. */
    .ed-tile-6 { left:  6%; top: 50%; width: 24%; height: 38%;
      background-image: url('https://images.unsplash.com/photo-1734303023491-db8037a21f09?w=800&q=80&auto=format&fit=crop');
    }
    .ed-tile-7 { left: 30%; top: 50%; width: 22%; height: 34%;
      background-image: url('https://images.unsplash.com/photo-1530700131180-d43d9b8cc41f?w=700&q=80&auto=format&fit=crop');
    }
    .ed-tile-8 { left: 52%; top: 50%; width: 24%; height: 40%;
      background-image: url('https://images.unsplash.com/photo-1503951914875-452162b0f3f1?w=700&q=80&auto=format&fit=crop');
    }
    .ed-tile-9 { left: 76%; top: 50%; width: 20%; height: 32%;
      background-image: url('https://images.unsplash.com/photo-1613844044163-1ad2f2d0b152?w=600&q=80&auto=format&fit=crop');
    }
    @media (max-width: 860px) {

      /* Mobile collage: horizontal scroll-snap carousel. Tiles keep
         varied aspect ratios so the strip reads as a magazine spread
         rather than a uniform grid. Full-bleed on either side. */
      .ed-collage {
        aspect-ratio: auto;
        min-height: 0;
        height: 56vw; max-height: 320px;
        display: flex; gap: 8px;
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        padding: 0 20px;
        scroll-padding-left: 20px;
      }
      .ed-collage::-webkit-scrollbar { display: none; }
      .ed-tile {
        position: static !important;
        flex-shrink: 0;
        height: 100% !important;
        width: auto !important;
        left: auto !important; top: auto !important; bottom: auto !important;
        scroll-snap-align: start;
      }
      .ed-tile-1 { aspect-ratio: 4 / 3 !important; }
      .ed-tile-2 { aspect-ratio: 3 / 4 !important; }
      .ed-tile-3 { aspect-ratio: 4 / 3 !important; }
      .ed-tile-4 { aspect-ratio: 1 / 1 !important; }
      .ed-tile-5 { aspect-ratio: 3 / 4 !important; }
      .ed-tile-6 { aspect-ratio: 5 / 4 !important; }
      .ed-tile-7 { aspect-ratio: 4 / 3 !important; }
      .ed-tile-8 { aspect-ratio: 5 / 4 !important; }
      .ed-tile-9 { aspect-ratio: 4 / 3 !important; }

    /* close */

    /* === Chapter mockups === */
    .cm-frame {
      width: 100%; max-width: 360px;

      border: 1px solid var(--border-strong);

      box-shadow: 0 14px 36px -22px rgba(40,30,20,0.25);

      font-size: 12px;
    }
    .cm-bar {
      padding: 10px 14px;
      background: var(--tinted);
      border-bottom: 1px solid var(--border);
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--text-muted);
    }
    .cm-cal {
      display: grid; grid-template-columns: repeat(7, 1fr);
      padding: 12px 10px 16px;
      border-bottom: 1px solid var(--border);
    }
    .cm-cal-col {

      display: flex; flex-direction: column; align-items: center; gap: 3px;

      font-size: 9px; font-weight: 700;
      color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 0.08em;

    .cm-cal-date {
      font-family: var(--serif); font-size: 14px;
      color: var(--text); line-height: 1;
    }

    .cm-card {
      padding: 12px 14px;

    .cm-card-row {

    .cm-card-check {

    .cm-list {
      padding: 6px 14px 14px;

    .cm-list-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      font-size: 12px; color: var(--text);
    }
    .cm-list-row:last-child { border-bottom: none; }
    .cm-list-row strong { font-weight: 600; }
    .cm-amt {
      font-family: var(--serif); font-weight: 500;
      font-size: 14px; color: var(--text);

    .cm-cta {
      margin: 0 14px 14px;

    .cm-field-label {

      color: var(--text-muted); margin-bottom: 6px;

      font-size: 9px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-muted);

    /* === Legal pages === */

      max-width: 720px; margin: 0 auto;

    /* === Process flow section (editorial style) === */
    .flow-section {
      max-width: 1080px; margin: 0 auto;
      padding: 80px 32px 64px;

    .flow-header {
      text-align: center; max-width: 640px;
      margin: 0 auto 56px;

      display: grid; grid-template-columns: repeat(4, 1fr);
      border: 1px solid var(--border);
    }
    .flow-step {
      padding: 40px 24px;

      text-align: center;
    }
    .flow-step:last-child { border-right: none; }
    .flow-step-num {
      font-family: var(--serif); font-weight: 500;
      font-size: 13px; color: var(--accent);
      letter-spacing: 0.05em; margin-bottom: 18px;

      font-family: var(--serif); font-weight: 500;
      font-size: 28px; color: var(--text);

      font-size: 13px; line-height: 1.55;
      color: var(--text-muted); margin: 0 auto;
      max-width: 220px;

    @media (max-width: 720px) {
      .flow-section { padding: 56px 20px 40px; }
      .flow-grid { grid-template-columns: 1fr; }
      .flow-step {
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding: 28px 16px;
      }
      .flow-step:last-child { border-bottom: none; }

    /* === Landing pricing block === */
    .landing-pricing {
      padding: 80px 24px 40px;
    }
    .landing-pricing-inner { max-width: 1080px; margin: 0 auto; }
    .landing-pricing-head { text-align: center; max-width: 640px; margin: 0 auto 56px; }
    .landing-pricing-head h2 {
      font-family: var(--serif); font-weight: 600;
      font-size: clamp(32px, 4vw, 48px);
      letter-spacing: -0.025em; margin: 0 0 12px;
    }
    .landing-pricing-head p {
      color: var(--text-muted); font-size: 17px;
      line-height: 1.55; margin: 0;
    }
    .plan-card-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 22px;
      max-width: 880px; margin: 0 auto;
    }
    .plan-card {
      background: var(--card); border: 1px solid var(--border-strong);
      border-radius: 18px; padding: 32px;
      box-shadow: 0 12px 32px -16px rgba(40, 30, 20, 0.15);
      display: flex; flex-direction: column;
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1),
                  box-shadow 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
    }
    .plan-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 24px 56px -22px rgba(40, 30, 20, 0.25);
    }
    .plan-card-pro {
      background: linear-gradient(180deg, var(--card), var(--tinted));
      border-color: var(--accent);
      border-width: 1.5px;
    }
    .plan-card-badge {
      position: absolute; top: -12px; right: 24px;
      background: var(--accent); color: white;
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; padding: 4px 12px; border-radius: 999px;
      box-shadow: 0 4px 12px -3px rgba(201, 133, 88, 0.4);
    }
    .plan-card-name {
      font-size: 13px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text-muted); margin-bottom: 6px;
    }
    .plan-card-pro .plan-card-name { color: var(--accent); }
    .plan-card-price { margin-bottom: 12px; }
    .plan-card-price .amt {
      font-family: var(--serif); font-weight: 600;
      font-size: 48px; letter-spacing: -0.03em; line-height: 1;
      color: var(--text);
    }
    .plan-card-price .suf {
      font-size: 16px; color: var(--text-muted);
      margin-left: 4px;
    }
    .plan-card-blurb {
      color: var(--text-muted); font-size: 14px; line-height: 1.5;
      margin: 0 0 24px;
    }
    .plan-card-cta {
      width: 100%; padding: 12px;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      font-size: 14px;
    }
    .plan-card-cta .icon { transition: transform 0.2s; }
    .plan-card-cta:hover .icon { transform: translateX(3px); }

      list-style: none; padding: 0; margin: 28px 0 0;

      padding: 8px 0; color: var(--text);
    }
    .plan-card-list li.excluded {

      text-decoration-color: rgba(0,0,0,0.15);

    .plan-tick {
      display: inline-flex; align-items: center; justify-content: center;
      width: 18px; height: 18px; border-radius: 50%;
      background: var(--tinted); color: var(--primary);

      background: var(--card); color: var(--text-muted);
      border: 1px solid var(--border);

    .plan-fineprint {
      max-width: 640px; margin: 36px auto 0;
      text-align: center; font-size: 13px; color: var(--text-muted);
      line-height: 1.6;

      .plan-card-row { grid-template-columns: 1fr; }

    .scrn-pill {

<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback } = React;

const ICONS = {

};

function EmptyState({ icon, title, body, action }) {
  return (
    <div className="empty-state">
      {icon && <div className="empty-state-icon"><Icon name={icon} /></div>}
      <h3>{title}</h3>
      {body && <p>{body}</p>}
      {action && <div className="empty-state-cta">{action}</div>}
    </div>
  );
}

function Icon({ name }) {
  const d = ICONS[name];
  if (!d) return null;
  return (
    <svg className="icon" viewBox="0 0 24 24" aria-hidden="true">
      <path d={d} />
    </svg>
  );
}

const STORAGE = { token: 'fm_token', slug: 'fm_slug', user: 'fm_user', org: 'fm_org' };

function useLocation() {
  const [path, setPath] = useState(() => window.location.pathname);
  useEffect(() => {
    const onPop = () => setPath(window.location.pathname);
    window.addEventListener('popstate', onPop);
    return () => window.removeEventListener('popstate', onPop);
  }, []);
  return path;
}

function navigate(to, opts = {}) {
  if (window.location.pathname === to && !opts.force) return;
  if (opts.replace) {
    window.history.replaceState({}, '', to);
  } else {
    window.history.pushState({}, '', to);
  }
  window.dispatchEvent(new PopStateEvent('popstate'));
}
const STAFF_STORAGE = { token: 'fm_staff_token', user: 'fm_staff_user' };

function loadStaffSession() {
  const token = localStorage.getItem(STAFF_STORAGE.token);
  const user = JSON.parse(localStorage.getItem(STAFF_STORAGE.user) || 'null');
  if (!token || !user) return null;
  return { token, user };
}

function saveStaffSession({ token, user }) {
  localStorage.setItem(STAFF_STORAGE.token, token);
  localStorage.setItem(STAFF_STORAGE.user, JSON.stringify(user));
}

function clearStaffSession() {
  Object.values(STAFF_STORAGE).forEach((k) => localStorage.removeItem(k));
}

function loadSession() {
  const token = localStorage.getItem(STORAGE.token);
  const slug = localStorage.getItem(STORAGE.slug);
  const user = JSON.parse(localStorage.getItem(STORAGE.user) || 'null');
  const org = JSON.parse(localStorage.getItem(STORAGE.org) || 'null');
  if (!token || !slug || !user || !org) return null;
  return { token, slug, user, organization: org };
}

function saveSession({ token, user, organization }) {
  localStorage.setItem(STORAGE.token, token);
  localStorage.setItem(STORAGE.slug, organization.slug);
  localStorage.setItem(STORAGE.user, JSON.stringify(user));
  localStorage.setItem(STORAGE.org, JSON.stringify(organization));
}

function clearSession() {
  Object.values(STORAGE).forEach((k) => localStorage.removeItem(k));
}

async function startUpgrade(session) {
  try {
    const r = await apiRequest('/api/billing/checkout', {
      method: 'POST', slug: session.slug, token: session.token,
    });
    window.location.href = r.url;
  } catch (err) {
    alert('Could not start checkout: ' + err.message);
  }
}

function isPlanLimitError(err) {
  if (!err) return false;
  if (err.data && (err.data.billing_status === 'plan_limit' || err.data.billing_status === 'free_tier')) return true;
  return err.message && (
    err.message.includes('Free plan limit') ||
    err.message.includes('Pro feature')
  );
}

const DEFAULT_TERMS = {
  customer: 'Customer', customers: 'Customers',
  job: 'Job', jobs: 'Jobs',
};

function getTerms(source) {
  const s = source || {};
  const customer = s.customer_label || DEFAULT_TERMS.customer;
  const customers = s.customer_label_plural || DEFAULT_TERMS.customers;
  const job = s.job_label || DEFAULT_TERMS.job;
  const jobs = s.job_label_plural || DEFAULT_TERMS.jobs;

async function apiRequest(path, { method = 'GET', body, slug, token } = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (slug) headers['x-organization-slug'] = slug;
  if (token) headers['Authorization'] = `Bearer ${token}`;
  const res = await fetch(path, {
    method, headers,
    body: body ? JSON.stringify(body) : undefined,
  });
  if (res.status === 204) return null;
  const isJson = (res.headers.get('content-type') || '').includes('application/json');
  const data = isJson ? await res.json() : await res.text();
  if (!res.ok) {
    const err = new Error((data && data.error) || `Request failed (${res.status})`);
    err.status = res.status;
    err.data = data;
    throw err;
  }
  return data;
}

function customerDisplayName(c) {

}

function jobCustomerName(j) {
