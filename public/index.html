function InvoicesView({ session }) {
  const terms = useTerms();
  const [invoices, setInvoices] = useState([]);
  const [customers, setCustomers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [mode, setMode] = useState('list');
  const [editing, setEditing] = useState(null);
  const [busy, setBusy] = useState(false);
  const [copiedId, setCopiedId] = useState(null);
  const [search, setSearch] = useState('');
  const [sort, setSort] = useState('newest');
  const [statusFilter, setStatusFilter] = useState('all');

  function exportInvoices() {
    const headers = ['invoice_number', 'customer', 'date', 'status', 'sent_date', 'paid_date', 'subtotal', 'discount', 'tax', 'total', 'description'];
    const rows = invoices.map((inv) => {
      const m = invoiceMath(inv);
      return [
        inv.invoice_number,
        customerDisplayName({
          first_name: inv.customer_first_name,
          last_name: inv.customer_last_name,
          business_name: inv.customer_business_name,
        }),
        inv.date, inv.status,
        inv.sent_date ? inv.sent_date.split('T')[0] : '',
        inv.paid_date ? inv.paid_date.split('T')[0] : '',
        m.subtotal.toFixed(2), m.discount.toFixed(2), m.tax.toFixed(2), m.total.toFixed(2),
        inv.description,
      ];
    });
    downloadCSV(`invoices-${formatYMD(new Date())}.csv`, headers, rows);
  }

  async function copyPublicLink(invoiceId) {
    const url = `${window.location.origin}/i/${invoiceId}`;
    try {
      await navigator.clipboard.writeText(url);
      setCopiedId(invoiceId);
      setTimeout(() => setCopiedId((curr) => (curr === invoiceId ? null : curr)), 2000);
    } catch {
      window.prompt('Copy this link:', url);
    }
  }

  const canMutate = ['admin', 'lead'].includes(session.user.role);

  const refresh = useCallback(async () => {
    setLoading(true); setError(null);
    try {
      const [invData, custData] = await Promise.all([
        apiRequest('/api/invoices', { slug: session.slug, token: session.token }),
        apiRequest('/api/customers', { slug: session.slug, token: session.token }),
      ]);
      setInvoices(invData);
      setCustomers(custData);
    } catch (err) { setError(err.message); }
    finally { setLoading(false); }
  }, [session.slug, session.token]);

  useEffect(() => { refresh(); }, [refresh]);

  async function createInvoice(values) {
    setBusy(true); setError(null);
    try {
      await apiRequest('/api/invoices', {
        method: 'POST', slug: session.slug, token: session.token, body: values,
      });
      setMode('list');
      await refresh();
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  async function updateInvoice(values) {
    setBusy(true); setError(null);
    try {
      await apiRequest(`/api/invoices/${editing.id}`, {
        method: 'PUT', slug: session.slug, token: session.token, body: values,
      });
      setEditing(null); setMode('list');
      await refresh();
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  async function deleteInvoice(id) {
    if (!confirm('Delete this invoice?')) return;
    setError(null);
    try {
      await apiRequest(`/api/invoices/${id}`, {
        method: 'DELETE', slug: session.slug, token: session.token,
      });
      await refresh();
    } catch (err) { setError(err.message); }
  }

  async function transition(id, path) {
    setError(null);
    try {
      await apiRequest(`/api/invoices/${id}/${path}`, {
        method: 'POST', slug: session.slug, token: session.token,
      });
      await refresh();
    } catch (err) { setError(err.message); }
  }

  async function emailInvoice(inv) {
    if (!confirm(`Email invoice #${inv.invoice_number} to ${inv.customer_email || 'the customer'}?`)) return;
    setError(null);
    try {
      await apiRequest(`/api/invoices/${inv.id}/send-email`, {
        method: 'POST', slug: session.slug, token: session.token,
      });
      await refresh();
      alert('Invoice emailed.');
    } catch (err) { setError(err.message); }
  }

  if (mode === 'create') {
    return (
      <div>
        <div className="page-header"><h2>New invoice</h2></div>
        {error && <div className="error">{error}</div>}
        {customers.length === 0 ? (
          <div className="form-card">
            <p style={{ margin: 0, color: 'var(--text-muted)' }}>You need a customer first. Add one in the Customers tab.</p>
            <div className="form-actions"><button className="secondary" onClick={() => setMode('list')}>Back</button></div>
          </div>
        ) : (
          <div className="form-card">
            <InvoiceForm customers={customers} onSubmit={createInvoice} onCancel={() => { setError(null); setMode('list'); }} busy={busy} />
          </div>
        )}
      </div>
    );
  }

  if (mode === 'edit' && editing) {
    return (
      <div>
        <div className="page-header"><h2>Edit invoice #{editing.invoice_number}</h2></div>
        {error && <div className="error">{error}</div>}
        <div className="form-card">
          <InvoiceForm
            initial={editing}
            customers={customers}
            onSubmit={updateInvoice}
            onCancel={() => { setError(null); setEditing(null); setMode('list'); }}
            busy={busy}
          />
        </div>
      </div>
    );
  }

  function matchesStatus(inv) {
    if (statusFilter === 'all') return true;
    if (statusFilter === 'late') return isInvoiceLate(inv);
    if (statusFilter === 'unpaid') return inv.status === 'draft' || inv.status === 'sent';
    return inv.status === statusFilter;
  }

  const filteredInvoices = invoices.filter((inv) => matchesStatus(inv) && searchMatches(
    search,
    String(inv.invoice_number),
    inv.description,
    inv.customer_first_name, inv.customer_last_name, inv.customer_business_name
  ));
  const invSortKey = sort === 'number' ? 'invoice_number'
    : sort === 'total' ? (inv) => lineItemsTotal(inv.line_items)
    : sort === 'status' ? 'status'
    : 'created_at';
  const sortedInvoices = sortBy(filteredInvoices, invSortKey, sort === 'oldest' ? 'asc' : sort === 'status' ? 'asc' : 'desc');

  return (
    <div>
      <div className="page-header">
        <h2>Invoices</h2>
        <div style={{ display: 'flex', gap: 8 }}>
          <button className="secondary" onClick={exportInvoices} disabled={invoices.length === 0}>Export</button>
          {canMutate && <button className="primary" onClick={() => { setError(null); setMode('create'); }}>+ New invoice</button>}
        </div>
      </div>
      <div className="filter-bar">
        <div className="chip-group">
          {['all', 'unpaid', 'draft', 'sent', 'paid', 'late'].map((f) => {
            const count = invoices.filter((inv) => {
              if (f === 'all') return true;
              if (f === 'late') return isInvoiceLate(inv);
              if (f === 'unpaid') return inv.status === 'draft' || inv.status === 'sent';
              return inv.status === f;
            }).length;
            const labels = { all: 'All', unpaid: 'Unpaid', draft: 'Draft', sent: 'Sent', paid: 'Paid', late: 'Late' };
            return (
              <button
                key={f}
                className={`chip ${statusFilter === f ? 'active' : ''}`}
                onClick={() => setStatusFilter(f)}
              >
                {labels[f]} <span style={{ opacity: 0.7 }}>({count})</span>
              </button>
            );
          })}
        </div>
      </div>
      <div className="search-bar" style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
        <input
          type="search"
          value={search}
          onChange={(e) => setSearch(e.target.value)}
          placeholder={`Search by invoice #, ${terms.customerLower}, or description...`}
          style={{ flex: 1 }}
        />
        <select value={sort} onChange={(e) => setSort(e.target.value)} style={{ width: 'auto' }}>
          <option value="newest">Sort: Newest</option>
          <option value="oldest">Sort: Oldest</option>
          <option value="number">Sort: Invoice # (high)</option>
          <option value="total">Sort: Total (high)</option>
          <option value="status">Sort: Status</option>
        </select>
      </div>
      {error && <div className="error">{error}</div>}
      <div className="list">
        {loading ? (
          <div className="list-empty">Loading...</div>
        ) : sortedInvoices.length === 0 ? (
          invoices.length === 0 ? (
            <EmptyState
              icon="invoices"
              title="Draft your first invoice"
              body={canMutate
                ? `Bill a ${terms.customerLower} for completed work. Add line items, optional tax + discount, and share a public link your ${terms.customerLower} can pay from any device.`
                : `No invoices yet.`
              }
              action={canMutate && (
                <button className="primary" onClick={() => { setError(null); setMode('create'); }}>+ New invoice</button>
              )}
            />
          ) : (
            <div className="list-empty">No invoices match these filters.</div>
          )
        ) : (
          sortedInvoices.map((inv) => {
            const math = invoiceMath(inv);
            const late = isInvoiceLate(inv);
            const days = late ? daysOutstanding(inv) : 0;
            return (
              <div key={inv.id} className="row">
                <div className="info">
                  <div className="name">
                    Invoice #{inv.invoice_number}
                    <span className="price">{formatPrice(math.total)}</span>
                  </div>
                  <div className="meta">
                    {customerDisplayName({
                      first_name: inv.customer_first_name,
                      last_name: inv.customer_last_name,
                      business_name: inv.customer_business_name,
                    })} • {formatDateString(inv.date)} • <span className={`badge ${inv.status}`}>{inv.status}</span>
                    {late && <> · <span className="badge" style={{ background: 'var(--danger-bg)', color: 'var(--danger)' }}>Late · {days}d</span></>}
                  </div>
                  {inv.description && <div className="secondary-meta">{inv.description}</div>}
                </div>
                {canMutate && (
                  <div className="actions">
                    {(inv.status === 'draft' || inv.status === 'sent') && (
                      <button className="primary" onClick={() => emailInvoice(inv)}>Email to {terms.customerLower}</button>
                    )}
                    {inv.status === 'sent' && (
                      <button className="primary" onClick={() => transition(inv.id, 'mark-paid')}>Mark paid</button>
                    )}
                    {inv.status === 'paid' && (
                      <button className="secondary" onClick={() => transition(inv.id, 'mark-unpaid')}>Mark unpaid</button>
                    )}
                    {(inv.status === 'sent' || inv.status === 'paid') && (
                      <>
                        <button className="secondary" onClick={() => copyPublicLink(inv.id)}>
                          {copiedId === inv.id ? 'Copied!' : 'Copy link'}
                        </button>
                        <button className="secondary" onClick={() => window.open(`/i/${inv.id}`, '_blank')}>
                          View
                        </button>
                      </>
                    )}
                    <button className="secondary" onClick={() => { setEditing(inv); setMode('edit'); }}>Edit</button>
                    <button className="danger" onClick={() => deleteInvoice(inv.id)}>Delete</button>
                  </div>
                )}
              </div>
            );
          })
        )}
      </div>
    </div>
  );
}

function QuoteForm({ initial, customers, onSubmit, onCancel, busy }) {
  const terms = useTerms();
  const initialIsProspect = initial ? !initial.customer_id : false;
  const [isProspect, setIsProspect] = useState(initialIsProspect);
  const [customer_id, setCustomerId] = useState(initial?.customer_id || (customers[0]?.id || ''));
  const [prospect_name, setProspectName] = useState(initial?.prospect_name || '');
  const [prospect_email, setProspectEmail] = useState(initial?.prospect_email || '');
  const [prospect_phone, setProspectPhone] = useState(initial?.prospect_phone || '');
  const [prospect_address, setProspectAddress] = useState(initial?.prospect_address || '');
  const [description, setDescription] = useState(initial?.description || '');
  const [notes, setNotes] = useState(initial?.notes || '');
  const [line_items, setLineItems] = useState(initial?.line_items || []);
  const [status, setStatus] = useState(initial?.status || 'draft');

  function submit(e) {
    e.preventDefault();
    const payload = {
      description: description || null,
      notes: notes || null,
      line_items, status,
    };
    if (isProspect) {
      payload.customer_id = null;
      payload.prospect_name = prospect_name;
      payload.prospect_email = prospect_email || null;
      payload.prospect_phone = prospect_phone || null;
      payload.prospect_address = prospect_address || null;
    } else {
      payload.customer_id = customer_id;
    }
    onSubmit(payload);
  }

  return (
    <form onSubmit={submit}>
      <div className="form-grid">
        <div className="full">
          <label>Recipient</label>
          <div className="toggle-group">
            <button type="button" className={!isProspect ? 'active' : ''} onClick={() => setIsProspect(false)}>Existing {terms.customerLower}</button>
            <button type="button" className={isProspect ? 'active' : ''} onClick={() => setIsProspect(true)}>Prospect</button>
          </div>
        </div>
        {!isProspect ? (
          <div className="full">
            <label>{terms.customer}</label>
            <select value={customer_id} onChange={(e) => setCustomerId(e.target.value)} required>
              {customers.length === 0 && <option value="">No {terms.customersLower} — add one first</option>}
              {customers.map((c) => <option key={c.id} value={c.id}>{customerDisplayName(c)}</option>)}
            </select>
          </div>
        ) : (
          <>
            <div className="full">
              <label>Prospect name</label>
              <input value={prospect_name} onChange={(e) => setProspectName(e.target.value)} required />
            </div>
            <div>
              <label>Email <span className="hint">(optional)</span></label>
              <input type="email" value={prospect_email} onChange={(e) => setProspectEmail(e.target.value)} />
            </div>
            <div>
              <label>Phone <span className="hint">(optional)</span></label>
              <input value={prospect_phone} onChange={(e) => setProspectPhone(e.target.value)} />
            </div>
            <div className="full">
              <label>Address <span className="hint">(optional)</span></label>
              <textarea value={prospect_address} onChange={(e) => setProspectAddress(e.target.value)} />
            </div>
          </>
        )}
        <div className="full">
          <label>Description <span className="hint">(shown on the quote)</span></label>
          <input value={description} onChange={(e) => setDescription(e.target.value)} />
        </div>
        <div className="full">
          <label>Notes <span className="hint">(internal)</span></label>
          <textarea value={notes} onChange={(e) => setNotes(e.target.value)} />
        </div>
        <div className="full">
          <label>Line items</label>
          <LineItemsEditor items={line_items} onChange={setLineItems} />
        </div>
        <div>
          <label>Status</label>
          <select value={status} onChange={(e) => setStatus(e.target.value)}>
            <option value="draft">Draft</option>
            <option value="sent">Sent</option>
            <option value="accepted">Accepted</option>
            <option value="declined">Declined</option>
          </select>
        </div>
      </div>
      <div className="form-actions">
        <button type="submit" className="primary" disabled={busy}>
          {busy ? 'Saving...' : (initial ? 'Save changes' : 'Create quote')}
        </button>
        <button type="button" className="secondary" onClick={onCancel} disabled={busy}>Cancel</button>
      </div>
    </form>
  );
}

function splitProspectName(name) {
  if (!name) return { first: '', last: '', business: '' };
  const parts = name.trim().split(/\s+/);
  if (parts.length === 1) return { first: parts[0], last: '', business: '' };
  return { first: parts[0], last: parts.slice(1).join(' '), business: '' };
}

function PromoteForm({ quote, onSubmit, onCancel, busy }) {
  const terms = useTerms();
  const split = splitProspectName(quote.prospect_name);
  const [first_name, setFirst] = useState(split.first);
  const [last_name, setLast] = useState(split.last);
  const [business_name, setBusiness] = useState(split.business);
  const [phone, setPhone] = useState(quote.prospect_phone || '');
  const [email, setEmail] = useState(quote.prospect_email || '');
  const [address, setAddress] = useState(quote.prospect_address || '');
  const [notes, setNotes] = useState('');

  function submit(e) {
    e.preventDefault();
    onSubmit({ first_name, last_name, business_name, phone, email, address, notes });
  }

  return (
    <form onSubmit={submit}>
      <p className="subtitle" style={{ marginBottom: 20 }}>
        Creating a {terms.customerLower} from prospect <strong style={{ color: 'var(--text)' }}>{quote.prospect_name}</strong>.
        The quote will be re-linked to the new {terms.customerLower} and the prospect fields will be cleared.
      </p>
      <div className="form-grid">
        <div>
          <label>First name</label>
          <input value={first_name} onChange={(e) => setFirst(e.target.value)} />
        </div>
        <div>
          <label>Last name</label>
          <input value={last_name} onChange={(e) => setLast(e.target.value)} />
        </div>
        <div className="full">
          <label>Business name <span className="hint">(optional)</span></label>
          <input value={business_name} onChange={(e) => setBusiness(e.target.value)} />
        </div>
        <div>
          <label>Phone</label>
          <input value={phone} onChange={(e) => setPhone(e.target.value)} />
        </div>
        <div>
          <label>Email</label>
          <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} />
        </div>
        <div className="full">
          <label>Address</label>
          <textarea value={address} onChange={(e) => setAddress(e.target.value)} />
        </div>
        <div className="full">
          <label>Notes <span className="hint">(optional)</span></label>
          <textarea value={notes} onChange={(e) => setNotes(e.target.value)} />
        </div>
      </div>
      <div className="form-actions">
        <button type="submit" className="primary" disabled={busy}>
          {busy ? 'Creating...' : `Create ${terms.customerLower}`}
        </button>
        <button type="button" className="secondary" onClick={onCancel} disabled={busy}>Cancel</button>
      </div>
    </form>
  );
}

function quoteRecipientName(q) {
  if (q.customer_id) {
    return customerDisplayName({
      first_name: q.customer_first_name,
      last_name: q.customer_last_name,
      business_name: q.customer_business_name,
    });
  }
  return q.prospect_name || '(unnamed prospect)';
}

function QuotesView({ session, features = { invoices: true } }) {
  const terms = useTerms();
  const [quotes, setQuotes] = useState([]);
  const [customers, setCustomers] = useState([]);
  const [users, setUsers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [mode, setMode] = useState('list');
  const [editing, setEditing] = useState(null);
  const [busy, setBusy] = useState(false);
  const [search, setSearch] = useState('');
  const [sort, setSort] = useState('newest');

  const canMutate = ['admin', 'lead'].includes(session.user.role);

  function exportQuotes() {
    const headers = ['recipient', 'is_prospect', 'description', 'status', 'total', 'created_at'];
    const rows = quotes.map((q) => [
      quoteRecipientName(q),
      q.customer_id ? 'no' : 'yes',
      q.description, q.status,
      lineItemsTotal(q.line_items).toFixed(2),
      q.created_at ? q.created_at.split('T')[0] : '',
    ]);
    downloadCSV(`quotes-${formatYMD(new Date())}.csv`, headers, rows);
  }

  const refresh = useCallback(async () => {
    setLoading(true); setError(null);
    try {
      const [quoteData, custData, usersData] = await Promise.all([
        apiRequest('/api/quotes', { slug: session.slug, token: session.token }),
        apiRequest('/api/customers', { slug: session.slug, token: session.token }),
        apiRequest('/api/auth/users', { slug: session.slug, token: session.token }),
      ]);
      setQuotes(quoteData);
      setCustomers(custData);
      setUsers(usersData);
    } catch (err) { setError(err.message); }
    finally { setLoading(false); }
  }, [session.slug, session.token]);

  useEffect(() => { refresh(); }, [refresh]);

  async function createQuote(values) {
    setBusy(true); setError(null);
    try {
      await apiRequest('/api/quotes', { method: 'POST', slug: session.slug, token: session.token, body: values });
      setMode('list');
      await refresh();
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  async function updateQuote(values) {
    setBusy(true); setError(null);
    try {
      await apiRequest(`/api/quotes/${editing.id}`, { method: 'PUT', slug: session.slug, token: session.token, body: values });
      setEditing(null); setMode('list');
      await refresh();
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  async function deleteQuote(id) {
    if (!confirm('Delete this quote?')) return;
    setError(null);
    try {
      await apiRequest(`/api/quotes/${id}`, { method: 'DELETE', slug: session.slug, token: session.token });
      await refresh();
    } catch (err) { setError(err.message); }
  }

  async function emailQuote(q) {
    const email = q.customer_email || q.prospect_email;
    if (!email) {
      alert('This recipient has no email on file.');
      return;
    }
    if (!confirm(`Email this quote to ${email}?`)) return;
    setError(null);
    try {
      await apiRequest(`/api/quotes/${q.id}/send-email`, {
        method: 'POST', slug: session.slug, token: session.token,
      });
      await refresh();
      alert('Quote emailed.');
    } catch (err) { setError(err.message); }
  }

  async function promoteToCustomer(values) {
    setBusy(true); setError(null);
    try {
      await apiRequest(`/api/quotes/${editing.id}/promote-to-customer`, {
        method: 'POST', slug: session.slug, token: session.token, body: values,
      });
      setEditing(null); setMode('list');
      await refresh();
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  async function createInvoiceFromQuote(quoteId) {
    if (!confirm('Create a draft invoice from this quote? The line items will be copied and the quote will be marked accepted.')) return;
    setError(null);
    try {
      await apiRequest(`/api/quotes/${quoteId}/create-invoice`, {
        method: 'POST', slug: session.slug, token: session.token,
      });
      await refresh();
      alert('Draft invoice created. Switch to the Invoices tab to review and send.');
    } catch (err) { setError(err.message); }
  }

  async function createJobFromQuote(values) {
    setBusy(true); setError(null);
    try {
      await apiRequest('/api/jobs', {
        method: 'POST', slug: session.slug, token: session.token, body: values,
      });
      if (['draft', 'sent'].includes(editing.status)) {
        await apiRequest(`/api/quotes/${editing.id}`, {
          method: 'PUT', slug: session.slug, token: session.token, body: { status: 'accepted' },
        });
      }
      setEditing(null); setMode('list');
      await refresh();
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  if (mode === 'create') {
    return (
      <div>
        <div className="page-header"><h2>New quote</h2></div>
        {error && <div className="error">{error}</div>}
        <div className="form-card">
          <QuoteForm customers={customers} onSubmit={createQuote} onCancel={() => { setError(null); setMode('list'); }} busy={busy} />
        </div>
      </div>
    );
  }

  if (mode === 'edit' && editing) {
    return (
      <div>
        <div className="page-header"><h2>Edit quote</h2></div>
        {error && <div className="error">{error}</div>}
        <div className="form-card">
          <QuoteForm
            initial={editing}
            customers={customers}
            onSubmit={updateQuote}
            onCancel={() => { setError(null); setEditing(null); setMode('list'); }}
            busy={busy}
          />
        </div>
      </div>
    );
  }

  if (mode === 'promote' && editing) {
    return (
      <div>
        <div className="page-header"><h2>Promote prospect to {terms.customerLower}</h2></div>
        {error && <div className="error">{error}</div>}
        <div className="form-card">
          <PromoteForm
            quote={editing}
            onSubmit={promoteToCustomer}
            onCancel={() => { setError(null); setEditing(null); setMode('list'); }}
            busy={busy}
          />
        </div>
      </div>
    );
  }

  if (mode === 'createJob' && editing) {
    const total = lineItemsTotal(editing.line_items);
    const initial = {
      customer_id: editing.customer_id,
      title: editing.description || 'Job from quote',
      description: null,
      type: 'single',
      date: formatYMD(new Date()),
      default_price: total > 0 ? total : null,
      assigned_to: [],
    };
    return (
      <div>
        <div className="page-header"><h2>Create {terms.jobLower} from quote</h2></div>
        {error && <div className="error">{error}</div>}
        <div className="form-card">
          <JobForm
            initial={initial}
            customers={customers}
            users={users}
            onSubmit={createJobFromQuote}
            onCancel={() => { setError(null); setEditing(null); setMode('list'); }}
            busy={busy}
          />
        </div>
      </div>
    );
  }

  const filteredQuotes = quotes.filter((q) => searchMatches(
    search,
    q.description,
    quoteRecipientName(q),
    q.prospect_email,
    q.prospect_phone
  ));
  const qSortKey = sort === 'total' ? (q) => lineItemsTotal(q.line_items)
    : sort === 'status' ? 'status'
    : 'created_at';
  const sortedQuotes = sortBy(filteredQuotes, qSortKey, sort === 'oldest' ? 'asc' : sort === 'status' ? 'asc' : 'desc');

  return (
    <div>
      <div className="page-header">
        <h2>Quotes</h2>
        <div style={{ display: 'flex', gap: 8 }}>
          <button className="secondary" onClick={exportQuotes} disabled={quotes.length === 0}>Export</button>
          {canMutate && <button className="primary" onClick={() => { setError(null); setMode('create'); }}>+ New quote</button>}
        </div>
      </div>
      <div className="search-bar" style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
        <input
          type="search"
          value={search}
          onChange={(e) => setSearch(e.target.value)}
          placeholder="Search by customer, prospect, or description..."
          style={{ flex: 1 }}
        />
        <select value={sort} onChange={(e) => setSort(e.target.value)} style={{ width: 'auto' }}>
          <option value="newest">Sort: Newest</option>
          <option value="oldest">Sort: Oldest</option>
          <option value="total">Sort: Total (high)</option>
          <option value="status">Sort: Status</option>
        </select>
      </div>
      {error && <div className="error">{error}</div>}
      <div className="list">
        {loading ? (
          <div className="list-empty">Loading...</div>
        ) : sortedQuotes.length === 0 ? (
          quotes.length === 0 ? (
            <EmptyState
              icon="quotes"
              title="Send your first quote"
              body={canMutate
                ? `Estimate work for an existing ${terms.customerLower} or a brand-new prospect. Accepted quotes convert in one click — to a ${terms.customerLower}, a ${terms.jobLower}, or an invoice.`
                : 'No quotes yet.'
              }
              action={canMutate && (
                <button className="primary" onClick={() => { setError(null); setMode('create'); }}>+ New quote</button>
              )}
            />
          ) : (
            <div className="list-empty">No quotes match this search.</div>
          )
        ) : (
          sortedQuotes.map((q) => {
            const total = lineItemsTotal(q.line_items);
            return (
              <div key={q.id} className="row">
                <div className="info">
                  <div className="name">
                    {quoteRecipientName(q)}
                    {!q.customer_id && <span className="hint" style={{ marginLeft: 8 }}>(prospect)</span>}
                    <span className="price">{formatPrice(total)}</span>
                  </div>
                  <div className="meta">
                    {formatDateString(q.created_at.split('T')[0])} • <span className={`badge ${q.status}`}>{q.status}</span>
                  </div>
                  {q.description && <div className="secondary-meta">{q.description}</div>}
                </div>
                {canMutate && (
                  <div className="actions">
                    <button className="primary" onClick={() => emailQuote(q)}>Email</button>
                    {!q.customer_id && (
                      <button className="secondary" onClick={() => { setError(null); setEditing(q); setMode('promote'); }}>Promote to {terms.customerLower}</button>
                    )}
                    {q.customer_id && (
                      <>
                        {features.invoices && (
                          <button className="secondary" onClick={() => createInvoiceFromQuote(q.id)}>Create invoice</button>
                        )}
                        <button className="secondary" onClick={() => { setError(null); setEditing(q); setMode('createJob'); }}>Create {terms.jobLower}</button>
                      </>
                    )}
                    <button className="secondary" onClick={() => { setEditing(q); setMode('edit'); }}>Edit</button>
                    <button className="danger" onClick={() => deleteQuote(q.id)}>Delete</button>
                  </div>
                )}
              </div>
            );
          })
        )}
      </div>
    </div>
  );
}

function AutoInvoicePanel({ session, form, setField, isAdmin, busy, saved, error, submit }) {

  const [running, setRunning] = useState(false);
  const [runResult, setRunResult] = useState(null);
  const [runError, setRunError] = useState(null);

  async function runNow() {
    setRunning(true); setRunError(null); setRunResult(null);
    try {
      const r = await apiRequest('/api/billing/auto-invoice/run', {
        method: 'POST', slug: session.slug, token: session.token,
      });
      setRunResult(r);
    } catch (err) { setRunError(err.message); }
    finally { setRunning(false); }

            <div>
              <div className="auto-invoice-option-name">Off</div>

          <label className={`auto-invoice-option${schedule === 'monthly' ? ' active' : ''}`}>

              checked={schedule === 'monthly'} disabled={!isAdmin}

            <div>
              <div className="auto-invoice-option-name">Monthly</div>
              <div className="auto-invoice-option-help">Bills the previous calendar month on the chosen day.</div>

          </label>
          <label className={`auto-invoice-option${schedule === 'weekly' ? ' active' : ''}`}>

                <option value={2}>Tuesday</option>
                <option value={3}>Wednesday</option>
                <option value={4}>Thursday</option>
                <option value={5}>Friday</option>
                <option value={6}>Saturday</option>
              </select>
            </div>
          </div>
        )}

        {lastRun && (
          <div className="hint" style={{ marginTop: 16 }}>
            Last run: <strong style={{ color: 'var(--text)' }}>{lastRun}</strong>
          </div>
        )}

        {isAdmin && (
          <div className="form-actions">
            <button type="submit" className="primary" disabled={busy}>
              {busy ? 'Saving...' : 'Save schedule'}
            </button>
            {schedule !== 'off' && (
              <button type="button" className="secondary" onClick={runNow} disabled={running}>
                {running ? 'Running…' : 'Run now'}
              </button>
            )}
          </div>
        )}
      </form>

      {(runResult || runError) && (
        <div className="form-card" style={{ marginTop: 14 }}>
          {runError && <div className="error">{runError}</div>}
          {runResult && (
            <>
              <div className="section-heading" style={{ marginTop: 0 }}>Run summary</div>
              <p className="hint" style={{ marginTop: 0 }}>
                Period: <strong style={{ color: 'var(--text)' }}>{runResult.period.start} → {runResult.period.end}</strong>
              </p>
              {runResult.drafted.length === 0 ? (
                <p>No new completions to bill. Nothing was drafted.</p>
              ) : (
                <>
                  <p>{runResult.drafted.length} {runResult.drafted.length === 1 ? 'invoice' : 'invoices'} drafted, totaling {formatPrice(runResult.drafted.reduce((s, d) => s + (d.total || 0), 0))}.</p>
                  <button className="primary" onClick={() => navigate('/invoices')}>Review invoices</button>
                </>
              )}
            </>
          )}
        </div>
      )}
    </>
  );
}

function CopyButton({ text, label = 'Copy' }) {
  const [copied, setCopied] = useState(false);
  async function doCopy() {
    try {
      await navigator.clipboard.writeText(text);
      setCopied(true);
      setTimeout(() => setCopied(false), 1500);
    } catch (err) {
      alert('Could not copy. The link is: ' + text);
    }
  }
  return (
    <button type="button" className="secondary" onClick={doCopy}>
      {copied ? 'Copied!' : label}
    </button>
  );
}

function SettingsView({ session, features = { invoices: true, quotes: true, reports: true, team: true, requests: true }, onFeaturesChange }) {
  const path = useLocation();
  const subView = path === '/settings/modules' ? 'modules'
    : path === '/settings/terminology' ? 'terminology'
    : path === '/settings/quick-text' ? 'quick-text'
    : path === '/settings/dashboard' ? 'dashboard'
    : path === '/settings/auto-invoice' ? 'auto-invoice'
    : 'company';
  const [settings, setSettings] = useState(null);
  const [form, setForm] = useState({});
  const [loading, setLoading] = useState(true);
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState(null);
  const [saved, setSaved] = useState(false);
  const [localFeatures, setLocalFeatures] = useState(features);
  const [featuresBusy, setFeaturesBusy] = useState(false);
  const [featuresSaved, setFeaturesSaved] = useState(false);

  const isAdmin = session.user.role === 'admin';

  useEffect(() => { setLocalFeatures(features); }, [features.invoices, features.quotes, features.reports]);

  function toggleFeature(key) {
    setLocalFeatures((f) => ({ ...f, [key]: !f[key] }));
    setFeaturesSaved(false);
  }

  async function saveFeatures() {
    setFeaturesBusy(true); setError(null);
    try {
      await apiRequest('/api/onboarding/features', {
        method: 'PUT', slug: session.slug, token: session.token, body: { features: localFeatures },
      });
      setFeaturesSaved(true);
      if (onFeaturesChange) await onFeaturesChange();
    } catch (err) { setError(err.message); }
    finally { setFeaturesBusy(false); }
  }

  const load = useCallback(async () => {
    setLoading(true); setError(null);
    try {
      const data = await apiRequest('/api/settings', { slug: session.slug, token: session.token });
      setSettings(data);
      setForm({
        company_name: data.company_name || '',
        logo_url: data.logo_url || '',
        address: data.address || '',
        phone: data.phone || '',
        email: data.email || '',
        venmo_handle: data.venmo_handle || '',
        resend_from_email: data.resend_from_email || '',
        cloudinary_folder: data.cloudinary_folder || '',
        customer_label: data.customer_label || 'Customer',
        customer_label_plural: data.customer_label_plural || 'Customers',
        job_label: data.job_label || 'Job',
        job_label_plural: data.job_label_plural || 'Jobs',
        about: data.about || '',
        sms_templates: Array.isArray(data.sms_templates) ? data.sms_templates : [],
        dashboard_widgets: Array.isArray(data.dashboard_widgets) && data.dashboard_widgets.length > 0
          ? data.dashboard_widgets
          : DEFAULT_DASHBOARD_WIDGETS,
        auto_invoice_schedule: data.auto_invoice_schedule || 'off',
        auto_invoice_day_of_month: data.auto_invoice_day_of_month || 1,
        auto_invoice_day_of_week: data.auto_invoice_day_of_week != null ? data.auto_invoice_day_of_week : 1,
        auto_invoice_last_run_at: data.auto_invoice_last_run_at || null,
      });
    } catch (err) { setError(err.message); }
    finally { setLoading(false); }
  }, [session.slug, session.token]);

  useEffect(() => { load(); }, [load]);

  function setField(key, value) {
    setForm((f) => ({ ...f, [key]: value }));
    setSaved(false);
  }

  async function submit(e) {
    e.preventDefault();
    setBusy(true); setError(null); setSaved(false);
    try {
      const updated = await apiRequest('/api/settings', {
        method: 'PUT', slug: session.slug, token: session.token, body: form,
      });
      setSettings(updated);
      setSaved(true);
      if (onFeaturesChange) await onFeaturesChange();
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  function setSmsTemplate(index, key, value) {
    setForm((f) => {
      const next = (f.sms_templates || []).slice();
      next[index] = { ...next[index], [key]: value };
      return { ...f, sms_templates: next };
    });
    setSaved(false);
  }
  function addSmsTemplate() {
    setForm((f) => ({
      ...f,
      sms_templates: [
        ...(f.sms_templates || []),
        { id: 'tpl_' + Math.random().toString(36).slice(2, 9), label: '', message: '' },
      ],
    }));
    setSaved(false);
  }
  function removeSmsTemplate(index) {
    setForm((f) => ({
      ...f,
      sms_templates: (f.sms_templates || []).filter((_, i) => i !== index),
    }));
    setSaved(false);
  }

  function toggleDashboardWidget(id) {
    setForm((f) => ({
      ...f,
      dashboard_widgets: (f.dashboard_widgets || []).map((w) =>
        w.id === id ? { ...w, enabled: !w.enabled } : w
      ),
    }));
    setSaved(false);
  }
  function moveDashboardWidget(fromId, toId) {
    setForm((f) => {
      const list = (f.dashboard_widgets || []).slice();
      const fromIdx = list.findIndex((w) => w.id === fromId);
      const toIdx = list.findIndex((w) => w.id === toId);
      if (fromIdx === -1 || toIdx === -1 || fromIdx === toIdx) return f;
      const [moved] = list.splice(fromIdx, 1);
      list.splice(toIdx, 0, moved);
      return { ...f, dashboard_widgets: list };
    });
    setSaved(false);
  }

  if (loading && (subView === 'company' || subView === 'terminology' || subView === 'quick-text' || subView === 'dashboard' || subView === 'auto-invoice')) {
    return (
      <div>
        <div className="page-header"><h2>Settings</h2></div>

            <label>Email</label>
            <input type="email" value={form.email} onChange={(e) => setField('email', e.target.value)} disabled={!isAdmin} />
          </div>

        <div className="section-heading">Payments</div>
        <div className="form-grid">
          <div className="full">

            <input value={form.venmo_handle} onChange={(e) => setField('venmo_handle', e.target.value)} disabled={!isAdmin} />
          </div>
        </div>

        <div className="section-heading">Integrations</div>
        <div className="form-grid">
          <div>
            <label>Resend "from" email</label>
            <input type="email" value={form.resend_from_email} onChange={(e) => setField('resend_from_email', e.target.value)} placeholder="hello@yourdomain.com" disabled={!isAdmin} />
          </div>
          <div>

            <input value={form.cloudinary_folder} onChange={(e) => setField('cloudinary_folder', e.target.value)} placeholder="my-org/completions" disabled={!isAdmin} />
          </div>
        </div>

        {isAdmin && (
          <div className="form-actions">
            <button type="submit" className="primary" disabled={busy}>

        </>
      )}
    </div>
  );

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const ms = new Date(dateStr).getTime() - Date.now();
  return Math.ceil(ms / (1000 * 60 * 60 * 24));
}

function BillingBanner({ status, trialDaysLeft, isAdmin, orgId, session }) {
  if (!status) return null;
  const trialEnded = status === 'trial_expired' || (status === 'trialing' && trialDaysLeft !== null && trialDaysLeft <= 0);
  const droppedToFree = trialEnded || status === 'canceled';
  const dismissKey = droppedToFree && orgId ? `fm_dropped_to_free_seen_${orgId}` : null;
  const [dismissed, setDismissed] = useState(() => {
    if (!dismissKey) return false;
    try { return localStorage.getItem(dismissKey) === '1'; } catch (e) { return false; }
  });
  function dismiss() {
    setDismissed(true);
    if (dismissKey) { try { localStorage.setItem(dismissKey, '1'); } catch (e) {} }
  }

  let body = null;
  let bg = '#fff5e6';
  let color = '#8c5a00';
  let showDismiss = false;

  if (status === 'trialing' && trialDaysLeft !== null && trialDaysLeft > 3) {
    bg = 'var(--tinted)';
    color = 'var(--text-muted)';
    body = isAdmin
      ? <>You're trying Pro free — {trialDaysLeft} days left. <button className="link-button" style={{ color: 'inherit', textDecoration: 'underline' }} onClick={() => navigate('/billing')}>Add billing now</button> to keep Pro after the trial.</>
      : <>This organization is on a Pro trial — {trialDaysLeft} days left.</>;
  } else if (status === 'trialing' && trialDaysLeft !== null && trialDaysLeft <= 3 && trialDaysLeft > 0) {
    body = isAdmin
      ? <>Your Pro trial ends in {trialDaysLeft} {trialDaysLeft === 1 ? 'day' : 'days'}. <button className="link-button" style={{ color: 'inherit', textDecoration: 'underline' }} onClick={() => navigate('/billing')}>Subscribe to keep Pro</button>, or do nothing to drop to Free.</>
      : <>This organization's Pro trial ends in {trialDaysLeft} {trialDaysLeft === 1 ? 'day' : 'days'}.</>;
  } else if (trialEnded && !dismissed) {
    bg = 'var(--tinted)'; color = 'var(--text)';
    showDismiss = true;
    body = isAdmin
      ? <>Your Pro trial ended — you're now on <strong>Free</strong> with caps of 5 customers + 20 jobs. <button className="link-button" style={{ color: 'inherit', textDecoration: 'underline', fontWeight: 600 }} onClick={() => startUpgrade(session)}>Upgrade to Pro · $29/mo</button>.</>
      : <>This organization's Pro trial ended. It's now on the Free plan.</>;
  } else if (status === 'past_due') {
    bg = 'var(--danger-bg)'; color = 'var(--danger)';
    body = isAdmin
      ? <>Your latest payment failed — editing is locked until it clears. <button className="link-button" style={{ color: 'inherit', textDecoration: 'underline' }} onClick={() => navigate('/billing')}>Update payment method</button>.</>
      : <>Payment is past due. Ask an admin to update the payment method.</>;
  } else if (status === 'canceled' && !dismissed) {
    bg = 'var(--tinted)'; color = 'var(--text)';
    showDismiss = true;
    body = isAdmin
      ? <>Your Pro subscription is canceled — you're on <strong>Free</strong> now. Data and settings are preserved. <button className="link-button" style={{ color: 'inherit', textDecoration: 'underline', fontWeight: 600 }} onClick={() => startUpgrade(session)}>Resubscribe</button>.</>
      : <>Your organization's Pro subscription was canceled. It's now on the Free plan.</>;
  }

  if (!body) return null;
  return (
    <div style={{
      background: bg, color, padding: '10px 24px', textAlign: 'center',
      fontSize: 13, fontWeight: 500, borderBottom: '1px solid var(--border)',
      position: 'relative',
    }}>
      {body}
      {showDismiss && isAdmin && (
        <button
          aria-label="Dismiss"
          onClick={dismiss}
          style={{
            position: 'absolute', right: 12, top: '50%', transform: 'translateY(-50%)',
            background: 'transparent', border: 'none', cursor: 'pointer',
            color: 'inherit', fontSize: 18, lineHeight: 1, padding: 4, opacity: 0.6,
          }}
        >×</button>
      )}
    </div>
  );
}

function BillingUsageBar({ label, used, limit }) {
  const pct = limit > 0 ? Math.min(100, Math.round((used / limit) * 100)) : 0;
  const atCap = used >= limit;
  return (
    <div className="usage-bar">
      <div className="usage-bar-head">
        <span className="usage-bar-label">{label}</span>
        <span className={`usage-bar-count${atCap ? ' over' : ''}`}>{used} / {limit}</span>
      </div>
      <div className="usage-bar-track">
        <div className={`usage-bar-fill${atCap ? ' over' : ''}`} style={{ width: `${pct}%` }} />
      </div>
    </div>
  );
}

function DangerZone({ session, orgSlug, orgName }) {
  const [open, setOpen] = useState(false);
  const [confirmSlug, setConfirmSlug] = useState('');
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState(null);

  async function destroy() {
    setBusy(true); setError(null);
    try {
      await apiRequest('/api/billing/cancel-account', {
        method: 'POST', slug: session.slug, token: session.token,
        body: { confirm_slug: confirmSlug },
      });
      clearSession();
      window.location.href = '/?account_deleted=1';
    } catch (err) {
      setError(err.message);
      setBusy(false);
    }
  }

  return (
    <div className="danger-zone">
      <div className="section-heading" style={{ marginTop: 0, color: 'var(--danger)' }}>Danger zone</div>
      {!open ? (
        <div className="danger-zone-summary">
          <div>
            <strong>Close this account</strong>
            <p>Cancels the Stripe subscription and permanently deletes <strong>{orgName}</strong> and all its data. This cannot be undone.</p>
          </div>
          <button className="danger" onClick={() => { setOpen(true); setError(null); setConfirmSlug(''); }}>
            Delete account…
          </button>
        </div>
      ) : (
        <div className="danger-zone-confirm">
          <p>
            Type <code>{orgSlug}</code> below to confirm permanent deletion. All customers, jobs, invoices, quotes, settings, and teammates will be removed. Your Stripe subscription (if any) will be canceled.
          </p>
          <input
            value={confirmSlug}
            onChange={(e) => setConfirmSlug(e.target.value)}
            placeholder={orgSlug}
            autoFocus
          />
          {error && <div className="error">{error}</div>}
          <div className="form-actions">
            <button className="danger" disabled={busy || confirmSlug !== orgSlug} onClick={destroy}>
              {busy ? 'Deleting...' : 'Permanently delete account'}
            </button>
            <button className="secondary" disabled={busy} onClick={() => { setOpen(false); setConfirmSlug(''); setError(null); }}>
              Cancel
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

function badgeForStatus(s) {
  if (s === 'free' || s === 'active') return 'paid';
  if (s === 'trialing') return 'sent';
  if (s === 'past_due' || s === 'canceled') return 'declined';
  return 'draft';
}

function statusLabel(s, trialEnds) {
  if (s === 'free') return 'Free';
  if (s === 'trialing') {
    const d = daysUntil(trialEnds);
    return d !== null && d <= 0 ? 'Trial expired' : 'Free trial';
  }
  if (s === 'active') return 'Active';
  if (s === 'past_due') return 'Past due';
  if (s === 'canceled') return 'Canceled';
  return s;
}

// PlanError wraps the usual `<div className="error">` so any caller that
// throws a plan-limit / pro-feature error gets the styled upgrade prompt
// (with a direct Stripe-checkout button) instead of a plain red message.
function PlanError({ error, session }) {
  if (!error) return null;
  if (!isPlanLimitError(error)) {
    return <div className="error">{error.message || String(error)}</div>;
  }
  const data = error.data || {};
  return (
    <div className="upgrade-prompt">
      <div className="upgrade-prompt-icon"><Icon name="lock" /></div>
      <div className="upgrade-prompt-text">
        <strong>{data.billing_status === 'plan_limit' ? "You've hit the Free plan limit" : "That's a Pro feature"}</strong>
        <span>
          {error.message} Upgrade to Pro to unlock — $29/mo, cancel anytime.
        </span>
      </div>
      <button className="primary" onClick={() => startUpgrade(session)}>Upgrade · $29/mo</button>
    </div>
  );
}

function UserMenu({ session, onLogout, onSwitch }) {
  const [open, setOpen] = useState(false);
  const [orgs, setOrgs] = useState(null);
  const [switching, setSwitching] = useState(false);
  const wrapRef = React.useRef(null);

  useEffect(() => {
    if (!open) return;
    function onDocClick(e) {
      if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false);
    }
    function onEsc(e) { if (e.key === 'Escape') setOpen(false); }
    document.addEventListener('mousedown', onDocClick);
    document.addEventListener('keydown', onEsc);
    return () => {
      document.removeEventListener('mousedown', onDocClick);
      document.removeEventListener('keydown', onEsc);
    };
  }, [open]);

  useEffect(() => {
    if (!open || orgs !== null) return;
    (async () => {
      try {
        const r = await apiRequest('/api/auth/my-orgs', { token: session.token });
        setOrgs(r.orgs || []);
      } catch (err) {
        setOrgs([]);
      }
    })();
  }, [open, orgs, session.token]);

  async function switchTo(slug) {
    setSwitching(true);
    try {
      const data = await apiRequest('/api/auth/switch-org', {
        method: 'POST', token: session.token, body: { org_slug: slug },
      });
      onSwitch({
        token: data.token,
        user: data.user,
        organization: data.organization,
        slug: data.organization.slug,
      });
    } catch (err) {
      alert(err.message);
      setSwitching(false);
    }
  }

  const name = session.user.name || session.user.email || '';
  const initial = (name.trim().charAt(0) || '?').toUpperCase();
  const otherOrgs = (orgs || []).filter((o) => !o.current);

  return (
    <div className="user-menu-wrap" ref={wrapRef}>
      <button
        className="user-menu-trigger"
        onClick={() => setOpen((v) => !v)}
        aria-haspopup="menu"
        aria-expanded={open}
        title={name}
      >
        <span className="user-menu-avatar">{initial}</span>
        <svg className="user-menu-caret" viewBox="0 0 12 8" aria-hidden="true">
          <path d="M1 1.5L6 6.5L11 1.5" stroke="currentColor" strokeWidth="1.8" fill="none" strokeLinecap="round" strokeLinejoin="round" />
        </svg>
      </button>
      {open && (
        <div className="user-menu-pop" role="menu">
          <div className="user-menu-header">
            <div className="user-menu-name">{session.user.name || '(no name)'}</div>
            <div className="user-menu-email">{session.user.email}</div>
            <div className="user-menu-role">
              <span className="badge">{session.user.role}</span>
              <span style={{ color: 'var(--text-muted)', fontSize: 12 }}>at <strong style={{ color: 'var(--text)' }}>{session.organization && session.organization.name}</strong></span>
            </div>
          </div>
          {otherOrgs.length > 0 && (
            <>
              <div className="user-menu-section">Switch organization</div>
              {otherOrgs.map((o) => (
                <button
                  key={o.id}
                  className="user-menu-item"
                  disabled={switching}
                  onClick={() => switchTo(o.slug)}
                >
                  <span>{o.name}</span>
                  <span className="user-menu-item-meta">{o.role}</span>
                </button>
              ))}
            </>
          )}
          <div className="user-menu-divider" />
          <button className="user-menu-item" onClick={() => { setOpen(false); navigate('/profile'); }}>
            Profile
          </button>
          {session.user.is_system_admin && (
            <button className="user-menu-item" onClick={() => { setOpen(false); navigate('/system'); }}>
              System admin
            </button>
          )}
          <div className="user-menu-divider" />
          <button className="user-menu-item user-menu-item-danger" onClick={() => { setOpen(false); onLogout(); }}>
            Sign out
          </button>
        </div>
      )}
    </div>
  );
}

    try {
      const m = await apiRequest('/api/auth/me', { slug: session.slug, token: session.token });
      setMe(m);

  }, [session.slug, session.token]);

          apiRequest('/api/auth/me', { slug: session.slug, token: session.token }),
          apiRequest('/api/booking-requests/count', { slug: session.slug, token: session.token })
            .catch(() => ({ pending: 0 })),

        {view === 'jobs' && <JobsView session={session} features={features} smsTemplates={(me && me.sms_templates) || []} planContext={{ isFree, atCap: jobsAtCap, used: counts.jobs, limit: limits.jobs }} />}
        {view === 'customers' && <CustomersView session={session} features={features} planContext={{ isFree, atCap: customersAtCap, used: counts.customers, limit: limits.customers }} />}
        {view === 'requests' && features.requests && <RequestsView session={session} />}
        {view === 'invoices' && (isFree
          ? <LockedFeature feature="invoices" session={session} />
          : (features.invoices && <InvoicesView session={session} />))}
        {view === 'quotes' && features.quotes && <QuotesView session={session} features={features} />}
        {view === 'reports' && (isFree
          ? <LockedFeature feature="reports" session={session} />
          : (features.reports && session.user.role === 'admin' && <ReportsView session={session} />))}
        {view === 'team' && (isFree
          ? <LockedFeature feature="team" session={session} />
          : (session.user.role === 'admin' && features.team && <TeamView session={session} />))}
        {view === 'billing' && session.user.role === 'admin' && <BillingView session={session} me={me} />}
        {view === 'settings' && <SettingsView session={session} features={features} onFeaturesChange={reloadMe} />}
        {view === 'system' && session.user.is_system_admin && <SystemView session={session} />}
        {view === 'profile' && <ProfileView session={session} onSessionUpdate={onSessionUpdate} />}
      </div>
    </div>
    </TermsContext.Provider>
    </SmsTemplatesContext.Provider>
  );
}

  return 'Good evening';
}

function DashboardWidgetTopCustomers({ ctx }) {
  const { invoices, terms, invoicesUsable } = ctx;

  const byCustomer = {};
  invoices.filter((i) => i.status === 'paid').forEach((inv) => {
    const name = customerDisplayName({
      first_name: inv.customer_first_name,
      last_name: inv.customer_last_name,
      business_name: inv.customer_business_name,
    }) || 'Unknown';
    const cid = inv.customer_id || name;
    if (!byCustomer[cid]) byCustomer[cid] = { name, total: 0, count: 0 };
    byCustomer[cid].total += invoiceMath(inv).total;
    byCustomer[cid].count++;
  });
  const sorted = Object.values(byCustomer).sort((a, b) => b.total - a.total).slice(0, 5);
  if (sorted.length === 0) return null;
  return (
    <>
      <div className="section-heading">Top {terms.customersLower}</div>

        {sorted.map((c, i) => (
          <div key={i} className="compact-row">

              <div className="meta">{c.count} paid {c.count === 1 ? 'invoice' : 'invoices'}</div>
            </div>
          </div>
        ))}
      </div>
    </>
  );
}

function DashboardView({ session, me, pendingRequestsCount, features = {} }) {
  const terms = useTerms();
  const [jobs, setJobs] = useState([]);
  const [customers, setCustomers] = useState([]);
  const [invoices, setInvoices] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [completing, setCompleting] = useState(null);
  const [busy, setBusy] = useState(false);

  const refresh = useCallback(async () => {
    setLoading(true); setError(null);
    try {
      const [jobsData, invoicesData, customersData] = await Promise.all([
        apiRequest('/api/jobs', { slug: session.slug, token: session.token }),
        apiRequest('/api/invoices', { slug: session.slug, token: session.token }),
        apiRequest('/api/customers', { slug: session.slug, token: session.token }),
      ]);
      setJobs(jobsData);
      setInvoices(invoicesData);
      setCustomers(customersData);
    } catch (err) { setError(err.message); }
    finally { setLoading(false); }
  }, [session.slug, session.token]);

  useEffect(() => { refresh(); }, [refresh]);

  async function completeJob(values) {
    setBusy(true); setError(null);
    try {
      await apiRequest(`/api/jobs/${completing.job.id}/complete`, {
        method: 'POST', slug: session.slug, token: session.token, body: values,
      });
      setCompleting(null);
      await refresh();
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  async function markInvoicePaid(id) {
    setError(null);
    try {
      await apiRequest(`/api/invoices/${id}/mark-paid`, {
        method: 'POST', slug: session.slug, token: session.token,
      });
      await refresh();
    } catch (err) { setError(err.message); }
  }

  const today = todayStart();
  const todayStr = formatYMD(today);
  const tomorrowStr = formatYMD(addDays(today, 1));
  const weekAgoStr = formatYMD(addDays(today, -6));
  const overdueStart = formatYMD(addDays(today, -90));
  const yesterdayStr = formatYMD(addDays(today, -1));

  const todayOccurrences = jobs.flatMap((j) => jobOccurrencesInRange(j, todayStr, todayStr));
  const tomorrowOccurrences = jobs
    .flatMap((j) => jobOccurrencesInRange(j, tomorrowStr, tomorrowStr))
    .sort((a, b) => (a.job.start_time || '99:99').localeCompare(b.job.start_time || '99:99'));
  const overdueOccurrences = jobs
    .flatMap((j) => jobOccurrencesInRange(j, overdueStart, yesterdayStr))
    .filter((o) => !o.completed)
    .sort((a, b) => b.date.localeCompare(a.date));
  const outstandingInvoices = invoices.filter((i) => i.status === 'sent');

  const outstandingTotal = outstandingInvoices.reduce((sum, i) => sum + invoiceMath(i).total, 0);
  const weekRevenue = invoices
    .filter((i) => i.status === 'paid' && i.paid_date && i.paid_date.split('T')[0] >= weekAgoStr && i.paid_date.split('T')[0] <= todayStr)
    .reduce((sum, i) => sum + invoiceMath(i).total, 0);
  const next7DaysProjected = computeProjectedIncome(jobs, todayStr, formatYMD(addDays(today, 6)));

  if (completing) {
    return (
      <div>
        <div className="page-header"><h2>Mark complete: {completing.job.title}</h2></div>
        {error && <div className="error">{error}</div>}
        <div className="form-card">
          <CompletionForm
            job={completing.job}
            initialDate={completing.date}
            onSubmit={completeJob}
            onCancel={() => { setError(null); setCompleting(null); }}
            busy={busy}
          />
        </div>
      </div>
    );
  }

  const newCustomersThisWeek = customers.filter((c) => {
    if (!c.created_at) return false;
    return c.created_at.split('T')[0] >= weekAgoStr;
  }).length;

  const plan = (me && me.plan) || 'pro';
  const isFree = plan === 'free';
  const ctx = {
    session, terms, today,
    jobs, invoices, customers,
    todayOccurrences, tomorrowOccurrences, overdueOccurrences,
    outstandingInvoices, outstandingTotal, weekRevenue, next7DaysProjected,
    newCustomersThisWeek,
    pendingRequestsCount: pendingRequestsCount || 0,
    features, isFree,
    invoicesUsable: !isFree && features.invoices,
    quotesUsable: features.quotes,
    onMarkComplete: (job, date) => setCompleting({ job, date }),
    onMarkPaid: markInvoicePaid,
  };

  const widgets = (me && Array.isArray(me.dashboard_widgets) && me.dashboard_widgets.length > 0)
    ? me.dashboard_widgets
    : DEFAULT_DASHBOARD_WIDGETS;

  return (
    <div>
      {error && <div className="error">{error}</div>}

      {loading ? (
        <div className="list-empty">Loading...</div>
      ) : (
        <>
          {widgets.filter((w) => w.enabled && DASHBOARD_WIDGET_REGISTRY[w.id]).map((w) => {
            const W = DASHBOARD_WIDGET_REGISTRY[w.id].render;
            return <W key={w.id} ctx={ctx} />;
          })}
        </>
      )}
    </div>
  );
}

const REPORT_PRESETS = {
  '7days': '7 days',
  'month': 'This month',
  'quarter': 'This quarter',
  'year': 'This year',
  'all': 'All time',
  'custom': 'Custom',
};

function getReportRange(preset, customFrom, customTo) {
  const today = todayStart();
  const todayStr = formatYMD(today);
  if (preset === '7days') return { from: formatYMD(addDays(today, -6)), to: todayStr };
  if (preset === 'month') {
    return { from: formatYMD(new Date(today.getFullYear(), today.getMonth(), 1)), to: todayStr };
  }
  if (preset === 'quarter') {
    const q = Math.floor(today.getMonth() / 3);
    return { from: formatYMD(new Date(today.getFullYear(), q * 3, 1)), to: todayStr };
  }
  if (preset === 'year') {
    return { from: formatYMD(new Date(today.getFullYear(), 0, 1)), to: todayStr };
  }
  if (preset === 'all') {
    return { from: '2000-01-01', to: todayStr };
  }
  return { from: customFrom || todayStr, to: customTo || todayStr };
}

function ReportsView({ session }) {
  const terms = useTerms();
  const [preset, setPreset] = useState('month');
  const [customFrom, setCustomFrom] = useState(formatYMD(todayStart()));
  const [customTo, setCustomTo] = useState(formatYMD(todayStart()));
  const [report, setReport] = useState(null);
  const [jobs, setJobs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  const range = getReportRange(preset, customFrom, customTo);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      setLoading(true); setError(null);
      try {
        const params = new URLSearchParams({ from: range.from, to: range.to });
        const [reportData, jobsData] = await Promise.all([
          apiRequest(`/api/reports?${params}`, { slug: session.slug, token: session.token }),
          apiRequest('/api/jobs', { slug: session.slug, token: session.token }),
        ]);
        if (!cancelled) { setReport(reportData); setJobs(jobsData); }
      } catch (err) {
        if (!cancelled) setError(err.message);
      } finally {
        if (!cancelled) setLoading(false);
      }
    })();
    return () => { cancelled = true; };
  }, [session.slug, session.token, range.from, range.to]);

  const projectedIncome = computeProjectedIncome(jobs, range.from, range.to);

  const maxMonthly = report && report.monthly_revenue.length > 0
    ? Math.max(...report.monthly_revenue.map((r) => parseFloat(r.paid_total) || 0))
    : 0;

  // Avg paid per invoice in range (KPI ish)
  const avgPerInvoice = report && report.invoices.paid_count > 0
    ? report.invoices.paid_total / report.invoices.paid_count
    : 0;

  return (
    <div>
      <div className="reports-hero">
        <div className="reports-hero-eyebrow">Reports</div>
        <h2 className="reports-hero-title">
          {REPORT_PRESETS[preset] || 'Custom range'}
        </h2>
        <p className="reports-hero-sub">
          {formatDateString(range.from)} <span style={{ opacity: 0.5 }}>→</span> {formatDateString(range.to)}
        </p>
        <div className="reports-range-chips">
          {Object.entries(REPORT_PRESETS).map(([key, label]) => (
            <button
              key={key}
              className={`chip ${preset === key ? 'active' : ''}`}
              onClick={() => setPreset(key)}
            >
              {label}
            </button>
          ))}
        </div>
      </div>
      {preset === 'custom' && (
        <div className="form-card" style={{ marginBottom: 20 }}>
          <div className="form-grid">
            <div>
              <label>From</label>
              <input type="date" value={customFrom} onChange={(e) => setCustomFrom(e.target.value)} />
            </div>
            <div>
              <label>To</label>
              <input type="date" value={customTo} onChange={(e) => setCustomTo(e.target.value)} />
            </div>
          </div>
        </div>
      )}

      {error && <div className="error">{error}</div>}
      {loading ? (
        <div className="list-empty">Loading...</div>
      ) : report ? (
        <>
          <div className="stats-grid row-fixed-3">
            <div className="stat-card accent">
              <div className="label">Paid revenue</div>
              <div className="value">{formatPrice(report.invoices.paid_total)}</div>
              <div className="subvalue">{report.invoices.paid_count} {report.invoices.paid_count === 1 ? 'invoice' : 'invoices'}</div>
            </div>
            <div className="stat-card">

          <div className="stats-grid row-fixed-3">
            <div className="stat-card">
              <div className="label">{terms.jobs} completed</div>
              <div className="value">{report.completed_work}</div>
              <div className="subvalue">in selected range</div>
            </div>
            <div className="stat-card">
              <div className="label">New {terms.customersLower}</div>

            <div className="stat-card">

                  return (
                    <div key={row.month} className="revenue-bar-row">
                      <div className="month">{label}</div>
                      <div className="bar-track"><div className="bar-fill" style={{ width: `${pct}%` }}></div></div>
                      <div className="amount">{formatPrice(amount)}</div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          <div className="reports-panel">
            <div className="reports-panel-head">
              <h3>Top {terms.customersLower}</h3>
              <span>by paid revenue</span>
            </div>
            {report.top_customers.length === 0 ? (
              <div className="line-items-empty">No paid invoices in this range.</div>
            ) : (
              <div className="reports-top-customers">
                {report.top_customers.map((c, i) => {
                  const max = parseFloat(report.top_customers[0].paid_total) || 0;
                  const pct = max > 0 ? ((parseFloat(c.paid_total) || 0) / max) * 100 : 0;
                  return (
                    <div key={c.id} className="reports-tc-row">
                      <div className="reports-tc-rank">{i + 1}</div>
                      <div className="reports-tc-body">
                        <div className="reports-tc-name">{customerDisplayName(c)}</div>
                        <div className="reports-tc-bar"><span style={{ width: `${pct}%` }} /></div>
                      </div>
                      <div className="reports-tc-amount">{formatPrice(c.paid_total)}</div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </>
      ) : null}
    </div>
  );
}

function OnboardingPage({ session, onDone }) {
  const terms = useTerms();
  const [step, setStep] = useState('modules');
  const [features, setFeatures] = useState({ invoices: false, quotes: false, reports: false, team: false, requests: false });
  const [terminology, setTerminology] = useState({
    customer_label: 'Customer',
    customer_label_plural: 'Customers',
    job_label: 'Job',
    job_label_plural: 'Jobs',
  });
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState(null);

  function toggle(key) {
    setFeatures((f) => ({ ...f, [key]: !f[key] }));
  }

  function setTermField(key, value) {
    setTerminology((t) => ({ ...t, [key]: value }));
  }

  async function submit() {
    setBusy(true); setError(null);
    try {
      await apiRequest('/api/onboarding/complete', {
        method: 'POST', slug: session.slug, token: session.token,
        body: { features, terminology },
      });
      await onDone();
    } catch (err) { setError(err.message); setBusy(false); }
  }

  if (step === 'terminology') {
    return (
      <div className="auth-shell" style={{ maxWidth: 640 }}>
        <div className="card">
          <p className="hint" style={{ marginTop: 0, marginBottom: 6, textTransform: 'uppercase', letterSpacing: '0.08em', fontWeight: 600 }}>
            Step 2 of 2
          </p>
          <h1>What do you call your work?</h1>
          <p className="subtitle" style={{ marginBottom: 20 }}>
            Every business is different. Tell us what you call jobs and customers and we'll use those words throughout the app. You can change this later in Settings → Terminology.
          </p>

          <div className="form-grid">
            <div>
              <label>What do you call a customer?</label>
              <input value={terminology.customer_label} onChange={(e) => setTermField('customer_label', e.target.value)} placeholder="Customer" />
            </div>
            <div>
              <label>Plural</label>
              <input value={terminology.customer_label_plural} onChange={(e) => setTermField('customer_label_plural', e.target.value)} placeholder="Customers" />
            </div>
            <div>
              <label>What do you call a job?</label>
              <input value={terminology.job_label} onChange={(e) => setTermField('job_label', e.target.value)} placeholder="Job" />
            </div>
            <div>
              <label>Plural</label>
              <input value={terminology.job_label_plural} onChange={(e) => setTermField('job_label_plural', e.target.value)} placeholder="Jobs" />
            </div>
          </div>

          <div style={{ marginTop: 18, padding: 14, background: 'var(--tinted)', borderRadius: 8, fontSize: 13, color: 'var(--text-muted)' }}>
            Preview: Your sidebar will say <strong style={{ color: 'var(--text)' }}>{terminology.customer_label_plural || 'Customers'}</strong> and <strong style={{ color: 'var(--text)' }}>{terminology.job_label_plural || 'Jobs'}</strong>.
          </div>

          {error && <div className="error">{error}</div>}

          <div className="form-actions" style={{ marginTop: 24, justifyContent: 'space-between' }}>
            <button className="secondary" disabled={busy} onClick={() => setStep('modules')}>← Back</button>
            <button className="primary" disabled={busy} onClick={submit}>
              {busy ? 'Saving...' : 'Finish setup'}
            </button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="auth-shell" style={{ maxWidth: 640 }}>
      <div className="card">
        <p className="hint" style={{ marginTop: 0, marginBottom: 6, textTransform: 'uppercase', letterSpacing: '0.08em', fontWeight: 600 }}>
          Step 1 of 2
        </p>
        <h1>Welcome to {session.organization.name}!</h1>
        <p className="subtitle" style={{ marginBottom: 16 }}>
          You're already set up with the basics: a <strong style={{ color: 'var(--text)' }}>Dashboard</strong>, <strong style={{ color: 'var(--text)' }}>{terms.customers}</strong>, and <strong style={{ color: 'var(--text)' }}>{terms.jobs}</strong>. These are always on — they're the core of Field Manager.
        </p>
        <p className="subtitle">
          Click below to add anything else you need. You can change this later in Settings → Modules.
        </p>

        <div className="section-heading" style={{ marginTop: 24, marginBottom: 12 }}>Optional modules</div>

        <FeatureRow
          enabled={features.invoices} onToggle={() => toggle('invoices')}
          label="Invoices"
          description={`Track billable work, send invoices to ${terms.customersLower} (email or shareable link), record payments, tax + discounts, recurring-${terms.jobLower} auto-billing.`}
        />
        <FeatureRow
          enabled={features.quotes} onToggle={() => toggle('quotes')}
          label="Quotes / Estimates"
          description={`Send estimates to prospects, convert accepted quotes into ${terms.customersLower}, ${terms.jobsLower}, or invoices in one click.`}
        />
        <FeatureRow
          enabled={features.reports} onToggle={() => toggle('reports')}
          label="Reports"
          description={`Revenue dashboard, projected income, top ${terms.customersLower}, monthly trends. Admin-only when on.`}
        />
        <FeatureRow
          enabled={features.team} onToggle={() => toggle('team')}
          label="Team"
          description="Invite admins, leads, and employees with role-based access. Skip if you're a solo operator."
        />
        <FeatureRow
          enabled={features.requests} onToggle={() => toggle('requests')}
          label="Requests"
          description={`Public booking page where ${terms.customersLower} can request appointments. Adds a Requests tab where you accept or decline them.`}

        <div className="form-actions" style={{ marginTop: 24 }}>
          <button className="primary" disabled={busy} onClick={() => setStep('terminology')}>
            Continue →

        </div>

function ProfileView({ session, onSessionUpdate }) {
  const [name, setName] = useState(session.user.name || '');
  const [currentPassword, setCurrentPassword] = useState('');
  const [newPassword, setNewPassword] = useState('');
  const [confirmPassword, setConfirmPassword] = useState('');
  const [nameBusy, setNameBusy] = useState(false);
  const [pwBusy, setPwBusy] = useState(false);
  const [error, setError] = useState(null);
  const [success, setSuccess] = useState(null);
  const [theme, setTheme] = useState(() => document.documentElement.dataset.theme || 'light');

  function changeTheme(next) {
    setTheme(next);
    document.documentElement.dataset.theme = next;
    try { localStorage.setItem('fm_theme', next); } catch (e) {}
  }

  async function saveName(e) {
    e.preventDefault();
    setError(null); setSuccess(null); setNameBusy(true);
    try {
      const updated = await apiRequest('/api/auth/me', {
        method: 'PUT', slug: session.slug, token: session.token, body: { name },
      });
      onSessionUpdate({ ...session, user: { ...session.user, name: updated.name } });
      setSuccess('Name updated.');
    } catch (err) { setError(err.message); }
    finally { setNameBusy(false); }
  }

  async function changePassword(e) {
    e.preventDefault();
    setError(null); setSuccess(null);
    if (newPassword !== confirmPassword) {
      setError('New passwords do not match.');
      return;
    }
    setPwBusy(true);
    try {
      await apiRequest('/api/auth/me', {
        method: 'PUT', slug: session.slug, token: session.token,
        body: { current_password: currentPassword, new_password: newPassword },
      });
      setCurrentPassword(''); setNewPassword(''); setConfirmPassword('');
      setSuccess('Password changed.');
    } catch (err) { setError(err.message); }
    finally { setPwBusy(false); }
  }

  return (
    <div>
      <div className="page-header">
        <h2>Profile</h2>
      </div>
      {error && <div className="error">{error}</div>}
      {success && <div className="error" style={{ background: '#e8f1ec', color: '#1f6f4a' }}>{success}</div>}

      <div className="form-card">
        <div className="section-heading" style={{ marginTop: 0 }}>Account</div>
        <form onSubmit={saveName}>
          <label>Name</label>
          <input value={name} onChange={(e) => setName(e.target.value)} />
          <label>Email</label>
          <input value={session.user.email} disabled />
          <label>Role</label>
          <input value={session.user.role} disabled />
          <label>Organization</label>
          <input value={`${session.organization.name} (${session.organization.slug})`} disabled />
          <div className="form-actions">
            <button type="submit" className="primary" disabled={nameBusy}>
              {nameBusy ? 'Saving...' : 'Save name'}
            </button>
          </div>
        </form>
      </div>

      <div className="form-card">
        <div className="section-heading" style={{ marginTop: 0 }}>Change password</div>
        <form onSubmit={changePassword}>
          <label>Current password</label>
          <input type="password" value={currentPassword} onChange={(e) => setCurrentPassword(e.target.value)} required />
          <label>New password <span className="hint">(8+ chars, upper, lower, number, special)</span></label>
          <input type="password" value={newPassword} onChange={(e) => setNewPassword(e.target.value)} required />
          <label>Confirm new password</label>
          <input type="password" value={confirmPassword} onChange={(e) => setConfirmPassword(e.target.value)} required />
          <div className="form-actions">
            <button type="submit" className="primary" disabled={pwBusy}>
              {pwBusy ? 'Saving...' : 'Change password'}
            </button>
          </div>
        </form>
      </div>

      <div className="form-card">
        <div className="section-heading" style={{ marginTop: 0 }}>Appearance</div>
        <label>Theme</label>
        <div className="toggle-group">
          <button type="button" className={theme === 'light' ? 'active' : ''} onClick={() => changeTheme('light')}>Light</button>
          <button type="button" className={theme === 'dark' ? 'active' : ''} onClick={() => changeTheme('dark')}>Dark</button>
        </div>
      </div>
    </div>
  );
}
