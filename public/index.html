                      </>
                    )}
                    <button className="secondary" onClick={() => { setEditing(inv); setMode('edit'); }}>Edit</button>
                    <button className="danger" onClick={() => deleteInvoice(inv.id)}>Delete</button>
                  </div>
                )}
              </div>
            );
          })
        )}
      </div>
    </div>
  );
}

function QuoteForm({ initial, customers, onSubmit, onCancel, busy }) {
  const initialIsProspect = initial ? !initial.customer_id : false;
  const [isProspect, setIsProspect] = useState(initialIsProspect);
  const [customer_id, setCustomerId] = useState(initial?.customer_id || (customers[0]?.id || ''));
  const [prospect_name, setProspectName] = useState(initial?.prospect_name || '');
  const [prospect_email, setProspectEmail] = useState(initial?.prospect_email || '');
  const [prospect_phone, setProspectPhone] = useState(initial?.prospect_phone || '');
  const [prospect_address, setProspectAddress] = useState(initial?.prospect_address || '');
  const [description, setDescription] = useState(initial?.description || '');
  const [notes, setNotes] = useState(initial?.notes || '');
  const [line_items, setLineItems] = useState(initial?.line_items || []);
  const [status, setStatus] = useState(initial?.status || 'draft');

  function submit(e) {
    e.preventDefault();
    const payload = {
      description: description || null,
      notes: notes || null,
      line_items, status,
    };
    if (isProspect) {
      payload.customer_id = null;
      payload.prospect_name = prospect_name;
      payload.prospect_email = prospect_email || null;
      payload.prospect_phone = prospect_phone || null;
      payload.prospect_address = prospect_address || null;
    } else {
      payload.customer_id = customer_id;
    }
    onSubmit(payload);
  }

  return (
    <form onSubmit={submit}>
      <div className="form-grid">
        <div className="full">
          <label>Recipient</label>
          <div className="toggle-group">
            <button type="button" className={!isProspect ? 'active' : ''} onClick={() => setIsProspect(false)}>Existing customer</button>
            <button type="button" className={isProspect ? 'active' : ''} onClick={() => setIsProspect(true)}>Prospect</button>
          </div>
        </div>
        {!isProspect ? (
          <div className="full">
            <label>Customer</label>
            <select value={customer_id} onChange={(e) => setCustomerId(e.target.value)} required>
              {customers.length === 0 && <option value="">No customers — add one first</option>}
              {customers.map((c) => <option key={c.id} value={c.id}>{customerDisplayName(c)}</option>)}
            </select>
          </div>
        ) : (
          <>
            <div className="full">
              <label>Prospect name</label>
              <input value={prospect_name} onChange={(e) => setProspectName(e.target.value)} required />
            </div>
            <div>
              <label>Email <span className="hint">(optional)</span></label>
              <input type="email" value={prospect_email} onChange={(e) => setProspectEmail(e.target.value)} />
            </div>
            <div>
              <label>Phone <span className="hint">(optional)</span></label>
              <input value={prospect_phone} onChange={(e) => setProspectPhone(e.target.value)} />
            </div>
            <div className="full">
              <label>Address <span className="hint">(optional)</span></label>
              <textarea value={prospect_address} onChange={(e) => setProspectAddress(e.target.value)} />
            </div>
          </>
        )}
        <div className="full">
          <label>Description <span className="hint">(shown on the quote)</span></label>
          <input value={description} onChange={(e) => setDescription(e.target.value)} />
        </div>
        <div className="full">
          <label>Notes <span className="hint">(internal)</span></label>
          <textarea value={notes} onChange={(e) => setNotes(e.target.value)} />
        </div>
        <div className="full">
          <label>Line items</label>
          <LineItemsEditor items={line_items} onChange={setLineItems} />
        </div>
        <div>
          <label>Status</label>
          <select value={status} onChange={(e) => setStatus(e.target.value)}>
            <option value="draft">Draft</option>
            <option value="sent">Sent</option>
            <option value="accepted">Accepted</option>
            <option value="declined">Declined</option>
          </select>
        </div>
      </div>
      <div className="form-actions">
        <button type="submit" className="primary" disabled={busy}>
          {busy ? 'Saving...' : (initial ? 'Save changes' : 'Create quote')}
        </button>
        <button type="button" className="secondary" onClick={onCancel} disabled={busy}>Cancel</button>
      </div>
    </form>
  );
}

function splitProspectName(name) {
  if (!name) return { first: '', last: '', business: '' };
  const parts = name.trim().split(/\s+/);
  if (parts.length === 1) return { first: parts[0], last: '', business: '' };
  return { first: parts[0], last: parts.slice(1).join(' '), business: '' };
}

function PromoteForm({ quote, onSubmit, onCancel, busy }) {
  const split = splitProspectName(quote.prospect_name);
  const [first_name, setFirst] = useState(split.first);
  const [last_name, setLast] = useState(split.last);
  const [business_name, setBusiness] = useState(split.business);
  const [phone, setPhone] = useState(quote.prospect_phone || '');
  const [email, setEmail] = useState(quote.prospect_email || '');
  const [address, setAddress] = useState(quote.prospect_address || '');
  const [notes, setNotes] = useState('');

  function submit(e) {
    e.preventDefault();
    onSubmit({ first_name, last_name, business_name, phone, email, address, notes });
  }

  return (
    <form onSubmit={submit}>
      <p className="subtitle" style={{ marginBottom: 20 }}>
        Creating a customer from prospect <strong style={{ color: 'var(--text)' }}>{quote.prospect_name}</strong>.
        The quote will be re-linked to the new customer and the prospect fields will be cleared.
      </p>
      <div className="form-grid">
        <div>
          <label>First name</label>
          <input value={first_name} onChange={(e) => setFirst(e.target.value)} />
        </div>
        <div>
          <label>Last name</label>
          <input value={last_name} onChange={(e) => setLast(e.target.value)} />
        </div>
        <div className="full">
          <label>Business name <span className="hint">(optional)</span></label>
          <input value={business_name} onChange={(e) => setBusiness(e.target.value)} />
        </div>
        <div>
          <label>Phone</label>
          <input value={phone} onChange={(e) => setPhone(e.target.value)} />
        </div>
        <div>
          <label>Email</label>
          <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} />
        </div>
        <div className="full">
          <label>Address</label>
          <textarea value={address} onChange={(e) => setAddress(e.target.value)} />
        </div>
        <div className="full">
          <label>Notes <span className="hint">(optional)</span></label>
          <textarea value={notes} onChange={(e) => setNotes(e.target.value)} />
        </div>
      </div>
      <div className="form-actions">
        <button type="submit" className="primary" disabled={busy}>
          {busy ? 'Creating...' : 'Create customer'}
        </button>
        <button type="button" className="secondary" onClick={onCancel} disabled={busy}>Cancel</button>
      </div>
    </form>
  );
}

function quoteRecipientName(q) {
  if (q.customer_id) {
    return customerDisplayName({
      first_name: q.customer_first_name,
      last_name: q.customer_last_name,
      business_name: q.customer_business_name,
    });
  }
  return q.prospect_name || '(unnamed prospect)';
}

function QuotesView({ session }) {
  const [quotes, setQuotes] = useState([]);
  const [customers, setCustomers] = useState([]);
  const [users, setUsers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [mode, setMode] = useState('list');
  const [editing, setEditing] = useState(null);
  const [busy, setBusy] = useState(false);
  const [search, setSearch] = useState('');

  const canMutate = ['admin', 'lead'].includes(session.user.role);

  const refresh = useCallback(async () => {
    setLoading(true); setError(null);
    try {
      const [quoteData, custData, usersData] = await Promise.all([
        apiRequest('/api/quotes', { slug: session.slug, token: session.token }),
        apiRequest('/api/customers', { slug: session.slug, token: session.token }),
        apiRequest('/api/auth/users', { slug: session.slug, token: session.token }),
      ]);
      setQuotes(quoteData);
      setCustomers(custData);
      setUsers(usersData);
    } catch (err) { setError(err.message); }
    finally { setLoading(false); }
  }, [session.slug, session.token]);

  useEffect(() => { refresh(); }, [refresh]);

  async function createQuote(values) {
    setBusy(true); setError(null);
    try {
      await apiRequest('/api/quotes', { method: 'POST', slug: session.slug, token: session.token, body: values });
      setMode('list');
      await refresh();
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  async function updateQuote(values) {
    setBusy(true); setError(null);
    try {
      await apiRequest(`/api/quotes/${editing.id}`, { method: 'PUT', slug: session.slug, token: session.token, body: values });
      setEditing(null); setMode('list');
      await refresh();
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  async function deleteQuote(id) {
    if (!confirm('Delete this quote?')) return;
    setError(null);
    try {
      await apiRequest(`/api/quotes/${id}`, { method: 'DELETE', slug: session.slug, token: session.token });
      await refresh();
    } catch (err) { setError(err.message); }
  }

  async function promoteToCustomer(values) {
    setBusy(true); setError(null);
    try {
      await apiRequest(`/api/quotes/${editing.id}/promote-to-customer`, {
        method: 'POST', slug: session.slug, token: session.token, body: values,
      });
      setEditing(null); setMode('list');
      await refresh();
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  async function createInvoiceFromQuote(quoteId) {
    if (!confirm('Create a draft invoice from this quote? The line items will be copied and the quote will be marked accepted.')) return;
    setError(null);
    try {
      await apiRequest(`/api/quotes/${quoteId}/create-invoice`, {
        method: 'POST', slug: session.slug, token: session.token,
      });
      await refresh();
      alert('Draft invoice created. Switch to the Invoices tab to review and send.');
    } catch (err) { setError(err.message); }
  }

  async function createJobFromQuote(values) {
    setBusy(true); setError(null);
    try {
      await apiRequest('/api/jobs', {
        method: 'POST', slug: session.slug, token: session.token, body: values,
      });
      if (['draft', 'sent'].includes(editing.status)) {
        await apiRequest(`/api/quotes/${editing.id}`, {
          method: 'PUT', slug: session.slug, token: session.token, body: { status: 'accepted' },
        });
      }
      setEditing(null); setMode('list');
      await refresh();
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  if (mode === 'create') {
    return (
      <div>
        <div className="page-header"><h2>New quote</h2></div>
        {error && <div className="error">{error}</div>}
        <div className="form-card">
          <QuoteForm customers={customers} onSubmit={createQuote} onCancel={() => { setError(null); setMode('list'); }} busy={busy} />
        </div>
      </div>
    );
  }

  if (mode === 'edit' && editing) {
    return (
      <div>
        <div className="page-header"><h2>Edit quote</h2></div>
        {error && <div className="error">{error}</div>}
        <div className="form-card">
          <QuoteForm
            initial={editing}
            customers={customers}
            onSubmit={updateQuote}
            onCancel={() => { setError(null); setEditing(null); setMode('list'); }}
            busy={busy}
          />
        </div>
      </div>
    );
  }

  if (mode === 'promote' && editing) {
    return (
      <div>
        <div className="page-header"><h2>Promote prospect to customer</h2></div>
        {error && <div className="error">{error}</div>}
        <div className="form-card">
          <PromoteForm
            quote={editing}
            onSubmit={promoteToCustomer}
            onCancel={() => { setError(null); setEditing(null); setMode('list'); }}
            busy={busy}
          />
        </div>
      </div>
    );
  }

  if (mode === 'createJob' && editing) {
    const total = lineItemsTotal(editing.line_items);
    const initial = {
      customer_id: editing.customer_id,
      title: editing.description || 'Job from quote',
      description: null,
      type: 'single',
      date: formatYMD(new Date()),
      default_price: total > 0 ? total : null,
      assigned_to: [],
    };
    return (
      <div>
        <div className="page-header"><h2>Create job from quote</h2></div>
        {error && <div className="error">{error}</div>}
        <div className="form-card">
          <JobForm
            initial={initial}
            customers={customers}
            users={users}
            onSubmit={createJobFromQuote}
            onCancel={() => { setError(null); setEditing(null); setMode('list'); }}
            busy={busy}
          />
        </div>
      </div>
    );
  }

  const filteredQuotes = quotes.filter((q) => searchMatches(
    search,
    q.description,
    quoteRecipientName(q),
    q.prospect_email,
    q.prospect_phone
  ));

  return (
    <div>
      <div className="page-header">
        <h2>Quotes</h2>
        {canMutate && <button className="primary" onClick={() => { setError(null); setMode('create'); }}>+ New quote</button>}
      </div>
      <div className="search-bar">
        <input
          type="search"
          value={search}
          onChange={(e) => setSearch(e.target.value)}
          placeholder="Search by customer, prospect, or description..."
        />
      </div>
      {error && <div className="error">{error}</div>}
      <div className="list">
        {loading ? (
          <div className="list-empty">Loading...</div>
        ) : filteredQuotes.length === 0 ? (
          <div className="list-empty">
            {quotes.length === 0
              ? (canMutate ? 'No quotes yet. Click "New quote" to draft one.' : 'No quotes yet.')
              : 'No quotes match this search.'}
          </div>
        ) : (
          filteredQuotes.map((q) => {
            const total = lineItemsTotal(q.line_items);
            return (
              <div key={q.id} className="row">
                <div className="info">
                  <div className="name">
                    {quoteRecipientName(q)}
                    {!q.customer_id && <span className="hint" style={{ marginLeft: 8 }}>(prospect)</span>}
                    <span className="price">{formatPrice(total)}</span>
                  </div>
                  <div className="meta">
                    {formatDateString(q.created_at.split('T')[0])} • <span className={`badge ${q.status}`}>{q.status}</span>
                  </div>
                  {q.description && <div className="secondary-meta">{q.description}</div>}
                </div>
                {canMutate && (
                  <div className="actions">
                    {!q.customer_id && (
                      <button className="primary" onClick={() => { setError(null); setEditing(q); setMode('promote'); }}>Promote to customer</button>
                    )}
                    {q.customer_id && (
                      <>
                        <button className="secondary" onClick={() => createInvoiceFromQuote(q.id)}>Create invoice</button>
                        <button className="secondary" onClick={() => { setError(null); setEditing(q); setMode('createJob'); }}>Create job</button>
                      </>
                    )}
                    <button className="secondary" onClick={() => { setEditing(q); setMode('edit'); }}>Edit</button>
                    <button className="danger" onClick={() => deleteQuote(q.id)}>Delete</button>
                  </div>
                )}
              </div>
            );
          })
        )}
      </div>
    </div>
  );
}

    </div>
  );
}

function DashboardView({ session }) {
  const [jobs, setJobs] = useState([]);
  const [invoices, setInvoices] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [completing, setCompleting] = useState(null);
  const [busy, setBusy] = useState(false);

  const refresh = useCallback(async () => {
    setLoading(true); setError(null);
    try {
      const [jobsData, invoicesData] = await Promise.all([
        apiRequest('/api/jobs', { slug: session.slug, token: session.token }),
        apiRequest('/api/invoices', { slug: session.slug, token: session.token }),
      ]);
      setJobs(jobsData);
      setInvoices(invoicesData);
    } catch (err) { setError(err.message); }
    finally { setLoading(false); }
  }, [session.slug, session.token]);

  useEffect(() => { refresh(); }, [refresh]);

  async function completeJob(values) {
    setBusy(true); setError(null);
    try {
      await apiRequest(`/api/jobs/${completing.job.id}/complete`, {
        method: 'POST', slug: session.slug, token: session.token, body: values,
      });
      setCompleting(null);
      await refresh();
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  async function markInvoicePaid(id) {
    setError(null);
    try {
      await apiRequest(`/api/invoices/${id}/mark-paid`, {
        method: 'POST', slug: session.slug, token: session.token,
      });
      await refresh();
    } catch (err) { setError(err.message); }
  }

  const today = todayStart();
  const todayStr = formatYMD(today);
  const weekAgoStr = formatYMD(addDays(today, -6));
  const overdueStart = formatYMD(addDays(today, -90));
  const yesterdayStr = formatYMD(addDays(today, -1));

  const todayOccurrences = jobs.flatMap((j) => jobOccurrencesInRange(j, todayStr, todayStr));
  const overdueOccurrences = jobs
    .flatMap((j) => jobOccurrencesInRange(j, overdueStart, yesterdayStr))
    .filter((o) => !o.completed)
    .sort((a, b) => b.date.localeCompare(a.date));
  const outstandingInvoices = invoices.filter((i) => i.status === 'sent');

  const outstandingTotal = outstandingInvoices.reduce((sum, i) => sum + lineItemsTotal(i.line_items), 0);
  const weekRevenue = invoices
    .filter((i) => i.status === 'paid' && i.paid_date && i.paid_date.split('T')[0] >= weekAgoStr && i.paid_date.split('T')[0] <= todayStr)
    .reduce((sum, i) => sum + lineItemsTotal(i.line_items), 0);
  const next7DaysProjected = computeProjectedIncome(jobs, todayStr, formatYMD(addDays(today, 6)));

  if (completing) {
    return (

const REPORT_PRESETS = {
  '7days': '7 days',
  'month': 'This month',
  'quarter': 'This quarter',
  'year': 'This year',
  'all': 'All time',
  'custom': 'Custom',
};

function getReportRange(preset, customFrom, customTo) {
  const today = todayStart();
  const todayStr = formatYMD(today);
  if (preset === '7days') return { from: formatYMD(addDays(today, -6)), to: todayStr };
  if (preset === 'month') {
    return { from: formatYMD(new Date(today.getFullYear(), today.getMonth(), 1)), to: todayStr };
  }
  if (preset === 'quarter') {
    const q = Math.floor(today.getMonth() / 3);
    return { from: formatYMD(new Date(today.getFullYear(), q * 3, 1)), to: todayStr };
  }
  if (preset === 'year') {
    return { from: formatYMD(new Date(today.getFullYear(), 0, 1)), to: todayStr };
  }
  if (preset === 'all') {
    return { from: '2000-01-01', to: todayStr };
  }
  return { from: customFrom || todayStr, to: customTo || todayStr };
}

function ReportsView({ session }) {
  const [preset, setPreset] = useState('month');
  const [customFrom, setCustomFrom] = useState(formatYMD(todayStart()));
  const [customTo, setCustomTo] = useState(formatYMD(todayStart()));
  const [report, setReport] = useState(null);
  const [jobs, setJobs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  const range = getReportRange(preset, customFrom, customTo);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      setLoading(true); setError(null);
      try {
        const params = new URLSearchParams({ from: range.from, to: range.to });
        const [reportData, jobsData] = await Promise.all([
          apiRequest(`/api/reports?${params}`, { slug: session.slug, token: session.token }),
          apiRequest('/api/jobs', { slug: session.slug, token: session.token }),
        ]);
        if (!cancelled) { setReport(reportData); setJobs(jobsData); }
      } catch (err) {
        if (!cancelled) setError(err.message);
      } finally {
        if (!cancelled) setLoading(false);
      }
    })();
    return () => { cancelled = true; };
  }, [session.slug, session.token, range.from, range.to]);

  const projectedIncome = computeProjectedIncome(jobs, range.from, range.to);

  const maxMonthly = report && report.monthly_revenue.length > 0
    ? Math.max(...report.monthly_revenue.map((r) => parseFloat(r.paid_total) || 0))
    : 0;

  return (
    <div>
      <div className="page-header">
        <h2>Reports</h2>
        <div className="meta" style={{ fontSize: 13, color: 'var(--text-muted)' }}>
          {formatDateString(range.from)} — {formatDateString(range.to)}
        </div>
      </div>
      <div className="filter-bar">
        <div className="chip-group">
          {Object.entries(REPORT_PRESETS).map(([key, label]) => (
            <button
              key={key}
              className={`chip ${preset === key ? 'active' : ''}`}
              onClick={() => setPreset(key)}
            >
              {label}
            </button>
          ))}
        </div>
      </div>
      {preset === 'custom' && (
        <div className="form-card" style={{ marginBottom: 20 }}>
          <div className="form-grid">
            <div>
              <label>From</label>
              <input type="date" value={customFrom} onChange={(e) => setCustomFrom(e.target.value)} />
            </div>
            <div>
              <label>To</label>
              <input type="date" value={customTo} onChange={(e) => setCustomTo(e.target.value)} />
            </div>
          </div>
        </div>
      )}

      {error && <div className="error">{error}</div>}
      {loading ? (
        <div className="list-empty">Loading...</div>
      ) : report ? (
        <>
          <div className="stats-grid">
            <div className="stat-card accent">
              <div className="label">Paid revenue</div>
              <div className="value">{formatPrice(report.invoices.paid_total)}</div>
              <div className="subvalue">{report.invoices.paid_count} {report.invoices.paid_count === 1 ? 'invoice' : 'invoices'}</div>
            </div>
            <div className="stat-card">
              <div className="label">Outstanding</div>
              <div className="value">{formatPrice(report.invoices.outstanding_total)}</div>
              <div className="subvalue">{report.invoices.outstanding_count} unpaid (all time)</div>
            </div>
            <div className="stat-card">
              <div className="label">Visits completed</div>
              <div className="value">{report.completed_work}</div>
              <div className="subvalue">in selected range</div>
            </div>
            <div className="stat-card">
              <div className="label">New customers</div>
              <div className="value">{report.new_customers}</div>
              <div className="subvalue">in selected range</div>
            </div>
            <div className="stat-card">
              <div className="label">Projected income</div>
              <div className="value">{formatPrice(projectedIncome)}</div>
              <div className="subvalue">from upcoming work in range</div>
            </div>
          </div>

          <div className="section-heading">Revenue by month</div>
          <div className="form-card">
            {report.monthly_revenue.length === 0 ? (
              <div className="line-items-empty">No revenue in this range.</div>
            ) : (
              <div className="revenue-bars">
                {report.monthly_revenue.map((row) => {
                  const amount = parseFloat(row.paid_total) || 0;
                  const pct = maxMonthly > 0 ? (amount / maxMonthly) * 100 : 0;
                  const d = new Date(row.month + '-01');
                  const label = d.toLocaleString(undefined, { month: 'short', year: 'numeric' });
                  return (
                    <div key={row.month} className="revenue-bar-row">
                      <div className="month">{label}</div>
                      <div className="bar-track"><div className="bar-fill" style={{ width: `${pct}%` }}></div></div>
                      <div className="amount">{formatPrice(amount)}</div>

                })}

          <div className="section-heading">Top customers</div>
          <div className="list">
            {report.top_customers.length === 0 ? (
              <div className="list-empty">No paid invoices in this range.</div>
            ) : (
              report.top_customers.map((c, i) => (

            )}

        </>

    </div>
  );
}

function ProfileView({ session, onSessionUpdate }) {
  const [name, setName] = useState(session.user.name || '');
  const [currentPassword, setCurrentPassword] = useState('');
  const [newPassword, setNewPassword] = useState('');
  const [confirmPassword, setConfirmPassword] = useState('');
  const [nameBusy, setNameBusy] = useState(false);
  const [pwBusy, setPwBusy] = useState(false);
  const [error, setError] = useState(null);
  const [success, setSuccess] = useState(null);

  async function saveName(e) {
    e.preventDefault();
    setError(null); setSuccess(null); setNameBusy(true);
    try {
      const updated = await apiRequest('/api/auth/me', {
        method: 'PUT', slug: session.slug, token: session.token, body: { name },
      });
      onSessionUpdate({ ...session, user: { ...session.user, name: updated.name } });
      setSuccess('Name updated.');
    } catch (err) { setError(err.message); }
    finally { setNameBusy(false); }
  }

  async function changePassword(e) {
    e.preventDefault();
    setError(null); setSuccess(null);
    if (newPassword !== confirmPassword) {
      setError('New passwords do not match.');
      return;
    }
    setPwBusy(true);
    try {
      await apiRequest('/api/auth/me', {
        method: 'PUT', slug: session.slug, token: session.token,
        body: { current_password: currentPassword, new_password: newPassword },
      });
      setCurrentPassword(''); setNewPassword(''); setConfirmPassword('');
      setSuccess('Password changed.');
    } catch (err) { setError(err.message); }
    finally { setPwBusy(false); }
  }

  return (
    <div>
      <div className="page-header">
        <h2>Profile</h2>
      </div>
      {error && <div className="error">{error}</div>}
      {success && <div className="error" style={{ background: '#e8f1ec', color: '#1f6f4a' }}>{success}</div>}

      <div className="form-card">
        <div className="section-heading" style={{ marginTop: 0 }}>Account</div>
        <form onSubmit={saveName}>
          <label>Name</label>
          <input value={name} onChange={(e) => setName(e.target.value)} />
          <label>Email</label>
          <input value={session.user.email} disabled />
          <label>Role</label>
          <input value={session.user.role} disabled />
          <label>Organization</label>
          <input value={`${session.organization.name} (${session.organization.slug})`} disabled />
          <div className="form-actions">
            <button type="submit" className="primary" disabled={nameBusy}>
              {nameBusy ? 'Saving...' : 'Save name'}
            </button>
          </div>
        </form>
      </div>

      <div className="form-card">
        <div className="section-heading" style={{ marginTop: 0 }}>Change password</div>
        <form onSubmit={changePassword}>
          <label>Current password</label>
          <input type="password" value={currentPassword} onChange={(e) => setCurrentPassword(e.target.value)} required />
          <label>New password <span className="hint">(8+ chars, upper, lower, number, special)</span></label>
          <input type="password" value={newPassword} onChange={(e) => setNewPassword(e.target.value)} required />
          <label>Confirm new password</label>
          <input type="password" value={confirmPassword} onChange={(e) => setConfirmPassword(e.target.value)} required />
          <div className="form-actions">
            <button type="submit" className="primary" disabled={pwBusy}>
              {pwBusy ? 'Saving...' : 'Change password'}
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

function TeamView({ session }) {
  const [users, setUsers] = useState([]);

  const [mode, setMode] = useState('list');

  const [resettingId, setResettingId] = useState(null);
  const [resetPassword, setResetPassword] = useState('');
  const [resetSuccess, setResetSuccess] = useState(null);

  const refresh = useCallback(async () => {
    setLoading(true); setError(null);
    try {
      const data = await apiRequest('/api/auth/users', { slug: session.slug, token: session.token });
      setUsers(data);
    } catch (err) { setError(err.message); }
    finally { setLoading(false); }
  }, [session.slug, session.token]);

  useEffect(() => { refresh(); }, [refresh]);

  async function inviteUser(values) {
    setBusy(true); setError(null);
    try {
      await apiRequest('/api/auth/register', {
        method: 'POST', slug: session.slug, token: session.token, body: values,
      });
      setMode('list');
      await refresh();
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  async function changeRole(userId, newRole) {
    setError(null);
    try {
      await apiRequest(`/api/auth/users/${userId}`, {
        method: 'PUT', slug: session.slug, token: session.token, body: { role: newRole },
      });
      setEditingRoleId(null);
      await refresh();
    } catch (err) { setError(err.message); }
  }

  async function deleteUser(userId, displayName) {
    if (!confirm(`Remove ${displayName} from the team?`)) return;
    setError(null);
    try {
      await apiRequest(`/api/auth/users/${userId}`, {
        method: 'DELETE', slug: session.slug, token: session.token,
      });
      await refresh();
    } catch (err) { setError(err.message); }
  }

  async function submitResetPassword(userId) {
    setError(null); setResetSuccess(null);
    try {
      await apiRequest(`/api/auth/users/${userId}/reset-password`, {
        method: 'POST', slug: session.slug, token: session.token,
        body: { new_password: resetPassword },
      });
      setResettingId(null); setResetPassword('');
      setResetSuccess('Password reset. Share the new password with your teammate.');
    } catch (err) { setError(err.message); }
  }

  if (mode === 'invite') {
    return (
      <div>
        <div className="page-header"><h2>Invite teammate</h2></div>
        {error && <div className="error">{error}</div>}
        <div className="form-card">
          <InviteForm
            onSubmit={inviteUser}
            onCancel={() => { setError(null); setMode('list'); }}
            busy={busy}
          />
        </div>
      </div>
    );
  }

  return (
    <div>
      <div className="page-header">
        <h2>Team</h2>
        <button className="primary" onClick={() => { setError(null); setMode('invite'); }}>+ Invite teammate</button>
      </div>
      {error && <div className="error">{error}</div>}
      {resetSuccess && (
        <div className="error" style={{ background: '#e8f1ec', color: '#1f6f4a' }}>{resetSuccess}</div>
      )}
      <div className="list">
        {loading ? (
          <div className="list-empty">Loading...</div>
        ) : users.length === 0 ? (
          <div className="list-empty">No teammates yet.</div>
        ) : (
          users.map((u) => {
            const isMe = u.id === session.user.id;
            const displayName = u.name || u.email;
            const isResetting = resettingId === u.id;
            return (
              <div key={u.id} className="row">
                <div className="info">
                  <div className="name">
                    {displayName}{isMe && <span className="hint" style={{ marginLeft: 8 }}>(you)</span>}
                  </div>
                  <div className="meta">{u.email}</div>
                  {isResetting && (
                    <div className="secondary-meta" style={{ marginTop: 8 }}>
                      <input
                        type="password"
                        placeholder="New password"
                        value={resetPassword}
                        onChange={(e) => setResetPassword(e.target.value)}
                        style={{ width: 260, marginRight: 8 }}
                      />
                      <button className="primary" onClick={() => submitResetPassword(u.id)} disabled={!resetPassword}>Set password</button>
                      <button className="secondary" onClick={() => { setResettingId(null); setResetPassword(''); }} style={{ marginLeft: 6 }}>Cancel</button>
                    </div>
                  )}
                </div>
                <div className="actions">
                  {editingRoleId === u.id ? (
                    <>
                      <select
                        defaultValue={u.role}
                        onChange={(e) => changeRole(u.id, e.target.value)}
                        style={{ width: 'auto', padding: '7px 10px', fontSize: 13 }}
                      >
                        <option value="employee">Employee</option>
                        <option value="lead">Lead</option>
                        <option value="admin">Admin</option>
                      </select>
                      <button className="secondary" onClick={() => setEditingRoleId(null)}>Cancel</button>
                    </>
                  ) : (
                    <span className="badge">{u.role}</span>
                  )}
                  {!isMe && editingRoleId !== u.id && !isResetting && (
                    <>
                      <button className="secondary" onClick={() => { setResettingId(u.id); setResetPassword(''); setResetSuccess(null); }}>Reset password</button>
                      <button className="secondary" onClick={() => setEditingRoleId(u.id)}>Change role</button>
                      <button className="danger" onClick={() => deleteUser(u.id, displayName)}>Remove</button>
                    </>
                  )}
                </div>
              </div>
            );
          })
        )}
      </div>
    </div>
  );
}

            <div>
              <label>Temp password <span className="hint">(complexity required)</span></label>
              <input type="password" value={newPassword} onChange={(e) => setNewPassword(e.target.value)} required />
            </div>
          </div>
          <div className="form-actions">
            <button type="submit" className="primary" disabled={busy}>{busy ? 'Creating...' : 'Create staff account'}</button>
            <button type="button" className="secondary" onClick={() => setMode('list')} disabled={busy}>Cancel</button>
          </div>
        </form>
      )}
      <div className="list">
        {loading ? (
          <div className="list-empty">Loading...</div>
        ) : staff.length === 0 ? (
          <div className="list-empty">No dedicated staff yet. Add one to give a teammate platform access without an org login.</div>
        ) : (
          staff.map((s) => {
            const isMe = currentUserId === s.id;
            return (
              <div key={s.id} className="row">
                <div className="info">
                  <div className="name">{s.name || s.email}{isMe && <span className="hint" style={{ marginLeft: 8 }}>(you)</span>}</div>
                  <div className="meta">{s.email} • Added {formatDateString(s.created_at.split('T')[0])}</div>
                </div>
                {!isMe && (
                  <div className="actions">
                    <button className="danger" onClick={() => deleteStaff(s.id, s.name || s.email)}>Revoke</button>
                  </div>
                )}
              </div>
            );
          })
        )}
      </div>
    </>
  );
}

function SystemView({ session }) {
  const [orgs, setOrgs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  const isStaff = session.user && session.user.is_staff;

  useEffect(() => {
    let cancelled = false;
    (async () => {
      setLoading(true); setError(null);
      try {
        const data = await apiRequest('/api/system/organizations', { token: session.token });
        if (!cancelled) setOrgs(data);
      } catch (err) {
        if (!cancelled) setError(err.message);
      } finally {
        if (!cancelled) setLoading(false);
      }
    })();
    return () => { cancelled = true; };
  }, [session.token]);

  return (
    <div>
      <div className="page-header">
        <h2>System</h2>
        <span className="badge">{isStaff ? 'Staff' : 'System admin'}</span>
      </div>
      <div className="section-heading" style={{ marginTop: 0 }}>Organizations</div>
      {error && <div className="error">{error}</div>}
      <div className="list">
        {loading ? (
          <div className="list-empty">Loading...</div>
        ) : orgs.length === 0 ? (
          <div className="list-empty">No organizations.</div>
        ) : (
          orgs.map((o) => (
            <div key={o.id} className="row">
              <div className="info">
                <div className="name">{o.name}</div>
                <div className="meta">
                  {o.slug} • Created {formatDateString(o.created_at.split('T')[0])} • Next invoice #{o.next_invoice_number}
                </div>
                <div className="secondary-meta">
                  {o.user_count} {o.user_count === 1 ? 'user' : 'users'} •
                  {' '}{o.customer_count} {o.customer_count === 1 ? 'customer' : 'customers'} •
                  {' '}{o.job_count} {o.job_count === 1 ? 'job' : 'jobs'} •
                  {' '}{o.invoice_count} {o.invoice_count === 1 ? 'invoice' : 'invoices'} •
                  {' '}{o.quote_count} {o.quote_count === 1 ? 'quote' : 'quotes'}
                </div>
              </div>
            </div>
          ))
        )}
      </div>

      <StaffManagementSection token={session.token} currentUserId={session.user.id} />
    </div>
  );
}

function PublicInvoiceView({ id }) {
  const [invoice, setInvoice] = useState(null);
  const [error, setError] = useState(null);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const res = await fetch(`/api/public/invoices/${id}`);
        if (!res.ok) {
          if (cancelled) return;
          setError(res.status === 404 ? 'Invoice not found.' : `Error ${res.status}`);
          return;
        }
        const data = await res.json();
        if (cancelled) return;
        setInvoice(data);
        document.title = `Invoice #${data.invoice_number} — ${data.company_name || data.organization_name}`;
      } catch (err) {
        if (!cancelled) setError(err.message);
      }
    })();
    return () => { cancelled = true; };
  }, [id]);

  if (error) {
    return (
      <div className="public-shell">
        <div className="invoice-doc">
          <h1>Invoice unavailable</h1>
          <p className="subtitle">{error}</p>
        </div>
      </div>
    );
  }

  if (!invoice) {
    return <div className="public-shell"><div className="invoice-doc">Loading...</div></div>;
  }

  const total = lineItemsTotal(invoice.line_items);
  const customerName = customerDisplayName({
    first_name: invoice.customer_first_name,
    last_name: invoice.customer_last_name,
    business_name: invoice.customer_business_name,
  });
  const companyName = invoice.company_name || invoice.organization_name;

  return (
    <div className="public-shell">
      <div className="invoice-doc">
        <header className="invoice-header">
          <div className="company">
            {invoice.logo_url && <img src={invoice.logo_url} alt={companyName} />}
            <div>
              <h1>{companyName}</h1>
              {invoice.company_address && <p className="addr">{invoice.company_address}</p>}
              {invoice.company_phone && <p className="addr">{invoice.company_phone}</p>}
              {invoice.company_email && <p className="addr">{invoice.company_email}</p>}
            </div>
          </div>
          <div className="meta">
            <div className="num">Invoice #{invoice.invoice_number}</div>
            <div className="date">{formatDateString(invoice.date)}</div>
            <span className={`badge ${invoice.status}`}>{invoice.status}</span>
          </div>
        </header>

        <div className="invoice-meta-blocks">
          <div>
            <h3>Bill to</h3>
            <p>{customerName}</p>
            {invoice.customer_address && <p className="muted">{invoice.customer_address}</p>}
            {invoice.customer_email && <p className="muted">{invoice.customer_email}</p>}
            {invoice.customer_phone && <p className="muted">{invoice.customer_phone}</p>}
          </div>
          <div>
            <h3>Status</h3>
            <p style={{ textTransform: 'capitalize' }}>{invoice.status}</p>
            {invoice.sent_date && <p className="muted">Sent {formatDateString(invoice.sent_date.split('T')[0])}</p>}
            {invoice.paid_date && <p className="muted">Paid {formatDateString(invoice.paid_date.split('T')[0])}</p>}
          </div>
        </div>

        {invoice.description && (
          <div className="invoice-description">{invoice.description}</div>
        )}

        <table className="invoice-items">
          <thead>
            <tr>
              <th>Description</th>
              <th className="r">Qty</th>
              <th className="r">Rate</th>
              <th className="r">Amount</th>
            </tr>
          </thead>
          <tbody>
            {(invoice.line_items || []).map((item, i) => (
              <tr key={i}>
                <td>{item.description}</td>
                <td className="r">{item.quantity}</td>
                <td className="r">{formatPrice(item.rate)}</td>
                <td className="r">{formatPrice(item.amount)}</td>
              </tr>
            ))}
          </tbody>
        </table>
        <div className="invoice-total">Total {formatPrice(total)}</div>

        {invoice.status === 'sent' && invoice.venmo_handle && (
          <div className="invoice-payment no-print">
            <strong>Pay via Venmo:</strong> @{invoice.venmo_handle}
            <br />
            <a href={`https://venmo.com/${invoice.venmo_handle}?txn=pay&amount=${total.toFixed(2)}&note=Invoice%20%23${invoice.invoice_number}`} target="_blank" rel="noopener noreferrer">
              Open Venmo
            </a>
          </div>
        )}

        <div className="invoice-actions no-print">
          <button className="secondary" onClick={() => window.print()}>Print or save as PDF</button>
        </div>
      </div>
    </div>
  );
}

function StaffLoginForm({ onSession }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState(null);
  const [busy, setBusy] = useState(false);

  async function submit(e) {
    e.preventDefault();
    setError(null); setBusy(true);
    try {
      const data = await apiRequest('/api/system/login', {
        method: 'POST', body: { email, password },
      });
      saveStaffSession({ token: data.token, user: data.user });
      onSession({ token: data.token, user: data.user });
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  return (
    <form onSubmit={submit}>
      <label>Email</label>
      <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} required autoFocus />
      <label>Password</label>
      <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} required />
      {error && <div className="error">{error}</div>}
      <button type="submit" className="primary block" disabled={busy}>
        {busy ? 'Signing in...' : 'Staff sign in'}
      </button>
    </form>
  );
}

function StaffApp() {
  const [session, setSession] = useState(loadStaffSession);
  function handleLogout() { clearStaffSession(); setSession(null); }

  if (!session) {
    return (
      <div className="auth-shell">
        <div className="card">
          <h1>Staff</h1>
          <p className="subtitle">Platform admin sign-in. For regular customer accounts use the main login page.</p>
          <StaffLoginForm onSession={setSession} />
        </div>
      </div>
    );
  }

  return (
    <div>
      <div className="topbar">
        <div className="brand">Field Manager Platform</div>
        <div className="right">
          <span className="user">{session.user.name || session.user.email}</span>
          <span className="badge">Staff</span>
          <button className="secondary" onClick={handleLogout}>Sign out</button>
        </div>
      </div>
      <div className="content">
        <SystemView session={session} />
      </div>
    </div>
  );
}

function App() {
  const [session, setSession] = useState(loadSession);
  const path = typeof window !== 'undefined' ? window.location.pathname : '/';
  const publicMatch = path.match(/^\/i\/([^/]+)/);

  if (publicMatch) {
    return <PublicInvoiceView id={publicMatch[1]} />;
  }

  if (path.startsWith('/staff')) {
    return <StaffApp />;
  }

  function handleLogout() { clearSession(); setSession(null); }
  function handleSessionUpdate(next) { saveSession(next); setSession(next); }
  return session
    ? <AppShell session={session} onLogout={handleLogout} onSessionUpdate={handleSessionUpdate} />
    : <AuthShell onSession={setSession} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
