<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Field Manager</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg: #faf8f4;
      --card: #ffffff;
      --text: #2d2a26;
      --text-muted: #6d6a64;
      --border: #ece6d8;
      --border-strong: #d9d2c0;
      --primary: #4a5e7a;
      --primary-hover: #3a4d68;
      --primary-ring: rgba(74, 94, 122, 0.18);
      --accent: #e8a78c;
      --accent-hover: #d68768;
      --danger: #b04a3c;
      --danger-bg: #fbe9e5;
      --shadow-sm: 0 1px 2px rgba(45, 42, 38, 0.04);
      --shadow-md: 0 4px 14px rgba(45, 42, 38, 0.06), 0 1px 3px rgba(45, 42, 38, 0.04);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* Auth screens */
    .auth-shell { max-width: 460px; margin: 80px auto; padding: 0 16px; }
    .card {
      background: var(--card);
      border-radius: 14px;
      box-shadow: var(--shadow-md);
      padding: 36px;
    }
    h1 { margin: 0 0 6px; font-size: 26px; font-weight: 600; letter-spacing: -0.01em; }
    h2 { font-weight: 600; letter-spacing: -0.01em; }
    .subtitle { color: var(--text-muted); margin: 0 0 28px; font-size: 14px; }
    .tabs { display: flex; gap: 0; margin-bottom: 24px; border-bottom: 1px solid var(--border); }
    .tab {
      flex: 1; padding: 12px 0; background: none; border: none;
      cursor: pointer; font-size: 14px; color: var(--text-muted);
      border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s;
    }
    .tab.active { color: var(--text); border-bottom-color: var(--primary); font-weight: 600; }
    .tab:hover { color: var(--text); }
    label { display: block; font-size: 13px; font-weight: 600; margin: 14px 0 6px; color: var(--text); }
    .hint { font-weight: 400; color: var(--text-muted); font-size: 12px; margin-left: 6px; }
    input, textarea {
      width: 100%; padding: 11px 14px; font-size: 14px;
      border: 1px solid var(--border-strong); border-radius: 8px;
      background: var(--card); font-family: inherit; color: var(--text);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    textarea { resize: vertical; min-height: 76px; }
    input:focus, textarea:focus {
      outline: none; border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-ring);
    }
    input::placeholder, textarea::placeholder { color: #b0a99a; }
    button.primary {
      padding: 11px 18px; background: var(--primary); color: white;
      border: none; border-radius: 8px; font-size: 14px;
      font-weight: 600; cursor: pointer; transition: background 0.15s;
    }
    button.primary:hover { background: var(--primary-hover); }
    button.primary:disabled { background: #a8a59c; cursor: not-allowed; }
    button.primary.block { width: 100%; margin-top: 24px; }
    button.secondary {
      padding: 9px 14px; background: var(--card); color: var(--text);
      border: 1px solid var(--border-strong); border-radius: 8px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    button.secondary:hover { background: #f5f1e8; border-color: var(--primary); }
    button.danger {
      padding: 9px 14px; background: var(--card); color: var(--danger);
      border: 1px solid var(--border-strong); border-radius: 8px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    button.danger:hover { background: var(--danger-bg); border-color: var(--danger); }
    .error {
      margin-top: 16px; padding: 11px 14px;
      background: var(--danger-bg); color: var(--danger);
      border-radius: 8px; font-size: 13px;
    }
    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 999px;
      background: #f4ddd0; color: #8c4e30; font-size: 11px;
      font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em;
    }

    /* App shell */
    .topbar {
      background: var(--card); border-bottom: 1px solid var(--border);
      padding: 14px 28px; display: flex;
      align-items: center; justify-content: space-between;
    }
    .topbar .brand { font-weight: 600; font-size: 16px; letter-spacing: -0.01em; }
    .topbar .right { display: flex; align-items: center; gap: 14px; font-size: 13px; }
    .topbar .right .user { color: var(--text-muted); }
    .nav {
      background: var(--card); border-bottom: 1px solid var(--border);
      padding: 0 28px; display: flex; gap: 4px;
    }
    .nav button {
      background: none; border: none; padding: 14px 16px;
      font-size: 14px; color: var(--text-muted); cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }
    .nav button.active { color: var(--text); font-weight: 600; border-bottom-color: var(--primary); }
    .nav button:hover { color: var(--text); }
    .content { max-width: 960px; margin: 32px auto; padding: 0 28px; }
    .page-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px;
    }
    .page-header h2 { margin: 0; font-size: 22px; }

    /* List */
    .list {
      background: var(--card); border-radius: 12px;
      border: 1px solid var(--border); overflow: hidden;
      box-shadow: var(--shadow-sm);
    }
    .list-empty { padding: 56px 24px; text-align: center; color: var(--text-muted); font-size: 14px; }
    .row {
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; transition: background 0.12s;
    }
    .row:last-child { border-bottom: none; }
    .row:hover { background: #fbf9f3; }
    .row .info .name { font-weight: 500; font-size: 14px; margin-bottom: 3px; }
    .row .info .meta { color: var(--text-muted); font-size: 12px; }
    .row .actions { display: flex; gap: 8px; flex-shrink: 0; }

    /* Forms in app shell */
    .form-card {
      background: var(--card); border-radius: 12px;
      border: 1px solid var(--border); padding: 28px;
      margin-bottom: 24px; box-shadow: var(--shadow-sm);
    }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 18px; }
    .form-grid .full { grid-column: 1 / -1; }
    .form-actions { margin-top: 24px; display: flex; gap: 10px; }

    select {
      width: 100%; padding: 11px 14px; font-size: 14px;
      border: 1px solid var(--border-strong); border-radius: 8px;
      background: var(--card); font-family: inherit; color: var(--text);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-ring); }

    .toggle-group {
      display: inline-flex; background: #f4efe3; border-radius: 8px;
      padding: 4px; gap: 4px;
    }
    .toggle-group button {
      background: none; border: none; padding: 7px 16px;
      font-size: 13px; font-weight: 500; color: var(--text-muted);
      border-radius: 6px; cursor: pointer; transition: background 0.15s, color 0.15s;
    }
    .toggle-group button.active {
      background: var(--card); color: var(--text);
      box-shadow: 0 1px 2px rgba(0,0,0,0.06);
    }

    .check-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .check-list label {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 12px; border: 1px solid var(--border-strong);
      border-radius: 999px; font-size: 13px; font-weight: 500;
      cursor: pointer; margin: 0;
      background: var(--card); transition: background 0.15s, border-color 0.15s;
    }
    .check-list label:hover { background: #f5f1e8; }
    .check-list label.checked { background: #eaf0f2; border-color: var(--primary); color: var(--primary); }
    .check-list input { display: none; }

    .row .info .secondary-meta { color: var(--text-muted); font-size: 12px; margin-top: 2px; }
    .row .info .price { display: inline-block; margin-left: 8px; color: var(--text); font-weight: 500; }

    .section-heading {
      margin: 28px 0 10px; font-size: 12px; font-weight: 600;
      color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em;
    }
    .section-heading:first-child { margin-top: 0; }
    .inline-form { display: flex; align-items: center; gap: 8px; }
    .inline-form input[type="date"] { width: auto; padding: 8px 10px; font-size: 13px; }
    .schedule-summary {
      background: var(--card); border-radius: 10px;
      border: 1px solid var(--border); padding: 14px 18px;
      margin-bottom: 20px; color: var(--text-muted); font-size: 13px;
    }

    .filter-bar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .chip-group { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip {
      padding: 7px 14px; background: var(--card); color: var(--text-muted);
      border: 1px solid var(--border-strong); border-radius: 999px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .chip:hover { color: var(--text); background: #f5f1e8; }
    .chip.active {
      background: var(--primary); color: white; border-color: var(--primary);
    }

    .occurrence-row { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .occurrence-row:last-child { border-bottom: none; }
    .occurrence-row.completed { opacity: 0.55; }
    .occurrence-row:hover { background: #fbf9f3; }
    .occurrence-row .date {
      flex-shrink: 0; min-width: 90px; padding: 6px 10px;
      background: #f4efe3; border-radius: 8px; text-align: center;
    }
    .occurrence-row .date .day { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .occurrence-row .date .num { font-size: 18px; font-weight: 600; line-height: 1.1; }
    .occurrence-row.completed .date { background: #e8f1ec; }
    .occurrence-row.today .date { background: var(--primary); color: white; }
    .occurrence-row.today .date .day { color: #cbd6e6; }
    .occurrence-row .body { flex: 1; min-width: 0; }
    .occurrence-row .body .title { font-weight: 500; font-size: 14px; margin-bottom: 2px; }
    .occurrence-row .body .meta { font-size: 12px; color: var(--text-muted); }
    .occurrence-row .actions { display: flex; gap: 8px; flex-shrink: 0; }

    .calendar {
      background: var(--card); border-radius: 12px;
      border: 1px solid var(--border); padding: 18px;
      box-shadow: var(--shadow-sm);
    }
    .cal-nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .cal-nav .cal-month { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
    .cal-nav button { padding: 6px 12px; font-size: 14px; }
    .cal-grid {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
    }
    .cal-dow {
      padding: 6px; text-align: center; font-size: 11px;
      font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .cal-cell {
      min-height: 96px; padding: 6px 8px; border: 1px solid var(--border);
      border-radius: 8px; background: var(--card); overflow: hidden;
      display: flex; flex-direction: column; gap: 2px;
    }
    .cal-cell.empty { background: #f9f5ec; border-color: transparent; }
    .cal-cell.today { border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-ring); }
    .cal-cell .cal-date { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    .cal-cell.today .cal-date { color: var(--primary); }
    .cal-chip {
      font-size: 11px; padding: 2px 6px; border-radius: 4px;
      background: #eaf0f2; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      cursor: pointer; transition: background 0.12s;
    }
    .cal-chip:hover { background: #d5dee3; }
    .cal-chip.done { background: #e8f1ec; color: var(--text-muted); text-decoration: line-through; }
    .cal-more { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

    .pager {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 14px; font-size: 13px; color: var(--text-muted);
    }
    .pager .info { flex: 1; text-align: center; }

    .badge.draft { background: #ece6d8; color: #6d6a64; }
    .badge.sent { background: #dde6f0; color: #3a4d68; }
    .badge.paid { background: #d5e8d6; color: #2f6b3a; }
    .badge.accepted { background: #d5e8d6; color: #2f6b3a; }
    .badge.declined { background: #f4dad6; color: #99362a; }

    .line-items-table { width: 100%; border-collapse: collapse; margin: 12px 0; }
    .line-items-table th {
      text-align: left; padding: 8px 10px; font-size: 12px;
      font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.04em;
      border-bottom: 1px solid var(--border);
    }
    .line-items-table td { padding: 8px 6px; vertical-align: middle; border-bottom: 1px solid var(--border); }
    .line-items-table input { padding: 8px 10px; font-size: 13px; }
    .line-items-table .col-desc { width: 50%; }
    .line-items-table .col-qty input,
    .line-items-table .col-rate input { width: 90px; text-align: right; }
    .line-items-table .col-amount { text-align: right; font-weight: 500; white-space: nowrap; padding-right: 12px; }
    .line-items-table .col-remove { width: 36px; text-align: right; }
    .line-items-table .col-remove button {
      background: none; border: none; color: var(--text-muted);
      font-size: 18px; line-height: 1; cursor: pointer; padding: 4px 8px;
    }
    .line-items-table .col-remove button:hover { color: var(--danger); }
    .line-items-table tfoot td {
      font-weight: 600; border-bottom: none; border-top: 2px solid var(--border);
      padding-top: 12px;
    }
    .line-items-empty {
      padding: 18px; text-align: center; color: var(--text-muted);
      font-size: 13px; border: 1px dashed var(--border-strong);
      border-radius: 8px; margin: 12px 0;
    }

    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px; margin-bottom: 24px;
    }
    .stat-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 18px;
      box-shadow: var(--shadow-sm);
    }
    .stat-card .label {
      font-size: 11px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.06em;
      font-weight: 600; margin-bottom: 6px;
    }
    .stat-card .value { font-size: 26px; font-weight: 600; letter-spacing: -0.01em; }
    .stat-card .subvalue { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    .stat-card.accent .value { color: var(--primary); }

    .revenue-bars { padding: 4px 0; }
    .revenue-bar-row {
      display: grid; grid-template-columns: 80px 1fr 90px;
      align-items: center; gap: 12px; padding: 6px 0;
    }
    .revenue-bar-row .month { font-size: 13px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
    .revenue-bar-row .bar-track {
      height: 8px; background: var(--border); border-radius: 4px; overflow: hidden;
    }
    .revenue-bar-row .bar-fill {
      height: 100%; background: var(--primary); border-radius: 4px;
    }
    .revenue-bar-row .amount {
      text-align: right; font-size: 13px; font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    .public-shell { max-width: 760px; margin: 40px auto; padding: 0 16px; }
    .invoice-doc {
      background: var(--card); border-radius: 14px;
      box-shadow: var(--shadow-md); padding: 40px;
    }
    .invoice-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 24px; padding-bottom: 24px; border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .invoice-header .company { display: flex; gap: 14px; align-items: flex-start; }
    .invoice-header .company img { max-width: 64px; max-height: 64px; border-radius: 8px; }
    .invoice-header .company h1 { font-size: 22px; margin: 0 0 4px; }
    .invoice-header .company .addr {
      font-size: 12px; color: var(--text-muted); white-space: pre-line; margin: 0;
    }
    .invoice-header .meta { text-align: right; font-size: 13px; }
    .invoice-header .meta .num { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
    .invoice-header .meta .date { color: var(--text-muted); margin-bottom: 8px; }
    .invoice-meta-blocks {
      display: grid; grid-template-columns: 1fr 1fr; gap: 24px;
      padding: 24px 0; border-bottom: 1px solid var(--border);
    }
    .invoice-meta-blocks h3 {
      margin: 0 0 8px; font-size: 11px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600;
    }
    .invoice-meta-blocks p { margin: 2px 0; font-size: 14px; }
    .invoice-meta-blocks .muted { color: var(--text-muted); font-size: 13px; white-space: pre-line; }
    .invoice-description {
      padding: 18px 0; font-size: 14px; border-bottom: 1px solid var(--border);
    }
    .invoice-items {
      width: 100%; border-collapse: collapse; margin: 12px 0;
    }
    .invoice-items th {
      text-align: left; padding: 10px; font-size: 11px; font-weight: 600;
      color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em;
      border-bottom: 1px solid var(--border);
    }
    .invoice-items th.r, .invoice-items td.r { text-align: right; }
    .invoice-items td {
      padding: 10px; font-size: 14px; border-bottom: 1px solid var(--border);
    }
    .invoice-items tr:last-child td { border-bottom: none; }
    .invoice-total {
      text-align: right; font-size: 18px; font-weight: 600;
      padding: 16px 10px; border-top: 2px solid var(--text);
    }
    .invoice-payment {
      margin-top: 24px; padding: 20px;
      background: #f4efe3; border-radius: 10px;
      font-size: 14px;
    }
    .invoice-payment a {
      display: inline-block; padding: 8px 16px; margin-top: 8px;
      background: #3D95CE; color: white; text-decoration: none;
      border-radius: 8px; font-weight: 600;
    }
    .invoice-actions { margin-top: 24px; text-align: right; }

    @media print {
      body { background: white; }
      .no-print { display: none !important; }
      .invoice-doc { box-shadow: none; padding: 0; }
      .public-shell { margin: 0; max-width: none; }
    }

    .search-bar { margin-bottom: 16px; }
    .detail-info { display: grid; grid-template-columns: 120px 1fr; gap: 12px 18px; font-size: 14px; }
    .detail-info dt { color: var(--text-muted); font-size: 13px; font-weight: 500; }
    .detail-info dd { margin: 0; white-space: pre-line; }
    .compact-row {
      padding: 12px 18px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .compact-row:last-child { border-bottom: none; }
    .compact-row .info .name { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
    .compact-row .info .meta { font-size: 12px; color: var(--text-muted); }
    .csv-preview-wrap { overflow-x: auto; margin: 12px 0; }
    .csv-preview-table {
      width: 100%; border-collapse: collapse; font-size: 12px;
    }
    .csv-preview-table th, .csv-preview-table td {
      padding: 6px 10px; text-align: left;
      border-bottom: 1px solid var(--border); white-space: nowrap;
    }
    .csv-preview-table th {
      font-size: 11px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .link-button {
      background: none; border: none; padding: 0;
      color: var(--text-muted); font-size: 13px; cursor: pointer;
      font-family: inherit;
    }
    .link-button:hover { color: var(--text); text-decoration: underline; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback } = React;

const STORAGE = { token: 'fm_token', slug: 'fm_slug', user: 'fm_user', org: 'fm_org' };
const STAFF_STORAGE = { token: 'fm_staff_token', user: 'fm_staff_user' };

function loadStaffSession() {
  const token = localStorage.getItem(STAFF_STORAGE.token);
  const user = JSON.parse(localStorage.getItem(STAFF_STORAGE.user) || 'null');
  if (!token || !user) return null;
  return { token, user };
}

function saveStaffSession({ token, user }) {
  localStorage.setItem(STAFF_STORAGE.token, token);
  localStorage.setItem(STAFF_STORAGE.user, JSON.stringify(user));
}

function clearStaffSession() {
  Object.values(STAFF_STORAGE).forEach((k) => localStorage.removeItem(k));
}

function loadSession() {
  const token = localStorage.getItem(STORAGE.token);
  const slug = localStorage.getItem(STORAGE.slug);
  const user = JSON.parse(localStorage.getItem(STORAGE.user) || 'null');
  const org = JSON.parse(localStorage.getItem(STORAGE.org) || 'null');
  if (!token || !slug || !user || !org) return null;
  return { token, slug, user, organization: org };
}

function saveSession({ token, user, organization }) {
  localStorage.setItem(STORAGE.token, token);
  localStorage.setItem(STORAGE.slug, organization.slug);
  localStorage.setItem(STORAGE.user, JSON.stringify(user));
  localStorage.setItem(STORAGE.org, JSON.stringify(organization));
}

function clearSession() {

async function apiRequest(path, { method = 'GET', body, slug, token } = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (slug) headers['x-organization-slug'] = slug;
  if (token) headers['Authorization'] = `Bearer ${token}`;
  const res = await fetch(path, {
    method, headers,
    body: body ? JSON.stringify(body) : undefined,
  });
  if (res.status === 204) return null;
  const isJson = (res.headers.get('content-type') || '').includes('application/json');
  const data = isJson ? await res.json() : await res.text();
  if (!res.ok) throw new Error((data && data.error) || `Request failed (${res.status})`);
  return data;
}

  return parts || '(unnamed)';

const DAY_NAMES = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

function parseDate(s) {
  if (!s) return null;
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function formatYMD(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function formatDateString(s) {
  const d = parseDate(s);
  if (!d) return '';
  return d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
}

function dayOfWeekName(s) {
  const d = parseDate(s);
  if (!d) return '';
  return DAY_NAMES[d.getDay()];
}

function ordinal(n) {
  const s = ['th', 'st', 'nd', 'rd'];
  const v = n % 100;
  return n + (s[(v - 20) % 10] || s[v] || s[0]);
}

function addDays(date, n) {
  const r = new Date(date);
  r.setDate(r.getDate() + n);
  return r;
}

function addMonths(date, n) {
  const r = new Date(date);
  const day = r.getDate();
  r.setDate(1);
  r.setMonth(r.getMonth() + n);
  const daysInMonth = new Date(r.getFullYear(), r.getMonth() + 1, 0).getDate();
  r.setDate(Math.min(day, daysInMonth));
  return r;
}

function todayStart() {
  const t = new Date();
  return new Date(t.getFullYear(), t.getMonth(), t.getDate());
}

function generatePatternDates(job, limit) {
  const start = parseDate(job.start_date);
  const end = job.end_date ? parseDate(job.end_date) : null;
  const out = [];
  let current = new Date(start);
  for (let i = 0; i < 520; i++) {
    if (end && current > end) break;
    if (current > limit) break;
    out.push(formatYMD(current));
    if (job.recurrence_pattern === 'weekly') current = addDays(current, 7);
    else if (job.recurrence_pattern === 'biweekly') current = addDays(current, 14);
    else if (job.recurrence_pattern === 'monthly') current = addMonths(current, 1);
    else break;
  }
  return out;
}

function computeOccurrences(job, today = todayStart(), horizonDays = 365) {
  if (job.type !== 'recurring' || !job.start_date) return [];
  const limit = addDays(today, horizonDays);
  const pattern = generatePatternDates(job, limit);
  const set = new Set(pattern);

  const rescheduled = (job.rescheduled_dates && typeof job.rescheduled_dates === 'object') ? job.rescheduled_dates : {};
  const rescheduledFrom = {};
  Object.entries(rescheduled).forEach(([orig, target]) => {
    set.delete(orig);
    set.add(target);
    rescheduledFrom[target] = orig;
  });

  (job.skipped_dates || []).forEach((d) => set.delete(d));
  (job.deleted_dates || []).forEach((d) => set.delete(d));

  const completed = new Set(job.completed_dates || []);

  return [...set].sort().map((date) => ({
    date,
    completed: completed.has(date),
    rescheduledFrom: rescheduledFrom[date] || null,
  }));
}

function nextDueDate(job, today = todayStart()) {
  const todayStr = formatYMD(today);
  const upcoming = computeOccurrences(job, today).filter((o) => !o.completed && o.date >= todayStr);
  return upcoming[0]?.date || null;
}

function jobOccurrencesInRange(job, startDate, endDate) {
  if (job.type === 'single') {
    if (!job.date || job.date < startDate || job.date > endDate) return [];
    return [{
      job, date: job.date,
      completed: job.status === 'completed',
      rescheduledFrom: null,
    }];
  }
  if (job.type !== 'recurring' || !job.start_date) return [];

  const horizon = parseDate(endDate);
  const pattern = generatePatternDates(job, horizon);
  const set = new Set(pattern);

  const rescheduled = (job.rescheduled_dates && typeof job.rescheduled_dates === 'object') ? job.rescheduled_dates : {};
  const rescheduledFromMap = {};
  Object.entries(rescheduled).forEach(([orig, target]) => {
    set.delete(orig);
    set.add(target);
    rescheduledFromMap[target] = orig;
  });

  (job.skipped_dates || []).forEach((d) => set.delete(d));
  (job.deleted_dates || []).forEach((d) => set.delete(d));

  const completed = new Set(job.completed_dates || []);

  return [...set]
    .filter((d) => d >= startDate && d <= endDate)
    .sort()
    .map((date) => ({
      job, date,
      completed: completed.has(date),
      rescheduledFrom: rescheduledFromMap[date] || null,
    }));
}

const FILTER_RANGES = {
  today: () => {
    const t = formatYMD(todayStart());
    return { start: t, end: t };
  },
  week: () => {
    const t = todayStart();
    return { start: formatYMD(t), end: formatYMD(addDays(t, 6)) };
  },
  past: () => {
    const t = todayStart();
    return { start: formatYMD(addDays(t, -90)), end: formatYMD(addDays(t, -1)), onlyOpen: true };
  },
};

function expandJobsToOccurrences(jobs, filter) {
  const range = FILTER_RANGES[filter] && FILTER_RANGES[filter]();
  if (!range) return null;
  const occurrences = jobs.flatMap((j) => jobOccurrencesInRange(j, range.start, range.end));
  const filtered = range.onlyOpen ? occurrences.filter((o) => !o.completed) : occurrences;
  return filtered.sort((a, b) => a.date.localeCompare(b.date));
}

function lastCompletion(job) {
  const notes = job.completion_notes || [];
  if (notes.length === 0) return null;
  return notes.reduce((a, b) => (a.date > b.date ? a : b));
}

function formatSchedule(j) {
  if (j.type === 'single') return formatDateString(j.date);
  if (j.type === 'recurring') {
    const start = formatDateString(j.start_date);
    const end = j.end_date ? ` until ${formatDateString(j.end_date)}` : '';
    if (j.recurrence_pattern === 'weekly') {
      return `Every ${dayOfWeekName(j.start_date)} starting ${start}${end}`;
    }
    if (j.recurrence_pattern === 'biweekly') {
      return `Every other ${dayOfWeekName(j.start_date)} starting ${start}${end}`;
    }
    if (j.recurrence_pattern === 'monthly') {
      const d = parseDate(j.start_date);
      return `Monthly on the ${ordinal(d.getDate())} starting ${start}${end}`;
    }
  }
  return '';
}

function formatPrice(p) {
  if (p === null || p === undefined || p === '') return '';
  const n = typeof p === 'string' ? parseFloat(p) : p;
  if (!isFinite(n)) return '';
  return `$${n.toFixed(2)}`;
}

function CsvImportView({ session, onDone, onCancel }) {
  const [text, setText] = useState('');
  const [parsed, setParsed] = useState(null);
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState(null);
  const [result, setResult] = useState(null);

  const VALID_COLS = new Set(['first_name', 'last_name', 'business_name', 'phone', 'email', 'address', 'notes']);
  const SAMPLE = 'first_name,last_name,business_name,phone,email,address,notes\nBob,Smith,,555-0100,bob@example.com,123 Maple St,Front yard only\n,,Acme Co,555-9000,info@acme.com,500 Oak Ave,Net 30';

  function handleParse() {
    setError(null); setResult(null);
    try {
      const out = parseCSV(text);
      if (out.rows.length === 0) {
        setError('No rows to import. Make sure your CSV has a header row plus at least one data row.');
        setParsed(null);
        return;
      }
      const unknown = out.headers.filter((h) => !VALID_COLS.has(h));
      if (unknown.length > 0) {
        setError(`Unknown columns: ${unknown.join(', ')}. Allowed: ${[...VALID_COLS].join(', ')}.`);
        setParsed(null);
        return;
      }
      setParsed(out);
    } catch (err) {
      setError(err.message);
    }
  }

  async function handleImport() {
    if (!parsed) return;
    setBusy(true); setError(null); setResult(null);
    try {
      const data = await apiRequest('/api/customers/import', {
        method: 'POST', slug: session.slug, token: session.token,
        body: { rows: parsed.rows },
      });
      setResult(data);
      onDone();
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  return (
    <div>
      <div className="page-header"><h2>Import customers from CSV</h2></div>
      {error && <div className="error">{error}</div>}
      {result && (
        <div className="error" style={{ background: '#e8f1ec', color: '#1f6f4a' }}>
          Imported {result.inserted_count} customers ({result.skipped_count} skipped — no name).
        </div>
      )}
      <div className="form-card">
        <label>CSV <span className="hint">(first row must be a header; allowed columns: {[...VALID_COLS].join(', ')})</span></label>
        <textarea
          rows={10}
          value={text}
          onChange={(e) => setText(e.target.value)}
          placeholder={SAMPLE}
          style={{ fontFamily: 'ui-monospace, Menlo, monospace', fontSize: 13 }}
        />
        <div className="form-actions">
          <button type="button" className="secondary" onClick={handleParse} disabled={busy || !text.trim()}>Preview</button>
          {parsed && (
            <button type="button" className="primary" onClick={handleImport} disabled={busy}>
              {busy ? 'Importing...' : `Import ${parsed.rows.length} customer${parsed.rows.length === 1 ? '' : 's'}`}
            </button>
          )}
          <button type="button" className="secondary" onClick={onCancel} disabled={busy}>Back</button>
        </div>
      </div>

      {parsed && (
        <>
          <div className="section-heading">Preview ({parsed.rows.length} {parsed.rows.length === 1 ? 'row' : 'rows'})</div>
          <div className="form-card">
            <div className="csv-preview-wrap">
              <table className="csv-preview-table">
                <thead>
                  <tr>{parsed.headers.map((h) => <th key={h}>{h}</th>)}</tr>
                </thead>
                <tbody>
                  {parsed.rows.slice(0, 50).map((row, i) => (
                    <tr key={i}>{parsed.headers.map((h) => <td key={h}>{row[h] || '—'}</td>)}</tr>
                  ))}
                </tbody>
              </table>
            </div>
            {parsed.rows.length > 50 && <p className="hint">Showing first 50 rows. All {parsed.rows.length} will be imported.</p>}
          </div>
        </>
      )}
    </div>
  );
}

    setError(null);
    try {
      await apiRequest(`/api/customers/${id}`, {
        method: 'DELETE', slug: session.slug, token: session.token,
      });
      await refresh();
    } catch (err) { setError(err.message); }
  }

  if (mode === 'create') {
    return (
      <div>
        <div className="page-header"><h2>New customer</h2></div>
        {error && <div className="error">{error}</div>}
        <div className="form-card">
          <CustomerForm onSubmit={createCustomer} onCancel={() => { setError(null); setMode('list'); }} busy={busy} />
        </div>
      </div>
    );
  }

  if (mode === 'edit' && editing) {
    return (
      <div>
        <div className="page-header"><h2>Edit customer</h2></div>
        {error && <div className="error">{error}</div>}
        <div className="form-card">
          <CustomerForm
            initial={editing}
            onSubmit={updateCustomer}
            onCancel={() => { setError(null); setEditing(null); setMode('list'); }}
            busy={busy}
          />
        </div>
      </div>
    );
  }

  if (mode === 'detail' && viewing) {
    return (
      <CustomerDetailView
        session={session}
        customer={viewing}
        canMutate={canMutate}
        onBack={() => { setViewing(null); setMode('list'); }}
        onEdit={(c) => { setEditing(c); setMode('edit'); }}
      />
    );
  }

  if (mode === 'import') {
    return (
      <CsvImportView
        session={session}
        onDone={async () => { await refresh(); }}
        onCancel={() => { setError(null); setMode('list'); }}
      />
    );
  }

  const filtered = customers.filter((c) => searchMatches(
    search,
    c.first_name, c.last_name, c.business_name, c.phone, c.email, c.address
  ));

  return (
    <div>
      <div className="page-header">
        <h2>Customers</h2>
        {canMutate && (
          <div style={{ display: 'flex', gap: 8 }}>
            <button className="secondary" onClick={() => { setError(null); setMode('import'); }}>Import CSV</button>
            <button className="primary" onClick={() => { setError(null); setMode('create'); }}>+ New customer</button>
          </div>
        )}
      </div>
      <div className="search-bar">
        <input
          type="search"
          value={search}
          onChange={(e) => setSearch(e.target.value)}
          placeholder="Search customers by name, phone, email..."
        />
      </div>
      {error && <div className="error">{error}</div>}
      <div className="list">
        {loading ? (
          <div className="list-empty">Loading...</div>
        ) : filtered.length === 0 ? (
          <div className="list-empty">
            {customers.length === 0
              ? (canMutate ? 'No customers yet. Click "+ New customer" or "Import CSV" to start.' : 'No customers yet.')
              : 'No customers match this search.'}
          </div>
        ) : (
          filtered.map((c) => (
            <div key={c.id} className="row">
              <div className="info">
                <div className="name">{customerDisplayName(c)}</div>
                <div className="meta">
                  {[c.phone, c.email].filter(Boolean).join(' • ') || 'No contact info'}
                </div>
              </div>
              <div className="actions">
                <button className="secondary" onClick={() => { setViewing(c); setMode('detail'); }}>View</button>
                {canMutate && (
                  <>
                    <button className="secondary" onClick={() => { setEditing(c); setMode('edit'); }}>Edit</button>
                    <button className="danger" onClick={() => deleteCustomer(c.id)}>Delete</button>
                  </>
                )}
              </div>
            </div>
          ))
        )}
      </div>
    </div>
  );
}

function JobForm({ initial, customers, users, onSubmit, onCancel, busy }) {

  const [title, setTitle] = useState(initial?.title || '');
  const [description, setDescription] = useState(initial?.description || '');

  const [date, setDate] = useState(initial?.date || '');
  const [start_date, setStartDate] = useState(initial?.start_date || '');
  const [end_date, setEndDate] = useState(initial?.end_date || '');
  const [recurrence_pattern, setPattern] = useState(initial?.recurrence_pattern || 'weekly');
  const [default_price, setPrice] = useState(initial?.default_price ?? '');
  const [assigned_to, setAssigned] = useState(initial?.assigned_to || []);

  function toggleAssigned(userId) {
    setAssigned((a) => a.includes(userId) ? a.filter((x) => x !== userId) : [...a, userId]);
  }

  function submit(e) {
    e.preventDefault();

      customer_id,

      default_price: default_price === '' ? null : Number(default_price),

      payload.date = date;
    } else {

      payload.end_date = end_date || null;
      payload.recurrence_pattern = recurrence_pattern;

    <form onSubmit={submit}>
      <div className="form-grid">
        <div className="full">
          <label>Customer</label>
          <select value={customer_id} onChange={(e) => setCustomerId(e.target.value)} required>
            {customers.length === 0 && <option value="">No customers yet — add one first</option>}
            {customers.map((c) => (
              <option key={c.id} value={c.id}>{customerDisplayName(c)}</option>
            ))}
          </select>
        </div>
        <div className="full">
          <label>Title</label>
          <input value={title} onChange={(e) => setTitle(e.target.value)} placeholder="Weekly mow, deep clean, etc." required />
        </div>
        <div className="full">
          <label>Description <span className="hint">(optional)</span></label>
          <textarea value={description} onChange={(e) => setDescription(e.target.value)} />
        </div>
        <div className="full">
          <label>Schedule</label>
          <div className="toggle-group">
            <button type="button" className={type === 'single' ? 'active' : ''} onClick={() => setType('single')}>One-time</button>
            <button type="button" className={type === 'recurring' ? 'active' : ''} onClick={() => setType('recurring')}>Recurring</button>
          </div>
        </div>
        {type === 'single' ? (
          <div className="full">
            <label>Date</label>
            <input type="date" value={date} onChange={(e) => setDate(e.target.value)} required />
          </div>
        ) : (
          <>
            <div>
              <label>Repeats</label>
              <select value={recurrence_pattern} onChange={(e) => setPattern(e.target.value)}>
                <option value="weekly">Weekly</option>
                <option value="biweekly">Bi-weekly (every 2 weeks)</option>

            <div></div>

              <label>Start date</label>
              <input type="date" value={start_date} onChange={(e) => setStartDate(e.target.value)} required />
            </div>
            <div>
              <label>End date <span className="hint">(optional)</span></label>
              <input type="date" value={end_date} onChange={(e) => setEndDate(e.target.value)} />
            </div>
          </>

        <div>
          <label>Default price <span className="hint">(optional)</span></label>
          <input type="number" step="0.01" min="0" value={default_price} onChange={(e) => setPrice(e.target.value)} placeholder="0.00" />
        </div>
        <div className="full">
          <label>Assigned to <span className="hint">(optional)</span></label>
          <div className="check-list">
            {users.length === 0 && <span className="hint">No teammates to assign yet.</span>}

              <label key={u.id} className={assigned_to.includes(u.id) ? 'checked' : ''}>

function CalendarView({ jobs, onChipClick }) {
  const [monthOffset, setMonthOffset] = useState(0);
  const today = todayStart();
  const viewMonth = addMonths(today, monthOffset);
  const monthStart = new Date(viewMonth.getFullYear(), viewMonth.getMonth(), 1);
  const monthEnd = new Date(viewMonth.getFullYear(), viewMonth.getMonth() + 1, 0);
  const monthStartStr = formatYMD(monthStart);
  const monthEndStr = formatYMD(monthEnd);

  const byDate = {};
  jobs.forEach((j) => {
    jobOccurrencesInRange(j, monthStartStr, monthEndStr).forEach((o) => {
      (byDate[o.date] = byDate[o.date] || []).push(o);
    });
  });

  const firstDayOfWeek = monthStart.getDay();
  const daysInMonth = monthEnd.getDate();
  const cells = [];
  for (let i = 0; i < firstDayOfWeek; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);
  const todayStr = formatYMD(today);
  const monthLabel = viewMonth.toLocaleString(undefined, { month: 'long', year: 'numeric' });
  const dows = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

  return (
    <div className="calendar">
      <div className="cal-nav">
        <button className="secondary" onClick={() => setMonthOffset(monthOffset - 1)}>← Prev</button>
        <span className="cal-month">{monthLabel}</span>
        <button className="secondary" onClick={() => setMonthOffset(monthOffset + 1)}>Next →</button>
      </div>
      <div className="cal-grid">
        {dows.map((dow) => <div key={dow} className="cal-dow">{dow}</div>)}
        {cells.map((d, i) => {
          if (d === null) return <div key={i} className="cal-cell empty"></div>;
          const dateStr = `${viewMonth.getFullYear()}-${String(viewMonth.getMonth() + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
          const occs = byDate[dateStr] || [];
          const isToday = dateStr === todayStr;
          return (
            <div key={i} className={`cal-cell ${isToday ? 'today' : ''}`}>
              <div className="cal-date">{d}</div>
              {occs.slice(0, 3).map((o, j) => (
                <div
                  key={j}
                  className={`cal-chip ${o.completed ? 'done' : ''}`}
                  title={`${o.job.title} — ${jobCustomerName(o.job)}`}
                  onClick={() => onChipClick(o.job)}
                >
                  {o.job.title}
                </div>
              ))}
              {occs.length > 3 && <div className="cal-more">+{occs.length - 3} more</div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function JobScheduleView({ session, job, onBack, onMarkComplete, onChange }) {
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState(null);
  const [page, setPage] = useState(0);
  const [showInvoiceForm, setShowInvoiceForm] = useState(false);
  const [invoiceFrom, setInvoiceFrom] = useState(formatYMD(new Date(todayStart().getFullYear(), todayStart().getMonth(), 1)));
  const [invoiceTo, setInvoiceTo] = useState(formatYMD(todayStart()));
  const [generateBusy, setGenerateBusy] = useState(false);
  const [generateResult, setGenerateResult] = useState(null);
  const PAGE_SIZE = 8;

  const canMutate = ['admin', 'lead'].includes(session.user.role);

  const allUpcoming = computeOccurrences(job, todayStart(), 730).filter((o) => !o.completed);
  const totalPages = Math.max(1, Math.ceil(allUpcoming.length / PAGE_SIZE));
  const safePage = Math.min(page, totalPages - 1);
  const upcoming = allUpcoming.slice(safePage * PAGE_SIZE, (safePage + 1) * PAGE_SIZE);
  const firstIndex = allUpcoming.length === 0 ? 0 : safePage * PAGE_SIZE + 1;
  const lastIndex = Math.min(allUpcoming.length, (safePage + 1) * PAGE_SIZE);

  useEffect(() => {
    if (page > 0 && page > totalPages - 1) setPage(Math.max(0, totalPages - 1));
  }, [page, totalPages]);

  const todayStr = formatYMD(todayStart());
  const futureSkipped = (job.skipped_dates || []).filter((d) => d >= todayStr).sort();
  const completionHistory = [...(job.completion_notes || [])].sort((a, b) => b.date.localeCompare(a.date));

  async function call(fn) {
    setBusy(true); setError(null);
    try {
      const updated = await fn();
      await onChange(updated);
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  const skip = (date) => call(() => apiRequest(`/api/jobs/${job.id}/skip`, {
    method: 'POST', slug: session.slug, token: session.token, body: { date },
  }));
  const unskip = (date) => call(() => apiRequest(`/api/jobs/${job.id}/skip/${date}`, {
    method: 'DELETE', slug: session.slug, token: session.token,
  }));
  const reschedule = (date, new_date) => call(() => apiRequest(`/api/jobs/${job.id}/reschedule`, {
    method: 'POST', slug: session.slug, token: session.token, body: { date, new_date },
  }));
  const cancelReschedule = (date) => call(() => apiRequest(`/api/jobs/${job.id}/reschedule/${date}`, {
    method: 'DELETE', slug: session.slug, token: session.token,
  }));

  async function generateInvoice() {
    setGenerateBusy(true); setError(null); setGenerateResult(null);
    try {
      const inv = await apiRequest(`/api/jobs/${job.id}/generate-invoice`, {
        method: 'POST', slug: session.slug, token: session.token,
        body: { from: invoiceFrom, to: invoiceTo },
      });
      setGenerateResult(inv);
      setShowInvoiceForm(false);
    } catch (err) { setError(err.message); }
    finally { setGenerateBusy(false); }
  }

  const completionsInRange = (job.completed_dates || []).filter((d) => d >= invoiceFrom && d <= invoiceTo);
  const projectedTotal = completionsInRange.length * (parseFloat(job.default_price) || 0);

  return (
    <div>
      <div className="page-header">
        <h2>Schedule</h2>
        <button className="secondary" onClick={onBack}>Back to jobs</button>
      </div>
      <div className="schedule-summary">
        <strong style={{ color: 'var(--text)' }}>{job.title}</strong> — {jobCustomerName(job)} · {formatSchedule(job)}
        {canMutate && (
          <div style={{ marginTop: 10 }}>
            <button className="secondary" onClick={() => { setShowInvoiceForm((v) => !v); setGenerateResult(null); }}>
              {showInvoiceForm ? 'Hide invoice generator' : 'Generate invoice from completions'}
            </button>
          </div>
        )}
      </div>

      {showInvoiceForm && (
        <div className="form-card">
          <div className="section-heading" style={{ marginTop: 0 }}>Bill completed visits</div>
          <div className="form-grid">
            <div>
              <label>From</label>
              <input type="date" value={invoiceFrom} onChange={(e) => setInvoiceFrom(e.target.value)} />
            </div>
            <div>
              <label>To</label>
              <input type="date" value={invoiceTo} onChange={(e) => setInvoiceTo(e.target.value)} />
            </div>
          </div>
          <p className="subtitle" style={{ marginTop: 14, marginBottom: 0 }}>
            {completionsInRange.length === 0 ? (
              <>No completed visits in this range.</>
            ) : (
              <>{completionsInRange.length} completed visit{completionsInRange.length === 1 ? '' : 's'} @ {formatPrice(parseFloat(job.default_price) || 0)} = <strong style={{ color: 'var(--text)' }}>{formatPrice(projectedTotal)}</strong></>
            )}
          </p>
          <div className="form-actions">
            <button
              className="primary"
              disabled={generateBusy || completionsInRange.length === 0}
              onClick={generateInvoice}
            >
              {generateBusy ? 'Generating...' : `Create draft invoice`}
            </button>
            <button className="secondary" onClick={() => setShowInvoiceForm(false)} disabled={generateBusy}>Cancel</button>
          </div>
        </div>
      )}

      {generateResult && (
        <div className="error" style={{ background: '#e8f1ec', color: '#1f6f4a' }}>
          Created invoice #{generateResult.invoice_number} with {generateResult.line_items.length} line items. Switch to the Invoices tab to review and send.
        </div>
      )}

      {error && <div className="error">{error}</div>}

      <div className="section-heading">Upcoming</div>
      <div className="list">
        {upcoming.length === 0 ? (
          <div className="list-empty">No upcoming occurrences. The series may be fully completed or past its end date.</div>
        ) : (
          upcoming.map((o) => (
            <ScheduleOccurrenceRow
              key={o.date}
              occurrence={o}
              busy={busy}
              onMarkComplete={onMarkComplete}
              onSkip={skip}
              onReschedule={reschedule}
              onCancelReschedule={cancelReschedule}
            />
          ))
        )}
      </div>
      {allUpcoming.length > PAGE_SIZE && (
        <div className="pager">
          <button className="secondary" onClick={() => setPage(safePage - 1)} disabled={safePage === 0}>← Prev</button>
          <span className="info">Showing {firstIndex}–{lastIndex} of {allUpcoming.length}</span>
          <button className="secondary" onClick={() => setPage(safePage + 1)} disabled={safePage >= totalPages - 1}>Next →</button>
        </div>
      )}

      {futureSkipped.length > 0 && (
        <>
          <div className="section-heading">Skipped</div>
          <div className="list">
            {futureSkipped.map((d) => (
              <div key={d} className="row">
                <div className="info"><div className="name">{formatDateString(d)}</div></div>
                <div className="actions">
                  <button className="secondary" disabled={busy} onClick={() => unskip(d)}>Restore</button>
                </div>
              </div>
            ))}
          </div>
        </>
      )}

      {completionHistory.length > 0 && (
        <>
          <div className="section-heading">Completion history</div>
          <div className="list">
            {completionHistory.map((c, i) => (
              <div key={`${c.date}-${i}`} className="row">
                <div className="info">
                  <div className="name">{formatDateString(c.date)}</div>
                  <div className="meta">by {c.completedByName}{c.note && <> — “{c.note}”</>}</div>
                </div>
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

      ]);
      setJobs(jobsData);
      setCustomers(customersData);
      setUsers(usersData);
    } catch (err) { setError(err.message); }
    finally { setLoading(false); }
  }, [session.slug, session.token]);

  useEffect(() => { refresh(); }, [refresh]);

  async function createJob(values) {
    setBusy(true); setError(null);
    try {
      await apiRequest('/api/jobs', {
        method: 'POST', slug: session.slug, token: session.token, body: values,
      });
      setMode('list');
      await refresh();
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  async function updateJob(values) {
    setBusy(true); setError(null);
    try {
      await apiRequest(`/api/jobs/${editing.id}`, {
        method: 'PUT', slug: session.slug, token: session.token, body: values,
      });
      setEditing(null); setMode('list');
      await refresh();
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  async function deleteJob(id) {
    if (!confirm('Delete this job?')) return;
    setError(null);
    try {
      await apiRequest(`/api/jobs/${id}`, {
        method: 'DELETE', slug: session.slug, token: session.token,
      });
      await refresh();
    } catch (err) { setError(err.message); }
  }

  async function completeJob(values) {
    setBusy(true); setError(null);
    try {
      const updated = await apiRequest(`/api/jobs/${editing.id}/complete`, {
        method: 'POST', slug: session.slug, token: session.token, body: values,
      });
      await refresh();
      if (returnMode === 'schedule') {
        setEditing(updated);
        setMode('schedule');
      } else {
        setEditing(null);
        setMode('list');
      }
      setReturnMode('list');
      setCompletionInitialDate(null);
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  function handleScheduleChange(updatedJob) {
    setEditing(updatedJob);
    return refresh();
  }

  function handleScheduleMarkComplete(date) {
    setCompletionInitialDate(date);
    setReturnMode('schedule');
    setMode('complete');
  }

  function userNames(ids) {
    return ids
      .map((id) => users.find((u) => u.id === id))
      .filter(Boolean)
      .map((u) => u.name || u.email)
      .join(', ');
  }

  if (mode === 'create') {
    return (
      <div>
        <div className="page-header"><h2>New job</h2></div>
        {error && <div className="error">{error}</div>}
        {customers.length === 0 ? (
          <div className="form-card">
            <p style={{ margin: 0, color: 'var(--text-muted)' }}>
              You need at least one customer before you can create a job. Add a customer first.
            </p>
            <div className="form-actions"><button className="secondary" onClick={() => setMode('list')}>Back</button></div>
          </div>
        ) : (
          <div className="form-card">
            <JobForm
              customers={customers}
              users={users}
              onSubmit={createJob}
              onCancel={() => { setError(null); setMode('list'); }}
              busy={busy}
            />
          </div>
        )}
      </div>
    );
  }

  if (mode === 'edit' && editing) {
    return (
      <div>
        <div className="page-header"><h2>Edit job</h2></div>
        {error && <div className="error">{error}</div>}
        <div className="form-card">
          <JobForm
            initial={editing}
            customers={customers}
            users={users}
            onSubmit={updateJob}
            onCancel={() => { setError(null); setEditing(null); setMode('list'); }}
            busy={busy}
          />
        </div>
      </div>
    );
  }

  if (mode === 'complete' && editing) {
    const cancelTarget = returnMode === 'schedule' ? 'schedule' : 'list';
    return (
      <div>
        <div className="page-header"><h2>Mark complete: {editing.title}</h2></div>
        {error && <div className="error">{error}</div>}
        <div className="form-card">
          <CompletionForm
            job={editing}
            initialDate={completionInitialDate}
            onSubmit={completeJob}
            onCancel={() => {
              setError(null);
              setCompletionInitialDate(null);
              setMode(cancelTarget);
              if (cancelTarget === 'list') setEditing(null);
              setReturnMode('list');
            }}
            busy={busy}
          />
        </div>
      </div>
    );
  }

  if (mode === 'schedule' && editing) {
    return (
      <JobScheduleView
        session={session}
        job={editing}
        onBack={() => { setEditing(null); setMode('list'); }}
        onMarkComplete={handleScheduleMarkComplete}
        onChange={handleScheduleChange}
      />
    );
  }

  function openMarkComplete(job, date) {
    setEditing(job);
    setCompletionInitialDate(date || null);
    setReturnMode('list');
    setMode('complete');
  }

  function openEdit(job) {
    setEditing(job);
    setMode(job.type === 'recurring' ? 'schedule' : 'edit');
  }

  function jobMatchesSearch(j) {
    return searchMatches(search, j.title, j.description, jobCustomerName(j));
  }

  const searchedJobs = jobs.filter(jobMatchesSearch);
  const occurrences = expandJobsToOccurrences(searchedJobs, filter);

  return (
    <div>
      <div className="page-header">
        <h2>Jobs</h2>
        {canMutate && (
          <button className="primary" onClick={() => { setError(null); setMode('create'); }}>+ New job</button>
        )}
      </div>
      <div className="search-bar">
        <input
          type="search"
          value={search}
          onChange={(e) => setSearch(e.target.value)}
          placeholder="Search by job title, customer, or description..."
        />
      </div>
      <div className="filter-bar">
        <div className="chip-group">
          {['all', 'today', 'week', 'past'].map((f) => (
            <button
              key={f}
              className={`chip ${filter === f ? 'active' : ''}`}
              onClick={() => setFilter(f)}
            >
              {f === 'all' ? 'All' : f === 'today' ? 'Today' : f === 'week' ? 'Next 7 days' : 'Past due'}
            </button>
          ))}
        </div>
        <div className="toggle-group">
          <button className={layout === 'list' ? 'active' : ''} onClick={() => setLayout('list')}>List</button>
          <button className={layout === 'calendar' ? 'active' : ''} onClick={() => setLayout('calendar')}>Calendar</button>
        </div>
      </div>
      {error && <div className="error">{error}</div>}
      {layout === 'calendar' ? (
        loading ? (
          <div className="list-empty">Loading...</div>
        ) : (
          <CalendarView jobs={searchedJobs} onChipClick={openEdit} />
        )
      ) : occurrences !== null ? (
        <div className="list">
          {loading ? (
            <div className="list-empty">Loading...</div>
          ) : occurrences.length === 0 ? (
            <div className="list-empty">No jobs match this filter.</div>
          ) : (
            occurrences.map((o, i) => (
              <OccurrenceRow
                key={`${o.job.id}-${o.date}-${i}`}
                occurrence={o}
                onMarkComplete={openMarkComplete}
                onEdit={openEdit}
              />
            ))
          )}
        </div>
      ) : (
      <div className="list">
        {loading ? (
          <div className="list-empty">Loading...</div>
        ) : searchedJobs.length === 0 ? (
          <div className="list-empty">
            {jobs.length === 0
              ? (canMutate ? 'No jobs yet. Click "New job" to schedule the first one.' : 'No jobs yet.')
              : 'No jobs match this search.'}
          </div>
        ) : (
          searchedJobs.map((j) => {
            const isCompletedSingle = j.type === 'single' && j.status === 'completed';
            const nextDue = j.type === 'recurring' ? nextDueDate(j) : null;
            const last = lastCompletion(j);
            return (
              <div key={j.id} className="row">
                <div className="info">
                  <div className="name">
                    {j.title}
                    {j.default_price != null && <span className="price">{formatPrice(j.default_price)}</span>}
                  </div>
                  <div className="meta">
                    {jobCustomerName(j)} • {formatSchedule(j)}
                    {nextDue && <> • Next due: {formatDateString(nextDue)}</>}
                    {isCompletedSingle && <> • Completed {formatDateString(j.date)}</>}
                  </div>
                  {j.assigned_to && j.assigned_to.length > 0 && (
                    <div className="secondary-meta">Assigned: {userNames(j.assigned_to)}</div>
                  )}
                  {last && (
                    <div className="secondary-meta">
                      Last done: {formatDateString(last.date)} by {last.completedByName}
                      {last.note && <> — “{last.note}”</>}
                    </div>
                  )}
                </div>
                <div className="actions">
                  {j.type === 'recurring' && (
                    <button className="secondary" onClick={() => { setEditing(j); setMode('schedule'); }}>
                      Manage schedule
                    </button>
                  )}
                  {canMutate && (
                    <>
                      <button className="secondary" onClick={() => { setEditing(j); setMode('edit'); }}>Edit</button>
                      <button className="danger" onClick={() => deleteJob(j.id)}>Delete</button>
                    </>
                  )}
                </div>
              </div>
            );
          })
        )}
      </div>
      )}
    </div>
  );
}

function LineItemsEditor({ items, onChange }) {
  function update(idx, field, value) {
    const next = items.map((item, i) => {
      if (i !== idx) return item;
      const updated = { ...item, [field]: value };
      const q = parseFloat(updated.quantity);
      const r = parseFloat(updated.rate);
      updated.amount = (isFinite(q) ? q : 0) * (isFinite(r) ? r : 0);
      return updated;
    });
    onChange(next);
  }

  function add() {
    onChange([...items, { description: '', quantity: 1, rate: 0, amount: 0 }]);
  }

  function remove(idx) {
    onChange(items.filter((_, i) => i !== idx));
  }

  const total = items.reduce((sum, item) => sum + (parseFloat(item.amount) || 0), 0);

  return (
    <div>
      {items.length === 0 ? (
        <div className="line-items-empty">No line items yet. Click "Add line item" to start.</div>
      ) : (
        <table className="line-items-table">
          <thead>
            <tr>
              <th className="col-desc">Description</th>
              <th>Qty</th>
              <th>Rate</th>
              <th style={{ textAlign: 'right' }}>Amount</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            {items.map((item, idx) => (
              <tr key={idx}>
                <td className="col-desc">
                  <input
                    value={item.description || ''}
                    onChange={(e) => update(idx, 'description', e.target.value)}
                    placeholder="e.g. Weekly mow service"
                  />
                </td>
                <td className="col-qty">
                  <input
                    type="number" step="0.01" min="0"
                    value={item.quantity ?? ''}
                    onChange={(e) => update(idx, 'quantity', e.target.value)}
                  />
                </td>
                <td className="col-rate">
                  <input
                    type="number" step="0.01" min="0"
                    value={item.rate ?? ''}
                    onChange={(e) => update(idx, 'rate', e.target.value)}
                  />
                </td>
                <td className="col-amount">{formatPrice(item.amount)}</td>
                <td className="col-remove">
                  <button type="button" onClick={() => remove(idx)} aria-label="Remove">×</button>
                </td>
              </tr>
            ))}
          </tbody>
          <tfoot>
            <tr>
              <td colSpan="3" style={{ textAlign: 'right' }}>Total</td>
              <td className="col-amount">{formatPrice(total)}</td>
              <td></td>
            </tr>
          </tfoot>
        </table>
      )}
      <button type="button" className="secondary" onClick={add}>+ Add line item</button>
    </div>
  );
}

function lineItemsTotal(items) {
  return (items || []).reduce((sum, item) => sum + (parseFloat(item.amount) || 0), 0);
}

function parseCSV(text) {
  const lines = text.split(/\r?\n/).map((l) => l).filter((l) => l.trim().length > 0);
  if (lines.length === 0) return { headers: [], rows: [] };
  function splitLine(line) {
    const out = [];
    let cur = '';
    let inQuote = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') {
        if (inQuote && line[i + 1] === '"') { cur += '"'; i++; }
        else { inQuote = !inQuote; }
      } else if (c === ',' && !inQuote) {
        out.push(cur);
        cur = '';
      } else {
        cur += c;
      }
    }
    out.push(cur);
    return out.map((s) => s.trim());
  }
  const headers = splitLine(lines[0]).map((h) => h.toLowerCase().replace(/\s+/g, '_'));
  const rows = lines.slice(1).map((line) => {
    const cells = splitLine(line);
    const row = {};
    headers.forEach((h, i) => { row[h] = cells[i] === undefined ? '' : cells[i]; });
    return row;
  });
  return { headers, rows };
}

function searchMatches(needle, ...fields) {
  if (!needle) return true;
  const n = needle.toLowerCase().trim();
  if (!n) return true;
  return fields.some((f) => f && String(f).toLowerCase().includes(n));
}

function computeProjectedIncome(jobs, fromStr, toStr) {
  const todayStr = formatYMD(todayStart());
  const effectiveFrom = fromStr > todayStr ? fromStr : todayStr;
  if (effectiveFrom > toStr) return 0;
  let total = 0;
  for (const job of jobs) {
    if (!job.default_price) continue;
    const price = parseFloat(job.default_price);
    if (!isFinite(price) || price <= 0) continue;
    const upcoming = jobOccurrencesInRange(job, effectiveFrom, toStr).filter((o) => !o.completed);
    total += upcoming.length * price;
  }
  return total;
}

function InvoicesView({ session }) {
  const [invoices, setInvoices] = useState([]);
  const [customers, setCustomers] = useState([]);

  const [error, setError] = useState(null);

    const url = `${window.location.origin}/i/${invoiceId}`;
    try {
      await navigator.clipboard.writeText(url);
      setCopiedId(invoiceId);
      setTimeout(() => setCopiedId((curr) => (curr === invoiceId ? null : curr)), 2000);
    } catch {
      window.prompt('Copy this link:', url);
    }

    setLoading(true); setError(null);
    try {
      const [invData, custData] = await Promise.all([
        apiRequest('/api/invoices', { slug: session.slug, token: session.token }),
        apiRequest('/api/customers', { slug: session.slug, token: session.token }),
      ]);
      setInvoices(invData);
      setCustomers(custData);
    } catch (err) { setError(err.message); }
    finally { setLoading(false); }
  }, [session.slug, session.token]);

  useEffect(() => { refresh(); }, [refresh]);

    setBusy(true); setError(null);

      await apiRequest('/api/invoices', {
        method: 'POST', slug: session.slug, token: session.token, body: values,

      setMode('list');
      await refresh();
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  async function updateInvoice(values) {
    setBusy(true); setError(null);
    try {
      await apiRequest(`/api/invoices/${editing.id}`, {
        method: 'PUT', slug: session.slug, token: session.token, body: values,
      });
      setEditing(null); setMode('list');
      await refresh();
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  async function deleteInvoice(id) {
    if (!confirm('Delete this invoice?')) return;
    setError(null);
    try {
      await apiRequest(`/api/invoices/${id}`, {
        method: 'DELETE', slug: session.slug, token: session.token,
      });
      await refresh();
    } catch (err) { setError(err.message); }
  }

  async function transition(id, path) {
    setError(null);
    try {
      await apiRequest(`/api/invoices/${id}/${path}`, {
        method: 'POST', slug: session.slug, token: session.token,
      });
      await refresh();

          </div>

          <div className="form-card">

          </div>
        )}

      <div>

        <div className="form-card">
          <InvoiceForm
            initial={editing}
            customers={customers}
            onSubmit={updateInvoice}
            onCancel={() => { setError(null); setEditing(null); setMode('list'); }}
            busy={busy}
          />
        </div>
      </div>
    );

    search,
    String(inv.invoice_number),
    inv.description,
    inv.customer_first_name, inv.customer_last_name, inv.customer_business_name

      </div>

        ) : (
          filteredInvoices.map((inv) => {
            const total = lineItemsTotal(inv.line_items);
            return (

                      first_name: inv.customer_first_name,

                  <div className="actions">

                    {inv.status === 'sent' && (
                      <button className="primary" onClick={() => transition(inv.id, 'mark-paid')}>Mark paid</button>
                    )}
                    {inv.status === 'paid' && (
                      <button className="secondary" onClick={() => transition(inv.id, 'mark-unpaid')}>Mark unpaid</button>
                    )}

                      <>
                        <button className="secondary" onClick={() => copyPublicLink(inv.id)}>

                          View
