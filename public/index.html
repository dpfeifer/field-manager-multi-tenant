function TeamView({ session }) {
  const [users, setUsers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [mode, setMode] = useState('list');
  const [busy, setBusy] = useState(false);
  const [editingRoleId, setEditingRoleId] = useState(null);
  const [resettingId, setResettingId] = useState(null);
  const [resetPassword, setResetPassword] = useState('');
  const [resetSuccess, setResetSuccess] = useState(null);

  const refresh = useCallback(async () => {
    setLoading(true); setError(null);
    try {
      const data = await apiRequest('/api/auth/users', { slug: session.slug, token: session.token });
      setUsers(data);
    } catch (err) { setError(err.message); }
    finally { setLoading(false); }
  }, [session.slug, session.token]);

  useEffect(() => { refresh(); }, [refresh]);

  async function inviteUser(values) {
    setBusy(true); setError(null);
    try {
      await apiRequest('/api/auth/register', {
        method: 'POST', slug: session.slug, token: session.token, body: values,
      });
      setMode('list');
      await refresh();
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  async function changeRole(userId, newRole) {
    setError(null);
    try {
      await apiRequest(`/api/auth/users/${userId}`, {
        method: 'PUT', slug: session.slug, token: session.token, body: { role: newRole },
      });
      setEditingRoleId(null);
      await refresh();
    } catch (err) { setError(err.message); }
  }

  async function deleteUser(userId, displayName) {
    if (!confirm(`Remove ${displayName} from the team?`)) return;
    setError(null);
    try {
      await apiRequest(`/api/auth/users/${userId}`, {
        method: 'DELETE', slug: session.slug, token: session.token,
      });
      await refresh();
    } catch (err) { setError(err.message); }
  }

  async function submitResetPassword(userId) {
    setError(null); setResetSuccess(null);
    try {
      await apiRequest(`/api/auth/users/${userId}/reset-password`, {
        method: 'POST', slug: session.slug, token: session.token,
        body: { new_password: resetPassword },
      });
      setResettingId(null); setResetPassword('');
      setResetSuccess('Password reset. Share the new password with your teammate.');
    } catch (err) { setError(err.message); }
  }

  if (mode === 'invite') {
    return (
      <div>
        <div className="page-header"><h2>Invite teammate</h2></div>
        {error && <div className="error">{error}</div>}
        <div className="form-card">
          <InviteForm
            onSubmit={inviteUser}
            onCancel={() => { setError(null); setMode('list'); }}
            busy={busy}
          />
        </div>
      </div>
    );
  }

  return (
    <div>
      <div className="page-header">
        <h2>Team</h2>
        <button className="primary" onClick={() => { setError(null); setMode('invite'); }}>+ Invite teammate</button>
      </div>
      {error && <div className="error">{error}</div>}
      {resetSuccess && (
        <div className="error" style={{ background: '#e8f1ec', color: '#1f6f4a' }}>{resetSuccess}</div>
      )}
      <div className="list">
        {loading ? (
          <div className="list-empty">Loading...</div>
        ) : users.length === 0 ? (
          <div className="list-empty">No teammates yet.</div>
        ) : (
          users.map((u) => {
            const isMe = u.id === session.user.id;
            const displayName = u.name || u.email;
            const isResetting = resettingId === u.id;
            return (
              <div key={u.id} className="row">
                <div className="info">
                  <div className="name">
                    {displayName}{isMe && <span className="hint" style={{ marginLeft: 8 }}>(you)</span>}
                  </div>
                  <div className="meta">{u.email}</div>
                  {isResetting && (
                    <div className="secondary-meta" style={{ marginTop: 8 }}>
                      <input
                        type="password"
                        placeholder="New password"
                        value={resetPassword}
                        onChange={(e) => setResetPassword(e.target.value)}
                        style={{ width: 260, marginRight: 8 }}
                      />
                      <button className="primary" onClick={() => submitResetPassword(u.id)} disabled={!resetPassword}>Set password</button>
                      <button className="secondary" onClick={() => { setResettingId(null); setResetPassword(''); }} style={{ marginLeft: 6 }}>Cancel</button>
                    </div>
                  )}
                </div>
                <div className="actions">
                  {editingRoleId === u.id ? (
                    <>
                      <select
                        defaultValue={u.role}
                        onChange={(e) => changeRole(u.id, e.target.value)}
                        style={{ width: 'auto', padding: '7px 10px', fontSize: 13 }}
                      >
                        <option value="employee">Employee</option>
                        <option value="lead">Lead</option>
                        <option value="admin">Admin</option>
                      </select>
                      <button className="secondary" onClick={() => setEditingRoleId(null)}>Cancel</button>
                    </>
                  ) : (
                    <span className="badge">{u.role}</span>
                  )}
                  {!isMe && editingRoleId !== u.id && !isResetting && (
                    <>
                      <button className="secondary" onClick={() => { setResettingId(u.id); setResetPassword(''); setResetSuccess(null); }}>Reset password</button>
                      <button className="secondary" onClick={() => setEditingRoleId(u.id)}>Change role</button>
                      <button className="danger" onClick={() => deleteUser(u.id, displayName)}>Remove</button>
                    </>
                  )}
                </div>
              </div>
            );
          })
        )}
      </div>
    </div>
  );
}

            </div>
          </div>
          <div className="form-actions">
            <button type="submit" className="primary" disabled={busy}>{busy ? 'Creating...' : 'Create staff account'}</button>
            <button type="button" className="secondary" onClick={() => setMode('list')} disabled={busy}>Cancel</button>
          </div>
        </form>
      )}
      <div className="list">
        {loading ? (
          <div className="list-empty">Loading...</div>
        ) : staff.length === 0 ? (
          <div className="list-empty">No dedicated staff yet. Add one to give a teammate platform access without an org login.</div>
        ) : (
          staff.map((s) => {
            const isMe = currentUserId === s.id;
            return (
              <div key={s.id} className="row">
                <div className="info">
                  <div className="name">{s.name || s.email}{isMe && <span className="hint" style={{ marginLeft: 8 }}>(you)</span>}</div>
                  <div className="meta">{s.email} • Added {formatDateString(s.created_at.split('T')[0])}</div>
                </div>
                {!isMe && (
                  <div className="actions">
                    <button className="danger" onClick={() => deleteStaff(s.id, s.name || s.email)}>Revoke</button>
                  </div>
                )}
              </div>
            );
          })
        )}
      </div>
    </>
  );
}

function SystemView({ session }) {
  const path = useLocation();
  const orgDetailMatch = path.match(/^\/system\/orgs\/([^/]+)/);
  const subView = orgDetailMatch ? 'org-detail'
    : path === '/system/staff' ? 'staff'
    : path === '/system/templates' ? 'templates'
    : 'organizations';
  const isStaff = session.user && session.user.is_staff;

  if (subView === 'org-detail') {
    return <OrgDetailView session={session} orgId={orgDetailMatch[1]} />;
  }

  return (
    <div>
      <div className="page-header">
        <h2>System</h2>
        <span className="badge">{isStaff ? 'Staff' : 'System admin'}</span>
      </div>
      <div className="filter-bar">
        <div className="chip-group">
          <button
            className={`chip ${subView === 'organizations' ? 'active' : ''}`}
            onClick={() => navigate('/system')}
          >Organizations</button>
          <button
            className={`chip ${subView === 'staff' ? 'active' : ''}`}
            onClick={() => navigate('/system/staff')}
          >Staff accounts</button>
          <button
            className={`chip ${subView === 'templates' ? 'active' : ''}`}
            onClick={() => navigate('/system/templates')}
          >Email templates</button>
        </div>
      </div>
      {subView === 'organizations' && <OrganizationsSection session={session} />}
      {subView === 'staff' && <StaffManagementSection token={session.token} currentUserId={session.user.id} />}
      {subView === 'templates' && <EmailTemplatesSection token={session.token} />}
    </div>
  );
}

function OrganizationsSection({ session }) {
  const [orgs, setOrgs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [search, setSearch] = useState('');
  const [sort, setSort] = useState('newest');

  const refresh = useCallback(async () => {
    setLoading(true); setError(null);
    try {
      const data = await apiRequest('/api/system/organizations', { token: session.token });
      setOrgs(data);
    } catch (err) { setError(err.message); }
    finally { setLoading(false); }
  }, [session.token]);

  useEffect(() => { refresh(); }, [refresh]);

  const filtered = orgs.filter((o) => searchMatches(search, o.name, o.slug, o.subscription_status));
  const sortKey = sort === 'name' ? (o) => (o.name || '').toLowerCase()
    : sort === 'status' ? 'subscription_status'
    : sort === 'users' ? (o) => -o.user_count
    : 'created_at';
  const sorted = sortBy(filtered, sortKey, sort === 'oldest' ? 'asc' : sort === 'name' || sort === 'status' ? 'asc' : 'desc');

  return (
    <>
      {error && <div className="error">{error}</div>}
      <div className="search-bar" style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
        <input
          type="search" value={search} onChange={(e) => setSearch(e.target.value)}
          placeholder="Search by name, slug, status..." style={{ flex: 1 }}
        />
        <select value={sort} onChange={(e) => setSort(e.target.value)} style={{ width: 'auto' }}>
          <option value="newest">Sort: Newest</option>
          <option value="oldest">Sort: Oldest</option>
          <option value="name">Sort: Name</option>
          <option value="status">Sort: Status</option>
          <option value="users">Sort: Most users</option>
        </select>
      </div>
      <div className="list">
        {loading ? (
          <div className="list-empty">Loading...</div>
        ) : sorted.length === 0 ? (
          <div className="list-empty">{orgs.length === 0 ? 'No organizations.' : 'No orgs match this search.'}</div>
        ) : (
          sorted.map((o) => (
            <div key={o.id} className="row">
              <div className="info">
                <div className="name">
                  {o.name}
                  <span className={`badge ${badgeForStatus(o.subscription_status)}`} style={{ marginLeft: 10 }}>
                    {statusLabel(o.subscription_status, o.trial_ends_at)}
                  </span>
                </div>
                <div className="meta">
                  {o.slug} • Created {formatDateString(o.created_at.split('T')[0])} • Next invoice #{o.next_invoice_number}
                </div>
                <div className="secondary-meta">
                  {o.user_count} {o.user_count === 1 ? 'user' : 'users'} •
                  {' '}{o.customer_count} {o.customer_count === 1 ? 'customer' : 'customers'} •
                  {' '}{o.job_count} {o.job_count === 1 ? 'job' : 'jobs'} •
                  {' '}{o.invoice_count} {o.invoice_count === 1 ? 'invoice' : 'invoices'} •
                  {' '}{o.quote_count} {o.quote_count === 1 ? 'quote' : 'quotes'}
                </div>
              </div>
              <div className="actions">
                <button className="secondary" onClick={() => navigate(`/system/orgs/${o.id}`)}>Open</button>
              </div>
            </div>
          ))
        )}
      </div>
    </>
  );
}

function OrgDetailView({ session, orgId }) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [busy, setBusy] = useState(false);
  const [extendDays, setExtendDays] = useState(14);
  const [resetUserId, setResetUserId] = useState(null);
  const [resetPassword, setResetPassword] = useState('');
  const [confirmDelete, setConfirmDelete] = useState(false);
  const [deleteSlugInput, setDeleteSlugInput] = useState('');

  const refresh = useCallback(async () => {
    setLoading(true); setError(null);
    try {
      const d = await apiRequest(`/api/system/organizations/${orgId}`, { token: session.token });
      setData(d);
    } catch (err) { setError(err.message); }
    finally { setLoading(false); }
  }, [orgId, session.token]);

  useEffect(() => { refresh(); }, [refresh]);

  async function setBilling(status) {
    const label = status === 'free' ? 'Mark this org as comped/free?' : 'Reset to a fresh 14-day trial?';
    if (!confirm(label)) return;
    setBusy(true); setError(null);
    try {
      await apiRequest(`/api/system/organizations/${orgId}/billing`, {
        method: 'PUT', token: session.token, body: { status },
      });
      await refresh();
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  async function extendTrial() {
    setBusy(true); setError(null);
    try {
      await apiRequest(`/api/system/organizations/${orgId}/extend-trial`, {
        method: 'POST', token: session.token, body: { days: parseInt(extendDays, 10) || 14 },
      });
      await refresh();
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  async function submitResetPassword(userId) {
    if (!resetPassword) return;
    setBusy(true); setError(null);
    try {
      await apiRequest(`/api/system/organizations/${orgId}/users/${userId}/reset-password`, {
        method: 'POST', token: session.token, body: { new_password: resetPassword },
      });
      setResetUserId(null); setResetPassword('');
      alert('Password reset. Share the new password with the user.');
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  async function deleteOrg() {
    setBusy(true); setError(null);
    try {
      await apiRequest(`/api/system/organizations/${orgId}`, {
        method: 'DELETE', token: session.token, body: { confirm_slug: deleteSlugInput },
      });
      navigate('/system');
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  if (loading) {
    return (
      <div>
        <div className="page-header">
          <h2>Organization</h2>
          <button className="secondary" onClick={() => navigate('/system')}>← Back</button>
        </div>
        <div className="list-empty">Loading...</div>
      </div>
    );
  }
  if (!data) {
    return (
      <div>
        <div className="page-header"><h2>Not found</h2></div>
        <button className="secondary" onClick={() => navigate('/system')}>← Back</button>
      </div>
    );
  }

  const o = data.organization;
  const stripeUrl = o.stripe_customer_id ? `https://dashboard.stripe.com/customers/${o.stripe_customer_id}` : null;

  return (
    <div>
      <div className="page-header">
        <h2>
          {o.name}
          <span className={`badge ${badgeForStatus(o.subscription_status)}`} style={{ marginLeft: 12 }}>
            {statusLabel(o.subscription_status, o.trial_ends_at)}
          </span>
        </h2>
        <button className="secondary" onClick={() => navigate('/system')}>← Back to orgs</button>
      </div>
      {error && <div className="error">{error}</div>}

      <div className="form-card">
        <div className="section-heading" style={{ marginTop: 0 }}>Details</div>
        <dl className="detail-info">
          <dt>Slug</dt><dd>{o.slug}</dd>
          <dt>Created</dt><dd>{formatDateString(o.created_at.split('T')[0])}</dd>
          {o.trial_ends_at && (<><dt>Trial ends</dt><dd>{formatDateString(o.trial_ends_at.split('T')[0])}</dd></>)}
          <dt>Next invoice #</dt><dd>{o.next_invoice_number}</dd>
          {o.stripe_customer_id && (
            <><dt>Stripe customer</dt><dd><a href={stripeUrl} target="_blank" rel="noopener noreferrer">{o.stripe_customer_id} ↗</a></dd></>
          )}
          {o.stripe_subscription_id && (
            <><dt>Stripe subscription</dt><dd>{o.stripe_subscription_id}</dd></>
          )}
          <dt>Counts</dt><dd>{o.customer_count} customers · {o.job_count} jobs · {o.invoice_count} invoices · {o.quote_count} quotes</dd>
        </dl>
      </div>

      <div className="form-card">
        <div className="section-heading" style={{ marginTop: 0 }}>Billing actions</div>
        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', alignItems: 'center' }}>
          {o.subscription_status === 'free' ? (
            <button className="secondary" disabled={busy} onClick={() => setBilling('trialing')}>Remove free (start trial)</button>
          ) : (
            <button className="secondary" disabled={busy} onClick={() => setBilling('free')}>Set free (comp account)</button>
          )}
          <span style={{ color: 'var(--text-muted)', fontSize: 13, marginLeft: 12 }}>Extend trial by</span>
          <input
            type="number" min="1" max="365" value={extendDays}
            onChange={(e) => setExtendDays(e.target.value)}
            style={{ width: 70 }}
          />
          <span style={{ color: 'var(--text-muted)', fontSize: 13 }}>days</span>
          <button className="primary" disabled={busy} onClick={extendTrial}>Apply</button>
        </div>
        <p className="hint" style={{ marginTop: 12 }}>
          Extending adds days on top of the current trial end (or starts a trial from today if none).
        </p>
      </div>

      <div className="form-card" style={{ borderColor: 'var(--danger)' }}>
        <div className="section-heading" style={{ marginTop: 0, color: 'var(--danger)' }}>Danger zone</div>
        {!confirmDelete ? (
          <>
            <p className="hint" style={{ marginBottom: 14 }}>
              Permanently delete this organization and everything in it (users, customers, jobs, invoices, quotes, settings). Any active Stripe subscription will be canceled. <strong>This cannot be undone.</strong>
            </p>
            <button className="danger" onClick={() => setConfirmDelete(true)}>Delete organization</button>
          </>
        ) : (
          <>
            <p style={{ marginBottom: 12, fontSize: 14 }}>
              Type <code style={{ background: 'var(--tinted)', padding: '2px 6px', borderRadius: 4 }}>{o.slug}</code> below to confirm. Cascades through all data and cancels Stripe.
            </p>
            <input
              value={deleteSlugInput}
              onChange={(e) => setDeleteSlugInput(e.target.value)}
              placeholder={`Type ${o.slug}`}
              style={{ marginBottom: 12 }}
            />
            <div style={{ display: 'flex', gap: 8 }}>
              <button
                className="danger"
                disabled={busy || deleteSlugInput !== o.slug}
                onClick={deleteOrg}
              >
                {busy ? 'Deleting...' : 'Permanently delete'}
              </button>
              <button
                className="secondary"
                disabled={busy}
                onClick={() => { setConfirmDelete(false); setDeleteSlugInput(''); }}
              >
                Cancel
              </button>
            </div>
          </>
        )}
      </div>

      <div className="section-heading">Users ({data.users.length})</div>
      <div className="list">
        {data.users.length === 0 ? (
          <div className="list-empty">No users in this org.</div>
        ) : (
          data.users.map((u) => {
            const isResetting = resetUserId === u.id;
            return (
              <div key={u.id} className="row">
                <div className="info">
                  <div className="name">
                    {u.name || u.email}
                    <span className="badge" style={{ marginLeft: 8 }}>{u.role}</span>
                    {!u.email_verified_at && <span className="hint" style={{ marginLeft: 8, color: 'var(--danger)' }}>unverified</span>}
                  </div>
                  <div className="meta">{u.email} · joined {formatDateString(u.created_at.split('T')[0])}</div>
                  {isResetting && (
                    <div style={{ marginTop: 8, display: 'flex', gap: 8, alignItems: 'center' }}>
                      <input
                        type="password" placeholder="New password"
                        value={resetPassword}
                        onChange={(e) => setResetPassword(e.target.value)}
                        style={{ width: 260 }}
                      />
                      <button className="primary" disabled={busy || !resetPassword} onClick={() => submitResetPassword(u.id)}>Set</button>
                      <button className="secondary" disabled={busy} onClick={() => { setResetUserId(null); setResetPassword(''); }}>Cancel</button>
                    </div>
                  )}
                </div>
                {!isResetting && (
                  <div className="actions">
                    <button className="secondary" onClick={() => { setResetUserId(u.id); setResetPassword(''); }}>Reset password</button>
                  </div>
                )}
              </div>
            );
          })
        )}
      </div>
    </div>
  );
}

  trial_reminder_1d: ['user_name', 'organization_name', 'trial_ends_on', 'billing_url'],
  trial_expired: ['user_name', 'organization_name', 'billing_url'],
};

const TEMPLATE_LABELS = {
  email_verification: 'Email verification (sent on signup)',
  trial_reminder_3d: 'Trial reminder — 3 days before end',
  trial_reminder_1d: 'Trial reminder — 1 day before end',
  trial_expired: 'Trial ended notice',
};

function EmailTemplatesSection({ token }) {
  const [templates, setTemplates] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [editingKey, setEditingKey] = useState(null);
  const [draft, setDraft] = useState(null);
  const [busy, setBusy] = useState(false);

  const refresh = useCallback(async () => {
    setLoading(true); setError(null);
    try {
      const data = await apiRequest('/api/system/email-templates', { token });
      setTemplates(data);
    } catch (err) { setError(err.message); }
    finally { setLoading(false); }
  }, [token]);

  useEffect(() => { refresh(); }, [refresh]);

  function startEdit(t) {
    setDraft({ subject: t.subject, intro_html: t.intro_html, intro_text: t.intro_text });
    setEditingKey(t.template_key);
  }

  async function saveEdit() {
    setBusy(true); setError(null);
    try {
      await apiRequest(`/api/system/email-templates/${editingKey}`, {
        method: 'PUT', token, body: draft,
      });
      setEditingKey(null); setDraft(null);
      await refresh();
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  async function resetToDefault(key) {
    if (!confirm('Reset this template to its default text?')) return;
    setError(null);
    try {
      await apiRequest(`/api/system/email-templates/${key}`, { method: 'DELETE', token });
      await refresh();
    } catch (err) { setError(err.message); }
  }

  if (editingKey) {
    const vars = TEMPLATE_VARIABLES[editingKey] || [];
    return (
      <>
        <div className="section-heading">Edit: {TEMPLATE_LABELS[editingKey]}</div>
        {error && <div className="error">{error}</div>}
        <div className="form-card">
          <p className="hint" style={{ marginBottom: 16 }}>
            Available variables (insert as <code>{`{{variable}}`}</code>): {vars.map((v) => <code key={v} style={{ marginRight: 6 }}>{`{{${v}}}`}</code>)}
          </p>
          <label>Subject</label>
          <input value={draft.subject} onChange={(e) => setDraft({ ...draft, subject: e.target.value })} />
          <label>HTML body</label>
          <textarea
            rows={8} value={draft.intro_html}
            onChange={(e) => setDraft({ ...draft, intro_html: e.target.value })}
            style={{ fontFamily: 'ui-monospace, Menlo, monospace', fontSize: 13 }}
          />
          <label>Plain text body</label>
          <textarea
            rows={6} value={draft.intro_text}
            onChange={(e) => setDraft({ ...draft, intro_text: e.target.value })}
            style={{ fontFamily: 'ui-monospace, Menlo, monospace', fontSize: 13 }}
          />
          <div className="form-actions">
            <button className="primary" disabled={busy} onClick={saveEdit}>{busy ? 'Saving...' : 'Save'}</button>
            <button className="secondary" disabled={busy} onClick={() => { setEditingKey(null); setDraft(null); }}>Cancel</button>
          </div>
        </div>
      </>
    );
  }

  return (
    <>
      <div className="section-heading">Email templates</div>
      {error && <div className="error">{error}</div>}
      <div className="list">
        {loading ? (
          <div className="list-empty">Loading...</div>
        ) : templates.length === 0 ? (
          <div className="list-empty">No templates.</div>
        ) : (
          templates.map((t) => (
            <div key={t.template_key} className="row">
              <div className="info">
                <div className="name">
                  {TEMPLATE_LABELS[t.template_key] || t.template_key}
                  {t.is_default
                    ? <span className="hint" style={{ marginLeft: 8 }}>(using default)</span>
                    : <span className="hint" style={{ marginLeft: 8 }}>customized {t.updated_at ? formatDateString(t.updated_at.split('T')[0]) : ''}</span>}
                </div>
                <div className="meta">{t.subject}</div>
              </div>
              <div className="actions">
                <button className="secondary" onClick={() => startEdit(t)}>Edit</button>
                {!t.is_default && (
                  <button className="secondary" onClick={() => resetToDefault(t.template_key)}>Reset</button>
                )}
              </div>
            </div>
          ))
        )}
      </div>
    </>
  );
}

function VerifyEmailPage() {
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token') || '';
  const [state, setState] = useState('working');
  const [error, setError] = useState(null);

  useEffect(() => {
    if (!token) { setState('invalid'); return; }
    (async () => {
      try {
        await apiRequest('/api/auth/verify-email', {
          method: 'POST', body: { token },
        });
        setState('done');
      } catch (err) {
        setError(err.message);
        setState('error');
      }
    })();
  }, [token]);

  return (
    <div className="auth-shell">
      <div className="card">
        <h1>Email verification</h1>
        {state === 'working' && <p className="subtitle">Verifying your email...</p>}
        {state === 'invalid' && (
          <>
            <p className="subtitle">This link is missing required information. Sign in and use the resend button to get a fresh link.</p>
            <button className="primary block" onClick={() => navigate('/signin')}>Sign in</button>
          </>
        )}
        {state === 'error' && (
          <>
            <p className="subtitle">{error || 'Could not verify your email.'}</p>
            <button className="primary block" onClick={() => navigate('/signin')}>Back to sign in</button>
          </>
        )}
        {state === 'done' && (
          <>
            <p className="subtitle">Email verified. You're all set.</p>
            <button className="primary block" onClick={() => navigate('/dashboard')}>Continue</button>
          </>
        )}
      </div>
    </div>
  );
}

function ResetPasswordPage() {
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token') || '';
  const [password, setPassword] = useState('');
  const [confirm, setConfirm] = useState('');
  const [error, setError] = useState(null);
  const [busy, setBusy] = useState(false);
  const [done, setDone] = useState(false);

  async function submit(e) {
    e.preventDefault();
    setError(null);
    if (password !== confirm) {
      setError('Passwords do not match.');
      return;
    }
    setBusy(true);
    try {
      await apiRequest('/api/auth/reset-password', {
        method: 'POST',
        body: { token, new_password: password },
      });
      setDone(true);
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  if (!token) {
    return (
      <div className="auth-shell">
        <div className="card">
          <h1>Reset password</h1>
          <p className="subtitle">This reset link is missing required information. Request a new one from the sign-in page.</p>
          <button className="primary block" onClick={() => navigate('/signin')}>Back to sign in</button>
        </div>
      </div>
    );
  }

  if (done) {
    return (
      <div className="auth-shell">
        <div className="card">
          <h1>Password updated</h1>
          <p className="subtitle">You can now sign in with your new password.</p>
          <button className="primary block" onClick={() => navigate('/signin')}>Sign in</button>
        </div>
      </div>
    );
  }

  return (
    <div className="auth-shell">
      <div className="card">
        <h1>Reset password</h1>
        <p className="subtitle">Resetting password for <strong style={{ color: 'var(--text)' }}>{orgSlug}</strong>. Choose a new password.</p>
        <form onSubmit={submit}>
          <label>New password <span className="hint">(8+ chars, upper, lower, number, special)</span></label>
          <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} required autoFocus />
          <label>Confirm new password</label>
          <input type="password" value={confirm} onChange={(e) => setConfirm(e.target.value)} required />
          {error && <div className="error">{error}</div>}
          <button type="submit" className="primary block" disabled={busy}>
            {busy ? 'Saving...' : 'Set new password'}
          </button>
        </form>
      </div>
    </div>
  );
}

function PublicInvoiceView({ id }) {
  const [invoice, setInvoice] = useState(null);
  const [error, setError] = useState(null);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const res = await fetch(`/api/public/invoices/${id}`);
        if (!res.ok) {
          if (cancelled) return;
          setError(res.status === 404 ? 'Invoice not found.' : `Error ${res.status}`);
          return;
        }
        const data = await res.json();
        if (cancelled) return;
        setInvoice(data);
        document.title = `Invoice #${data.invoice_number} — ${data.company_name || data.organization_name}`;
      } catch (err) {
        if (!cancelled) setError(err.message);
      }
    })();
    return () => { cancelled = true; };
  }, [id]);

  if (error) {
    return (
      <div className="public-shell">
        <div className="invoice-doc">
          <h1>Invoice unavailable</h1>
          <p className="subtitle">{error}</p>
        </div>
      </div>
    );
  }

  if (!invoice) {
    return <div className="public-shell"><div className="invoice-doc">Loading...</div></div>;
  }

  const math = invoiceMath(invoice);
  const customerName = customerDisplayName({
    first_name: invoice.customer_first_name,
    last_name: invoice.customer_last_name,
    business_name: invoice.customer_business_name,
  });
  const companyName = invoice.company_name || invoice.organization_name;

  return (
    <div className="public-shell">
      <div className="invoice-doc">
        <header className="invoice-header">
          <div className="company">
            {invoice.logo_url && <img src={invoice.logo_url} alt={companyName} />}
            <div>
              <h1>{companyName}</h1>
              {invoice.company_address && <p className="addr">{invoice.company_address}</p>}
              {invoice.company_phone && <p className="addr">{invoice.company_phone}</p>}
              {invoice.company_email && <p className="addr">{invoice.company_email}</p>}
            </div>
          </div>
          <div className="meta">
            <div className="num">Invoice #{invoice.invoice_number}</div>
            <div className="date">{formatDateString(invoice.date)}</div>
            <span className={`badge ${invoice.status}`}>{invoice.status}</span>
          </div>
        </header>

        <div className="invoice-meta-blocks">
          <div>
            <h3>Bill to</h3>
            <p>{customerName}</p>
            {invoice.customer_address && <p className="muted">{invoice.customer_address}</p>}
            {invoice.customer_email && <p className="muted">{invoice.customer_email}</p>}
            {invoice.customer_phone && <p className="muted">{invoice.customer_phone}</p>}
          </div>
          <div>
            <h3>Status</h3>
            <p style={{ textTransform: 'capitalize' }}>{invoice.status}</p>
            {invoice.sent_date && <p className="muted">Sent {formatDateString(invoice.sent_date.split('T')[0])}</p>}
            {invoice.paid_date && <p className="muted">Paid {formatDateString(invoice.paid_date.split('T')[0])}</p>}
          </div>
        </div>

        {invoice.description && (
          <div className="invoice-description">{invoice.description}</div>
        )}

        <table className="invoice-items">
          <thead>
            <tr>
              <th>Description</th>
              <th className="r">Qty</th>
              <th className="r">Rate</th>
              <th className="r">Amount</th>
            </tr>
          </thead>
          <tbody>
            {(invoice.line_items || []).map((item, i) => (
              <tr key={i}>
                <td>{item.description}</td>
                <td className="r">{item.quantity}</td>
                <td className="r">{formatPrice(item.rate)}</td>
                <td className="r">{formatPrice(item.amount)}</td>
              </tr>
            ))}
          </tbody>
        </table>
        <div style={{ marginTop: 12 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', padding: '6px 10px', fontSize: 14, color: 'var(--text-muted)' }}>
            <span>Subtotal</span><span>{formatPrice(math.subtotal)}</span>
          </div>
          {math.discount > 0 && (
            <div style={{ display: 'flex', justifyContent: 'space-between', padding: '6px 10px', fontSize: 14, color: 'var(--text-muted)' }}>
              <span>Discount</span><span>−{formatPrice(math.discount)}</span>
            </div>
          )}
          {math.tax > 0 && (
            <div style={{ display: 'flex', justifyContent: 'space-between', padding: '6px 10px', fontSize: 14, color: 'var(--text-muted)' }}>
              <span>Tax ({math.taxRate}%)</span><span>{formatPrice(math.tax)}</span>
            </div>
          )}
          <div className="invoice-total">Total {formatPrice(math.total)}</div>
        </div>

        {invoice.status === 'sent' && invoice.venmo_handle && (
          <div className="invoice-payment no-print">
            <strong>Pay via Venmo:</strong> @{invoice.venmo_handle}
            <br />
            <a href={`https://venmo.com/${invoice.venmo_handle}?txn=pay&amount=${math.total.toFixed(2)}&note=Invoice%20%23${invoice.invoice_number}`} target="_blank" rel="noopener noreferrer">
              Open Venmo
            </a>
          </div>
        )}

        <div className="invoice-actions no-print">
          <button className="secondary" onClick={() => window.print()}>Print or save as PDF</button>
        </div>
      </div>
    </div>
  );
}

function StaffLoginForm({ onSession }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState(null);
  const [busy, setBusy] = useState(false);

  async function submit(e) {
    e.preventDefault();
    setError(null); setBusy(true);
    try {
      const data = await apiRequest('/api/system/login', {
        method: 'POST', body: { email, password },
      });
      saveStaffSession({ token: data.token, user: data.user });
      onSession({ token: data.token, user: data.user });
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  return (
    <form onSubmit={submit}>
      <label>Email</label>
      <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} required autoFocus />
      <label>Password</label>
      <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} required />
      {error && <div className="error">{error}</div>}
      <button type="submit" className="primary block" disabled={busy}>
        {busy ? 'Signing in...' : 'Staff sign in'}
      </button>
    </form>
  );
}

function StaffApp() {
  const [session, setSession] = useState(loadStaffSession);
  function handleLogout() { clearStaffSession(); setSession(null); }

  if (!session) {
    return (
      <div className="auth-shell">
        <div className="card">
          <h1>Staff</h1>
          <p className="subtitle">Platform admin sign-in. For regular customer accounts use the main login page.</p>
          <StaffLoginForm onSession={setSession} />
        </div>
      </div>
    );
  }

  return (
    <div>
      <div className="topbar">
        <div className="brand">Field Manager Platform</div>
        <div className="right">
          <span className="user">{session.user.name || session.user.email}</span>
          <span className="badge">Staff</span>
          <button className="secondary" onClick={handleLogout}>Sign out</button>
        </div>
      </div>
      <div className="content">
        <SystemView session={session} />
      </div>
    </div>
  );
}

function PublicBookingView({ slug }) {
  const [org, setOrg] = useState(null);
  const [notFound, setNotFound] = useState(false);
  const [name, setName] = useState('');
  const [email, setEmail] = useState('');
  const [phone, setPhone] = useState('');
  const [address, setAddress] = useState('');
  const [service, setService] = useState('');
  const [date, setDate] = useState('');
  const [window_, setWindow] = useState('anytime');
  const [notes, setNotes] = useState('');
  const [website, setWebsite] = useState(''); // honeypot
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState(null);
  const [done, setDone] = useState(false);

  useEffect(() => {
    (async () => {
      try {
        const o = await apiRequest(`/api/public/orgs/${slug}`);
        setOrg(o);
      } catch (err) {
        setNotFound(true);
      }
    })();
  }, [slug]);

  async function submit(e) {
    e.preventDefault();
    setBusy(true); setError(null);
    try {
      await apiRequest(`/api/public/book/${slug}`, {
        method: 'POST',
        body: {
          requester_name: name,
          requester_email: email,
          requester_phone: phone,
          requester_address: address,
          service_description: service,
          preferred_date: date || null,
          preferred_time_window: window_,
          notes,
          website,
        },
      });
      setDone(true);
    } catch (err) {
      setError(err.message);
    } finally {
      setBusy(false);
    }
  }

  if (notFound) {
    return (
      <div className="auth-shell">
        <div className="card">
          <h1>Not found</h1>
          <p className="subtitle">We couldn't find a business at this booking link. Double-check the URL.</p>
        </div>
      </div>
    );
  }

  if (!org) {
    return <div className="auth-shell"><div className="card"><p className="subtitle">Loading...</p></div></div>;
  }

  if (done) {
    return (
      <div className="auth-shell">
        <div className="card">
          {org.logo_url && <img src={org.logo_url} alt={org.name} style={{ maxWidth: 80, maxHeight: 80, marginBottom: 16, borderRadius: 8 }} />}
          <h1>Request sent</h1>
          <p className="subtitle">
            Thanks! {org.name} got your request and will be in touch shortly to confirm.
          </p>
        </div>
      </div>
    );
  }

  const customer = org.customer_label || 'Customer';
  const job = (org.job_label || 'Job').toLowerCase();

  return (
    <div className="auth-shell" style={{ maxWidth: 560 }}>
      <div className="card">
        {org.logo_url && <img src={org.logo_url} alt={org.name} style={{ maxWidth: 80, maxHeight: 80, marginBottom: 12, borderRadius: 8 }} />}
        <h1>Book {job} with {org.name}</h1>
        <p className="subtitle">Fill out a few details and {org.name} will get back to you to confirm.</p>
        <form onSubmit={submit}>
          <label>Your name</label>
          <input value={name} onChange={(e) => setName(e.target.value)} required autoFocus />

          <label>Email</label>
          <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="you@example.com" />

          <label>Phone <span className="hint">(at least one of email or phone)</span></label>
          <input value={phone} onChange={(e) => setPhone(e.target.value)} placeholder="555-1234" />

          <label>Address <span className="hint">(where the work happens, optional)</span></label>
          <textarea value={address} onChange={(e) => setAddress(e.target.value)} rows={2} />

          <label>What do you need?</label>
          <textarea value={service} onChange={(e) => setService(e.target.value)} rows={3} required placeholder="Brief description of the service you'd like" />

          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
            <div>
              <label>Preferred date <span className="hint">(optional)</span></label>
              <input type="date" value={date} onChange={(e) => setDate(e.target.value)} />
            </div>
            <div>
              <label>Time of day</label>
              <select value={window_} onChange={(e) => setWindow(e.target.value)}>
                <option value="anytime">Anytime</option>
                <option value="morning">Morning</option>
                <option value="afternoon">Afternoon</option>
                <option value="evening">Evening</option>
              </select>
            </div>
          </div>

          <label>Notes <span className="hint">(optional)</span></label>
          <textarea value={notes} onChange={(e) => setNotes(e.target.value)} rows={2} placeholder="Anything else they should know?" />

          <input
            type="text" name="website" value={website}
            onChange={(e) => setWebsite(e.target.value)}
            style={{ position: 'absolute', left: '-9999px', opacity: 0, pointerEvents: 'none' }}
            tabIndex={-1} autoComplete="off"
          />

          {error && <div className="error">{error}</div>}

          <button type="submit" className="primary block" disabled={busy}>
            {busy ? 'Sending...' : 'Send request'}
          </button>
        </form>
        <p style={{ marginTop: 18, fontSize: 12, color: 'var(--text-muted)', textAlign: 'center' }}>
          Powered by <a href="/" style={{ color: 'inherit', textDecoration: 'underline' }}>Field Manager</a>
        </p>
      </div>
    </div>
  );
}

  useEffect(() => {
    (async () => {

function App() {
  const path = useLocation();
  const [session, setSession] = useState(loadSession);

  const publicMatch = path.match(/^\/i\/([^/]+)/);
  if (publicMatch) return <PublicInvoiceView id={publicMatch[1]} />;
  const bookMatch = path.match(/^\/book\/([^/]+)/);
  if (bookMatch) return <PublicBookingView slug={bookMatch[1].toLowerCase()} />;
  const profileMatch = path.match(/^\/o\/([^/]+)/);
  if (profileMatch) return <PublicProfileView slug={profileMatch[1].toLowerCase()} />;
  if (path.startsWith('/staff')) return <StaffApp />;
  // /system/* is the URL space used by SystemView's chips and detail pages.
  // If a staff session is active and there's no regular user session, keep
  // those clicks inside StaffApp instead of dumping the user to /signin.
  if (path.startsWith('/system') && !session && loadStaffSession()) return <StaffApp />;
  if (path === '/reset-password') return <ResetPasswordPage />;
  if (path === '/verify-email') return <VerifyEmailPage />;
  if (path === '/terms') return <TermsPage />;
  if (path === '/privacy') return <PrivacyPage />;

  function handleLogout() { clearSession(); setSession(null); navigate('/'); }
  function handleSessionUpdate(next) { saveSession(next); setSession(next); }
  function handleAuthSuccess(next) { saveSession(next); setSession(next); navigate('/dashboard'); }

  if (session) {
    return <AppShell session={session} onLogout={handleLogout} onSessionUpdate={handleSessionUpdate} />;
  }

  if (path === '/signin' || path === '/signup') {
    return <AuthShell onSession={handleAuthSuccess} />;
  }

  return <LandingPage />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
