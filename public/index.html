  return parts || '(unnamed)';
}

const DAY_NAMES = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

function parseDate(s) {
  if (!s) return null;
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function formatYMD(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function formatDateString(s) {
  const d = parseDate(s);
  if (!d) return '';
  return d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
}

function dayOfWeekName(s) {
  const d = parseDate(s);
  if (!d) return '';
  return DAY_NAMES[d.getDay()];
}

function ordinal(n) {
  const s = ['th', 'st', 'nd', 'rd'];
  const v = n % 100;
  return n + (s[(v - 20) % 10] || s[v] || s[0]);
}

function addDays(date, n) {
  const r = new Date(date);
  r.setDate(r.getDate() + n);
  return r;
}

function addMonths(date, n) {
  const r = new Date(date);
  const day = r.getDate();
  r.setDate(1);
  r.setMonth(r.getMonth() + n);
  const daysInMonth = new Date(r.getFullYear(), r.getMonth() + 1, 0).getDate();
  r.setDate(Math.min(day, daysInMonth));
  return r;
}

function todayStart() {
  const t = new Date();
  return new Date(t.getFullYear(), t.getMonth(), t.getDate());
}

function generatePatternDates(job, limit) {
  const start = parseDate(job.start_date);
  const end = job.end_date ? parseDate(job.end_date) : null;
  const out = [];
  let current = new Date(start);
  for (let i = 0; i < 520; i++) {
    if (end && current > end) break;
    if (current > limit) break;
    out.push(formatYMD(current));
    if (job.recurrence_pattern === 'weekly') current = addDays(current, 7);
    else if (job.recurrence_pattern === 'biweekly') current = addDays(current, 14);
    else if (job.recurrence_pattern === 'monthly') current = addMonths(current, 1);
    else break;
  }
  return out;
}

function computeOccurrences(job, today = todayStart(), horizonDays = 365) {
  if (job.type !== 'recurring' || !job.start_date) return [];
  const limit = addDays(today, horizonDays);
  const pattern = generatePatternDates(job, limit);
  const set = new Set(pattern);

  const rescheduled = (job.rescheduled_dates && typeof job.rescheduled_dates === 'object') ? job.rescheduled_dates : {};
  const rescheduledFrom = {};
  Object.entries(rescheduled).forEach(([orig, target]) => {
    set.delete(orig);
    set.add(target);
    rescheduledFrom[target] = orig;
  });

  (job.skipped_dates || []).forEach((d) => set.delete(d));
  (job.deleted_dates || []).forEach((d) => set.delete(d));

  const completed = new Set(job.completed_dates || []);

  return [...set].sort().map((date) => ({
    date,
    completed: completed.has(date),
    rescheduledFrom: rescheduledFrom[date] || null,
  }));
}

function nextDueDate(job, today = todayStart()) {
  const todayStr = formatYMD(today);
  const upcoming = computeOccurrences(job, today).filter((o) => !o.completed && o.date >= todayStr);
  return upcoming[0]?.date || null;
}

function jobOccurrencesInRange(job, startDate, endDate) {
  if (job.type === 'single') {
    if (!job.date || job.date < startDate || job.date > endDate) return [];
    return [{
      job, date: job.date,
      completed: job.status === 'completed',
      rescheduledFrom: null,
    }];
  }
  if (job.type !== 'recurring' || !job.start_date) return [];

  const horizon = parseDate(endDate);
  const pattern = generatePatternDates(job, horizon);
  const set = new Set(pattern);

  const rescheduled = (job.rescheduled_dates && typeof job.rescheduled_dates === 'object') ? job.rescheduled_dates : {};
  const rescheduledFromMap = {};
  Object.entries(rescheduled).forEach(([orig, target]) => {
    set.delete(orig);
    set.add(target);
    rescheduledFromMap[target] = orig;
  });

  (job.skipped_dates || []).forEach((d) => set.delete(d));
  (job.deleted_dates || []).forEach((d) => set.delete(d));

  const completed = new Set(job.completed_dates || []);

  return [...set]
    .filter((d) => d >= startDate && d <= endDate)
    .sort()
    .map((date) => ({
      job, date,
      completed: completed.has(date),
      rescheduledFrom: rescheduledFromMap[date] || null,
    }));
}

const FILTER_RANGES = {
  today: () => {
    const t = formatYMD(todayStart());
    return { start: t, end: t };
  },
  week: () => {
    const t = todayStart();
    return { start: formatYMD(t), end: formatYMD(addDays(t, 6)) };
  },
  past: () => {
    const t = todayStart();
    return { start: formatYMD(addDays(t, -90)), end: formatYMD(addDays(t, -1)), onlyOpen: true };
  },
};

function expandJobsToOccurrences(jobs, filter) {
  const range = FILTER_RANGES[filter] && FILTER_RANGES[filter]();
  if (!range) return null;
  const occurrences = jobs.flatMap((j) => jobOccurrencesInRange(j, range.start, range.end));
  const filtered = range.onlyOpen ? occurrences.filter((o) => !o.completed) : occurrences;
  return filtered.sort((a, b) => a.date.localeCompare(b.date));
}

function lastCompletion(job) {
  const notes = job.completion_notes || [];
  if (notes.length === 0) return null;
  return notes.reduce((a, b) => (a.date > b.date ? a : b));
}

function formatSchedule(j) {
  const timeRange = formatTimeRange(j.start_time, j.duration_minutes);
  const timeSuffix = timeRange ? ` · ${timeRange}` : '';
  if (j.type === 'single') return formatDateString(j.date) + timeSuffix;
  if (j.type === 'recurring') {
    const start = formatDateString(j.start_date);
    const end = j.end_date ? ` until ${formatDateString(j.end_date)}` : '';
    if (j.recurrence_pattern === 'weekly') {
      return `Every ${dayOfWeekName(j.start_date)} starting ${start}${end}${timeSuffix}`;
    }
    if (j.recurrence_pattern === 'biweekly') {
      return `Every other ${dayOfWeekName(j.start_date)} starting ${start}${end}${timeSuffix}`;
    }
    if (j.recurrence_pattern === 'monthly') {
      const d = parseDate(j.start_date);
      return `Monthly on the ${ordinal(d.getDate())} starting ${start}${end}${timeSuffix}`;
    }
  }
  return '';
}

function formatTimeOfDay(hhmm) {
  if (!hhmm) return '';
  const s = String(hhmm);
  const m = s.match(/^(\d{2}):(\d{2})/);
  if (!m) return '';
  const h = parseInt(m[1], 10);
  const min = m[2];
  const period = h >= 12 ? 'PM' : 'AM';
  const display = h === 0 ? 12 : h > 12 ? h - 12 : h;
  return `${display}:${min} ${period}`;
}

function addMinutesToTime(hhmm, minsToAdd) {
  if (!hhmm) return null;
  const m = String(hhmm).match(/^(\d{2}):(\d{2})/);
  if (!m) return null;
  const total = parseInt(m[1], 10) * 60 + parseInt(m[2], 10) + (parseInt(minsToAdd, 10) || 0);
  const wrapped = ((total % (24 * 60)) + 24 * 60) % (24 * 60);
  const h = Math.floor(wrapped / 60);
  const mm = wrapped % 60;
  return `${String(h).padStart(2, '0')}:${String(mm).padStart(2, '0')}`;
}

function formatDuration(mins) {
  const n = parseInt(mins, 10);
  if (!Number.isFinite(n) || n <= 0) return '';
  const h = Math.floor(n / 60);
  const m = n % 60;
  if (h === 0) return `${m}m`;
  if (m === 0) return `${h}h`;
  return `${h}h ${m}m`;
}

function formatTimeRange(startTime, durationMinutes) {
  if (!startTime) return '';
  const start = formatTimeOfDay(startTime);
  const mins = parseInt(durationMinutes, 10);
  if (!Number.isFinite(mins) || mins <= 0) return start;
  const endTime = addMinutesToTime(startTime, mins);
  return `${start} – ${formatTimeOfDay(endTime)}`;
}

function formatPrice(p) {
  if (p === null || p === undefined || p === '') return '';
  const n = typeof p === 'string' ? parseFloat(p) : p;
  if (!isFinite(n)) return '';
  return `$${n.toFixed(2)}`;
}

function LoginForm({ onSuccess }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState(null);
  const [busy, setBusy] = useState(false);
  const [forgotMode, setForgotMode] = useState(false);
  const [forgotSent, setForgotSent] = useState(false);
  const [accountOptions, setAccountOptions] = useState(null);

  async function attemptLogin(orgSlug) {
    setError(null); setBusy(true);
    try {
      const data = await apiRequest('/api/auth/login', {
        method: 'POST',
        body: { email, password, org_slug: orgSlug || undefined },
      });
      if (data.multiple_accounts) {
        setAccountOptions(data.multiple_accounts);
        setBusy(false);
        return;
      }
      const session = {
        token: data.token,
        user: data.user,
        organization: data.organization,
        slug: data.organization && data.organization.slug,
      };
      saveSession(session);
      onSuccess(session);
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  function submit(e) {
    e.preventDefault();
    attemptLogin();
  }

  async function submitForgot(e) {
    e.preventDefault();
    setError(null); setBusy(true);
    try {
      await apiRequest('/api/auth/forgot-password', {
        method: 'POST', body: { email },
      });
      setForgotSent(true);
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  if (forgotMode) {
    if (forgotSent) {
      return (
        <div>
          <p style={{ fontSize: 14 }}>
            If an account with that email exists, a reset link is on its way.
            Check your inbox (and spam folder).
          </p>
          <button className="primary block" onClick={() => { setForgotMode(false); setForgotSent(false); }}>
            Back to sign in
          </button>
        </div>
      );
    }
    return (
      <form onSubmit={submitForgot}>
        <p className="subtitle" style={{ marginBottom: 16 }}>Enter the email for your account. We'll send a reset link.</p>
        <label>Email</label>
        <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} required autoFocus />
        {error && <div className="error">{error}</div>}
        <button type="submit" className="primary block" disabled={busy}>
          {busy ? 'Sending...' : 'Send reset link'}
        </button>
        <div style={{ textAlign: 'center', marginTop: 12 }}>
          <button type="button" className="link-button" onClick={() => setForgotMode(false)}>Back to sign in</button>
        </div>
      </form>
    );
  }

  if (accountOptions) {
    return (
      <div>
        <p className="subtitle" style={{ marginBottom: 16 }}>
          You have accounts at multiple businesses. Which one are you signing into?
        </p>
        {accountOptions.map((a) => (
          <button
            key={a.slug}
            className="secondary block"
            style={{ width: '100%', marginBottom: 8, padding: 14, textAlign: 'left' }}
            disabled={busy}
            onClick={() => attemptLogin(a.slug)}
          >
            <strong>{a.name}</strong>
            <span style={{ display: 'block', fontSize: 12, color: 'var(--text-muted)', marginTop: 2 }}>{a.slug}</span>
          </button>
        ))}
        {error && <div className="error">{error}</div>}
        <div style={{ textAlign: 'center', marginTop: 12 }}>
          <button type="button" className="link-button" onClick={() => { setAccountOptions(null); setError(null); }}>
            Back to sign in
          </button>
        </div>
      </div>
    );
  }

  return (
    <form onSubmit={submit}>
      <label>Email</label>
      <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} required autoFocus />
      <label>Password</label>
      <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} required />
      {error && <div className="error">{error}</div>}
      <button type="submit" className="primary block" disabled={busy}>
        {busy ? 'Signing in...' : 'Sign in'}
      </button>
      <div style={{ textAlign: 'center', marginTop: 12 }}>
        <button type="button" className="link-button" onClick={() => { setForgotMode(true); setError(null); setForgotSent(false); }}>
          Forgot your password?
        </button>
      </div>
    </form>
  );
}

  useEffect(() => {
    if (reachedEnd) return;
    const delay = CYCLE_DELAYS[idx] || 460;
    const t = setTimeout(() => setIdx(i => i + 1), delay);
    return () => clearTimeout(t);
  }, [idx, reachedEnd]);
  // Match animation duration to the cycle delay so the slide stays continuous.
  const animDuration = reachedEnd ? null : `${CYCLE_DELAYS[idx] || 460}ms`;
  return (
    <h1 className="ed-hero-headline fade-in-delay-1">
      Run your<br />
      <em
        key={idx}
        className={`cycle-word${reachedEnd ? ' cycle-settled' : ''}`}
        style={animDuration ? { animationDuration: animDuration } : undefined}
      >{INDUSTRIES[idx]}</em><br />
      in one place.
    </h1>
  );
}

function LandingPage() {
  useEffect(() => {
    if (typeof IntersectionObserver === 'undefined') {
      document.querySelectorAll('[data-reveal]').forEach(el => el.classList.add('is-revealed'));
      return;
    }
    const observer = new IntersectionObserver((entries) => {
      for (const entry of entries) {
        if (entry.isIntersecting) {
          entry.target.classList.add('is-revealed');
          observer.unobserve(entry.target);
        }
      }
    }, { rootMargin: '0px 0px -10% 0px', threshold: 0.12 });
    document.querySelectorAll('[data-reveal]').forEach(el => observer.observe(el));
    return () => observer.disconnect();
  }, []);

  // Feature card cursor-follow glow: each card tracks pointer position into
  // CSS variables --mx/--my so the radial gradient in ::before can chase the
  // cursor while it's over the card.
  useEffect(() => {
    const cards = document.querySelectorAll('.feature-card');

      const r = e.currentTarget.getBoundingClientRect();
      e.currentTarget.style.setProperty('--mx', `${e.clientX - r.left}px`);
      e.currentTarget.style.setProperty('--my', `${e.clientY - r.top}px`);

    cards.forEach(c => c.addEventListener('pointermove', onMove));
    return () => cards.forEach(c => c.removeEventListener('pointermove', onMove));

function CustomerDetailView({ session, customer, onBack, onEdit, canMutate }) {
  const terms = useTerms();
  const [jobs, setJobs] = useState([]);
  const [invoices, setInvoices] = useState([]);
  const [quotes, setQuotes] = useState([]);
  const [notes, setNotes] = useState([]);
  const [noteText, setNoteText] = useState('');
  const [noteBusy, setNoteBusy] = useState(false);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [tab, setTab] = useState('jobs');

  useEffect(() => {
    let cancelled = false;
    (async () => {
      setLoading(true); setError(null);
      try {
        const [j, i, q, n] = await Promise.all([
          apiRequest('/api/jobs', { slug: session.slug, token: session.token }),
          apiRequest('/api/invoices', { slug: session.slug, token: session.token }),
          apiRequest('/api/quotes', { slug: session.slug, token: session.token }),
          apiRequest(`/api/customers/${customer.id}/notes`, { slug: session.slug, token: session.token }),
        ]);
        if (cancelled) return;
        const cid = customer.id;
        setJobs(j.filter((x) => x.customer_id === cid));
        setInvoices(i.filter((x) => x.customer_id === cid));
        setQuotes(q.filter((x) => x.customer_id === cid));
        setNotes(n);
      } catch (err) {
        if (!cancelled) setError(err.message);
      } finally {
        if (!cancelled) setLoading(false);
      }
    })();
    return () => { cancelled = true; };
  }, [customer.id, session.slug, session.token]);

  async function addNote(e) {
    e.preventDefault();
    if (!noteText.trim()) return;
    setNoteBusy(true); setError(null);
    try {
      const created = await apiRequest(`/api/customers/${customer.id}/notes`, {
        method: 'POST', slug: session.slug, token: session.token,
        body: { body: noteText.trim() },
      });
      setNotes((prev) => [created, ...prev]);
      setNoteText('');
    } catch (err) { setError(err.message); }
    finally { setNoteBusy(false); }
  }

  async function deleteNote(noteId) {
    if (!confirm('Delete this note? This cannot be undone.')) return;
    setError(null);
    try {
      await apiRequest(`/api/customers/${customer.id}/notes/${noteId}`, {
        method: 'DELETE', slug: session.slug, token: session.token,
      });
      setNotes((prev) => prev.filter((n) => n.id !== noteId));
    } catch (err) { setError(err.message); }
  }

  function formatNoteTime(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    const now = new Date();
    const sameDay = d.toDateString() === now.toDateString();
    const ms = now - d;
    if (ms < 60000) return 'just now';
    if (sameDay && ms < 3600000) return `${Math.floor(ms / 60000)}m ago`;
    if (sameDay) return d.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
  }

  return (
    <div>
      <div className="page-header">
        <h2>{customerDisplayName(customer)}</h2>
        <div className="actions" style={{ display: 'flex', gap: 8 }}>
          {canMutate && <button className="secondary" onClick={() => onEdit(customer)}>Edit</button>}
          <button className="secondary" onClick={onBack}>Back</button>
        </div>
      </div>

      <div className="form-card">
        <dl className="detail-info">
          {parseFloat(customer.outstanding_balance) > 0 && (
            <><dt>Owes</dt><dd style={{ color: 'var(--danger)', fontWeight: 600 }}>{formatPrice(customer.outstanding_balance)}</dd></>
          )}
          {customer.phone && <><dt>Phone</dt><dd>{customer.phone}</dd></>}
          {customer.email && <><dt>Email</dt><dd>{customer.email}</dd></>}
          {customer.business_name && (customer.first_name || customer.last_name) && (
            <><dt>Contact</dt><dd>{[customer.first_name, customer.last_name].filter(Boolean).join(' ')}</dd></>
          )}
          {customer.address && <><dt>Address</dt><dd>{customer.address}</dd></>}
          {customer.notes && <><dt>Notes</dt><dd>{customer.notes}</dd></>}
        </dl>
      </div>

      {error && <div className="error">{error}</div>}

      <div className="jobs-tabs">
        <button className={`jobs-tab${tab === 'jobs' ? ' active' : ''}`} onClick={() => setTab('jobs')}>
          {terms.jobs} {!loading && <span style={{ opacity: 0.5, fontWeight: 500 }}>· {jobs.length}</span>}
        </button>
        <button className={`jobs-tab${tab === 'invoices' ? ' active' : ''}`} onClick={() => setTab('invoices')}>
          Invoices {!loading && <span style={{ opacity: 0.5, fontWeight: 500 }}>· {invoices.length}</span>}
        </button>
        <button className={`jobs-tab${tab === 'quotes' ? ' active' : ''}`} onClick={() => setTab('quotes')}>
          Quotes {!loading && <span style={{ opacity: 0.5, fontWeight: 500 }}>· {quotes.length}</span>}
        </button>
        <button className={`jobs-tab${tab === 'notes' ? ' active' : ''}`} onClick={() => setTab('notes')}>
          Notes {!loading && <span style={{ opacity: 0.5, fontWeight: 500 }}>· {notes.length}</span>}
        </button>
      </div>

      {loading ? (
        <div className="list-empty">Loading related items...</div>
      ) : (
        <>
          {tab === 'jobs' && (
            <div className="list">
              {jobs.length === 0 ? (
                <div className="list-empty">No {terms.jobsLower} for this {terms.customerLower}.</div>
              ) : jobs.map((j) => (
                <div key={j.id} className="compact-row">
                  <div className="info">
                    <div className="name">{j.title}</div>
                    <div className="meta">
                      {formatSchedule(j)}
                      {j.default_price != null && <> · {formatPrice(j.default_price)}</>}
                      {j.status === 'completed' && <> · Completed</>}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}

          {tab === 'invoices' && (
            <div className="list">
              {invoices.length === 0 ? (
                <div className="list-empty">No invoices.</div>
              ) : invoices.map((inv) => (
                <div key={inv.id} className="compact-row">
                  <div className="info">
                    <div className="name">
                      Invoice #{inv.invoice_number} <span className="price">{formatPrice(lineItemsTotal(inv.line_items))}</span>
                    </div>
                    <div className="meta">
                      {formatDateString(inv.date)} · <span className={`badge ${inv.status}`}>{inv.status}</span>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}

          {tab === 'quotes' && (
            <div className="list">
              {quotes.length === 0 ? (
                <div className="list-empty">No quotes.</div>
              ) : quotes.map((q) => (
                <div key={q.id} className="compact-row">
                  <div className="info">
                    <div className="name">
                      {q.description || 'Quote'} <span className="price">{formatPrice(lineItemsTotal(q.line_items))}</span>
                    </div>
                    <div className="meta"><span className={`badge ${q.status}`}>{q.status}</span></div>
                  </div>
                </div>
              ))}
            </div>
          )}

          {tab === 'notes' && (
            <div>
              <form className="note-add" onSubmit={addNote}>
                <textarea
                  value={noteText}
                  onChange={(e) => setNoteText(e.target.value)}
                  placeholder={`Add a note about ${customerDisplayName(customer)} — calls, preferences, anything to remember next time.`}
                  rows={3}
                  disabled={noteBusy}
                />
                <div className="note-add-actions">
                  <button type="submit" className="primary" disabled={noteBusy || !noteText.trim()}>
                    {noteBusy ? 'Saving...' : 'Add note'}
                  </button>
                </div>
              </form>
              <div className="note-timeline">
                {notes.length === 0 ? (
                  <div className="list-empty">No notes yet. Add the first one above.</div>
                ) : (
                  notes.map((n) => (
                    <div key={n.id} className="note-row">
                      <div className="note-meta">
                        <span className="note-author">{n.author_name || n.author_email || 'Unknown'}</span>
                        <span className="note-time" title={new Date(n.created_at).toLocaleString()}>
                          {formatNoteTime(n.created_at)}
                        </span>
                        {canMutate && (
                          <button
                            type="button" className="note-delete"
                            onClick={() => deleteNote(n.id)}
                            aria-label="Delete note"
                          >×</button>
                        )}
                      </div>
                      <div className="note-body">{n.body}</div>
                    </div>
                  ))
                )}
              </div>
            </div>
          )}
        </>
      )}
    </div>
  );
}

function CsvImportView({ session, onDone, onCancel }) {
  const terms = useTerms();
  const [text, setText] = useState('');
  const [parsed, setParsed] = useState(null);
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState(null);
  const [result, setResult] = useState(null);

  const VALID_COLS = new Set(['first_name', 'last_name', 'business_name', 'phone', 'email', 'address', 'notes']);
  const SAMPLE = 'first_name,last_name,business_name,phone,email,address,notes\nBob,Smith,,555-0100,bob@example.com,123 Maple St,Front yard only\n,,Acme Co,555-9000,info@acme.com,500 Oak Ave,Net 30';

  function handleParse() {
    setError(null); setResult(null);
    try {
      const out = parseCSV(text);
      if (out.rows.length === 0) {
        setError('No rows to import. Make sure your CSV has a header row plus at least one data row.');
        setParsed(null);
        return;
      }
      const unknown = out.headers.filter((h) => !VALID_COLS.has(h));
      if (unknown.length > 0) {
        setError(`Unknown columns: ${unknown.join(', ')}. Allowed: ${[...VALID_COLS].join(', ')}.`);
        setParsed(null);
        return;
      }
      setParsed(out);
    } catch (err) {
      setError(err.message);
    }
  }

  async function handleImport() {
    if (!parsed) return;
    setBusy(true); setError(null); setResult(null);
    try {
      const data = await apiRequest('/api/customers/import', {
        method: 'POST', slug: session.slug, token: session.token,
        body: { rows: parsed.rows },
      });
      setResult(data);
      onDone();
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  return (
    <div>
      <div className="page-header"><h2>Import {terms.customersLower} from CSV</h2></div>
      {error && <div className="error">{error}</div>}
      {result && (
        <div className="error" style={{ background: '#e8f1ec', color: '#1f6f4a' }}>
          Imported {result.inserted_count} {terms.customersLower} ({result.skipped_count} skipped — no name).
        </div>
      )}
      <div className="form-card">
        <label>CSV <span className="hint">(first row must be a header; allowed columns: {[...VALID_COLS].join(', ')})</span></label>
        <textarea
          rows={10}
          value={text}
          onChange={(e) => setText(e.target.value)}
          placeholder={SAMPLE}
          style={{ fontFamily: 'ui-monospace, Menlo, monospace', fontSize: 13 }}
        />
        <div className="form-actions">
          <button type="button" className="secondary" onClick={handleParse} disabled={busy || !text.trim()}>Preview</button>
          {parsed && (
            <button type="button" className="primary" onClick={handleImport} disabled={busy}>
              {busy ? 'Importing...' : `Import ${parsed.rows.length} ${parsed.rows.length === 1 ? terms.customerLower : terms.customersLower}`}
            </button>
          )}
          <button type="button" className="secondary" onClick={onCancel} disabled={busy}>Back</button>
        </div>
      </div>

      {parsed && (
        <>
          <div className="section-heading">Preview ({parsed.rows.length} {parsed.rows.length === 1 ? 'row' : 'rows'})</div>
          <div className="form-card">
            <div className="csv-preview-wrap">
              <table className="csv-preview-table">
                <thead>
                  <tr>{parsed.headers.map((h) => <th key={h}>{h}</th>)}</tr>
                </thead>
                <tbody>
                  {parsed.rows.slice(0, 50).map((row, i) => (
                    <tr key={i}>{parsed.headers.map((h) => <td key={h}>{row[h] || '—'}</td>)}</tr>
                  ))}
                </tbody>
              </table>
            </div>
            {parsed.rows.length > 50 && <p className="hint">Showing first 50 rows. All {parsed.rows.length} will be imported.</p>}
          </div>
        </>
      )}
    </div>
  );
}

function CustomersView({ session, planContext }) {
  const terms = useTerms();
  const atCap = planContext && planContext.atCap;
  const [customers, setCustomers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [mode, setMode] = useState('list');
  const [editing, setEditing] = useState(null);
  const [viewing, setViewing] = useState(null);
  const [search, setSearch] = useState('');
  const [sort, setSort] = useState('name');
  const [busy, setBusy] = useState(false);

  const canMutate = ['admin', 'lead'].includes(session.user.role);

  function exportCustomers() {
    const headers = ['first_name', 'last_name', 'business_name', 'phone', 'email', 'address', 'notes'];
    const rows = customers.map((c) => headers.map((h) => c[h]));
    downloadCSV(`customers-${formatYMD(new Date())}.csv`, headers, rows);
  }

  const refresh = useCallback(async () => {
    setLoading(true);
    setError(null);
    try {
      const data = await apiRequest('/api/customers', { slug: session.slug, token: session.token });
      setCustomers(data);
    } catch (err) { setError(err.message); }
    finally { setLoading(false); }
  }, [session.slug, session.token]);

  useEffect(() => { refresh(); }, [refresh]);

  async function createCustomer(values) {
    setBusy(true); setError(null);
    try {
      await apiRequest('/api/customers', {
        method: 'POST', slug: session.slug, token: session.token, body: values,
      });
      setMode('list');
      await refresh();
    } catch (err) { setError(err); }
    finally { setBusy(false); }
  }

  async function updateCustomer(values) {
    setBusy(true); setError(null);
    try {
      await apiRequest(`/api/customers/${editing.id}`, {
        method: 'PUT', slug: session.slug, token: session.token, body: values,
      });
      setEditing(null);
      setMode('list');
      await refresh();
    } catch (err) { setError(err); }
    finally { setBusy(false); }
  }

  async function deleteCustomer(id) {
    if (!confirm(`Delete this ${terms.customerLower}? This cannot be undone from the UI.`)) return;
    setError(null);
    try {
      await apiRequest(`/api/customers/${id}`, {
        method: 'DELETE', slug: session.slug, token: session.token,
      });
      await refresh();
    } catch (err) { setError(err); }
  }

  if (mode === 'create') {
    return (
      <div>
        <div className="page-header"><h2>New {terms.customerLower}</h2></div>
        <PlanError error={error} session={session} />
        <div className="form-card">
          <CustomerForm onSubmit={createCustomer} onCancel={() => { setError(null); setMode('list'); }} busy={busy} />
        </div>
      </div>
    );
  }

  if (mode === 'edit' && editing) {
    return (
      <div>
        <div className="page-header"><h2>Edit {terms.customerLower}</h2></div>
        <PlanError error={error} session={session} />
        <div className="form-card">
          <CustomerForm
            initial={editing}
            onSubmit={updateCustomer}
            onCancel={() => { setError(null); setEditing(null); setMode('list'); }}
            busy={busy}
          />
        </div>
      </div>
    );
  }

  if (mode === 'detail' && viewing) {
    return (
      <CustomerDetailView
        session={session}
        customer={viewing}
        canMutate={canMutate}
        onBack={() => { setViewing(null); setMode('list'); }}
        onEdit={(c) => { setEditing(c); setMode('edit'); }}
      />
    );
  }

  if (mode === 'import') {
    return (
      <CsvImportView
        session={session}
        onDone={async () => { await refresh(); }}
        onCancel={() => { setError(null); setMode('list'); }}
      />
    );
  }

  const filtered = customers.filter((c) => searchMatches(
    search,
    c.first_name, c.last_name, c.business_name, c.phone, c.email, c.address
  ));
  const sortKey = sort === 'name'
    ? (c) => (c.business_name || `${c.last_name || ''} ${c.first_name || ''}`).toLowerCase()
    : 'created_at';
  const sorted = sortBy(filtered, sortKey, sort === 'oldest' ? 'asc' : sort === 'name' ? 'asc' : 'desc');

  return (
    <div>
      <div className="page-header">
        <h2>{terms.customers}</h2>
        <div style={{ display: 'flex', gap: 8 }}>
          <button className="secondary" onClick={exportCustomers} disabled={customers.length === 0}>Export</button>
          {canMutate && (
            <>
              <button className="secondary" onClick={() => { setError(null); setMode('import'); }} disabled={atCap}>Import CSV</button>
              <button className="primary" onClick={() => { setError(null); setMode('create'); }} disabled={atCap}>+ New {terms.customerLower}</button>
            </>
          )}
        </div>
      </div>
      {planContext && planContext.isFree && planContext.atCap && (
        <UpgradePrompt session={session} used={planContext.used} limit={planContext.limit} resource={terms.customersLower} />
      )}
      <div className="search-bar" style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
        <input
          type="search"
          value={search}
          onChange={(e) => setSearch(e.target.value)}
          placeholder={`Search ${terms.customersLower} by name, phone, email...`}
          style={{ flex: 1 }}
        />
        <select value={sort} onChange={(e) => setSort(e.target.value)} style={{ width: 'auto' }}>
          <option value="name">Sort: Name</option>
          <option value="newest">Sort: Newest</option>
          <option value="oldest">Sort: Oldest</option>
        </select>
      </div>
      <PlanError error={error} session={session} />
      <div className="list">
        {loading ? (
          <div className="list-empty">Loading...</div>
        ) : sorted.length === 0 ? (
          customers.length === 0 ? (
            <EmptyState
              icon="customers"
              title={`Add your first ${terms.customerLower}`}
              body={canMutate
                ? `Bring people in by hand, paste a CSV, or accept a booking request. Once you've got at least one, you can schedule ${terms.jobsLower} and send invoices.`
                : `Ask an admin to add ${terms.customersLower} so you can start working.`
              }
              action={canMutate && (
                <>
                  <button className="primary" disabled={atCap} onClick={() => { setError(null); setMode('create'); }}>+ New {terms.customerLower}</button>
                  <button className="secondary" disabled={atCap} onClick={() => { setError(null); setMode('import'); }}>Import CSV</button>
                </>
              )}
            />
          ) : (
            <div className="list-empty">No {terms.customersLower} match this search.</div>
          )
        ) : (
          sorted.map((c) => {
            const balance = parseFloat(c.outstanding_balance) || 0;
            return (
              <div key={c.id} className="row">
                <div className="info">
                  <div className="name">
                    {customerDisplayName(c)}
                    {balance > 0 && <span className="price" style={{ color: 'var(--danger)' }}>owes {formatPrice(balance)}</span>}
                  </div>
                  <div className="meta">
                    {[c.phone, c.email].filter(Boolean).join(' • ') || 'No contact info'}
                  </div>
                </div>
                <div className="actions">
                  <button className="secondary" onClick={() => { setViewing(c); setMode('detail'); }}>View</button>
                  {canMutate && (
                    <>
                      <button className="secondary" onClick={() => { setEditing(c); setMode('edit'); }}>Edit</button>
                      <button className="danger" onClick={() => deleteCustomer(c.id)}>Delete</button>
                    </>
                  )}
                </div>
              </div>
            );
          })
        )}
      </div>
    </div>
  );
}
