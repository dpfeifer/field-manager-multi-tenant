<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Field Manager</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg: #faf8f4;
      --card: #ffffff;
      --text: #2d2a26;
      --text-muted: #6d6a64;
      --border: #ece6d8;
      --border-strong: #d9d2c0;
      --primary: #4a5e7a;
      --primary-hover: #3a4d68;
      --primary-ring: rgba(74, 94, 122, 0.18);
      --accent: #e8a78c;
      --accent-hover: #d68768;
      --danger: #b04a3c;
      --danger-bg: #fbe9e5;
      --shadow-sm: 0 1px 2px rgba(45, 42, 38, 0.04);
      --shadow-md: 0 4px 14px rgba(45, 42, 38, 0.06), 0 1px 3px rgba(45, 42, 38, 0.04);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* Auth screens */
    .auth-shell { max-width: 460px; margin: 80px auto; padding: 0 16px; }
    .card {
      background: var(--card);
      border-radius: 14px;
      box-shadow: var(--shadow-md);
      padding: 36px;
    }
    h1 { margin: 0 0 6px; font-size: 26px; font-weight: 600; letter-spacing: -0.01em; }
    h2 { font-weight: 600; letter-spacing: -0.01em; }
    .subtitle { color: var(--text-muted); margin: 0 0 28px; font-size: 14px; }
    .tabs { display: flex; gap: 0; margin-bottom: 24px; border-bottom: 1px solid var(--border); }
    .tab {
      flex: 1; padding: 12px 0; background: none; border: none;
      cursor: pointer; font-size: 14px; color: var(--text-muted);
      border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s;
    }
    .tab.active { color: var(--text); border-bottom-color: var(--primary); font-weight: 600; }
    .tab:hover { color: var(--text); }
    label { display: block; font-size: 13px; font-weight: 600; margin: 14px 0 6px; color: var(--text); }
    .hint { font-weight: 400; color: var(--text-muted); font-size: 12px; margin-left: 6px; }
    input, textarea {
      width: 100%; padding: 11px 14px; font-size: 14px;
      border: 1px solid var(--border-strong); border-radius: 8px;
      background: var(--card); font-family: inherit; color: var(--text);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    textarea { resize: vertical; min-height: 76px; }
    input:focus, textarea:focus {
      outline: none; border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-ring);
    }
    input::placeholder, textarea::placeholder { color: #b0a99a; }
    button.primary {
      padding: 11px 18px; background: var(--primary); color: white;
      border: none; border-radius: 8px; font-size: 14px;
      font-weight: 600; cursor: pointer; transition: background 0.15s;
    }
    button.primary:hover { background: var(--primary-hover); }
    button.primary:disabled { background: #a8a59c; cursor: not-allowed; }
    button.primary.block { width: 100%; margin-top: 24px; }
    button.secondary {
      padding: 9px 14px; background: var(--card); color: var(--text);
      border: 1px solid var(--border-strong); border-radius: 8px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    button.secondary:hover { background: #f5f1e8; border-color: var(--primary); }
    button.danger {
      padding: 9px 14px; background: var(--card); color: var(--danger);
      border: 1px solid var(--border-strong); border-radius: 8px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    button.danger:hover { background: var(--danger-bg); border-color: var(--danger); }
    .error {
      margin-top: 16px; padding: 11px 14px;
      background: var(--danger-bg); color: var(--danger);
      border-radius: 8px; font-size: 13px;
    }
    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 999px;
      background: #f4ddd0; color: #8c4e30; font-size: 11px;
      font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em;
    }

    /* App shell */
    .topbar {
      background: var(--card); border-bottom: 1px solid var(--border);
      padding: 14px 28px; display: flex;
      align-items: center; justify-content: space-between;
    }
    .topbar .brand { font-weight: 600; font-size: 16px; letter-spacing: -0.01em; }
    .topbar .right { display: flex; align-items: center; gap: 14px; font-size: 13px; }
    .topbar .right .user { color: var(--text-muted); }
    .nav {
      background: var(--card); border-bottom: 1px solid var(--border);
      padding: 0 28px; display: flex; gap: 4px;
    }
    .nav button {
      background: none; border: none; padding: 14px 16px;
      font-size: 14px; color: var(--text-muted); cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }
    .nav button.active { color: var(--text); font-weight: 600; border-bottom-color: var(--primary); }
    .nav button:hover { color: var(--text); }
    .content { max-width: 960px; margin: 32px auto; padding: 0 28px; }
    .page-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px;
    }
    .page-header h2 { margin: 0; font-size: 22px; }

    /* List */
    .list {
      background: var(--card); border-radius: 12px;
      border: 1px solid var(--border); overflow: hidden;
      box-shadow: var(--shadow-sm);
    }
    .list-empty { padding: 56px 24px; text-align: center; color: var(--text-muted); font-size: 14px; }
    .row {
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; transition: background 0.12s;
    }
    .row:last-child { border-bottom: none; }
    .row:hover { background: #fbf9f3; }
    .row .info .name { font-weight: 500; font-size: 14px; margin-bottom: 3px; }
    .row .info .meta { color: var(--text-muted); font-size: 12px; }
    .row .actions { display: flex; gap: 8px; flex-shrink: 0; }

    /* Forms in app shell */
    .form-card {
      background: var(--card); border-radius: 12px;
      border: 1px solid var(--border); padding: 28px;
      margin-bottom: 24px; box-shadow: var(--shadow-sm);
    }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 18px; }
    .form-grid .full { grid-column: 1 / -1; }
    .form-actions { margin-top: 24px; display: flex; gap: 10px; }

    select {
      width: 100%; padding: 11px 14px; font-size: 14px;
      border: 1px solid var(--border-strong); border-radius: 8px;
      background: var(--card); font-family: inherit; color: var(--text);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-ring); }

    .toggle-group {
      display: inline-flex; background: #f4efe3; border-radius: 8px;
      padding: 4px; gap: 4px;
    }
    .toggle-group button {
      background: none; border: none; padding: 7px 16px;
      font-size: 13px; font-weight: 500; color: var(--text-muted);
      border-radius: 6px; cursor: pointer; transition: background 0.15s, color 0.15s;
    }
    .toggle-group button.active {
      background: var(--card); color: var(--text);
      box-shadow: 0 1px 2px rgba(0,0,0,0.06);
    }

    .check-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .check-list label {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 12px; border: 1px solid var(--border-strong);
      border-radius: 999px; font-size: 13px; font-weight: 500;
      cursor: pointer; margin: 0;
      background: var(--card); transition: background 0.15s, border-color 0.15s;
    }
    .check-list label:hover { background: #f5f1e8; }
    .check-list label.checked { background: #eaf0f2; border-color: var(--primary); color: var(--primary); }
    .check-list input { display: none; }

    .row .info .secondary-meta { color: var(--text-muted); font-size: 12px; margin-top: 2px; }
    .row .info .price { display: inline-block; margin-left: 8px; color: var(--text); font-weight: 500; }

    .section-heading {
      margin: 28px 0 10px; font-size: 12px; font-weight: 600;
      color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em;
    }
    .section-heading:first-child { margin-top: 0; }
    .inline-form { display: flex; align-items: center; gap: 8px; }
    .inline-form input[type="date"] { width: auto; padding: 8px 10px; font-size: 13px; }
    .schedule-summary {
      background: var(--card); border-radius: 10px;
      border: 1px solid var(--border); padding: 14px 18px;
      margin-bottom: 20px; color: var(--text-muted); font-size: 13px;
    }

    .filter-bar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .chip-group { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip {
      padding: 7px 14px; background: var(--card); color: var(--text-muted);
      border: 1px solid var(--border-strong); border-radius: 999px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .chip:hover { color: var(--text); background: #f5f1e8; }
    .chip.active {
      background: var(--primary); color: white; border-color: var(--primary);
    }

    .occurrence-row { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .occurrence-row:last-child { border-bottom: none; }
    .occurrence-row.completed { opacity: 0.55; }
    .occurrence-row:hover { background: #fbf9f3; }
    .occurrence-row .date {
      flex-shrink: 0; min-width: 90px; padding: 6px 10px;
      background: #f4efe3; border-radius: 8px; text-align: center;
    }
    .occurrence-row .date .day { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .occurrence-row .date .num { font-size: 18px; font-weight: 600; line-height: 1.1; }
    .occurrence-row.completed .date { background: #e8f1ec; }
    .occurrence-row.today .date { background: var(--primary); color: white; }
    .occurrence-row.today .date .day { color: #cbd6e6; }
    .occurrence-row .body { flex: 1; min-width: 0; }
    .occurrence-row .body .title { font-weight: 500; font-size: 14px; margin-bottom: 2px; }
    .occurrence-row .body .meta { font-size: 12px; color: var(--text-muted); }
    .occurrence-row .actions { display: flex; gap: 8px; flex-shrink: 0; }

    .calendar {
      background: var(--card); border-radius: 12px;
      border: 1px solid var(--border); padding: 18px;
      box-shadow: var(--shadow-sm);
    }
    .cal-nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .cal-nav .cal-month { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
    .cal-nav button { padding: 6px 12px; font-size: 14px; }
    .cal-grid {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
    }
    .cal-dow {
      padding: 6px; text-align: center; font-size: 11px;
      font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .cal-cell {
      min-height: 96px; padding: 6px 8px; border: 1px solid var(--border);
      border-radius: 8px; background: var(--card); overflow: hidden;
      display: flex; flex-direction: column; gap: 2px;
    }
    .cal-cell.empty { background: #f9f5ec; border-color: transparent; }
    .cal-cell.today { border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-ring); }
    .cal-cell .cal-date { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    .cal-cell.today .cal-date { color: var(--primary); }
    .cal-chip {
      font-size: 11px; padding: 2px 6px; border-radius: 4px;
      background: #eaf0f2; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      cursor: pointer; transition: background 0.12s;
    }
    .cal-chip:hover { background: #d5dee3; }
    .cal-chip.done { background: #e8f1ec; color: var(--text-muted); text-decoration: line-through; }
    .cal-more { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback } = React;

const STORAGE = { token: 'fm_token', slug: 'fm_slug', user: 'fm_user', org: 'fm_org' };

function loadSession() {
  const token = localStorage.getItem(STORAGE.token);
  const slug = localStorage.getItem(STORAGE.slug);
  const user = JSON.parse(localStorage.getItem(STORAGE.user) || 'null');
  const org = JSON.parse(localStorage.getItem(STORAGE.org) || 'null');
  if (!token || !slug || !user || !org) return null;
  return { token, slug, user, organization: org };
}

function saveSession({ token, user, organization }) {
  localStorage.setItem(STORAGE.token, token);
  localStorage.setItem(STORAGE.slug, organization.slug);
  localStorage.setItem(STORAGE.user, JSON.stringify(user));
  localStorage.setItem(STORAGE.org, JSON.stringify(organization));
}

function clearSession() {
  Object.values(STORAGE).forEach((k) => localStorage.removeItem(k));
}

async function apiRequest(path, { method = 'GET', body, slug, token } = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (slug) headers['x-organization-slug'] = slug;
  if (token) headers['Authorization'] = `Bearer ${token}`;
  const res = await fetch(path, {
    method, headers,
    body: body ? JSON.stringify(body) : undefined,
  });
  if (res.status === 204) return null;
  const isJson = (res.headers.get('content-type') || '').includes('application/json');
  const data = isJson ? await res.json() : await res.text();
  if (!res.ok) throw new Error((data && data.error) || `Request failed (${res.status})`);
  return data;
}

function customerDisplayName(c) {
  if (!c) return '';
  if (c.business_name) return c.business_name;
  const parts = [c.first_name, c.last_name].filter(Boolean).join(' ').trim();
  return parts || '(unnamed)';
}

function jobCustomerName(j) {
  if (j.customer_business_name) return j.customer_business_name;
  const parts = [j.customer_first_name, j.customer_last_name].filter(Boolean).join(' ').trim();
  return parts || '(unnamed)';
}

const DAY_NAMES = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

function parseDate(s) {
  if (!s) return null;
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function formatYMD(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function formatDateString(s) {
  const d = parseDate(s);
  if (!d) return '';
  return d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
}

function dayOfWeekName(s) {
  const d = parseDate(s);
  if (!d) return '';
  return DAY_NAMES[d.getDay()];
}

function ordinal(n) {
  const s = ['th', 'st', 'nd', 'rd'];
  const v = n % 100;
  return n + (s[(v - 20) % 10] || s[v] || s[0]);
}

function addDays(date, n) {
  const r = new Date(date);
  r.setDate(r.getDate() + n);
  return r;
}

function addMonths(date, n) {
  const r = new Date(date);
  const day = r.getDate();
  r.setDate(1);
  r.setMonth(r.getMonth() + n);
  const daysInMonth = new Date(r.getFullYear(), r.getMonth() + 1, 0).getDate();
  r.setDate(Math.min(day, daysInMonth));
  return r;
}

function todayStart() {
  const t = new Date();
  return new Date(t.getFullYear(), t.getMonth(), t.getDate());
}

function generatePatternDates(job, limit) {
  const start = parseDate(job.start_date);
  const end = job.end_date ? parseDate(job.end_date) : null;
  const out = [];
  let current = new Date(start);
  for (let i = 0; i < 520; i++) {
    if (end && current > end) break;
    if (current > limit) break;
    out.push(formatYMD(current));
    if (job.recurrence_pattern === 'weekly') current = addDays(current, 7);
    else if (job.recurrence_pattern === 'biweekly') current = addDays(current, 14);
    else if (job.recurrence_pattern === 'monthly') current = addMonths(current, 1);
    else break;
  }
  return out;
}

function computeOccurrences(job, today = todayStart(), horizonDays = 365) {
  if (job.type !== 'recurring' || !job.start_date) return [];
  const limit = addDays(today, horizonDays);
  const pattern = generatePatternDates(job, limit);
  const set = new Set(pattern);

  const rescheduled = (job.rescheduled_dates && typeof job.rescheduled_dates === 'object') ? job.rescheduled_dates : {};
  const rescheduledFrom = {};
  Object.entries(rescheduled).forEach(([orig, target]) => {
    set.delete(orig);
    set.add(target);
    rescheduledFrom[target] = orig;
  });

  (job.skipped_dates || []).forEach((d) => set.delete(d));
  (job.deleted_dates || []).forEach((d) => set.delete(d));

  const completed = new Set(job.completed_dates || []);

  return [...set].sort().map((date) => ({
    date,
    completed: completed.has(date),
    rescheduledFrom: rescheduledFrom[date] || null,
  }));
}

function nextDueDate(job, today = todayStart()) {
  const todayStr = formatYMD(today);
  const upcoming = computeOccurrences(job, today).filter((o) => !o.completed && o.date >= todayStr);
  return upcoming[0]?.date || null;
}

function jobOccurrencesInRange(job, startDate, endDate) {
  if (job.type === 'single') {
    if (!job.date || job.date < startDate || job.date > endDate) return [];
    return [{
      job, date: job.date,
      completed: job.status === 'completed',
      rescheduledFrom: null,
    }];
  }
  if (job.type !== 'recurring' || !job.start_date) return [];

  const horizon = parseDate(endDate);
  const pattern = generatePatternDates(job, horizon);
  const set = new Set(pattern);

  const rescheduled = (job.rescheduled_dates && typeof job.rescheduled_dates === 'object') ? job.rescheduled_dates : {};
  const rescheduledFromMap = {};
  Object.entries(rescheduled).forEach(([orig, target]) => {
    set.delete(orig);
    set.add(target);
    rescheduledFromMap[target] = orig;
  });

  (job.skipped_dates || []).forEach((d) => set.delete(d));
  (job.deleted_dates || []).forEach((d) => set.delete(d));

  const completed = new Set(job.completed_dates || []);

  return [...set]
    .filter((d) => d >= startDate && d <= endDate)
    .sort()
    .map((date) => ({
      job, date,
      completed: completed.has(date),
      rescheduledFrom: rescheduledFromMap[date] || null,
    }));
}

const FILTER_RANGES = {
  today: () => {
    const t = formatYMD(todayStart());
    return { start: t, end: t };
  },
  week: () => {
    const t = todayStart();
    return { start: formatYMD(t), end: formatYMD(addDays(t, 6)) };
  },
  past: () => {
    const t = todayStart();
    return { start: formatYMD(addDays(t, -90)), end: formatYMD(addDays(t, -1)), onlyOpen: true };
  },
};

function expandJobsToOccurrences(jobs, filter) {
  const range = FILTER_RANGES[filter] && FILTER_RANGES[filter]();
  if (!range) return null;
  const occurrences = jobs.flatMap((j) => jobOccurrencesInRange(j, range.start, range.end));
  const filtered = range.onlyOpen ? occurrences.filter((o) => !o.completed) : occurrences;
  return filtered.sort((a, b) => a.date.localeCompare(b.date));
}

function lastCompletion(job) {
  const notes = job.completion_notes || [];
  if (notes.length === 0) return null;
  return notes.reduce((a, b) => (a.date > b.date ? a : b));
}

function formatSchedule(j) {
  if (j.type === 'single') return formatDateString(j.date);
  if (j.type === 'recurring') {
    const start = formatDateString(j.start_date);
    const end = j.end_date ? ` until ${formatDateString(j.end_date)}` : '';
    if (j.recurrence_pattern === 'weekly') {
      return `Every ${dayOfWeekName(j.start_date)} starting ${start}${end}`;
    }
    if (j.recurrence_pattern === 'biweekly') {
      return `Every other ${dayOfWeekName(j.start_date)} starting ${start}${end}`;
    }
    if (j.recurrence_pattern === 'monthly') {
      const d = parseDate(j.start_date);
      return `Monthly on the ${ordinal(d.getDate())} starting ${start}${end}`;
    }
  }
  return '';
}

function formatPrice(p) {
  if (p === null || p === undefined || p === '') return '';
  const n = typeof p === 'string' ? parseFloat(p) : p;
  if (!isFinite(n)) return '';
  return `$${n.toFixed(2)}`;
}

function SignupForm({ onSuccess }) {
  const [orgName, setOrgName] = useState('');
  const [slug, setSlug] = useState('');
  const [name, setName] = useState('');
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState(null);
  const [busy, setBusy] = useState(false);

  async function submit(e) {
    e.preventDefault();
    setError(null); setBusy(true);
    try {
      const data = await apiRequest('/api/signup', {
        method: 'POST',
        body: {
          organization: { name: orgName, slug: slug || undefined },
          user: { email, password, name: name || undefined },
        },
      });
      saveSession(data);
      onSuccess(data);
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  return (
    <form onSubmit={submit}>
      <label>Company name</label>
      <input value={orgName} onChange={(e) => setOrgName(e.target.value)} placeholder="Acme Lawn Care" required />

function CustomersView({ session }) {
  const [customers, setCustomers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [mode, setMode] = useState('list'); // 'list' | 'create' | 'edit'
  const [editing, setEditing] = useState(null);
  const [busy, setBusy] = useState(false);

  const canMutate = ['admin', 'lead'].includes(session.user.role);

  const refresh = useCallback(async () => {
    setLoading(true);
    setError(null);
    try {
      const data = await apiRequest('/api/customers', { slug: session.slug, token: session.token });
      setCustomers(data);
    } catch (err) { setError(err.message); }
    finally { setLoading(false); }
  }, [session.slug, session.token]);

  useEffect(() => { refresh(); }, [refresh]);

  async function createCustomer(values) {
    setBusy(true); setError(null);
    try {
      await apiRequest('/api/customers', {
        method: 'POST', slug: session.slug, token: session.token, body: values,
      });
      setMode('list');
      await refresh();
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  async function updateCustomer(values) {
    setBusy(true); setError(null);
    try {
      await apiRequest(`/api/customers/${editing.id}`, {
        method: 'PUT', slug: session.slug, token: session.token, body: values,
      });
      setEditing(null);
      setMode('list');
      await refresh();
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  async function deleteCustomer(id) {
    if (!confirm('Delete this customer? This cannot be undone from the UI.')) return;
    setError(null);
    try {
      await apiRequest(`/api/customers/${id}`, {
        method: 'DELETE', slug: session.slug, token: session.token,
      });
      await refresh();
    } catch (err) { setError(err.message); }
  }

  if (mode === 'create') {
    return (
      <div>
        <div className="page-header"><h2>New customer</h2></div>
        {error && <div className="error">{error}</div>}
        <div className="form-card">
          <CustomerForm onSubmit={createCustomer} onCancel={() => { setError(null); setMode('list'); }} busy={busy} />
        </div>
      </div>
    );
  }

  if (mode === 'edit' && editing) {
    return (
      <div>
        <div className="page-header"><h2>Edit customer</h2></div>
        {error && <div className="error">{error}</div>}
        <div className="form-card">
          <CustomerForm
            initial={editing}
            onSubmit={updateCustomer}
            onCancel={() => { setError(null); setEditing(null); setMode('list'); }}
            busy={busy}
          />
        </div>
      </div>
    );
  }

  return (
    <div>
      <div className="page-header">
        <h2>Customers</h2>
        {canMutate && (
          <button className="primary" onClick={() => { setError(null); setMode('create'); }}>+ New customer</button>
        )}
      </div>
      {error && <div className="error">{error}</div>}
      <div className="list">
        {loading ? (
          <div className="list-empty">Loading...</div>
        ) : customers.length === 0 ? (
          <div className="list-empty">No customers yet. {canMutate && 'Click "New customer" to add your first.'}</div>
        ) : (
          customers.map((c) => (
            <div key={c.id} className="row">
              <div className="info">
                <div className="name">{customerDisplayName(c)}</div>
                <div className="meta">
                  {[c.phone, c.email].filter(Boolean).join(' • ') || 'No contact info'}
                </div>
              </div>
              {canMutate && (
                <div className="actions">
                  <button className="secondary" onClick={() => { setEditing(c); setMode('edit'); }}>Edit</button>
                  <button className="danger" onClick={() => deleteCustomer(c.id)}>Delete</button>
                </div>
              )}
            </div>
          ))
        )}
      </div>
    </div>
  );
}

function CalendarView({ jobs, onChipClick }) {
  const [monthOffset, setMonthOffset] = useState(0);
  const today = todayStart();
  const viewMonth = addMonths(today, monthOffset);
  const monthStart = new Date(viewMonth.getFullYear(), viewMonth.getMonth(), 1);
  const monthEnd = new Date(viewMonth.getFullYear(), viewMonth.getMonth() + 1, 0);
  const monthStartStr = formatYMD(monthStart);
  const monthEndStr = formatYMD(monthEnd);

  const byDate = {};
  jobs.forEach((j) => {
    jobOccurrencesInRange(j, monthStartStr, monthEndStr).forEach((o) => {
      (byDate[o.date] = byDate[o.date] || []).push(o);
    });
  });

  const firstDayOfWeek = monthStart.getDay();
  const daysInMonth = monthEnd.getDate();
  const cells = [];
  for (let i = 0; i < firstDayOfWeek; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);
  const todayStr = formatYMD(today);
  const monthLabel = viewMonth.toLocaleString(undefined, { month: 'long', year: 'numeric' });
  const dows = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

  return (
    <div className="calendar">
      <div className="cal-nav">
        <button className="secondary" onClick={() => setMonthOffset(monthOffset - 1)}>← Prev</button>
        <span className="cal-month">{monthLabel}</span>
        <button className="secondary" onClick={() => setMonthOffset(monthOffset + 1)}>Next →</button>
      </div>
      <div className="cal-grid">
        {dows.map((dow) => <div key={dow} className="cal-dow">{dow}</div>)}
        {cells.map((d, i) => {
          if (d === null) return <div key={i} className="cal-cell empty"></div>;
          const dateStr = `${viewMonth.getFullYear()}-${String(viewMonth.getMonth() + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
          const occs = byDate[dateStr] || [];
          const isToday = dateStr === todayStr;
          return (
            <div key={i} className={`cal-cell ${isToday ? 'today' : ''}`}>
              <div className="cal-date">{d}</div>
              {occs.slice(0, 3).map((o, j) => (
                <div
                  key={j}
                  className={`cal-chip ${o.completed ? 'done' : ''}`}
                  title={`${o.job.title} — ${jobCustomerName(o.job)}`}
                  onClick={() => onChipClick(o.job)}
                >
                  {o.job.title}
                </div>
              ))}
              {occs.length > 3 && <div className="cal-more">+{occs.length - 3} more</div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function JobScheduleView({ session, job, onBack, onMarkComplete, onChange }) {
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState(null);

  const upcoming = computeOccurrences(job).filter((o) => !o.completed).slice(0, 8);
  const todayStr = formatYMD(todayStart());
  const futureSkipped = (job.skipped_dates || []).filter((d) => d >= todayStr).sort();
  const completionHistory = [...(job.completion_notes || [])].sort((a, b) => b.date.localeCompare(a.date));

  async function call(fn) {
    setBusy(true); setError(null);
    try {
      const updated = await fn();
      await onChange(updated);
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  const skip = (date) => call(() => apiRequest(`/api/jobs/${job.id}/skip`, {
    method: 'POST', slug: session.slug, token: session.token, body: { date },
  }));
  const unskip = (date) => call(() => apiRequest(`/api/jobs/${job.id}/skip/${date}`, {
    method: 'DELETE', slug: session.slug, token: session.token,
  }));
  const reschedule = (date, new_date) => call(() => apiRequest(`/api/jobs/${job.id}/reschedule`, {
    method: 'POST', slug: session.slug, token: session.token, body: { date, new_date },
  }));
  const cancelReschedule = (date) => call(() => apiRequest(`/api/jobs/${job.id}/reschedule/${date}`, {
    method: 'DELETE', slug: session.slug, token: session.token,
  }));

  return (
    <div>
      <div className="page-header">
        <h2>Schedule</h2>
        <button className="secondary" onClick={onBack}>Back to jobs</button>
      </div>
      <div className="schedule-summary">
        <strong style={{ color: 'var(--text)' }}>{job.title}</strong> — {jobCustomerName(job)} · {formatSchedule(job)}
      </div>

      {error && <div className="error">{error}</div>}

      <div className="section-heading">Upcoming</div>
      <div className="list">
        {upcoming.length === 0 ? (
          <div className="list-empty">No upcoming occurrences. The series may be fully completed or past its end date.</div>
        ) : (
          upcoming.map((o) => (
            <ScheduleOccurrenceRow
              key={o.date}
              occurrence={o}
              busy={busy}
              onMarkComplete={onMarkComplete}
              onSkip={skip}
              onReschedule={reschedule}
              onCancelReschedule={cancelReschedule}
            />
          ))
        )}
      </div>

      {futureSkipped.length > 0 && (
        <>
          <div className="section-heading">Skipped</div>
          <div className="list">
            {futureSkipped.map((d) => (
              <div key={d} className="row">
                <div className="info"><div className="name">{formatDateString(d)}</div></div>
                <div className="actions">
                  <button className="secondary" disabled={busy} onClick={() => unskip(d)}>Restore</button>
                </div>
              </div>
            ))}
          </div>
        </>
      )}

      {completionHistory.length > 0 && (
        <>
          <div className="section-heading">Completion history</div>
          <div className="list">
            {completionHistory.map((c, i) => (
              <div key={`${c.date}-${i}`} className="row">
                <div className="info">
                  <div className="name">{formatDateString(c.date)}</div>
                  <div className="meta">by {c.completedByName}{c.note && <> — “{c.note}”</>}</div>
                </div>
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

function JobsView({ session }) {
  const [jobs, setJobs] = useState([]);
  const [customers, setCustomers] = useState([]);
  const [users, setUsers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [mode, setMode] = useState('list');
  const [editing, setEditing] = useState(null);
  const [busy, setBusy] = useState(false);
  const [completionInitialDate, setCompletionInitialDate] = useState(null);
  const [returnMode, setReturnMode] = useState('list');
  const [filter, setFilter] = useState('all');
  const [layout, setLayout] = useState('list');

  const canMutate = ['admin', 'lead'].includes(session.user.role);

  const refresh = useCallback(async () => {
    setLoading(true); setError(null);
    try {
      const [jobsData, customersData, usersData] = await Promise.all([
        apiRequest('/api/jobs', { slug: session.slug, token: session.token }),
        apiRequest('/api/customers', { slug: session.slug, token: session.token }),
        apiRequest('/api/auth/users', { slug: session.slug, token: session.token }),
      ]);
      setJobs(jobsData);
      setCustomers(customersData);
      setUsers(usersData);
    } catch (err) { setError(err.message); }
    finally { setLoading(false); }
  }, [session.slug, session.token]);

  useEffect(() => { refresh(); }, [refresh]);

  async function createJob(values) {
    setBusy(true); setError(null);
    try {
      await apiRequest('/api/jobs', {
        method: 'POST', slug: session.slug, token: session.token, body: values,
      });
      setMode('list');
      await refresh();
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  async function updateJob(values) {
    setBusy(true); setError(null);
    try {
      await apiRequest(`/api/jobs/${editing.id}`, {
        method: 'PUT', slug: session.slug, token: session.token, body: values,
      });
      setEditing(null); setMode('list');
      await refresh();
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  async function deleteJob(id) {
    if (!confirm('Delete this job?')) return;
    setError(null);
    try {
      await apiRequest(`/api/jobs/${id}`, {
        method: 'DELETE', slug: session.slug, token: session.token,
      });
      await refresh();
    } catch (err) { setError(err.message); }
  }

  async function completeJob(values) {
    setBusy(true); setError(null);
    try {
      const updated = await apiRequest(`/api/jobs/${editing.id}/complete`, {
        method: 'POST', slug: session.slug, token: session.token, body: values,
      });
      await refresh();
      if (returnMode === 'schedule') {
        setEditing(updated);
        setMode('schedule');
      } else {
        setEditing(null);
        setMode('list');
      }
      setReturnMode('list');
      setCompletionInitialDate(null);
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  function handleScheduleChange(updatedJob) {
    setEditing(updatedJob);
    return refresh();
  }

  function handleScheduleMarkComplete(date) {
    setCompletionInitialDate(date);
    setReturnMode('schedule');
    setMode('complete');
  }

  function userNames(ids) {
    return ids
      .map((id) => users.find((u) => u.id === id))
      .filter(Boolean)
      .map((u) => u.name || u.email)
      .join(', ');
  }

  if (mode === 'create') {
    return (
      <div>
        <div className="page-header"><h2>New job</h2></div>
        {error && <div className="error">{error}</div>}
        {customers.length === 0 ? (
          <div className="form-card">
            <p style={{ margin: 0, color: 'var(--text-muted)' }}>
              You need at least one customer before you can create a job. Add a customer first.
            </p>
            <div className="form-actions"><button className="secondary" onClick={() => setMode('list')}>Back</button></div>
          </div>
        ) : (
          <div className="form-card">
            <JobForm
              customers={customers}
              users={users}
              onSubmit={createJob}
              onCancel={() => { setError(null); setMode('list'); }}
              busy={busy}
            />
          </div>
        )}
      </div>
    );
  }

  if (mode === 'edit' && editing) {
    return (
      <div>
        <div className="page-header"><h2>Edit job</h2></div>
        {error && <div className="error">{error}</div>}
        <div className="form-card">
          <JobForm
            initial={editing}
            customers={customers}
            users={users}
            onSubmit={updateJob}
            onCancel={() => { setError(null); setEditing(null); setMode('list'); }}
            busy={busy}
          />
        </div>
      </div>
    );
  }

  if (mode === 'complete' && editing) {
    const cancelTarget = returnMode === 'schedule' ? 'schedule' : 'list';
    return (
      <div>
        <div className="page-header"><h2>Mark complete: {editing.title}</h2></div>
        {error && <div className="error">{error}</div>}
        <div className="form-card">
          <CompletionForm
            job={editing}
            initialDate={completionInitialDate}
            onSubmit={completeJob}
            onCancel={() => {
              setError(null);
              setCompletionInitialDate(null);
              setMode(cancelTarget);
              if (cancelTarget === 'list') setEditing(null);
              setReturnMode('list');
            }}
            busy={busy}
          />
        </div>
      </div>
    );
  }

  if (mode === 'schedule' && editing) {
    return (
      <JobScheduleView
        session={session}
        job={editing}
        onBack={() => { setEditing(null); setMode('list'); }}
        onMarkComplete={handleScheduleMarkComplete}
        onChange={handleScheduleChange}
      />
    );
  }

  function openMarkComplete(job, date) {
    setEditing(job);
    setCompletionInitialDate(date || null);
    setReturnMode('list');
    setMode('complete');
  }

  function openEdit(job) {
    setEditing(job);
    setMode(job.type === 'recurring' ? 'schedule' : 'edit');
  }

  const occurrences = expandJobsToOccurrences(jobs, filter);

  return (
    <div>
      <div className="page-header">
        <h2>Jobs</h2>
        {canMutate && (
          <button className="primary" onClick={() => { setError(null); setMode('create'); }}>+ New job</button>
        )}
      </div>
      <div className="filter-bar">
        <div className="chip-group">
          {['all', 'today', 'week', 'past'].map((f) => (
            <button
              key={f}
              className={`chip ${filter === f ? 'active' : ''}`}
              onClick={() => setFilter(f)}
            >
              {f === 'all' ? 'All' : f === 'today' ? 'Today' : f === 'week' ? 'Next 7 days' : 'Past due'}
            </button>
          ))}
        </div>
        <div className="toggle-group">
          <button className={layout === 'list' ? 'active' : ''} onClick={() => setLayout('list')}>List</button>
          <button className={layout === 'calendar' ? 'active' : ''} onClick={() => setLayout('calendar')}>Calendar</button>
        </div>
      </div>
      {error && <div className="error">{error}</div>}
      {layout === 'calendar' ? (
        loading ? (
          <div className="list-empty">Loading...</div>
        ) : (
          <CalendarView jobs={jobs} onChipClick={openEdit} />
        )
      ) : occurrences !== null ? (
        <div className="list">
          {loading ? (
            <div className="list-empty">Loading...</div>
          ) : occurrences.length === 0 ? (
            <div className="list-empty">No jobs match this filter.</div>
          ) : (
            occurrences.map((o, i) => (
              <OccurrenceRow
                key={`${o.job.id}-${o.date}-${i}`}
                occurrence={o}
                onMarkComplete={openMarkComplete}
                onEdit={openEdit}
              />
            ))
          )}
        </div>
      ) : (
      <div className="list">
        {loading ? (
          <div className="list-empty">Loading...</div>
        ) : jobs.length === 0 ? (
          <div className="list-empty">No jobs yet. {canMutate && 'Click "New job" to schedule the first one.'}</div>
        ) : (
          jobs.map((j) => {
            const isCompletedSingle = j.type === 'single' && j.status === 'completed';
            const nextDue = j.type === 'recurring' ? nextDueDate(j) : null;
            const last = lastCompletion(j);
            return (
              <div key={j.id} className="row">
                <div className="info">
                  <div className="name">
                    {j.title}
                    {j.default_price != null && <span className="price">{formatPrice(j.default_price)}</span>}
                  </div>
                  <div className="meta">
                    {jobCustomerName(j)} • {formatSchedule(j)}
                    {nextDue && <> • Next due: {formatDateString(nextDue)}</>}
                    {isCompletedSingle && <> • Completed {formatDateString(j.date)}</>}
                  </div>
                  {j.assigned_to && j.assigned_to.length > 0 && (
                    <div className="secondary-meta">Assigned: {userNames(j.assigned_to)}</div>
                  )}
                  {last && (
                    <div className="secondary-meta">
                      Last done: {formatDateString(last.date)} by {last.completedByName}
                      {last.note && <> — “{last.note}”</>}
                    </div>
                  )}
                </div>
                <div className="actions">
                  {j.type === 'recurring' && (
                    <button className="secondary" onClick={() => { setEditing(j); setMode('schedule'); }}>
                      Manage schedule
                    </button>
                  )}
                  {canMutate && (
                    <>
                      <button className="secondary" onClick={() => { setEditing(j); setMode('edit'); }}>Edit</button>
                      <button className="danger" onClick={() => deleteJob(j.id)}>Delete</button>
                    </>
                  )}
                </div>
              </div>
            );
          })
        )}
      </div>
      )}
    </div>
  );
}

function SettingsView({ session }) {
  const [settings, setSettings] = useState(null);
  const [form, setForm] = useState({});
  const [loading, setLoading] = useState(true);
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState(null);
  const [saved, setSaved] = useState(false);

  const isAdmin = session.user.role === 'admin';

  const load = useCallback(async () => {
    setLoading(true); setError(null);
    try {
      const data = await apiRequest('/api/settings', { slug: session.slug, token: session.token });
      setSettings(data);
      setForm({
        company_name: data.company_name || '',
        logo_url: data.logo_url || '',
        address: data.address || '',
        phone: data.phone || '',
        email: data.email || '',
        venmo_handle: data.venmo_handle || '',
        resend_from_email: data.resend_from_email || '',
        cloudinary_folder: data.cloudinary_folder || '',
      });
    } catch (err) { setError(err.message); }
    finally { setLoading(false); }
  }, [session.slug, session.token]);

  useEffect(() => { load(); }, [load]);

  function setField(key, value) {
    setForm((f) => ({ ...f, [key]: value }));
    setSaved(false);
  }

  async function submit(e) {
    e.preventDefault();
    setBusy(true); setError(null); setSaved(false);
    try {
      const updated = await apiRequest('/api/settings', {
        method: 'PUT', slug: session.slug, token: session.token, body: form,
      });
      setSettings(updated);
      setSaved(true);
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  if (loading) {
    return (
      <div>
        <div className="page-header"><h2>Settings</h2></div>
        <div className="list-empty">Loading...</div>
      </div>
    );
  }

  return (
    <div>
      <div className="page-header">
        <h2>Settings</h2>
        {!isAdmin && <span className="badge">Read-only</span>}
      </div>
      {error && <div className="error">{error}</div>}
      {saved && (
        <div className="error" style={{ background: '#e8f1ec', color: '#1f6f4a' }}>Saved.</div>
      )}
      <form onSubmit={submit} className="form-card">
        <div className="section-heading" style={{ marginTop: 0 }}>Company</div>
        <div className="form-grid">
          <div className="full">
            <label>Company name</label>
            <input value={form.company_name} onChange={(e) => setField('company_name', e.target.value)} disabled={!isAdmin} />
          </div>
          <div className="full">
            <label>Logo URL</label>
            <input value={form.logo_url} onChange={(e) => setField('logo_url', e.target.value)} placeholder="https://..." disabled={!isAdmin} />
          </div>
          <div className="full">
            <label>Address</label>
            <textarea value={form.address} onChange={(e) => setField('address', e.target.value)} disabled={!isAdmin} />
          </div>
          <div>
            <label>Phone</label>
            <input value={form.phone} onChange={(e) => setField('phone', e.target.value)} disabled={!isAdmin} />
          </div>
          <div>
            <label>Email</label>
            <input type="email" value={form.email} onChange={(e) => setField('email', e.target.value)} disabled={!isAdmin} />
          </div>
        </div>

        <div className="section-heading">Payments</div>
        <div className="form-grid">
          <div className="full">
            <label>Venmo handle <span className="hint">(without the @)</span></label>
            <input value={form.venmo_handle} onChange={(e) => setField('venmo_handle', e.target.value)} disabled={!isAdmin} />
          </div>
        </div>

        <div className="section-heading">Integrations</div>
        <div className="form-grid">
          <div>
            <label>Resend "from" email</label>
            <input type="email" value={form.resend_from_email} onChange={(e) => setField('resend_from_email', e.target.value)} placeholder="hello@yourdomain.com" disabled={!isAdmin} />
          </div>
          <div>
            <label>Cloudinary folder</label>
            <input value={form.cloudinary_folder} onChange={(e) => setField('cloudinary_folder', e.target.value)} placeholder="my-org/completions" disabled={!isAdmin} />
          </div>
        </div>

        {isAdmin && (
          <div className="form-actions">
            <button type="submit" className="primary" disabled={busy}>
              {busy ? 'Saving...' : 'Save settings'}
            </button>
          </div>
        )}
      </form>
    </div>
  );
}

function AppShell({ session, onLogout }) {
  const [view, setView] = useState('jobs');
  return (
    <div>
      <div className="topbar">
        <div className="brand">{session.organization.name}</div>
        <div className="right">
          <span className="user">{session.user.name || session.user.email}</span>
          <span className="badge">{session.user.role}</span>
          <button className="secondary" onClick={onLogout}>Sign out</button>
        </div>
      </div>
      <div className="nav">
        <button className={view === 'jobs' ? 'active' : ''} onClick={() => setView('jobs')}>Jobs</button>
        <button className={view === 'customers' ? 'active' : ''} onClick={() => setView('customers')}>Customers</button>
        <button className={view === 'settings' ? 'active' : ''} onClick={() => setView('settings')}>Settings</button>
      </div>
      <div className="content">
        {view === 'jobs' && <JobsView session={session} />}
        {view === 'customers' && <CustomersView session={session} />}
        {view === 'settings' && <SettingsView session={session} />}
      </div>
    </div>
  );
}

function App() {
  const [session, setSession] = useState(loadSession);
  function handleLogout() { clearSession(); setSession(null); }
  return session
    ? <AppShell session={session} onLogout={handleLogout} />
    : <AuthShell onSession={setSession} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
