    setBusy(true); setError(null);
    try {
      await apiRequest(`/api/booking-requests/${id}/decline`, {
        method: 'POST', slug: session.slug, token: session.token,
        body: { reason: declineReason },
      });
      setDecliningId(null); setDeclineReason('');
      await refresh();
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  async function destroy(id) {
    if (!confirm('Permanently delete this request? This cannot be undone.')) return;
    setBusy(true); setError(null);
    try {
      await apiRequest(`/api/booking-requests/${id}`, {
        method: 'DELETE', slug: session.slug, token: session.token,
      });
      await refresh();
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  return (
    <div>
      <div className="page-header">
        <h2>Requests</h2>
      </div>
      <p className="subtitle" style={{ marginTop: -8, marginBottom: 16 }}>
        Booking requests submitted by visitors to your public link. Accept to create a {terms.customerLower} and {terms.jobLower}.
      </p>
      <div className="form-card" style={{ marginBottom: 16 }}>
        <label style={{ marginTop: 0 }}>Your public booking link</label>
        <p className="hint" style={{ marginTop: 0, marginBottom: 8 }}>
          Share this URL on your website, social media, or business card so customers can submit booking requests.
        </p>
        <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
          <input
            readOnly
            value={`${window.location.origin}/book/${session.slug}`}
            style={{ flex: 1, fontFamily: 'ui-monospace, Menlo, monospace', fontSize: 13 }}
          />
          <CopyButton text={`${window.location.origin}/book/${session.slug}`} />
        </div>
      </div>
      <div className="filter-bar">
        <div className="chip-group">
          {['pending', 'accepted', 'declined', 'all'].map((f) => (
            <button key={f} className={`chip ${filter === f ? 'active' : ''}`} onClick={() => setFilter(f)}>
              {f.charAt(0).toUpperCase() + f.slice(1)}
            </button>
          ))}
        </div>
      </div>
      <PlanError error={error} session={session} />
      <div className="list">
        {loading ? (
          <div className="list-empty">Loading...</div>
        ) : requests.length === 0 ? (
          filter === 'pending' ? (
            <EmptyState
              icon="quotes"
              title="Share your booking link"
              body={`Paste it on your website, social, or a business card. When someone fills it out, the request lands here for you to accept — which auto-creates a ${terms.customerLower} and a ${terms.jobLower}.`}
              action={
                <CopyButton text={`${window.location.origin}/book/${session.slug}`} label="Copy booking link" />
              }
            />
          ) : (
            <div className="list-empty">No {filter} requests.</div>
          )
        ) : (
          requests.map((r) => (
            <div key={r.id} className="row">
              <div className="info" style={{ flex: 1 }}>
                <div className="name">
                  {r.requester_name}
                  <span className={`badge ${r.status}`} style={{ marginLeft: 10 }}>{r.status}</span>
                </div>
                <div className="meta">
                  {r.requester_email && <>{r.requester_email}</>}
                  {r.requester_email && r.requester_phone && ' · '}
                  {r.requester_phone}
                  {r.preferred_date && <> · Wants {r.preferred_date} ({r.preferred_time_window})</>}
                </div>
                <div className="secondary-meta" style={{ marginTop: 6, color: 'var(--text)' }}>
                  {r.service_description}
                </div>
                {r.requester_address && (
                  <div className="secondary-meta">📍 {r.requester_address}</div>
                )}
                {r.notes && (
                  <div className="secondary-meta">Notes: {r.notes}</div>
                )}
                <div className="secondary-meta" style={{ marginTop: 6, fontSize: 11 }}>
                  Received {new Date(r.created_at).toLocaleString()}
                </div>
                {r.status === 'declined' && r.declined_reason && (
                  <div className="secondary-meta" style={{ fontStyle: 'italic' }}>Decline note: {r.declined_reason}</div>
                )}
                {r.status === 'accepted' && r.created_job_id && (
                  <div className="secondary-meta">
                    Created <button className="link-button" onClick={() => navigate('/jobs')}>{terms.jobLower} ↗</button>
                  </div>
                )}
                {decliningId === r.id && (
                  <div style={{ marginTop: 10, padding: 12, background: 'var(--tinted)', borderRadius: 8 }}>
                    <label>Decline note <span className="hint">(internal, not sent to requester)</span></label>
                    <textarea value={declineReason} onChange={(e) => setDeclineReason(e.target.value)} rows={2} />
                    <div style={{ display: 'flex', gap: 8, marginTop: 8 }}>
                      <button className="danger" onClick={() => submitDecline(r.id)} disabled={busy}>Confirm decline</button>
                      <button className="secondary" onClick={() => { setDecliningId(null); setDeclineReason(''); }} disabled={busy}>Cancel</button>
                    </div>
                  </div>
                )}
              </div>
              {canMutate && (
                <div className="actions">
                  {r.status === 'pending' && (
                    <>
                      <button className="primary" onClick={() => accept(r.id)} disabled={busy}>Accept</button>
                      <button className="secondary" onClick={() => { setDecliningId(r.id); setDeclineReason(''); }} disabled={busy}>Decline</button>
                    </>
                  )}
                  {r.status !== 'pending' && session.user.role === 'admin' && (
                    <button className="danger" onClick={() => destroy(r.id)} disabled={busy}>Delete</button>
                  )}
                </div>
              )}
            </div>
          ))
        )}
      </div>
    </div>
  );
}

function CompletionForm({ job, initialDate, onSubmit, onCancel, busy }) {
  const defaultDate = initialDate || (job.type === 'single' && job.date ? job.date : formatYMD(new Date()));
  const [date, setDate] = useState(defaultDate);
  const [note, setNote] = useState('');

  function submit(e) {
    e.preventDefault();
    onSubmit({ date, note: note || null });
  }

  return (
    <form onSubmit={submit}>
      <div className="form-grid">
        <div className="full">
          <label>Date completed</label>
          <input type="date" value={date} onChange={(e) => setDate(e.target.value)} required />
        </div>
        <div className="full">
          <label>Note <span className="hint">(optional)</span></label>
          <textarea value={note} onChange={(e) => setNote(e.target.value)} placeholder="Anything worth recording about this visit?" />
        </div>
      </div>
      <div className="form-actions">
        <button type="submit" className="primary" disabled={busy}>
          {busy ? 'Saving...' : 'Mark complete'}
        </button>
        <button type="button" className="secondary" onClick={onCancel} disabled={busy}>Cancel</button>
      </div>
    </form>
  );
}

function OccurrenceRow({ occurrence, onMarkComplete, onEdit }) {
  const smsTemplates = useSmsTemplates();
  const d = parseDate(occurrence.date);
  const dayName = d.toLocaleDateString(undefined, { weekday: 'short' });
  const monthName = d.toLocaleDateString(undefined, { month: 'short' });
  const isToday = occurrence.date === formatYMD(todayStart());
  const isOverdue = !occurrence.completed && occurrence.date < formatYMD(todayStart());
  const phone = occurrence.job.customer_phone;
  const showSms = phone && smsTemplates.length > 0 && !occurrence.completed;
  const classes = ['occurrence-row'];
  if (occurrence.completed) classes.push('completed');
  if (isToday) classes.push('today');

  return (
    <div className={classes.join(' ')}>
      <div className="date">
        <div className="day">{dayName} {monthName}</div>
        <div className="num">{d.getDate()}</div>
      </div>
      <div className="body">
        <div className="title">
          {occurrence.job.title}
          {occurrence.job.default_price != null && <span className="price">{formatPrice(occurrence.job.default_price)}</span>}
        </div>
        <div className="meta">
          {jobCustomerName(occurrence.job)}
          {formatTimeRange(occurrence.job.start_time, occurrence.job.duration_minutes) && (
            <> · {formatTimeRange(occurrence.job.start_time, occurrence.job.duration_minutes)}</>
          )}
          {isOverdue && <> · <span style={{ color: 'var(--danger)', fontWeight: 500 }}>Overdue</span></>}
          {occurrence.completed && <> · Completed</>}
          {occurrence.rescheduledFrom && <> · Rescheduled from {formatDateString(occurrence.rescheduledFrom)}</>}
        </div>
      </div>
      <div className="actions">
        {showSms && (
          <select
            className="row-sms"
            onClick={(e) => e.stopPropagation()}
            onChange={(e) => {
              const tpl = smsTemplates.find((t) => t.id === e.target.value);
              if (tpl) sendSmsTemplate(phone, tpl, occurrence.job);
              e.target.value = '';
            }}
            defaultValue=""
          >
            <option value="" disabled>💬 Text…</option>
            {smsTemplates.map((t) => (
              <option key={t.id} value={t.id}>{t.label}</option>
            ))}
          </select>
        )}
        {!occurrence.completed && (
          <button className="primary" onClick={() => onMarkComplete(occurrence.job, occurrence.date)}>Mark complete</button>
        )}
        <button className="secondary" onClick={() => onEdit(occurrence.job)}>Open</button>
      </div>
    </div>
  );
}

function CalendarView({ jobs, onChipClick, onMarkComplete, smsTemplates = [] }) {
  const terms = useTerms();
  const today = todayStart();
  const todayStr = formatYMD(today);
  const [view, setView] = useState('day');
  const [selectedDate, setSelectedDate] = useState(todayStr);
  const [monthOffset, setMonthOffset] = useState(0);

  function shiftDay(delta) {
    const cur = new Date(selectedDate + 'T00:00:00');
    cur.setDate(cur.getDate() + delta);
    setSelectedDate(formatYMD(cur));
  }
  function shiftWeek(delta) { shiftDay(delta * 7); }
  function jumpToToday() {
    setSelectedDate(todayStr);
    setMonthOffset(0);
  }

  // Compute week start (Sunday) for the selected date.
  const weekStartDate = (() => {
    const d = new Date(selectedDate + 'T00:00:00');
    d.setDate(d.getDate() - d.getDay());
    return d;
  })();
  const weekDays = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(weekStartDate);
    d.setDate(d.getDate() + i);
    weekDays.push(d);
  }
  const weekStartStr = formatYMD(weekStartDate);
  const weekEndStr = formatYMD(weekDays[6]);

  // Month range for the month view.
  const viewMonth = addMonths(today, monthOffset);
  const monthStart = new Date(viewMonth.getFullYear(), viewMonth.getMonth(), 1);
  const monthEnd = new Date(viewMonth.getFullYear(), viewMonth.getMonth() + 1, 0);
  const monthStartStr = formatYMD(monthStart);
  const monthEndStr = formatYMD(monthEnd);
  const monthByDate = {};
  jobs.forEach((j) => {
    jobOccurrencesInRange(j, monthStartStr, monthEndStr).forEach((o) => {
      (monthByDate[o.date] = monthByDate[o.date] || []).push(o);
    });
  });

  const dayOccurrences = (() => {
    if (view !== 'day') return [];
    const out = [];
    jobs.forEach((j) => {
      jobOccurrencesInRange(j, selectedDate, selectedDate).forEach((o) => out.push(o));
    });
    return out.sort((a, b) => {
      const ta = a.job.start_time || '99:99';
      const tb = b.job.start_time || '99:99';
      return ta.localeCompare(tb);
    });
  })();

  const weekByDate = (() => {
    if (view !== 'week') return {};
    const map = {};
    jobs.forEach((j) => {
      jobOccurrencesInRange(j, weekStartStr, weekEndStr).forEach((o) => {
        (map[o.date] = map[o.date] || []).push(o);
      });
    });
    Object.keys(map).forEach((k) => {
      map[k].sort((a, b) => (a.job.start_time || '99:99').localeCompare(b.job.start_time || '99:99'));
    });
    return map;
  })();

  const selectedDateLabel = (() => {
    const d = new Date(selectedDate + 'T00:00:00');
    return d.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });
  })();
  const weekRangeLabel = (() => {
    const s = weekDays[0], e = weekDays[6];
    const sameMonth = s.getMonth() === e.getMonth();
    const sMo = s.toLocaleDateString(undefined, { month: 'short' });
    const eMo = e.toLocaleDateString(undefined, { month: 'short' });
    return sameMonth
      ? `${sMo} ${s.getDate()} – ${e.getDate()}, ${e.getFullYear()}`
      : `${sMo} ${s.getDate()} – ${eMo} ${e.getDate()}, ${e.getFullYear()}`;
  })();

  return (
    <div>
      <div className="cal-mode-row">
        <div className="toggle-group cal-mode-toggle">
          <button className={view === 'day' ? 'active' : ''} onClick={() => setView('day')}>Day</button>
          <button className={view === 'week' ? 'active' : ''} onClick={() => setView('week')}>Week</button>
          <button className={view === 'month' ? 'active' : ''} onClick={() => setView('month')}>Month</button>
        </div>
        {view === 'day' && (
          <div className="cal-day-nav">
            <button className="secondary" onClick={() => shiftDay(-1)} aria-label="Previous day">←</button>
            <input
              type="date" value={selectedDate}
              onChange={(e) => setSelectedDate(e.target.value)}
              className="cal-day-picker"
            />
            <button className="secondary" onClick={() => shiftDay(1)} aria-label="Next day">→</button>
            {selectedDate !== todayStr && (
              <button className="secondary" onClick={jumpToToday}>Today</button>
            )}
          </div>
        )}
        {view === 'week' && (
          <div className="cal-day-nav">
            <button className="secondary" onClick={() => shiftWeek(-1)} aria-label="Previous week">←</button>
            <span className="cal-week-label">{weekRangeLabel}</span>
            <button className="secondary" onClick={() => shiftWeek(1)} aria-label="Next week">→</button>
            {selectedDate !== todayStr && (
              <button className="secondary" onClick={jumpToToday}>Today</button>
            )}
          </div>
        )}
      </div>

      {view === 'day' && (
        <>
          <div className="cal-day-header">
            <h3>{selectedDateLabel}</h3>
            <span className="cal-day-count">
              {dayOccurrences.length} {dayOccurrences.length === 1 ? terms.jobLower : terms.jobsLower}
            </span>
          </div>
          <DayTimeGrid
            occurrences={dayOccurrences}
            isToday={selectedDate === todayStr}
            onOpen={onChipClick}
            onMarkComplete={onMarkComplete}
            smsTemplates={smsTemplates}
          />
        </>
      )}

      {view === 'week' && (
        <CalendarWeekGrid
          weekDays={weekDays}
          weekByDate={weekByDate}
          todayStr={todayStr}
          selectedDate={selectedDate}
          onSelectDate={(d) => { setSelectedDate(d); setView('day'); }}
          onOpen={onChipClick}
        />
      )}

      {view === 'month' && (
        <CalendarMonthGrid
          today={today}
          todayStr={todayStr}
          viewMonth={viewMonth}
          monthByDate={monthByDate}
          selectedDate={selectedDate}
          setSelectedDate={setSelectedDate}
          monthOffset={monthOffset}
          setMonthOffset={setMonthOffset}
          onChipClick={onChipClick}
          onMarkComplete={onMarkComplete}
        />
      )}
    </div>
  );
}

function formatHourLabel(h) {
  if (h === 0) return '12 AM';
  if (h === 12) return 'Noon';
  if (h < 12) return `${h} AM`;
  return `${h - 12} PM`;
}

function customerFirstName(c) {
  if (!c) return '';
  if (c.customer_first_name) return c.customer_first_name;
  if (c.customer_business_name) return c.customer_business_name;
  return 'there';
}

function sendSmsTemplate(phone, template, customer) {
  if (!phone || !template) return;
  const cleanPhone = String(phone).replace(/\D/g, '');
  const msg = String(template.message || '').replace(/\{name\}/g, customerFirstName(customer));
  // iOS uses ?body=, Android wants &body=. Most platforms accept both.
  window.open(`sms:${cleanPhone}?body=${encodeURIComponent(msg)}`);
}

function DayTimeGrid({ occurrences, isToday, onOpen, onMarkComplete, smsTemplates = [] }) {
  const terms = useTerms();
  const jobsLowerLabel = terms.jobsLower;
  const untimed = occurrences.filter((o) => !o.job.start_time);
  const timed = occurrences.filter((o) => o.job.start_time);

  let startHour = 7;
  let endHour = 19;
  timed.forEach((o) => {
    const [h] = o.job.start_time.split(':').map(Number);
    if (h < startHour) startHour = Math.max(0, h);
    const durMin = o.job.duration_minutes || 60;
    const endH = h + Math.ceil(durMin / 60);
    if (endH > endHour) endHour = Math.min(24, endH);
  });
  const hours = [];
  for (let h = startHour; h <= endHour; h++) hours.push(h);
  const PX_PER_HOUR = 56;

  function timeToY(timeStr) {
    const [h, m] = timeStr.split(':').map(Number);
    return (h - startHour) * PX_PER_HOUR + (m / 60) * PX_PER_HOUR;
  }

  // "Now" line for today.
  let nowY = null;
  if (isToday) {
    const now = new Date();
    const hh = now.getHours();
    if (hh >= startHour && hh <= endHour) {
      nowY = (hh - startHour) * PX_PER_HOUR + (now.getMinutes() / 60) * PX_PER_HOUR;
    }
  }

  return (
    <div className="day-grid">
      {untimed.length > 0 && (
        <div className="day-untimed-section">
          <div className="day-untimed-header">No time set · {untimed.length} {untimed.length === 1 ? terms.jobLower : terms.jobsLower}</div>
          <div className="day-untimed-list">
            {untimed.map((o, i) => {
              const phone = o.job.customer_phone;
              const showSms = phone && smsTemplates.length > 0 && !o.completed;
              return (
                <div key={i} className={`day-untimed-block${o.completed ? ' completed' : ''}`} onClick={() => onOpen(o.job)}>
                  <div className="day-untimed-main">
                    <div className="day-untimed-title">{o.job.title}</div>
                    <div className="day-untimed-customer">{jobCustomerName(o.job)}</div>
                  </div>
                  <div className="day-untimed-meta">
                    {o.job.default_price != null && (
                      <div className="day-untimed-price">{formatPrice(o.job.default_price)}</div>
                    )}
                    <div className="day-untimed-actions">
                      {showSms && (
                        <select
                          className="day-untimed-sms"
                          onClick={(e) => e.stopPropagation()}
                          onChange={(e) => {
                            const tpl = smsTemplates.find((t) => t.id === e.target.value);
                            if (tpl) sendSmsTemplate(phone, tpl, o.job);
                            e.target.value = '';
                          }}
                          defaultValue=""
                        >
                          <option value="" disabled>💬 Text…</option>
                          {smsTemplates.map((t) => (
                            <option key={t.id} value={t.id}>{t.label}</option>
                          ))}
                        </select>
                      )}
                      {!o.completed && (
                        <button
                          className="day-untimed-complete"
                          onClick={(e) => { e.stopPropagation(); onMarkComplete(o.job, o.date); }}
                        >Mark complete</button>
                      )}
                      {o.completed && (
                        <span className="day-untimed-done-pill">Completed</span>
                      )}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
      {timed.length === 0 && untimed.length === 0 ? (
        <div className="list-empty" style={{ borderRadius: 0 }}>No {jobsLowerLabel} scheduled for this day.</div>
      ) : (
        <div className="day-grid-body">
          <div className="day-grid-hours" style={{ height: hours.length * PX_PER_HOUR }}>
            {hours.map((h) => (
              <div key={h} className="day-grid-hour" style={{ height: PX_PER_HOUR }}>
                <span className="day-grid-hour-label">{formatHourLabel(h)}</span>
              </div>
            ))}
          </div>
          <div className="day-grid-blocks" style={{ height: hours.length * PX_PER_HOUR }}>
            {hours.map((h) => (
              <div key={h} className="day-grid-lane" style={{ height: PX_PER_HOUR }} />
            ))}
            {nowY !== null && (
              <div className="day-grid-now" style={{ top: nowY }}>
                <span className="day-grid-now-dot" />
                <span className="day-grid-now-line" />
              </div>
            )}
            {timed.map((o, i) => {
              const top = timeToY(o.job.start_time);
              const phone = o.job.customer_phone;
              const showSms = phone && smsTemplates.length > 0 && !o.completed;
              // Reserve enough block height when SMS select is present so it
              // never gets clipped. Short jobs visually expand to fit.
              const minH = showSms ? 100 : 32;
              const height = Math.max(minH, ((o.job.duration_minutes || 60) / 60) * PX_PER_HOUR - 4);
              return (
                <div
                  key={i}
                  className={`day-block${o.completed ? ' completed' : ''}`}
                  style={{ top, height }}
                  onClick={() => onOpen(o.job)}
                >
                  <div className="day-block-head">
                    <span className="day-block-time">{formatTimeOfDay(o.job.start_time)}</span>
                    {o.job.default_price != null && <span className="day-block-price">{formatPrice(o.job.default_price)}</span>}
                  </div>
                  <div className="day-block-title">{o.job.title}</div>
                  {(height >= 56 || showSms || !o.completed) && (
                    <div className="day-block-bottom">
                      {height >= 56 && (
                        <div className="day-block-customer">{jobCustomerName(o.job)}</div>
                      )}
                      {(showSms || !o.completed) && (
                        <div className="day-block-actions">
                          {showSms && (
                            <select
                              className="day-block-sms"
                              onClick={(e) => e.stopPropagation()}
                              onChange={(e) => {
                                const tpl = smsTemplates.find((t) => t.id === e.target.value);
                                if (tpl) sendSmsTemplate(phone, tpl, o.job);
                                e.target.value = '';
                              }}
                              defaultValue=""
                            >
                              <option value="" disabled>💬 Text…</option>
                              {smsTemplates.map((t) => (
                                <option key={t.id} value={t.id}>{t.label}</option>
                              ))}
                            </select>
                          )}
                          {!o.completed && (
                            <button
                              className="day-block-complete"
                              onClick={(e) => { e.stopPropagation(); onMarkComplete(o.job, o.date); }}
                            >Mark complete</button>
                          )}
                        </div>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

function CalendarWeekGrid({ weekDays, weekByDate, todayStr, selectedDate, onSelectDate, onOpen }) {
  return (
    <div className="week-grid">
      {weekDays.map((d) => {
        const dateStr = formatYMD(d);
        const occs = weekByDate[dateStr] || [];
        const isToday = dateStr === todayStr;
        const isSelected = dateStr === selectedDate;
        return (
          <div key={dateStr} className={`week-col${isToday ? ' today' : ''}${isSelected ? ' selected' : ''}`}>
            <button className="week-col-head" onClick={() => onSelectDate(dateStr)}>
              <span className="week-col-dow">{d.toLocaleDateString(undefined, { weekday: 'short' })}</span>
              <span className="week-col-num">{d.getDate()}</span>
            </button>
            <div className="week-col-body">
              {occs.length === 0 ? (
                <div className="week-col-empty">—</div>
              ) : (
                occs.map((o, i) => (
                  <button
                    key={i}
                    className={`week-pill${o.completed ? ' done' : ''}`}
                    onClick={() => onOpen(o.job)}
                  >
                    <span className="week-pill-time">
                      {o.job.start_time ? formatTimeOfDay(o.job.start_time) : 'Anytime'}
                    </span>
                    <span className="week-pill-title">{o.job.title}</span>
                    <span className="week-pill-customer">{jobCustomerName(o.job)}</span>
                  </button>
                ))
              )}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function CalendarMonthGrid({ today, todayStr, viewMonth, monthByDate, selectedDate, setSelectedDate, monthOffset, setMonthOffset, onChipClick, onMarkComplete }) {
  const terms = useTerms();
  const monthStart = new Date(viewMonth.getFullYear(), viewMonth.getMonth(), 1);
  const monthEnd = new Date(viewMonth.getFullYear(), viewMonth.getMonth() + 1, 0);
  const firstDayOfWeek = monthStart.getDay();
  const daysInMonth = monthEnd.getDate();
  const cells = [];
  for (let i = 0; i < firstDayOfWeek; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);
  const monthLabel = viewMonth.toLocaleString(undefined, { month: 'long', year: 'numeric' });
  const dows = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  const selectedOccurrences = selectedDate ? (monthByDate[selectedDate] || []) : [];

  return (
    <>
      <div className="calendar">
        <div className="cal-nav">
          <button className="secondary" onClick={() => setMonthOffset(monthOffset - 1)}>← Prev</button>
          <span className="cal-month">{monthLabel}</span>
          <button className="secondary" onClick={() => setMonthOffset(monthOffset + 1)}>Next →</button>
        </div>
        <div className="cal-grid">
          {dows.map((dow) => <div key={dow} className="cal-dow">{dow}</div>)}
          {cells.map((d, i) => {
            if (d === null) return <div key={i} className="cal-cell empty"></div>;
            const dateStr = `${viewMonth.getFullYear()}-${String(viewMonth.getMonth() + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const occs = monthByDate[dateStr] || [];
            const isToday = dateStr === todayStr;
            const isSelected = dateStr === selectedDate;
            const classes = ['cal-cell'];
            if (isToday) classes.push('today');
            if (isSelected) classes.push('selected');
            return (
              <div key={i} className={classes.join(' ')} onClick={() => setSelectedDate(dateStr)}>
                <div className="cal-date">{d}</div>
                {occs.slice(0, 3).map((o, j) => (
                  <div
                    key={j}
                    className={`cal-chip ${o.completed ? 'done' : ''}`}
                    title={`${o.job.title} — ${jobCustomerName(o.job)}`}
                    onClick={(e) => { e.stopPropagation(); onChipClick(o.job); }}
                  >
                    {o.job.title}
                  </div>
                ))}
                {occs.length > 3 && <div className="cal-more">+{occs.length - 3} more</div>}
              </div>
            );
          })}
        </div>
      </div>

      {selectedDate && (
        <>
          <div className="section-heading">
            {formatDateString(selectedDate)}
            <span style={{ color: 'var(--text-muted)', fontWeight: 400, marginLeft: 8 }}>
              ({selectedOccurrences.length} {selectedOccurrences.length === 1 ? terms.jobLower : terms.jobsLower})
            </span>
          </div>
          <div className="list">
            {selectedOccurrences.length === 0 ? (
              <div className="list-empty">No {terms.jobsLower} scheduled.</div>
            ) : (
              selectedOccurrences.map((o, i) => (
                <OccurrenceRow
                  key={`${o.job.id}-${o.date}-${i}`}
                  occurrence={o}
                  onMarkComplete={onMarkComplete}
                  onEdit={onChipClick}
                />
              ))
            )}
          </div>
        </>
      )}
    </>
  );
}

function ScheduleOccurrenceRow({ occurrence, busy, onMarkComplete, onSkip, onReschedule, onCancelReschedule }) {
  const [editing, setEditing] = useState(false);
  const [newDate, setNewDate] = useState(occurrence.date);

  if (editing) {
    return (
      <div className="row">
        <div className="info">
          <div className="name">Reschedule {formatDateString(occurrence.date)}</div>
          <div className="meta">Pick a new date</div>
        </div>
        <div className="actions inline-form">
          <input type="date" value={newDate} onChange={(e) => setNewDate(e.target.value)} />
          <button
            className="primary"
            disabled={busy || newDate === occurrence.date || !newDate}
            onClick={async () => {
              await onReschedule(occurrence.date, newDate);
              setEditing(false);
            }}
          >Save</button>
          <button className="secondary" onClick={() => setEditing(false)} disabled={busy}>Cancel</button>
        </div>
      </div>
    );
  }

  return (
    <div className="row">
      <div className="info">
        <div className="name">{formatDateString(occurrence.date)}</div>
        {occurrence.rescheduledFrom && (
          <div className="meta">Rescheduled from {formatDateString(occurrence.rescheduledFrom)}</div>
        )}
      </div>
      <div className="actions">
        <button className="primary" disabled={busy} onClick={() => onMarkComplete(occurrence.date)}>
          Mark complete
        </button>
        <button className="secondary" disabled={busy} onClick={() => onSkip(occurrence.date)}>Skip</button>
        {occurrence.rescheduledFrom ? (
          <button className="secondary" disabled={busy} onClick={() => onCancelReschedule(occurrence.rescheduledFrom)}>
            Undo reschedule
          </button>
        ) : (
          <button className="secondary" disabled={busy} onClick={() => setEditing(true)}>Reschedule</button>
        )}
      </div>
    </div>
  );
}

function JobScheduleView({ session, job, onBack, onMarkComplete, onChange, features = { invoices: true } }) {
  const terms = useTerms();
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState(null);
  const [page, setPage] = useState(0);
  const [showInvoiceForm, setShowInvoiceForm] = useState(false);
  const [invoiceFrom, setInvoiceFrom] = useState(formatYMD(new Date(todayStart().getFullYear(), todayStart().getMonth(), 1)));
  const [invoiceTo, setInvoiceTo] = useState(formatYMD(todayStart()));
  const [generateBusy, setGenerateBusy] = useState(false);
  const [generateResult, setGenerateResult] = useState(null);
  const PAGE_SIZE = 8;

  const canMutate = ['admin', 'lead'].includes(session.user.role);

  const allUpcoming = computeOccurrences(job, todayStart(), 730).filter((o) => !o.completed);
  const totalPages = Math.max(1, Math.ceil(allUpcoming.length / PAGE_SIZE));
  const safePage = Math.min(page, totalPages - 1);
  const upcoming = allUpcoming.slice(safePage * PAGE_SIZE, (safePage + 1) * PAGE_SIZE);
  const firstIndex = allUpcoming.length === 0 ? 0 : safePage * PAGE_SIZE + 1;
  const lastIndex = Math.min(allUpcoming.length, (safePage + 1) * PAGE_SIZE);

  useEffect(() => {
    if (page > 0 && page > totalPages - 1) setPage(Math.max(0, totalPages - 1));
  }, [page, totalPages]);

  const todayStr = formatYMD(todayStart());
  const futureSkipped = (job.skipped_dates || []).filter((d) => d >= todayStr).sort();
  const completionHistory = (job.completion_notes || [])
    .map((c, idx) => ({ ...c, _idx: idx }))
    .sort((a, b) => b.date.localeCompare(a.date));
  const [editingCompletionIdx, setEditingCompletionIdx] = useState(null);
  const [editedNote, setEditedNote] = useState('');

  async function call(fn) {
    setBusy(true); setError(null);
    try {
      const updated = await fn();
      await onChange(updated);
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  const skip = (date) => call(() => apiRequest(`/api/jobs/${job.id}/skip`, {
    method: 'POST', slug: session.slug, token: session.token, body: { date },
  }));
  const unskip = (date) => call(() => apiRequest(`/api/jobs/${job.id}/skip/${date}`, {
    method: 'DELETE', slug: session.slug, token: session.token,
  }));
  const reschedule = (date, new_date) => call(() => apiRequest(`/api/jobs/${job.id}/reschedule`, {
    method: 'POST', slug: session.slug, token: session.token, body: { date, new_date },
  }));
  const cancelReschedule = (date) => call(() => apiRequest(`/api/jobs/${job.id}/reschedule/${date}`, {
    method: 'DELETE', slug: session.slug, token: session.token,
  }));

  function saveCompletionEdit(idx) {
    return call(() => apiRequest(`/api/jobs/${job.id}/completions/${idx}`, {
      method: 'PUT', slug: session.slug, token: session.token,
      body: { note: editedNote },
    })).then(() => { setEditingCompletionIdx(null); setEditedNote(''); });
  }

  function deleteCompletion(idx, date) {
    if (!confirm(`Delete the completion entry for ${formatDateString(date)}?`)) return;
    return call(() => apiRequest(`/api/jobs/${job.id}/completions/${idx}`, {
      method: 'DELETE', slug: session.slug, token: session.token,
    }));
  }

  async function generateInvoice() {
    setGenerateBusy(true); setError(null); setGenerateResult(null);
    try {
      const inv = await apiRequest(`/api/jobs/${job.id}/generate-invoice`, {
        method: 'POST', slug: session.slug, token: session.token,
        body: { from: invoiceFrom, to: invoiceTo },
      });
      setGenerateResult(inv);
      setShowInvoiceForm(false);
    } catch (err) { setError(err.message); }
    finally { setGenerateBusy(false); }
  }

  const completionsInRange = (job.completed_dates || []).filter((d) => d >= invoiceFrom && d <= invoiceTo);
  const projectedTotal = completionsInRange.length * (parseFloat(job.default_price) || 0);

  return (
    <div>
      <div className="page-header">
        <h2>Schedule</h2>
        <button className="secondary" onClick={onBack}>Back to {terms.jobsLower}</button>
      </div>
      <div className="schedule-summary">
        <strong style={{ color: 'var(--text)' }}>{job.title}</strong> — {jobCustomerName(job)} · {formatSchedule(job)}
        {canMutate && features.invoices && (
          <div style={{ marginTop: 10 }}>
            <button className="secondary" onClick={() => { setShowInvoiceForm((v) => !v); setGenerateResult(null); }}>
              {showInvoiceForm ? 'Hide invoice generator' : 'Generate invoice from completions'}
            </button>
          </div>
        )}
      </div>

      {showInvoiceForm && (
        <div className="form-card">
          <div className="section-heading" style={{ marginTop: 0 }}>Bill completed visits</div>
          <div className="form-grid">
            <div>
              <label>From</label>
              <input type="date" value={invoiceFrom} onChange={(e) => setInvoiceFrom(e.target.value)} />
            </div>
            <div>
              <label>To</label>
              <input type="date" value={invoiceTo} onChange={(e) => setInvoiceTo(e.target.value)} />
            </div>
          </div>
          <p className="subtitle" style={{ marginTop: 14, marginBottom: 0 }}>
            {completionsInRange.length === 0 ? (
              <>No completed visits in this range.</>
            ) : (
              <>{completionsInRange.length} completed visit{completionsInRange.length === 1 ? '' : 's'} @ {formatPrice(parseFloat(job.default_price) || 0)} = <strong style={{ color: 'var(--text)' }}>{formatPrice(projectedTotal)}</strong></>
            )}
          </p>
          <div className="form-actions">
            <button
              className="primary"
              disabled={generateBusy || completionsInRange.length === 0}
              onClick={generateInvoice}
            >
              {generateBusy ? 'Generating...' : `Create draft invoice`}
            </button>
            <button className="secondary" onClick={() => setShowInvoiceForm(false)} disabled={generateBusy}>Cancel</button>
          </div>
        </div>
      )}

      {generateResult && (
        <div className="error" style={{ background: '#e8f1ec', color: '#1f6f4a' }}>
          Created invoice #{generateResult.invoice_number} with {generateResult.line_items.length} line items. Switch to the Invoices tab to review and send.
        </div>
      )}

      {error && <div className="error">{error}</div>}

      <div className="section-heading">Upcoming</div>
      <div className="list">
        {upcoming.length === 0 ? (
          <div className="list-empty">No upcoming occurrences. The series may be fully completed or past its end date.</div>
        ) : (
          upcoming.map((o) => (
            <ScheduleOccurrenceRow
              key={o.date}
              occurrence={o}
              busy={busy}
              onMarkComplete={onMarkComplete}
              onSkip={skip}
              onReschedule={reschedule}
              onCancelReschedule={cancelReschedule}
            />
          ))
        )}
      </div>
      {allUpcoming.length > PAGE_SIZE && (
        <div className="pager">
          <button className="secondary" onClick={() => setPage(safePage - 1)} disabled={safePage === 0}>← Prev</button>
          <span className="info">Showing {firstIndex}–{lastIndex} of {allUpcoming.length}</span>
          <button className="secondary" onClick={() => setPage(safePage + 1)} disabled={safePage >= totalPages - 1}>Next →</button>
        </div>
      )}

      {futureSkipped.length > 0 && (
        <>
          <div className="section-heading">Skipped</div>
          <div className="list">
            {futureSkipped.map((d) => (
              <div key={d} className="row">
                <div className="info"><div className="name">{formatDateString(d)}</div></div>
                <div className="actions">
                  <button className="secondary" disabled={busy} onClick={() => unskip(d)}>Restore</button>
                </div>
              </div>
            ))}
          </div>
        </>
      )}

      {completionHistory.length > 0 && (
        <>
          <div className="section-heading">Completion history</div>
          <div className="list">
            {completionHistory.map((c) => {
              const isEditing = editingCompletionIdx === c._idx;
              return (
                <div key={`${c.date}-${c._idx}`} className="row">
                  <div className="info">
                    <div className="name">{formatDateString(c.date)}</div>
                    {isEditing ? (
                      <div className="meta" style={{ marginTop: 6, display: 'flex', gap: 8 }}>
                        <input
                          value={editedNote}
                          onChange={(e) => setEditedNote(e.target.value)}
                          placeholder="Note (or leave empty to clear)"
                          style={{ flex: 1 }}
                        />
                      </div>
                    ) : (
                      <div className="meta">by {c.completedByName}{c.note && <> — “{c.note}”</>}</div>
                    )}
                  </div>
                  {canMutate && (
                    <div className="actions">
                      {isEditing ? (
                        <>
                          <button className="primary" disabled={busy} onClick={() => saveCompletionEdit(c._idx)}>Save</button>
                          <button className="secondary" disabled={busy} onClick={() => { setEditingCompletionIdx(null); setEditedNote(''); }}>Cancel</button>
                        </>
                      ) : (
                        <>
                          <button className="secondary" onClick={() => { setEditingCompletionIdx(c._idx); setEditedNote(c.note || ''); }}>Edit note</button>
                          <button className="danger" disabled={busy} onClick={() => deleteCompletion(c._idx, c.date)}>Delete</button>
                        </>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </>
      )}
    </div>
  );
}

function JobsView({ session, features = { invoices: true }, planContext, smsTemplates = [] }) {
  const [firstJobToast, setFirstJobToast] = useState(false);
  const terms = useTerms();
  const atCap = planContext && planContext.atCap;
  const [jobs, setJobs] = useState([]);
  const [customers, setCustomers] = useState([]);
  const [users, setUsers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [mode, setMode] = useState('list');
  const [editing, setEditing] = useState(null);
  const [busy, setBusy] = useState(false);
  const [completionInitialDate, setCompletionInitialDate] = useState(null);
  const [returnMode, setReturnMode] = useState('list');
  const [layout, setLayout] = useState('calendar');
  const [search, setSearch] = useState('');
  const [sort, setSort] = useState('newest');

  const canMutate = ['admin', 'lead'].includes(session.user.role);

  function exportJobs() {
    const headers = ['title', 'customer', 'type', 'schedule', 'default_price', 'status', 'description'];
    const rows = jobs.map((j) => [
      j.title, jobCustomerName(j), j.type, formatSchedule(j),
      j.default_price, j.status, j.description,
    ]);
    downloadCSV(`jobs-${formatYMD(new Date())}.csv`, headers, rows);
  }

  const refresh = useCallback(async () => {
    setLoading(true); setError(null);
    try {
      const [jobsData, customersData, usersData] = await Promise.all([
        apiRequest('/api/jobs', { slug: session.slug, token: session.token }),
        apiRequest('/api/customers', { slug: session.slug, token: session.token }),
        apiRequest('/api/auth/users', { slug: session.slug, token: session.token }),
      ]);
      setJobs(jobsData);
      setCustomers(customersData);
      setUsers(usersData);
    } catch (err) { setError(err.message); }
    finally { setLoading(false); }
  }, [session.slug, session.token]);

  useEffect(() => { refresh(); }, [refresh]);

  async function createJob(values) {
    setBusy(true); setError(null);
    const wasFirst = jobs.length === 0;
    try {
      await apiRequest('/api/jobs', {
        method: 'POST', slug: session.slug, token: session.token, body: values,
      });
      setMode('list');
      await refresh();
      if (wasFirst) {
        const seenKey = `fm_first_job_seen_${session.organization && session.organization.id}`;
        try {
          if (!localStorage.getItem(seenKey)) {
            localStorage.setItem(seenKey, '1');
            setFirstJobToast(true);
            setTimeout(() => setFirstJobToast(false), 6500);
          }
        } catch (e) {}
      }
    } catch (err) { setError(err); }
    finally { setBusy(false); }
  }

  async function updateJob(values) {
    setBusy(true); setError(null);
    try {
      await apiRequest(`/api/jobs/${editing.id}`, {
        method: 'PUT', slug: session.slug, token: session.token, body: values,
      });
      setEditing(null); setMode('list');
      await refresh();
    } catch (err) { setError(err); }
    finally { setBusy(false); }
  }

  async function deleteJob(id) {
    if (!confirm(`Delete this ${terms.jobLower}?`)) return;
    setError(null);
    try {
      await apiRequest(`/api/jobs/${id}`, {
        method: 'DELETE', slug: session.slug, token: session.token,
      });
      await refresh();
    } catch (err) { setError(err); }
  }

  async function completeJob(values) {
    setBusy(true); setError(null);
    try {
      const updated = await apiRequest(`/api/jobs/${editing.id}/complete`, {
        method: 'POST', slug: session.slug, token: session.token, body: values,
      });
      await refresh();
      if (returnMode === 'schedule') {
        setEditing(updated);
        setMode('schedule');
      } else {
        setEditing(null);
        setMode('list');
      }
      setReturnMode('list');
      setCompletionInitialDate(null);
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  function handleScheduleChange(updatedJob) {
    setEditing(updatedJob);
    return refresh();
  }

  function handleScheduleMarkComplete(date) {
    setCompletionInitialDate(date);
    setReturnMode('schedule');
    setMode('complete');
  }

  function userNames(ids) {
    return ids
      .map((id) => users.find((u) => u.id === id))
      .filter(Boolean)
      .map((u) => u.name || u.email)
      .join(', ');
  }

  if (mode === 'create') {
    return (
      <div>
        <div className="page-header"><h2>New {terms.jobLower}</h2></div>
        <PlanError error={error} session={session} />
        {customers.length === 0 ? (
          <div className="form-card">
            <p style={{ margin: 0, color: 'var(--text-muted)' }}>
              You need at least one {terms.customerLower} before you can create a {terms.jobLower}. Add a {terms.customerLower} first.
            </p>
            <div className="form-actions"><button className="secondary" onClick={() => setMode('list')}>Back</button></div>
          </div>
        ) : (
          <div className="form-card">
            <JobForm
              customers={customers}
              users={users}
              onSubmit={createJob}
              onCancel={() => { setError(null); setMode('list'); }}
              busy={busy}
            />
          </div>
        )}
      </div>
    );
  }

  if (mode === 'edit' && editing) {
    return (
      <div>
        <div className="page-header"><h2>Edit {terms.jobLower}</h2></div>
        <PlanError error={error} session={session} />
        <div className="form-card">
          <JobForm
            initial={editing}
            customers={customers}
            users={users}
            onSubmit={updateJob}
            onCancel={() => { setError(null); setEditing(null); setMode('list'); }}
            busy={busy}
          />
        </div>
      </div>
    );
  }

  if (mode === 'complete' && editing) {
    const cancelTarget = returnMode === 'schedule' ? 'schedule' : 'list';
    return (
      <div>
        <div className="page-header"><h2>Mark complete: {editing.title}</h2></div>
        {error && <div className="error">{error}</div>}
        <div className="form-card">
          <CompletionForm
            job={editing}
            initialDate={completionInitialDate}
            onSubmit={completeJob}
            onCancel={() => {
              setError(null);
              setCompletionInitialDate(null);
              setMode(cancelTarget);
              if (cancelTarget === 'list') setEditing(null);
              setReturnMode('list');
            }}
            busy={busy}
          />
        </div>
      </div>
    );
  }

  if (mode === 'schedule' && editing) {
    return (
      <JobScheduleView
        session={session}
        job={editing}
        features={features}
        onBack={() => { setEditing(null); setMode('list'); }}
        onMarkComplete={handleScheduleMarkComplete}
        onChange={handleScheduleChange}
      />
    );
  }

  function openMarkComplete(job, date) {
    setEditing(job);
    setCompletionInitialDate(date || null);
    setReturnMode('list');
    setMode('complete');
  }

  function openEdit(job) {
    setEditing(job);
    setMode(job.type === 'recurring' ? 'schedule' : 'edit');
  }

  function jobMatchesSearch(j) {
    return searchMatches(search, j.title, j.description, jobCustomerName(j));
  }

  const jobSortKey = sort === 'title' ? (j) => (j.title || '').toLowerCase()
    : sort === 'price' ? (j) => parseFloat(j.default_price) || 0
    : 'created_at';
  const searchedJobs = sortBy(jobs.filter(jobMatchesSearch), jobSortKey, sort === 'oldest' ? 'asc' : sort === 'title' ? 'asc' : 'desc');

  return (
    <div>
      {firstJobToast && (
        <div className="first-job-toast" role="status" aria-live="polite">
          <span className="first-job-toast-burst">🎉</span>
          <div>
            <strong>First {terms.jobLower} on the books!</strong>
            <span>Find it on the calendar — mark it complete when the work's done.</span>
          </div>
          <button className="first-job-toast-close" onClick={() => setFirstJobToast(false)} aria-label="Dismiss">×</button>
        </div>
      )}
      <div className="page-header">
        <h2>{terms.jobs}</h2>
        <div style={{ display: 'flex', gap: 8 }}>
          <button className="secondary" onClick={exportJobs} disabled={jobs.length === 0}>Export</button>
          {canMutate && (
            <button className="primary" onClick={() => { setError(null); setMode('create'); }} disabled={atCap}>+ New {terms.jobLower}</button>
          )}
        </div>
      </div>
      {planContext && planContext.isFree && planContext.atCap && (
        <UpgradePrompt session={session} used={planContext.used} limit={planContext.limit} resource={terms.jobsLower} />
      )}
      <div className="jobs-tabs">
        <button
          className={`jobs-tab${layout === 'calendar' ? ' active' : ''}`}
          onClick={() => setLayout('calendar')}
        >Schedule</button>
        <button
          className={`jobs-tab${layout === 'list' ? ' active' : ''}`}
          onClick={() => setLayout('list')}
        >List</button>
      </div>
      <PlanError error={error} session={session} />
      {layout === 'calendar' ? (
        loading ? (
          <div className="list-empty">Loading...</div>
        ) : (
          <CalendarView jobs={searchedJobs} onChipClick={openEdit} onMarkComplete={openMarkComplete} smsTemplates={smsTemplates} />
        )
      ) : (

                  <div className="name">
                    {j.title}
                    {j.default_price != null && <span className="price">{formatPrice(j.default_price)}</span>}

                  <div className="meta">
                    {jobCustomerName(j)} • {formatSchedule(j)}

function LineItemsEditor({ items, onChange }) {
  function update(idx, field, value) {
    const next = items.map((item, i) => {
      if (i !== idx) return item;
      const updated = { ...item, [field]: value };
      const q = parseFloat(updated.quantity);
      const r = parseFloat(updated.rate);
      updated.amount = (isFinite(q) ? q : 0) * (isFinite(r) ? r : 0);
      return updated;
    });
    onChange(next);
  }

  function add() {
    onChange([...items, { description: '', quantity: 1, rate: 0, amount: 0 }]);
  }

  function remove(idx) {
    onChange(items.filter((_, i) => i !== idx));
  }

  const total = items.reduce((sum, item) => sum + (parseFloat(item.amount) || 0), 0);

  return (
    <div>
      {items.length === 0 ? (
        <div className="line-items-empty">No line items yet. Click "Add line item" to start.</div>
      ) : (
        <table className="line-items-table">
          <thead>
            <tr>
              <th className="col-desc">Description</th>
              <th>Qty</th>
              <th>Rate</th>
              <th style={{ textAlign: 'right' }}>Amount</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            {items.map((item, idx) => (
              <tr key={idx}>
                <td className="col-desc">
                  <input
                    value={item.description || ''}
                    onChange={(e) => update(idx, 'description', e.target.value)}
                    placeholder="e.g. Weekly mow service"
                  />
                </td>
                <td className="col-qty">
                  <input
                    type="number" step="0.01" min="0"
                    value={item.quantity ?? ''}
                    onChange={(e) => update(idx, 'quantity', e.target.value)}
                  />
                </td>
                <td className="col-rate">
                  <input
                    type="number" step="0.01" min="0"
                    value={item.rate ?? ''}
                    onChange={(e) => update(idx, 'rate', e.target.value)}
                  />
                </td>
                <td className="col-amount">{formatPrice(item.amount)}</td>
                <td className="col-remove">
                  <button type="button" onClick={() => remove(idx)} aria-label="Remove">×</button>
                </td>
              </tr>
            ))}
          </tbody>
          <tfoot>
            <tr>
              <td colSpan="3" style={{ textAlign: 'right' }}>Total</td>
              <td className="col-amount">{formatPrice(total)}</td>
              <td></td>
            </tr>
          </tfoot>
        </table>
      )}
      <button type="button" className="secondary" onClick={add}>+ Add line item</button>
    </div>
  );
}

function lineItemsTotal(items) {
  return (items || []).reduce((sum, item) => sum + (parseFloat(item.amount) || 0), 0);
}

function invoiceMath(inv) {
  const subtotal = lineItemsTotal(inv.line_items);
  let discount = 0;
  const dv = parseFloat(inv.discount_value) || 0;
  if (dv > 0 && (inv.discount_type === 'percent' || inv.discount_type === 'amount')) {
    discount = inv.discount_type === 'percent' ? subtotal * dv / 100 : dv;
  }
  const discounted = Math.max(0, subtotal - discount);
  const taxRate = parseFloat(inv.tax_rate) || 0;
  const tax = discounted * taxRate / 100;
  const total = discounted + tax;
  return { subtotal, discount, discounted, taxRate, tax, total };
}

function isInvoiceLate(inv) {
  if (inv.status !== 'sent' || !inv.sent_date) return false;
  const sent = new Date(inv.sent_date);
  const ageDays = (Date.now() - sent.getTime()) / (1000 * 60 * 60 * 24);
  return ageDays > 30;
}

function daysOutstanding(inv) {
  if (!inv.sent_date) return 0;
  const sent = new Date(inv.sent_date);
  return Math.floor((Date.now() - sent.getTime()) / (1000 * 60 * 60 * 24));
}

function parseCSV(text) {
  const lines = text.split(/\r?\n/).map((l) => l).filter((l) => l.trim().length > 0);
  if (lines.length === 0) return { headers: [], rows: [] };
  function splitLine(line) {
    const out = [];
    let cur = '';
    let inQuote = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') {
        if (inQuote && line[i + 1] === '"') { cur += '"'; i++; }
        else { inQuote = !inQuote; }
      } else if (c === ',' && !inQuote) {
        out.push(cur);
        cur = '';
      } else {
        cur += c;
      }
    }
    out.push(cur);
    return out.map((s) => s.trim());
  }
  const headers = splitLine(lines[0]).map((h) => h.toLowerCase().replace(/\s+/g, '_'));
  const rows = lines.slice(1).map((line) => {
    const cells = splitLine(line);
    const row = {};
    headers.forEach((h, i) => { row[h] = cells[i] === undefined ? '' : cells[i]; });
    return row;
  });
  return { headers, rows };
}

function searchMatches(needle, ...fields) {
  if (!needle) return true;
  const n = needle.toLowerCase().trim();
  if (!n) return true;
  return fields.some((f) => f && String(f).toLowerCase().includes(n));
}

function downloadCSV(filename, headers, rows) {
  const escape = (cell) => {
    if (cell == null) return '';
    const s = String(cell);
    return /[",\n\r]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
  };
  const csv = [headers, ...rows].map((row) => row.map(escape).join(',')).join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 200);
}

function sortBy(items, key, dir = 'asc') {
  const arr = [...items];
  arr.sort((a, b) => {
    const av = typeof key === 'function' ? key(a) : a[key];
    const bv = typeof key === 'function' ? key(b) : b[key];
    if (av == null && bv == null) return 0;
    if (av == null) return 1;
    if (bv == null) return -1;
    if (typeof av === 'number' && typeof bv === 'number') return dir === 'asc' ? av - bv : bv - av;
    return dir === 'asc' ? String(av).localeCompare(String(bv)) : String(bv).localeCompare(String(av));
  });
  return arr;
}

function computeProjectedIncome(jobs, fromStr, toStr) {
  const todayStr = formatYMD(todayStart());
  const effectiveFrom = fromStr > todayStr ? fromStr : todayStr;
  if (effectiveFrom > toStr) return 0;
  let total = 0;
  for (const job of jobs) {
    if (!job.default_price) continue;
    const price = parseFloat(job.default_price);
    if (!isFinite(price) || price <= 0) continue;
    const upcoming = jobOccurrencesInRange(job, effectiveFrom, toStr).filter((o) => !o.completed);
    total += upcoming.length * price;
  }
  return total;
}
