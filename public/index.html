<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Field Manager</title>
  <script>
    (function () {
      try {
        var t = localStorage.getItem('fm_theme');
        if (t === 'dark' || t === 'light') document.documentElement.dataset.theme = t;
      } catch (e) {}
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg: #f7f4ec;
      --bg-elevated: #fcfaf3;
      --card: #ffffff;
      --text: #19170f;
      --text-muted: #66635c;
      --border: #e8e1d1;
      --border-strong: #d4cab4;
      --primary: #2c3e57;
      --primary-hover: #1b2940;
      --primary-ring: rgba(44, 62, 87, 0.16);
      --accent: #c98558;
      --accent-hover: #b16f43;
      --danger: #a23b2c;
      --danger-bg: #f9e3df;
      --success: #2d6b4a;
      --success-bg: #e1ede5;
      --shadow-sm: 0 1px 2px rgba(25, 23, 15, 0.04), 0 1px 1px rgba(25, 23, 15, 0.02);
      --shadow-md: 0 1px 2px rgba(25, 23, 15, 0.04), 0 8px 24px -8px rgba(25, 23, 15, 0.08), 0 16px 48px -16px rgba(25, 23, 15, 0.06);
      --shadow-lg: 0 2px 4px rgba(25, 23, 15, 0.06), 0 16px 40px -8px rgba(25, 23, 15, 0.12), 0 32px 72px -16px rgba(25, 23, 15, 0.08);
      --row-hover: #faf6ea;
      --tinted: #efe7d3;
      --serif: 'Fraunces', Georgia, 'Times New Roman', serif;
    }
    :root[data-theme="dark"] {
      --bg: #0d1117;
      --bg-elevated: #131820;
      --card: #1a1f2a;
      --text: #ede7d6;
      --text-muted: #8a857a;
      --border: #2a3142;
      --border-strong: #3d4459;
      --primary: #8da6c8;
      --primary-hover: #a8bedc;
      --primary-ring: rgba(141, 166, 200, 0.22);
      --accent: #dca176;
      --accent-hover: #c98558;
      --danger: #db6b5c;
      --danger-bg: #3a1c17;
      --success: #62a87e;
      --success-bg: #1a2e22;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.45);
      --shadow-md: 0 2px 6px rgba(0, 0, 0, 0.5), 0 16px 40px -8px rgba(0, 0, 0, 0.55), 0 32px 72px -16px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 4px 12px rgba(0, 0, 0, 0.55), 0 24px 64px -8px rgba(0, 0, 0, 0.6);
      --row-hover: #1e2533;
      --tinted: #2a3142;
    }
    :root[data-theme="dark"] .cal-cell.empty { background: #1a1d27; }
    :root[data-theme="dark"] .cal-chip { background: #2c3142; color: var(--text); }
    :root[data-theme="dark"] .cal-chip:hover { background: #3b4258; }
    :root[data-theme="dark"] .cal-chip.done { background: #1f3328; color: var(--text-muted); }
    :root[data-theme="dark"] .check-list label.checked { background: #2c3a4e; color: var(--primary); }
    :root[data-theme="dark"] .badge.draft { background: #2e2a22; color: #b0a99a; }
    :root[data-theme="dark"] .badge.sent { background: #1f2a3b; color: #92a8c8; }
    :root[data-theme="dark"] .badge.paid { background: #1c2e22; color: #7ab089; }
    :root[data-theme="dark"] .badge.accepted { background: #1c2e22; color: #7ab089; }
    :root[data-theme="dark"] .badge.declined { background: #3b1f1b; color: #d76b5d; }
    :root[data-theme="dark"] .badge { background: #3a2820; color: #e8a78c; }
    :root[data-theme="dark"] input:disabled, :root[data-theme="dark"] textarea:disabled { background: #1a1d27; color: var(--text-muted); }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-feature-settings: 'cv11', 'ss01', 'ss03';
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }
    h1, h2, h3, .brand {
      font-family: var(--serif);
      font-feature-settings: 'liga', 'kern';
      letter-spacing: -0.02em;
    }
    h1 { font-weight: 600; }
    h2, h3 { font-weight: 600; }
    button { font-family: inherit; }
    .icon {
      display: inline-block;
      width: 1em; height: 1em; vertical-align: -0.15em;
      stroke: currentColor; stroke-width: 2;
      stroke-linecap: round; stroke-linejoin: round;
      fill: none;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both; }
    .fade-in-delay-1 { animation: fadeInUp 0.5s 0.06s cubic-bezier(0.16, 1, 0.3, 1) both; }
    .fade-in-delay-2 { animation: fadeInUp 0.5s 0.12s cubic-bezier(0.16, 1, 0.3, 1) both; }
    .fade-in-delay-3 { animation: fadeInUp 0.5s 0.18s cubic-bezier(0.16, 1, 0.3, 1) both; }

    /* Scroll-reveal: hidden by default, revealed when JS adds .is-revealed */
    [data-reveal] {
      opacity: 0; transform: translateY(28px);
      transition: opacity 0.85s cubic-bezier(0.16, 1, 0.3, 1),
                  transform 0.85s cubic-bezier(0.16, 1, 0.3, 1);
      will-change: opacity, transform;
    }
    [data-reveal].is-revealed { opacity: 1; transform: translateY(0); }
    [data-reveal-delay="1"] { transition-delay: 0.08s; }
    [data-reveal-delay="2"] { transition-delay: 0.16s; }
    [data-reveal-delay="3"] { transition-delay: 0.24s; }
    [data-reveal-delay="4"] { transition-delay: 0.32s; }
    [data-reveal-delay="5"] { transition-delay: 0.4s; }
    @media (prefers-reduced-motion: reduce) {
      [data-reveal] { opacity: 1; transform: none; transition: none; }
      .fade-in, .fade-in-delay-1, .fade-in-delay-2, .fade-in-delay-3 { animation: none; opacity: 1; }
    }

    /* Stacked hero headline with cycling industry word */
    .hero-stacked {
      display: flex; flex-direction: column;
      align-items: center;
      line-height: 1;
    }
    .hero-line { display: block; }
    .hero-cycle-line {
      display: block;
      line-height: 1.15;
      padding-bottom: 0.06em;
      white-space: nowrap;
      /* Inherits the h1's font-size — all three lines stay the same scale. */
    }
    .cycle-word {
      font-style: italic;
      color: var(--accent);
      display: inline-block;
      animation: wordSwap 0.24s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .cycle-word.settled {
      font-style: normal;
      color: inherit;
      animation: wordSettle 0.55s cubic-bezier(0.22, 1, 0.36, 1);
    }
    @keyframes wordSwap {
      0%   { opacity: 0; transform: translateY(0.18em); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes wordSettle {
      0%   { opacity: 0; transform: translateY(0.18em) scale(0.94); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Bold sans typography scoped to the hero only */
    .landing-hero h1 {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 800;
      font-feature-settings: 'ss01', 'cv11';
    }
    .landing .eyebrow,
    .landing .section-label { font-weight: 600; }

    /* Auth screens */
    .auth-shell { max-width: 480px; margin: 80px auto; padding: 0 16px; }
    .card {
      background: var(--card);
      border-radius: 16px;
      box-shadow: var(--shadow-lg);
      padding: 44px 40px;
      border: 1px solid var(--border);
    }
    h1 { margin: 0 0 8px; font-size: 30px; }
    h2 { font-size: 22px; }
    h3 { font-size: 17px; }
    .subtitle { color: var(--text-muted); margin: 0 0 28px; font-size: 14px; line-height: 1.6; }
    .tabs { display: flex; gap: 0; margin-bottom: 24px; border-bottom: 1px solid var(--border); }
    .tab {
      flex: 1; padding: 12px 0; background: none; border: none;
      cursor: pointer; font-size: 14px; color: var(--text-muted);
      border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s;
    }
    .tab.active { color: var(--text); border-bottom-color: var(--primary); font-weight: 600; }
    .tab:hover { color: var(--text); }
    label { display: block; font-size: 13px; font-weight: 600; margin: 14px 0 6px; color: var(--text); }
    .hint { font-weight: 400; color: var(--text-muted); font-size: 12px; margin-left: 6px; }
    input, textarea {
      width: 100%; padding: 11px 14px; font-size: 14px;
      border: 1px solid var(--border-strong); border-radius: 8px;
      background: var(--card); font-family: inherit; color: var(--text);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    textarea { resize: vertical; min-height: 76px; }
    input:focus, textarea:focus {
      outline: none; border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-ring);
    }
    input::placeholder, textarea::placeholder { color: #b0a99a; }
    button.primary {
      padding: 11px 20px; background: var(--primary); color: white;
      border: none; border-radius: 10px; font-size: 14px;
      font-weight: 600; cursor: pointer;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06), 0 0 0 1px rgba(0, 0, 0, 0.04) inset;
      letter-spacing: -0.005em;
    }
    button.primary:hover { background: var(--primary-hover); box-shadow: 0 4px 12px -2px rgba(44, 62, 87, 0.2), 0 0 0 1px rgba(0, 0, 0, 0.04) inset; }
    button.primary:active { transform: translateY(1px); }
    button.primary:disabled { background: #a8a59c; cursor: not-allowed; box-shadow: none; }
    button.primary.block { width: 100%; margin-top: 24px; }
    button.secondary {
      padding: 9px 16px; background: var(--card); color: var(--text);
      border: 1px solid var(--border-strong); border-radius: 10px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    button.secondary:hover { background: var(--row-hover); border-color: var(--primary); }
    button.secondary:active { transform: translateY(1px); }
    button.danger {
      padding: 9px 16px; background: var(--card); color: var(--danger);
      border: 1px solid var(--border-strong); border-radius: 10px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    button.danger:hover { background: var(--danger-bg); border-color: var(--danger); }
    .error {
      margin-top: 16px; padding: 11px 14px;
      background: var(--danger-bg); color: var(--danger);
      border-radius: 8px; font-size: 13px;
    }
    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 999px;
      background: #f4ddd0; color: #8c4e30; font-size: 11px;
      font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em;
    }

    /* App shell */
    .topbar {
      background: var(--card); border-bottom: 1px solid var(--border);
      padding: 16px 32px; display: flex;
      align-items: center; justify-content: space-between;
    }
    .topbar .brand { font-size: 18px; font-weight: 600; letter-spacing: -0.02em; }
    .topbar .right { display: flex; align-items: center; gap: 14px; font-size: 13px; }
    .topbar .right .user { color: var(--text-muted); }
    .nav {
      background: var(--card); border-bottom: 1px solid var(--border);
      padding: 0 28px; display: flex; gap: 2px;
    }
    .nav button {
      background: none; border: none; padding: 14px 14px;
      font-size: 13.5px; color: var(--text-muted); cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
      display: inline-flex; align-items: center; gap: 7px;
      font-weight: 500;
    }
    .nav button .icon { font-size: 15px; opacity: 0.7; }
    .nav button.active { color: var(--text); font-weight: 600; border-bottom-color: var(--primary); }
    .nav button.active .icon { opacity: 1; color: var(--primary); }
    .nav button:hover { color: var(--text); }
    .nav-badge {
      background: var(--accent); color: white;
      font-size: 10px; font-weight: 700;
      padding: 1px 7px; border-radius: 999px;
      margin-left: 4px; letter-spacing: 0.02em;
      line-height: 1.4;
    }
    .content { max-width: 960px; margin: 32px auto; padding: 0 28px; }
    .page-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px;
    }
    .page-header h2 { margin: 0; font-size: 22px; }

    /* List */
    .list {
      background: var(--card); border-radius: 12px;
      border: 1px solid var(--border); overflow: hidden;
      box-shadow: var(--shadow-sm);
    }
    .list-empty { padding: 56px 24px; text-align: center; color: var(--text-muted); font-size: 14px; }
    .row {
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; transition: background 0.12s;
    }
    .row:last-child { border-bottom: none; }
    .row:hover { background: var(--row-hover); }
    .row .info .name { font-weight: 500; font-size: 14px; margin-bottom: 3px; }
    .row .info .meta { color: var(--text-muted); font-size: 12px; }
    .row .actions { display: flex; gap: 8px; flex-shrink: 0; }

    /* Forms in app shell */
    .form-card {
      background: var(--card); border-radius: 12px;
      border: 1px solid var(--border); padding: 28px;
      margin-bottom: 24px; box-shadow: var(--shadow-sm);
    }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 18px; }
    .form-grid .full { grid-column: 1 / -1; }
    .form-actions { margin-top: 24px; display: flex; gap: 10px; }

    select {
      width: 100%; padding: 11px 14px; font-size: 14px;
      border: 1px solid var(--border-strong); border-radius: 8px;
      background: var(--card); font-family: inherit; color: var(--text);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-ring); }

    .toggle-group {
      display: inline-flex; background: var(--tinted); border-radius: 8px;
      padding: 4px; gap: 4px;
    }
    .toggle-group button {
      background: none; border: none; padding: 7px 16px;
      font-size: 13px; font-weight: 500; color: var(--text-muted);
      border-radius: 6px; cursor: pointer; transition: background 0.15s, color 0.15s;
    }
    .toggle-group button.active {
      background: var(--card); color: var(--text);
      box-shadow: 0 1px 2px rgba(0,0,0,0.06);
    }

    .check-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .check-list label {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 12px; border: 1px solid var(--border-strong);
      border-radius: 999px; font-size: 13px; font-weight: 500;
      cursor: pointer; margin: 0;
      background: var(--card); transition: background 0.15s, border-color 0.15s;
    }
    .check-list label:hover { background: var(--row-hover); }
    .check-list label.checked { background: #eaf0f2; border-color: var(--primary); color: var(--primary); }
    .check-list input { display: none; }

    .row .info .secondary-meta { color: var(--text-muted); font-size: 12px; margin-top: 2px; }
    .row .info .price { display: inline-block; margin-left: 8px; color: var(--text); font-weight: 500; }

    .section-heading {
      margin: 28px 0 10px; font-size: 12px; font-weight: 600;
      color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em;
    }
    .section-heading:first-child { margin-top: 0; }
    .inline-form { display: flex; align-items: center; gap: 8px; }
    .inline-form input[type="date"] { width: auto; padding: 8px 10px; font-size: 13px; }
    .schedule-summary {
      background: var(--card); border-radius: 10px;
      border: 1px solid var(--border); padding: 14px 18px;
      margin-bottom: 20px; color: var(--text-muted); font-size: 13px;
    }

    .filter-bar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .chip-group { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip {
      padding: 7px 14px; background: var(--card); color: var(--text-muted);
      border: 1px solid var(--border-strong); border-radius: 999px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .chip:hover { color: var(--text); background: var(--row-hover); }
    .chip.active {
      background: var(--primary); color: white; border-color: var(--primary);
    }

    .occurrence-row { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .occurrence-row:last-child { border-bottom: none; }
    .occurrence-row.completed { opacity: 0.55; }
    .occurrence-row:hover { background: var(--row-hover); }
    .occurrence-row .date {
      flex-shrink: 0; min-width: 90px; padding: 6px 10px;
      background: var(--tinted); border-radius: 8px; text-align: center;
    }
    .occurrence-row .date .day { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .occurrence-row .date .num { font-size: 18px; font-weight: 600; line-height: 1.1; }
    .occurrence-row.completed .date { background: #e8f1ec; }
    .occurrence-row.today .date { background: var(--primary); color: white; }
    .occurrence-row.today .date .day { color: #cbd6e6; }
    .occurrence-row .body { flex: 1; min-width: 0; }
    .occurrence-row .body .title { font-weight: 500; font-size: 14px; margin-bottom: 2px; }
    .occurrence-row .body .meta { font-size: 12px; color: var(--text-muted); }
    .occurrence-row .actions { display: flex; gap: 8px; flex-shrink: 0; }

    .calendar {
      background: var(--card); border-radius: 12px;
      border: 1px solid var(--border); padding: 18px;
      box-shadow: var(--shadow-sm);
    }
    .cal-nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .cal-nav .cal-month { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
    .cal-nav button { padding: 6px 12px; font-size: 14px; }
    .cal-grid {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
    }
    .cal-dow {
      padding: 6px; text-align: center; font-size: 11px;
      font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .cal-cell {
      min-height: 96px; padding: 6px 8px; border: 1px solid var(--border);
      border-radius: 8px; background: var(--card); overflow: hidden;
      display: flex; flex-direction: column; gap: 2px;
    }
    .cal-cell.empty { background: #f9f5ec; border-color: transparent; }
    .cal-cell { cursor: pointer; transition: background 0.12s, border-color 0.12s; }
    .cal-cell:hover:not(.empty) { background: var(--row-hover); }
    .cal-cell.today { border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-ring); }
    .cal-cell.selected { border-color: var(--primary); background: var(--tinted); }
    .cal-cell.selected.today { box-shadow: 0 0 0 2px var(--primary-ring); }
    .cal-cell .cal-date { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    .cal-cell.today .cal-date { color: var(--primary); }
    .cal-chip {
      font-size: 11px; padding: 2px 6px; border-radius: 4px;
      background: #eaf0f2; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      cursor: pointer; transition: background 0.12s;
    }
    .cal-chip:hover { background: #d5dee3; }
    .cal-chip.done { background: #e8f1ec; color: var(--text-muted); text-decoration: line-through; }
    .cal-more { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

    .pager {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 14px; font-size: 13px; color: var(--text-muted);
    }
    .pager .info { flex: 1; text-align: center; }

    .badge.draft { background: #ece6d8; color: #6d6a64; }
    .badge.sent { background: #dde6f0; color: #3a4d68; }
    .badge.paid { background: #d5e8d6; color: #2f6b3a; }
    .badge.accepted { background: #d5e8d6; color: #2f6b3a; }
    .badge.declined { background: #f4dad6; color: #99362a; }

    .line-items-table { width: 100%; border-collapse: collapse; margin: 12px 0; }
    .line-items-table th {
      text-align: left; padding: 8px 10px; font-size: 12px;
      font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.04em;
      border-bottom: 1px solid var(--border);
    }
    .line-items-table td { padding: 8px 6px; vertical-align: middle; border-bottom: 1px solid var(--border); }
    .line-items-table input { padding: 8px 10px; font-size: 13px; }
    .line-items-table .col-desc { width: 50%; }
    .line-items-table .col-qty input,
    .line-items-table .col-rate input { width: 90px; text-align: right; }

function useLocation() {
  const [path, setPath] = useState(() => window.location.pathname);
  useEffect(() => {
    const onPop = () => setPath(window.location.pathname);
    window.addEventListener('popstate', onPop);
    return () => window.removeEventListener('popstate', onPop);
  }, []);
  return path;
}

function navigate(to, opts = {}) {
  if (window.location.pathname === to && !opts.force) return;
  if (opts.replace) {
    window.history.replaceState({}, '', to);
  } else {
    window.history.pushState({}, '', to);
  }
  window.dispatchEvent(new PopStateEvent('popstate'));
}

  localStorage.setItem(STAFF_STORAGE.user, JSON.stringify(user));

function clearStaffSession() {

function loadSession() {
  const token = localStorage.getItem(STORAGE.token);
  const slug = localStorage.getItem(STORAGE.slug);
  const user = JSON.parse(localStorage.getItem(STORAGE.user) || 'null');
  const org = JSON.parse(localStorage.getItem(STORAGE.org) || 'null');
  if (!token || !slug || !user || !org) return null;
  return { token, slug, user, organization: org };

function saveSession({ token, user, organization }) {
  localStorage.setItem(STORAGE.token, token);
  localStorage.setItem(STORAGE.slug, organization.slug);
  localStorage.setItem(STORAGE.user, JSON.stringify(user));

function clearSession() {

const DEFAULT_TERMS = {

function getTerms(source) {
  const s = source || {};
  const customer = s.customer_label || DEFAULT_TERMS.customer;
  const customers = s.customer_label_plural || DEFAULT_TERMS.customers;
  const job = s.job_label || DEFAULT_TERMS.job;

    customerLower: customer.toLowerCase(),
    customersLower: customers.toLowerCase(),
    jobLower: job.toLowerCase(),

}

async function apiRequest(path, { method = 'GET', body, slug, token } = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (slug) headers['x-organization-slug'] = slug;
  if (token) headers['Authorization'] = `Bearer ${token}`;
  const res = await fetch(path, {
    method, headers,
    body: body ? JSON.stringify(body) : undefined,
  });
  if (res.status === 204) return null;
  const isJson = (res.headers.get('content-type') || '').includes('application/json');
  const data = isJson ? await res.json() : await res.text();
  if (!res.ok) throw new Error((data && data.error) || `Request failed (${res.status})`);
  return data;
}

function customerDisplayName(c) {
  if (!c) return '';
  if (c.business_name) return c.business_name;
  const parts = [c.first_name, c.last_name].filter(Boolean).join(' ').trim();
  return parts || '(unnamed)';
}

function jobCustomerName(j) {

  const parts = [j.customer_first_name, j.customer_last_name].filter(Boolean).join(' ').trim();
  return parts || '(unnamed)';
}

const DAY_NAMES = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

function parseDate(s) {
  if (!s) return null;
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function formatYMD(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function formatDateString(s) {
  const d = parseDate(s);
  if (!d) return '';
  return d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
}

function dayOfWeekName(s) {
  const d = parseDate(s);
  if (!d) return '';
  return DAY_NAMES[d.getDay()];
}

function ordinal(n) {
  const s = ['th', 'st', 'nd', 'rd'];
  const v = n % 100;
  return n + (s[(v - 20) % 10] || s[v] || s[0]);
}

function addDays(date, n) {
  const r = new Date(date);
  r.setDate(r.getDate() + n);
  return r;
}

function addMonths(date, n) {
  const r = new Date(date);
  const day = r.getDate();
  r.setDate(1);
  r.setMonth(r.getMonth() + n);
  const daysInMonth = new Date(r.getFullYear(), r.getMonth() + 1, 0).getDate();
  r.setDate(Math.min(day, daysInMonth));
  return r;
}

function todayStart() {
  const t = new Date();
  return new Date(t.getFullYear(), t.getMonth(), t.getDate());
}

function generatePatternDates(job, limit) {
  const start = parseDate(job.start_date);
  const end = job.end_date ? parseDate(job.end_date) : null;
  const out = [];
  let current = new Date(start);
  for (let i = 0; i < 520; i++) {
    if (end && current > end) break;
    if (current > limit) break;
    out.push(formatYMD(current));
    if (job.recurrence_pattern === 'weekly') current = addDays(current, 7);
    else if (job.recurrence_pattern === 'biweekly') current = addDays(current, 14);
    else if (job.recurrence_pattern === 'monthly') current = addMonths(current, 1);
    else break;
  }
  return out;
}

function computeOccurrences(job, today = todayStart(), horizonDays = 365) {
  if (job.type !== 'recurring' || !job.start_date) return [];
  const limit = addDays(today, horizonDays);
  const pattern = generatePatternDates(job, limit);
  const set = new Set(pattern);

  const rescheduled = (job.rescheduled_dates && typeof job.rescheduled_dates === 'object') ? job.rescheduled_dates : {};
  const rescheduledFrom = {};
  Object.entries(rescheduled).forEach(([orig, target]) => {
    set.delete(orig);
    set.add(target);
    rescheduledFrom[target] = orig;
  });

  (job.skipped_dates || []).forEach((d) => set.delete(d));
  (job.deleted_dates || []).forEach((d) => set.delete(d));

  const completed = new Set(job.completed_dates || []);

  return [...set].sort().map((date) => ({
    date,
    completed: completed.has(date),
    rescheduledFrom: rescheduledFrom[date] || null,
  }));
}

function nextDueDate(job, today = todayStart()) {
  const todayStr = formatYMD(today);
  const upcoming = computeOccurrences(job, today).filter((o) => !o.completed && o.date >= todayStr);
  return upcoming[0]?.date || null;
}

function jobOccurrencesInRange(job, startDate, endDate) {
  if (job.type === 'single') {
    if (!job.date || job.date < startDate || job.date > endDate) return [];
    return [{
      job, date: job.date,
      completed: job.status === 'completed',
      rescheduledFrom: null,
    }];
  }
  if (job.type !== 'recurring' || !job.start_date) return [];

  const horizon = parseDate(endDate);
  const pattern = generatePatternDates(job, horizon);
  const set = new Set(pattern);

  const rescheduled = (job.rescheduled_dates && typeof job.rescheduled_dates === 'object') ? job.rescheduled_dates : {};
  const rescheduledFromMap = {};
  Object.entries(rescheduled).forEach(([orig, target]) => {
    set.delete(orig);
    set.add(target);
    rescheduledFromMap[target] = orig;
  });

  (job.skipped_dates || []).forEach((d) => set.delete(d));
  (job.deleted_dates || []).forEach((d) => set.delete(d));

  const completed = new Set(job.completed_dates || []);

  return [...set]
    .filter((d) => d >= startDate && d <= endDate)
    .sort()
    .map((date) => ({
      job, date,
      completed: completed.has(date),
      rescheduledFrom: rescheduledFromMap[date] || null,
    }));
}

const FILTER_RANGES = {
  today: () => {
    const t = formatYMD(todayStart());
    return { start: t, end: t };
  },
  week: () => {
    const t = todayStart();
    return { start: formatYMD(t), end: formatYMD(addDays(t, 6)) };
  },
  past: () => {
    const t = todayStart();
    return { start: formatYMD(addDays(t, -90)), end: formatYMD(addDays(t, -1)), onlyOpen: true };
  },
};

function expandJobsToOccurrences(jobs, filter) {
  const range = FILTER_RANGES[filter] && FILTER_RANGES[filter]();
  if (!range) return null;
  const occurrences = jobs.flatMap((j) => jobOccurrencesInRange(j, range.start, range.end));
  const filtered = range.onlyOpen ? occurrences.filter((o) => !o.completed) : occurrences;
  return filtered.sort((a, b) => a.date.localeCompare(b.date));
}

function lastCompletion(job) {
  const notes = job.completion_notes || [];
  if (notes.length === 0) return null;
  return notes.reduce((a, b) => (a.date > b.date ? a : b));
}

function formatSchedule(j) {
  const timeRange = formatTimeRange(j.start_time, j.duration_minutes);
  const timeSuffix = timeRange ? ` · ${timeRange}` : '';
  if (j.type === 'single') return formatDateString(j.date) + timeSuffix;
  if (j.type === 'recurring') {
    const start = formatDateString(j.start_date);
    const end = j.end_date ? ` until ${formatDateString(j.end_date)}` : '';
    if (j.recurrence_pattern === 'weekly') {
      return `Every ${dayOfWeekName(j.start_date)} starting ${start}${end}${timeSuffix}`;
    }
    if (j.recurrence_pattern === 'biweekly') {
      return `Every other ${dayOfWeekName(j.start_date)} starting ${start}${end}${timeSuffix}`;
    }
    if (j.recurrence_pattern === 'monthly') {
      const d = parseDate(j.start_date);
      return `Monthly on the ${ordinal(d.getDate())} starting ${start}${end}${timeSuffix}`;
    }
  }
  return '';
}

function formatTimeOfDay(hhmm) {
  if (!hhmm) return '';
  const s = String(hhmm);
  const m = s.match(/^(\d{2}):(\d{2})/);
  if (!m) return '';
  const h = parseInt(m[1], 10);
  const min = m[2];
  const period = h >= 12 ? 'PM' : 'AM';
  const display = h === 0 ? 12 : h > 12 ? h - 12 : h;
  return `${display}:${min} ${period}`;
}

function addMinutesToTime(hhmm, minsToAdd) {
  if (!hhmm) return null;
  const m = String(hhmm).match(/^(\d{2}):(\d{2})/);
  if (!m) return null;
  const total = parseInt(m[1], 10) * 60 + parseInt(m[2], 10) + (parseInt(minsToAdd, 10) || 0);
  const wrapped = ((total % (24 * 60)) + 24 * 60) % (24 * 60);
  const h = Math.floor(wrapped / 60);
  const mm = wrapped % 60;
  return `${String(h).padStart(2, '0')}:${String(mm).padStart(2, '0')}`;
}

function formatDuration(mins) {
  const n = parseInt(mins, 10);
  if (!Number.isFinite(n) || n <= 0) return '';
  const h = Math.floor(n / 60);
  const m = n % 60;
  if (h === 0) return `${m}m`;
  if (m === 0) return `${h}h`;
  return `${h}h ${m}m`;
}

function formatTimeRange(startTime, durationMinutes) {
  if (!startTime) return '';
  const start = formatTimeOfDay(startTime);
  const mins = parseInt(durationMinutes, 10);
  if (!Number.isFinite(mins) || mins <= 0) return start;
  const endTime = addMinutesToTime(startTime, mins);
  return `${start} – ${formatTimeOfDay(endTime)}`;
}

function formatPrice(p) {
  if (p === null || p === undefined || p === '') return '';
  const n = typeof p === 'string' ? parseFloat(p) : p;
  if (!isFinite(n)) return '';
  return `$${n.toFixed(2)}`;
}

function SignupForm({ onSuccess }) {
  const [orgName, setOrgName] = useState('');
  const [slug, setSlug] = useState('');
  const [name, setName] = useState('');
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState(null);
  const [busy, setBusy] = useState(false);

  async function submit(e) {
    e.preventDefault();
    setError(null); setBusy(true);
    try {
      const data = await apiRequest('/api/signup', {
        method: 'POST',
        body: {
          organization: { name: orgName, slug: slug || undefined },
          user: { email, password, name: name || undefined },
        },
      });
      const session = { ...data, slug: data.organization && data.organization.slug };
      saveSession(session);
      onSuccess(session);
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  return (
    <form onSubmit={submit}>
      <label>Company name</label>
      <input value={orgName} onChange={(e) => setOrgName(e.target.value)} placeholder="Acme Lawn Care" required />
      <label>URL slug <span className="hint">(optional, auto-derived from company name)</span></label>
      <input value={slug} onChange={(e) => setSlug(e.target.value.toLowerCase())} placeholder="acme-lawn-care" />
      <label>Your name <span className="hint">(optional)</span></label>
      <input value={name} onChange={(e) => setName(e.target.value)} placeholder="Jane Smith" />
      <label>Email</label>
      <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} required />
      <label>Password <span className="hint">(8+ chars, upper, lower, number, special)</span></label>
      <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} required />
      {error && <div className="error">{error}</div>}
      <button type="submit" className="primary block" disabled={busy}>
        {busy ? 'Creating account...' : 'Create account'}
      </button>
    </form>
  );
}

function LoginForm({ onSuccess }) {
  const [slug, setSlug] = useState(localStorage.getItem(STORAGE.slug) || '');
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState(null);
  const [busy, setBusy] = useState(false);
  const [forgotMode, setForgotMode] = useState(false);
  const [forgotSent, setForgotSent] = useState(false);

  async function submit(e) {
    e.preventDefault();
    setError(null); setBusy(true);
    try {
      const data = await apiRequest('/api/auth/login', {
        method: 'POST', slug,
        body: { email, password },
      });
      const org = await apiRequest(`/api/organizations/${slug}`);
      const session = { token: data.token, user: data.user, organization: org, slug: org.slug };
      saveSession(session);
      onSuccess(session);
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  async function submitForgot(e) {
    e.preventDefault();
    setError(null); setBusy(true);
    try {
      await apiRequest('/api/auth/forgot-password', {
        method: 'POST', slug, body: { email },
      });
      setForgotSent(true);
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  if (forgotMode) {
    if (forgotSent) {
      return (
        <div>
          <p style={{ fontSize: 14 }}>
            If an account with that email exists in <strong>{slug}</strong>, a reset link is on its way.
            Check your inbox (and spam folder).
          </p>
          <button className="primary block" onClick={() => { setForgotMode(false); setForgotSent(false); }}>
            Back to sign in
          </button>
        </div>
      );
    }
    return (
      <form onSubmit={submitForgot}>
        <p className="subtitle" style={{ marginBottom: 16 }}>Enter the email + company slug for your account. We'll send a reset link.</p>
        <label>Company URL slug</label>
        <input value={slug} onChange={(e) => setSlug(e.target.value.toLowerCase())} required />
        <label>Email</label>
        <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} required />
        {error && <div className="error">{error}</div>}
        <button type="submit" className="primary block" disabled={busy}>
          {busy ? 'Sending...' : 'Send reset link'}
        </button>
        <div style={{ textAlign: 'center', marginTop: 12 }}>
          <button type="button" className="link-button" onClick={() => setForgotMode(false)}>Back to sign in</button>
        </div>
      </form>
    );
  }

  return (
    <form onSubmit={submit}>
      <label>Company URL slug</label>
      <input value={slug} onChange={(e) => setSlug(e.target.value.toLowerCase())} placeholder="acme-lawn-care" required />
      <label>Email</label>
      <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} required />
      <label>Password</label>
      <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} required />
      {error && <div className="error">{error}</div>}
      <button type="submit" className="primary block" disabled={busy}>
        {busy ? 'Signing in...' : 'Sign in'}
      </button>
      <div style={{ textAlign: 'center', marginTop: 12 }}>
        <button type="button" className="link-button" onClick={() => { setForgotMode(true); setError(null); setForgotSent(false); }}>
          Forgot your password?
        </button>
      </div>
    </form>
  );
}

  return (
    <h1 className="fade-in-delay-1 hero-stacked">

  );

  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      setLoading(true); setError(null);
      try {
        const [j, i, q] = await Promise.all([
          apiRequest('/api/jobs', { slug: session.slug, token: session.token }),
          apiRequest('/api/invoices', { slug: session.slug, token: session.token }),

function CsvImportView({ session, onDone, onCancel }) {
  const terms = useTerms();
  const [text, setText] = useState('');
  const [parsed, setParsed] = useState(null);
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState(null);
  const [result, setResult] = useState(null);

  const VALID_COLS = new Set(['first_name', 'last_name', 'business_name', 'phone', 'email', 'address', 'notes']);
  const SAMPLE = 'first_name,last_name,business_name,phone,email,address,notes\nBob,Smith,,555-0100,bob@example.com,123 Maple St,Front yard only\n,,Acme Co,555-9000,info@acme.com,500 Oak Ave,Net 30';

  function handleParse() {
    setError(null); setResult(null);
    try {
      const out = parseCSV(text);
      if (out.rows.length === 0) {
        setError('No rows to import. Make sure your CSV has a header row plus at least one data row.');
        setParsed(null);
        return;
      }
      const unknown = out.headers.filter((h) => !VALID_COLS.has(h));
      if (unknown.length > 0) {
        setError(`Unknown columns: ${unknown.join(', ')}. Allowed: ${[...VALID_COLS].join(', ')}.`);
        setParsed(null);
        return;
      }
      setParsed(out);
    } catch (err) {
      setError(err.message);
    }
  }

  async function handleImport() {
    if (!parsed) return;
    setBusy(true); setError(null); setResult(null);
    try {
      const data = await apiRequest('/api/customers/import', {
        method: 'POST', slug: session.slug, token: session.token,
        body: { rows: parsed.rows },
      });
      setResult(data);
      onDone();
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  return (
    <div>
      <div className="page-header"><h2>Import {terms.customersLower} from CSV</h2></div>
      {error && <div className="error">{error}</div>}
      {result && (
        <div className="error" style={{ background: '#e8f1ec', color: '#1f6f4a' }}>
          Imported {result.inserted_count} {terms.customersLower} ({result.skipped_count} skipped — no name).
        </div>
      )}
      <div className="form-card">
        <label>CSV <span className="hint">(first row must be a header; allowed columns: {[...VALID_COLS].join(', ')})</span></label>
        <textarea
          rows={10}
          value={text}
          onChange={(e) => setText(e.target.value)}
          placeholder={SAMPLE}
          style={{ fontFamily: 'ui-monospace, Menlo, monospace', fontSize: 13 }}
        />
        <div className="form-actions">
          <button type="button" className="secondary" onClick={handleParse} disabled={busy || !text.trim()}>Preview</button>
          {parsed && (
            <button type="button" className="primary" onClick={handleImport} disabled={busy}>
              {busy ? 'Importing...' : `Import ${parsed.rows.length} ${parsed.rows.length === 1 ? terms.customerLower : terms.customersLower}`}
            </button>
          )}
          <button type="button" className="secondary" onClick={onCancel} disabled={busy}>Back</button>
        </div>
      </div>

      {parsed && (
        <>
          <div className="section-heading">Preview ({parsed.rows.length} {parsed.rows.length === 1 ? 'row' : 'rows'})</div>
          <div className="form-card">
            <div className="csv-preview-wrap">
              <table className="csv-preview-table">
                <thead>
                  <tr>{parsed.headers.map((h) => <th key={h}>{h}</th>)}</tr>
                </thead>
                <tbody>
                  {parsed.rows.slice(0, 50).map((row, i) => (
                    <tr key={i}>{parsed.headers.map((h) => <td key={h}>{row[h] || '—'}</td>)}</tr>
                  ))}
                </tbody>
              </table>
            </div>
            {parsed.rows.length > 50 && <p className="hint">Showing first 50 rows. All {parsed.rows.length} will be imported.</p>}
          </div>
        </>
      )}
    </div>
  );
}

function CustomersView({ session }) {
  const terms = useTerms();
  const [customers, setCustomers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [mode, setMode] = useState('list');
  const [editing, setEditing] = useState(null);
  const [viewing, setViewing] = useState(null);
  const [search, setSearch] = useState('');
  const [sort, setSort] = useState('name');
  const [busy, setBusy] = useState(false);

  const canMutate = ['admin', 'lead'].includes(session.user.role);

  function exportCustomers() {
    const headers = ['first_name', 'last_name', 'business_name', 'phone', 'email', 'address', 'notes'];
    const rows = customers.map((c) => headers.map((h) => c[h]));
    downloadCSV(`customers-${formatYMD(new Date())}.csv`, headers, rows);
  }

  const refresh = useCallback(async () => {
    setLoading(true);
    setError(null);
    try {
      const data = await apiRequest('/api/customers', { slug: session.slug, token: session.token });
      setCustomers(data);
    } catch (err) { setError(err.message); }
    finally { setLoading(false); }
  }, [session.slug, session.token]);

  useEffect(() => { refresh(); }, [refresh]);

  async function createCustomer(values) {
    setBusy(true); setError(null);
    try {
      await apiRequest('/api/customers', {
        method: 'POST', slug: session.slug, token: session.token, body: values,
      });
      setMode('list');
      await refresh();
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  async function updateCustomer(values) {
    setBusy(true); setError(null);
    try {
      await apiRequest(`/api/customers/${editing.id}`, {
        method: 'PUT', slug: session.slug, token: session.token, body: values,
      });
      setEditing(null);
      setMode('list');
      await refresh();
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  async function deleteCustomer(id) {
    if (!confirm(`Delete this ${terms.customerLower}? This cannot be undone from the UI.`)) return;
    setError(null);
    try {
      await apiRequest(`/api/customers/${id}`, {
        method: 'DELETE', slug: session.slug, token: session.token,
      });
      await refresh();
    } catch (err) { setError(err.message); }
  }

  if (mode === 'create') {
    return (
      <div>
        <div className="page-header"><h2>New {terms.customerLower}</h2></div>
        {error && <div className="error">{error}</div>}
        <div className="form-card">
          <CustomerForm onSubmit={createCustomer} onCancel={() => { setError(null); setMode('list'); }} busy={busy} />
        </div>
      </div>
    );
  }

  if (mode === 'edit' && editing) {
    return (
      <div>
        <div className="page-header"><h2>Edit {terms.customerLower}</h2></div>
        {error && <div className="error">{error}</div>}
        <div className="form-card">
          <CustomerForm
            initial={editing}
            onSubmit={updateCustomer}
            onCancel={() => { setError(null); setEditing(null); setMode('list'); }}
            busy={busy}
          />
        </div>
      </div>
    );
  }

  if (mode === 'detail' && viewing) {
    return (
      <CustomerDetailView
        session={session}
        customer={viewing}
        canMutate={canMutate}
        onBack={() => { setViewing(null); setMode('list'); }}
        onEdit={(c) => { setEditing(c); setMode('edit'); }}
      />
    );
  }

  if (mode === 'import') {
    return (
      <CsvImportView
        session={session}
        onDone={async () => { await refresh(); }}
        onCancel={() => { setError(null); setMode('list'); }}
      />
    );
  }

  const filtered = customers.filter((c) => searchMatches(
    search,
    c.first_name, c.last_name, c.business_name, c.phone, c.email, c.address
  ));
  const sortKey = sort === 'name'
    ? (c) => (c.business_name || `${c.last_name || ''} ${c.first_name || ''}`).toLowerCase()
    : 'created_at';
  const sorted = sortBy(filtered, sortKey, sort === 'oldest' ? 'asc' : sort === 'name' ? 'asc' : 'desc');

  return (
    <div>
      <div className="page-header">
        <h2>{terms.customers}</h2>
        <div style={{ display: 'flex', gap: 8 }}>
          <button className="secondary" onClick={exportCustomers} disabled={customers.length === 0}>Export</button>
          {canMutate && (
            <>
              <button className="secondary" onClick={() => { setError(null); setMode('import'); }}>Import CSV</button>
              <button className="primary" onClick={() => { setError(null); setMode('create'); }}>+ New {terms.customerLower}</button>
            </>
          )}
        </div>
      </div>
      <div className="search-bar" style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
        <input
          type="search"
          value={search}
          onChange={(e) => setSearch(e.target.value)}
          placeholder={`Search ${terms.customersLower} by name, phone, email...`}
          style={{ flex: 1 }}
        />
        <select value={sort} onChange={(e) => setSort(e.target.value)} style={{ width: 'auto' }}>
          <option value="name">Sort: Name</option>
          <option value="newest">Sort: Newest</option>
          <option value="oldest">Sort: Oldest</option>
        </select>
      </div>
      {error && <div className="error">{error}</div>}
      <div className="list">
        {loading ? (
          <div className="list-empty">Loading...</div>
        ) : sorted.length === 0 ? (
          <div className="list-empty">
            {customers.length === 0
              ? (canMutate ? `No ${terms.customersLower} yet. Add your first ${terms.customerLower} to start scheduling ${terms.jobsLower} and sending invoices.` : `No ${terms.customersLower} yet.`)
              : `No ${terms.customersLower} match this search.`}
          </div>
        ) : (
          sorted.map((c) => {
            const balance = parseFloat(c.outstanding_balance) || 0;
            return (
              <div key={c.id} className="row">
                <div className="info">
                  <div className="name">
                    {customerDisplayName(c)}
                    {balance > 0 && <span className="price" style={{ color: 'var(--danger)' }}>owes {formatPrice(balance)}</span>}
                  </div>
                  <div className="meta">
                    {[c.phone, c.email].filter(Boolean).join(' • ') || 'No contact info'}
                  </div>
                </div>
                <div className="actions">
                  <button className="secondary" onClick={() => { setViewing(c); setMode('detail'); }}>View</button>
                  {canMutate && (
                    <>
                      <button className="secondary" onClick={() => { setEditing(c); setMode('edit'); }}>Edit</button>
                      <button className="danger" onClick={() => deleteCustomer(c.id)}>Delete</button>
                    </>
                  )}
                </div>
              </div>
            );
          })
        )}
      </div>
    </div>
  );
}

      assigned_to,
      start_time: start_time || null,
      duration_minutes: duration_minutes === '' ? null : parseInt(duration_minutes, 10) || null,
    };
    if (type === 'single') {
      payload.date = date;
    } else {
      payload.start_date = start_date;
      payload.end_date = end_date || null;
      payload.recurrence_pattern = recurrence_pattern;
    }
    onSubmit(payload);
  }

  return (
    <form onSubmit={submit}>
      <div className="form-grid">
        <div className="full">
          <label>{terms.customer}</label>
          <select value={customer_id} onChange={(e) => setCustomerId(e.target.value)} required>
            {customers.length === 0 && <option value="">No {terms.customersLower} yet — add one first</option>}
            {customers.map((c) => (
              <option key={c.id} value={c.id}>{customerDisplayName(c)}</option>
            ))}
          </select>
        </div>
        <div className="full">
          <label>Title</label>
          <input value={title} onChange={(e) => setTitle(e.target.value)} placeholder="Weekly mow, deep clean, etc." required />
        </div>
        <div className="full">
          <label>Description <span className="hint">(optional)</span></label>
          <textarea value={description} onChange={(e) => setDescription(e.target.value)} />
        </div>
        <div className="full">
          <label>Schedule</label>
          <div className="toggle-group">
            <button type="button" className={type === 'single' ? 'active' : ''} onClick={() => setType('single')}>One-time</button>
            <button type="button" className={type === 'recurring' ? 'active' : ''} onClick={() => setType('recurring')}>Recurring</button>
          </div>
        </div>
        {type === 'single' ? (
          <div className="full">
            <label>Date</label>
            <input type="date" value={date} onChange={(e) => setDate(e.target.value)} required />
          </div>
        ) : (
          <>
            <div>
              <label>Repeats</label>
              <select value={recurrence_pattern} onChange={(e) => setPattern(e.target.value)}>
                <option value="weekly">Weekly</option>
                <option value="biweekly">Bi-weekly (every 2 weeks)</option>
                <option value="monthly">Monthly</option>
              </select>
            </div>
            <div></div>
            <div>
              <label>Start date</label>
              <input type="date" value={start_date} onChange={(e) => setStartDate(e.target.value)} required />
            </div>
            <div>
              <label>End date <span className="hint">(optional)</span></label>
              <input type="date" value={end_date} onChange={(e) => setEndDate(e.target.value)} />
            </div>
          </>
        )}
        <div>
          <label>Start time <span className="hint">(optional)</span></label>
          <input type="time" value={start_time} onChange={(e) => setStartTime(e.target.value)} />
        </div>
        <div>
          <label>Duration <span className="hint">(minutes, optional)</span></label>
          <input
            type="number" min="0" step="15"
            value={duration_minutes}
            onChange={(e) => setDuration(e.target.value)}
            placeholder="e.g. 60"
            disabled={!start_time}
          />
          {start_time && duration_minutes && (
            <div className="hint" style={{ marginTop: 4 }}>
              {formatTimeRange(start_time, duration_minutes)} ({formatDuration(duration_minutes)})
            </div>
          )}
        </div>
        <div>
          <label>Default price <span className="hint">(optional)</span></label>
          <input type="number" step="0.01" min="0" value={default_price} onChange={(e) => setPrice(e.target.value)} placeholder="0.00" />
        </div>
        <div className="full">
          <label>Assigned to <span className="hint">(optional)</span></label>
          <div className="check-list">
            {users.length === 0 && <span className="hint">No teammates to assign yet.</span>}
            {users.map((u) => (
              <label key={u.id} className={assigned_to.includes(u.id) ? 'checked' : ''}>
                <input
                  type="checkbox"
                  checked={assigned_to.includes(u.id)}
                  onChange={() => toggleAssigned(u.id)}
                />
                {u.name || u.email}
              </label>
            ))}
          </div>
        </div>
      </div>
      <div className="form-actions">
        <button type="submit" className="primary" disabled={busy}>
          {busy ? 'Saving...' : (initial ? 'Save changes' : `Create ${terms.jobLower}`)}
        </button>
        <button type="button" className="secondary" onClick={onCancel} disabled={busy}>Cancel</button>
      </div>
    </form>
  );
}

function RequestsView({ session }) {
  const terms = useTerms();
  const [requests, setRequests] = useState([]);
  const [filter, setFilter] = useState('pending');
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [busy, setBusy] = useState(false);
  const [decliningId, setDecliningId] = useState(null);
  const [declineReason, setDeclineReason] = useState('');

  const canMutate = ['admin', 'lead'].includes(session.user.role);

  const refresh = useCallback(async () => {
    setLoading(true); setError(null);
    try {
      const data = await apiRequest(`/api/booking-requests?status=${filter}`, {
        slug: session.slug, token: session.token,
      });
      setRequests(data);
    } catch (err) { setError(err.message); }
    finally { setLoading(false); }
  }, [session.slug, session.token, filter]);

  useEffect(() => { refresh(); }, [refresh]);

  async function accept(id) {
    if (!confirm(`Accept this request? This will create a new ${terms.customerLower} and ${terms.jobLower}.`)) return;
    setBusy(true); setError(null);
    try {
      await apiRequest(`/api/booking-requests/${id}/accept`, {
        method: 'POST', slug: session.slug, token: session.token,
      });
      await refresh();
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  async function submitDecline(id) {
    setBusy(true); setError(null);
    try {
      await apiRequest(`/api/booking-requests/${id}/decline`, {
        method: 'POST', slug: session.slug, token: session.token,
        body: { reason: declineReason },
      });
      setDecliningId(null); setDeclineReason('');
      await refresh();
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  async function destroy(id) {
    if (!confirm('Permanently delete this request? This cannot be undone.')) return;
    setBusy(true); setError(null);
    try {
      await apiRequest(`/api/booking-requests/${id}`, {
        method: 'DELETE', slug: session.slug, token: session.token,
      });
      await refresh();
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  return (
    <div>
      <div className="page-header">
        <h2>Requests</h2>
      </div>
      <p className="subtitle" style={{ marginTop: -8, marginBottom: 16 }}>
        Booking requests submitted by visitors to your public link. Accept to create a {terms.customerLower} and {terms.jobLower}.
      </p>
      <div className="filter-bar">
        <div className="chip-group">
          {['pending', 'accepted', 'declined', 'all'].map((f) => (
            <button key={f} className={`chip ${filter === f ? 'active' : ''}`} onClick={() => setFilter(f)}>
              {f.charAt(0).toUpperCase() + f.slice(1)}
            </button>
          ))}
        </div>
      </div>
      {error && <div className="error">{error}</div>}
      <div className="list">
        {loading ? (
          <div className="list-empty">Loading...</div>
        ) : requests.length === 0 ? (
          <div className="list-empty">
            {filter === 'pending' ? 'No pending requests. Share your booking link to start receiving them.' : `No ${filter} requests.`}
          </div>
        ) : (
          requests.map((r) => (
            <div key={r.id} className="row">
              <div className="info" style={{ flex: 1 }}>
                <div className="name">
                  {r.requester_name}
                  <span className={`badge ${r.status}`} style={{ marginLeft: 10 }}>{r.status}</span>
                </div>
                <div className="meta">
                  {r.requester_email && <>{r.requester_email}</>}
                  {r.requester_email && r.requester_phone && ' · '}
                  {r.requester_phone}
                  {r.preferred_date && <> · Wants {r.preferred_date} ({r.preferred_time_window})</>}
                </div>
                <div className="secondary-meta" style={{ marginTop: 6, color: 'var(--text)' }}>
                  {r.service_description}
                </div>
                {r.requester_address && (
                  <div className="secondary-meta">📍 {r.requester_address}</div>
                )}
                {r.notes && (
                  <div className="secondary-meta">Notes: {r.notes}</div>
                )}
                <div className="secondary-meta" style={{ marginTop: 6, fontSize: 11 }}>
                  Received {new Date(r.created_at).toLocaleString()}
                </div>
                {r.status === 'declined' && r.declined_reason && (
                  <div className="secondary-meta" style={{ fontStyle: 'italic' }}>Decline note: {r.declined_reason}</div>
                )}
                {r.status === 'accepted' && r.created_job_id && (
                  <div className="secondary-meta">
                    Created <button className="link-button" onClick={() => navigate('/jobs')}>{terms.jobLower} ↗</button>
                  </div>
                )}
                {decliningId === r.id && (
                  <div style={{ marginTop: 10, padding: 12, background: 'var(--tinted)', borderRadius: 8 }}>
                    <label>Decline note <span className="hint">(internal, not sent to requester)</span></label>
                    <textarea value={declineReason} onChange={(e) => setDeclineReason(e.target.value)} rows={2} />
                    <div style={{ display: 'flex', gap: 8, marginTop: 8 }}>
                      <button className="danger" onClick={() => submitDecline(r.id)} disabled={busy}>Confirm decline</button>
                      <button className="secondary" onClick={() => { setDecliningId(null); setDeclineReason(''); }} disabled={busy}>Cancel</button>
                    </div>
                  </div>
                )}
              </div>
              {canMutate && (
                <div className="actions">
                  {r.status === 'pending' && (
                    <>
                      <button className="primary" onClick={() => accept(r.id)} disabled={busy}>Accept</button>
                      <button className="secondary" onClick={() => { setDecliningId(r.id); setDeclineReason(''); }} disabled={busy}>Decline</button>
                    </>
                  )}
                  {r.status !== 'pending' && session.user.role === 'admin' && (
                    <button className="danger" onClick={() => destroy(r.id)} disabled={busy}>Delete</button>
                  )}
                </div>
              )}
            </div>
          ))
        )}
      </div>
    </div>
  );
}

function CalendarView({ jobs, onChipClick, onMarkComplete }) {
  const [monthOffset, setMonthOffset] = useState(0);
  const today = todayStart();
  const todayStr = formatYMD(today);
  const [selectedDate, setSelectedDate] = useState(todayStr);
  const viewMonth = addMonths(today, monthOffset);
  const monthStart = new Date(viewMonth.getFullYear(), viewMonth.getMonth(), 1);
  const monthEnd = new Date(viewMonth.getFullYear(), viewMonth.getMonth() + 1, 0);
  const monthStartStr = formatYMD(monthStart);
  const monthEndStr = formatYMD(monthEnd);

  const byDate = {};
  jobs.forEach((j) => {
    jobOccurrencesInRange(j, monthStartStr, monthEndStr).forEach((o) => {
      (byDate[o.date] = byDate[o.date] || []).push(o);
    });
  });

  const firstDayOfWeek = monthStart.getDay();
  const daysInMonth = monthEnd.getDate();
  const cells = [];
  for (let i = 0; i < firstDayOfWeek; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);
  const monthLabel = viewMonth.toLocaleString(undefined, { month: 'long', year: 'numeric' });
  const dows = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

  const selectedOccurrences = selectedDate ? (byDate[selectedDate] || []) : [];

  return (
    <div>
      <div className="calendar">
        <div className="cal-nav">
          <button className="secondary" onClick={() => setMonthOffset(monthOffset - 1)}>← Prev</button>
          <span className="cal-month">{monthLabel}</span>
          <button className="secondary" onClick={() => setMonthOffset(monthOffset + 1)}>Next →</button>
        </div>
        <div className="cal-grid">
          {dows.map((dow) => <div key={dow} className="cal-dow">{dow}</div>)}
          {cells.map((d, i) => {
            if (d === null) return <div key={i} className="cal-cell empty"></div>;
            const dateStr = `${viewMonth.getFullYear()}-${String(viewMonth.getMonth() + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const occs = byDate[dateStr] || [];
            const isToday = dateStr === todayStr;
            const isSelected = dateStr === selectedDate;
            const classes = ['cal-cell'];
            if (isToday) classes.push('today');
            if (isSelected) classes.push('selected');
            return (
              <div key={i} className={classes.join(' ')} onClick={() => setSelectedDate(dateStr)}>
                <div className="cal-date">{d}</div>
                {occs.slice(0, 3).map((o, j) => (
                  <div
                    key={j}
                    className={`cal-chip ${o.completed ? 'done' : ''}`}
                    title={`${o.job.title} — ${jobCustomerName(o.job)}`}
                    onClick={(e) => { e.stopPropagation(); onChipClick(o.job); }}
                  >
                    {o.job.title}
                  </div>
                ))}
                {occs.length > 3 && <div className="cal-more">+{occs.length - 3} more</div>}
              </div>
            );
          })}
        </div>
      </div>

      {selectedDate && (
        <>
          <div className="section-heading">
            {formatDateString(selectedDate)}
            <span style={{ color: 'var(--text-muted)', fontWeight: 400, marginLeft: 8 }}>
              ({selectedOccurrences.length} {selectedOccurrences.length === 1 ? 'visit' : 'visits'})
            </span>
          </div>
          <div className="list">
            {selectedOccurrences.length === 0 ? (
              <div className="list-empty">No visits scheduled.</div>
            ) : (
              selectedOccurrences.map((o, i) => (
                <OccurrenceRow
                  key={`${o.job.id}-${o.date}-${i}`}
                  occurrence={o}
                  onMarkComplete={onMarkComplete}
                  onEdit={onChipClick}
                />
              ))
            )}
          </div>
        </>
      )}
    </div>
  );
}

function JobScheduleView({ session, job, onBack, onMarkComplete, onChange, features = { invoices: true } }) {
  const terms = useTerms();
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState(null);
  const [page, setPage] = useState(0);
  const [showInvoiceForm, setShowInvoiceForm] = useState(false);
  const [invoiceFrom, setInvoiceFrom] = useState(formatYMD(new Date(todayStart().getFullYear(), todayStart().getMonth(), 1)));
  const [invoiceTo, setInvoiceTo] = useState(formatYMD(todayStart()));
  const [generateBusy, setGenerateBusy] = useState(false);
  const [generateResult, setGenerateResult] = useState(null);
  const PAGE_SIZE = 8;

  const canMutate = ['admin', 'lead'].includes(session.user.role);

  const allUpcoming = computeOccurrences(job, todayStart(), 730).filter((o) => !o.completed);
  const totalPages = Math.max(1, Math.ceil(allUpcoming.length / PAGE_SIZE));
  const safePage = Math.min(page, totalPages - 1);
  const upcoming = allUpcoming.slice(safePage * PAGE_SIZE, (safePage + 1) * PAGE_SIZE);
  const firstIndex = allUpcoming.length === 0 ? 0 : safePage * PAGE_SIZE + 1;
  const lastIndex = Math.min(allUpcoming.length, (safePage + 1) * PAGE_SIZE);

  useEffect(() => {
    if (page > 0 && page > totalPages - 1) setPage(Math.max(0, totalPages - 1));
  }, [page, totalPages]);

  const todayStr = formatYMD(todayStart());
  const futureSkipped = (job.skipped_dates || []).filter((d) => d >= todayStr).sort();
  const completionHistory = (job.completion_notes || [])
    .map((c, idx) => ({ ...c, _idx: idx }))
    .sort((a, b) => b.date.localeCompare(a.date));
  const [editingCompletionIdx, setEditingCompletionIdx] = useState(null);
  const [editedNote, setEditedNote] = useState('');

  async function call(fn) {
    setBusy(true); setError(null);
    try {
      const updated = await fn();
      await onChange(updated);
    } catch (err) { setError(err.message); }
    finally { setBusy(false); }
  }

  const skip = (date) => call(() => apiRequest(`/api/jobs/${job.id}/skip`, {
    method: 'POST', slug: session.slug, token: session.token, body: { date },
  }));
  const unskip = (date) => call(() => apiRequest(`/api/jobs/${job.id}/skip/${date}`, {
    method: 'DELETE', slug: session.slug, token: session.token,
  }));
  const reschedule = (date, new_date) => call(() => apiRequest(`/api/jobs/${job.id}/reschedule`, {
    method: 'POST', slug: session.slug, token: session.token, body: { date, new_date },
  }));
  const cancelReschedule = (date) => call(() => apiRequest(`/api/jobs/${job.id}/reschedule/${date}`, {
    method: 'DELETE', slug: session.slug, token: session.token,
  }));

  function saveCompletionEdit(idx) {
    return call(() => apiRequest(`/api/jobs/${job.id}/completions/${idx}`, {
      method: 'PUT', slug: session.slug, token: session.token,
      body: { note: editedNote },
    })).then(() => { setEditingCompletionIdx(null); setEditedNote(''); });
  }

  function deleteCompletion(idx, date) {
    if (!confirm(`Delete the completion entry for ${formatDateString(date)}?`)) return;
    return call(() => apiRequest(`/api/jobs/${job.id}/completions/${idx}`, {
      method: 'DELETE', slug: session.slug, token: session.token,
    }));
  }

  async function generateInvoice() {
    setGenerateBusy(true); setError(null); setGenerateResult(null);
    try {
      const inv = await apiRequest(`/api/jobs/${job.id}/generate-invoice`, {
        method: 'POST', slug: session.slug, token: session.token,
        body: { from: invoiceFrom, to: invoiceTo },
      });
      setGenerateResult(inv);
      setShowInvoiceForm(false);
    } catch (err) { setError(err.message); }
    finally { setGenerateBusy(false); }
  }

  const completionsInRange = (job.completed_dates || []).filter((d) => d >= invoiceFrom && d <= invoiceTo);
  const projectedTotal = completionsInRange.length * (parseFloat(job.default_price) || 0);

  return (
    <div>
      <div className="page-header">
        <h2>Schedule</h2>
        <button className="secondary" onClick={onBack}>Back to {terms.jobsLower}</button>
      </div>
      <div className="schedule-summary">
        <strong style={{ color: 'var(--text)' }}>{job.title}</strong> — {jobCustomerName(job)} · {formatSchedule(job)}
        {canMutate && features.invoices && (
          <div style={{ marginTop: 10 }}>
            <button className="secondary" onClick={() => { setShowInvoiceForm((v) => !v); setGenerateResult(null); }}>
              {showInvoiceForm ? 'Hide invoice generator' : 'Generate invoice from completions'}
            </button>
          </div>
        )}
      </div>

      {showInvoiceForm && (
        <div className="form-card">
          <div className="section-heading" style={{ marginTop: 0 }}>Bill completed visits</div>
          <div className="form-grid">
            <div>
              <label>From</label>
              <input type="date" value={invoiceFrom} onChange={(e) => setInvoiceFrom(e.target.value)} />
            </div>
            <div>
              <label>To</label>
              <input type="date" value={invoiceTo} onChange={(e) => setInvoiceTo(e.target.value)} />
            </div>
          </div>
          <p className="subtitle" style={{ marginTop: 14, marginBottom: 0 }}>

                        <input
                          value={editedNote}
                          onChange={(e) => setEditedNote(e.target.value)}

                          style={{ flex: 1 }}
                        />

                    )}

                    <div className="actions">

                        <>
                          <button className="primary" disabled={busy} onClick={() => saveCompletionEdit(c._idx)}>Save</button>

                        </>

function JobsView({ session, features = { invoices: true } }) {
  const terms = useTerms();

  const [customers, setCustomers] = useState([]);
  const [users, setUsers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [mode, setMode] = useState('list');
  const [editing, setEditing] = useState(null);
  const [busy, setBusy] = useState(false);
  const [completionInitialDate, setCompletionInitialDate] = useState(null);

  const [layout, setLayout] = useState('list');
